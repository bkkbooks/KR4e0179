body:
  text: 甫田集卷二十七明文徵明撰傳五首戴先生傳戴先生者蘇長洲人也名冠字章甫生而穎異篤學過人其學自經史外若諸子百家山經地志隂陽歷律與夫稗官小說莫不貫總而摉彌刳剔必求緣起而㑹之以理為文必以古人為師汪洋澄湛奮迅陵轢而議論髙逺務出人意詩尤清麗多寓諷刺推其餘為程文亦奇雋不為關鍵束縛一時譽聞藉藉起諸生間同時諸生多守章句訓詁所為經義類多熟爛骫骳之言先生既聰明强解又髙朗自喜下視曹耦莫有當其意者以故人多忌而非毁之然卒亦莫有能過之者每賔興人必擬先生首解先生亦自謂科第可得也而八試皆絀𢎞治四年始以年資貢禮部是嵗貢禮部者數百人羣數百人而試之其名在第一入試內廷復褒然出數百人上然例止得學官當道者惜之勒令卒業太學以需他用而先生不能待矣竟就選得浙江紹興府儒學訓導在官以其學教授諸生諸生多所造就而先生益以其閒隙肆志於學學益宏肆考論著述不少怠廢初先生為諸生時紹興有為御史督學南畿者以文學自負先生見其文有所指擲或達於御史銜之欲論黜先生不果及官紹興御史者罷官家居解後有言不相下他日御史死其家誣執先生遂罷歸先生雅志當世自其少時即上書有司請逐里中淫祠去之及壯益究心時事三原王公以都御史撫巡江南特賢愛先生每召見輒欵語移時聽其論議未嘗不偉嘆知先生非經生也及先生至京公已為吏部見之驚曰爾尚舉子耶因問當今切務先生條上數事大要以用賢為國家首務又勸公不棄邇言不恃已見勿以嘗挫愞奪素志其言謇諤皆有所諷切在紹興時浙中海塘為患有韓參議者從先生訪水利得失先生條刺利害興廢及今修築事宜纖悉詳明而切於用韓遂取而行之民至今以為便先生所著有戴子若干卷隨筆類記若干卷讀史類聚若干卷通鑑綱目集覽精約若干卷經學啓蒙若干卷竒字音釋若干卷禮記辨疑若干卷氣候集解若干卷濯纓文集若干卷和㑹稽懷古詩若干卷補文房圖贊若干卷先生年七十有一以正德七年正月二十一日卒先生兩娶皆夏子四人恩憲憑應憑縣學生女三人孫男女十人文子曰近時以科目取士凡魁瑋傑特之士胥此焉出以余觀於戴先生一第之資豈其所不足哉迄老不售以一校官困頓死殆有司之失耶抑自有命耶謂科目不足以得士者固非也而謂能盡天下之士誰則信之華尚古小傳華尚古名珵字汝德嘗仕有官稱以其仕不久又性好古故遺其官不稱稱尚古生尚古生常之無錫人出南齊孝子寶之後世纍髙資不仕至濟時甫以資為郎後以二子升朝纍贈光祿署丞户部主事尚古其次子也少績學與弟珏俱隸學官為弟子員俱刻厲自奮既而珏舉進士去為稽勳郎中而尚古七試輒斥循資貢禮部卒業太學選授光祿寺太官署署丞太官掌內庭法膳共具浩穰而事關中禁倉卒皆從中涓取辦其徒率叨詖驕揚往往憑恃為姦利稍不厭所欲輒能中人以法尚古周慎詳雅而潔廉自將又平實沈厚見者沮喪訖其去無有過舉一時卿僚方重得尚古而尚古歸矣其後有司復援恩例起之卒辭不就蓋尚古仕雖晚而輒知止足又樂閒曠既家居率以良時勝日領客燕游南昉錢塘北盡京口數百里中名山勝境靡不踐歷遐矚髙寄黯然興思有古逸人之風家有尚古樓凡冠屨盤盂几榻悉擬制古人尤好古法書名畫鼎彞之屬每並金懸購不厭而益勤亦能推别真贋美惡故所畜皆不下乙品時吳有沈周先生號能鑒古尚古時時載小舟從沈周先生游互出所藏相與評隲或纍旬不返成化𢎞治間東南好古博雅之士稱沈先生而尚古其次焉尚古家居孝友而接物闓朗未嘗督過人而恆負人之懼古稱長者尚古有焉尚古今年七十有幾先未有子以稽勳之子鉦為子晚得一子名鑄余家吳門與錫比壤頗聞諸華之盛其間履德植義固多有之要不如尚古生之篤意古人也尚古所藏古名人文集若古人理言遺事古法帖總數十費皆數百千不惜又喜散財利物而不求知主名其事皆有足稱者然固富人有識者所能可以不書書其大者以傳胡參議傳參議胡公琮字文德蘇之長洲人也成化初舉進士為江陵知縣縣隸荆州荆既重鎮而江陵輔邑地大物繁民剽悍易動更數政不治公疏舉博謀隨事經理稍用法剪其豪植不令得肆遼王以近屬橫甚其下兵校椎埋圉奪尤多無賴公一繩以法無所貸王不能堪日夜思構公時時饋食襲以金錢庶幾公一顧得以劫持公既端介不可溷則相戒斂戢終公去噤不敢為暴湖襄盜發朝廷籍土兵討之夷獠悖謾素無紀律推刃劫奪所過警擾公大具牛酒先事飭其渠率俾為要束而身自餉終皆厭屬逾望以次受犒去無有譁者居三年徵入為監察御史以事左遷知黃之麻城亦湖南劇邑民習聞公江陵之政惴恐守法公顧其民淳質可以導化乃不事搏擊一意拊循俗佞鬼鮮知禮義乃毁淫祠表章節孝時時進其父老儒生問民所惡欲而罷行之民用悅服俗以丕厚稍遷常德府同知廉方自持頗不與羣僚狎比或言於守曰同知故京朝官豈能為守下守嗛之公不為意俄而守為上官所持公審畫導利卒用計脫守守嘆曰胡同知仁人也而幾失之自是非胡同知莫與計事大璫自滇還道出湖湘所至笞擊官吏責索賂遺公故不為禮徐召邏卒隨以出若將檢其槖裝者璫懼急引去他日有詔括金諸郡檄牒旁午公持不即下僚屬相繼進說恐閣詔得罪公曰常德郡貧嵗且儉矧金非所産又可賦外有徵乎即罪罪主者不以纍諸君也已而詔罷不徵而他郡先有徵發者聞常德事甚愧在常德數年以母憂去再起同知處州處故有礦穴官守之民或他處發地得礦中官即欲奏籍於官公不可曰愚民偶有所獲既非故穴其出不常萬一籍官則有常課一不登則將取足於民民且獲重困我在豈可使吾民重困乎即上疏言先王之政取於民有制蓋不欲盡民之利也況與民爭利乎其言明切懇至朝廷卒從之在處期年屬時缺守一時善政咸自公出故民尤深德公爭欲得公為守而公倦遊矣㑹滿考赴吏部遂乞致仕時王端懿公主銓彭惠安公為吏部侍郎素皆知公皆欲慰薦公而公去意堅决遂為論奏增秩以朝列大夫山西參議致仕先是公在處州彭惠安以都御史巡視兩浙處為屬郡常以邑子為丞者屬公公按黜之惠安不以為忤反益賢公及是去尤甚惜之戴縉者公同年進士又嘗同為御史雅相厚善其後戴為權璫引用攀附驟貴公遂去之而戴念之不衰及公浮湛外僚數致意欲援用公公絶不與通他日以事至京戴方為刑部尚書顯赫用事蹟公所寓躬候之亦避不見蓋公修正彊執不欲附離匪人故仕中外餘二十年潦倒末殺僅以一郡倅終老林下一時論者或有遺望而公自視乃無不足生平寡與既歸益事韜匿門庭寂然郡邑大夫往往不知有公𢎞治間有為郡守者雅知延禮郡彥於是諸郡彥共請公為㑹偶其人被酒誶語公即起馳去恚曰吾本不見時人無事輕出乃為鼠輩所侮自是掃軌滅跡雖故人親戚亦罕親接年七十九終於家論曰雋不疑有言太剛則折而蘇氏非之以為此鄙夫患失之言也夫剛亦貴有以養之孔子曰棖也欲焉得剛惟無欲乃能有養耳以余觀於胡公歷仕郡縣靖共正直必行其志卒用受知當路使其時不即引去必亦馴致大官可以有為而剛方嫉惡必不能脂韋取容萬一為小人所構將舉其平生而失之於是乎剛則折矣夫以蕭太傅顔平原之賢又皆為君上所知而卒皆不免議者猶以其老不知去有以致之然則胡公豈獨能剛哉其所以養之者深矣公無子有贅壻曰陸應賔應賔生子粲舉進士為給事中頗能言其事然而逸亡多矣列其大略以傳企齊先生傳企齊先生姓張氏名愷字元之常之無錫人也成化末舉進士奉使江浙閩廣既竣事援例歸省其父父亡解官持服服闋還朝選授兵部職方司主事分司山海關關臨絶塞當遼海之衝朝鮮入貢及關隴商販咸取道關下地廣人衆往往由他道行先生與為要束禁不得踰度商人或執僞檄通徼外為姦利悉按發之仍牒所司置籍勾稽自是無敢闌出入者而商人皆感帖無敢越佚先是分司更費咸榷諸商人先生謂譏而不征古之訓也既察非常又榷其貨幾於為暴矣且仕有常祿而奉使則有過所自應取給有司何以暴為因檄所在量為供頓而悉罷諸科擾以為常三年代還改授刑部陜西司主事㑹中官楊鵬有嗛於法吏托拾諸曹細故悉奏逮詔獄或謂先生坐曹未閲月事出其前宜有以自白先生嘆曰某誠無罪顧諸君豈皆其罪耶射時規免人謂我何竟從坐補外通判順德府分領監牧先時種額冗濫蕃息不能以時而有司視額取贏大為民病先生力言於上官隨宜更革務為節適而科敷徵發弗擾而集上官才之多屬以庶政平繇讞獄以若河防莫不職辦舉最升山東東平州知州州當南北孔道使車結轍守長將迎日有不暇先生曰吾為天子守一州存亡休戚萬姓攸賴可以末節而廢吾職耶於是展采錯事問民所惡欲而罷行之綜核緒正惟慎而勤至於餼館徠悉從簡約時大璫李興奉詔治水張秋詔旨嚴切所至笞辱長吏吏奔走承迎賄謝狼籍先生徒手謁之人為傍懼而先生進止詳雅占對明暢興顧瞻咨嗟以儒吏稱之無所忤素喜問學能以餘力飾教事修學宫端士習勸相引翼導以化本民用綏集而儒業以興州以大治超拜貴州黎平府知府黎平古之荒服雖名列郡而夷獠雜居鳥言卉服侏離獷悍既不可以訓而王法亦有所不加前政往往禽獸畜之先生嘆曰忠信可行於蠻貊此獨非人乎乃􅀈去牙角而推誠拊循民夷尋皆擾服屬夷有嚚訟更數政不平或稱兵仇殺先生諭以禍福開示大義而以誠導之兩造悅服悉投仗解去郡本五開衛治後雖置郡而兵官彊禦不緝其下郡民賦役于公每苦悍卒圉奪民望見郡城輒懼而逃卒得以乘其敝代之轉輸悉為乾沒先生稟承上官嚴為申飭有犯輒械而懲之舊有撫苖兵官嵗出行部叨詖狼戾諸洞獠苦之先生亦請罷置由是民夷安集輸將闕時賦發章程不戒而孚而郡以有立一時撫巡若巡視大臣交章論薦而先生方以病乞歸奏未及上而病加篤請於監司暫歸就醫時逆瑾盜權以奇法羅織羣僚闕先生在告愆期逮赴京獄邀賄不得罷為編民瑾誅起為山西太原府知府未至轉福建鹽運使抑遏彊禦務以通商惠民而持廉守法不以冗散易節御史賀泰以篤實疏通論薦而當路嗛之竟以疾罷歸歸二十有七年年八十有六嘉靖戊戌五月八日以疾卒子四人璵縣學生早卒􅀈承事郎珊理俱縣學生孫十人先生端諒若淑木質而理事關義利介然不可易守東平時數以事與上官爭執反復數四迄不為少詘在黎平亦以不時堂參為監司所怒其官不振殆亦以此然先生未嘗立異以徼名特不肯茍有所狥且逶迤張弛一惟名義所在而律身尤嚴往來仕途非傳置不乘官舟不給過所家居不役輿皂平生俸請之外不妄受一錢歷官二十年先世田廬無所增益既謝事家居非有故不輒至城府邑太府若行部使臣或就問政宴語終日不一及其私植志髙朗不屑鄙事而强學績文乃不以時廢少則貫綜羣籍髦而彌勤為文暢達理勝尤喜為詩生平履歷與所感觸所見聞悉於詩發之有文集若干卷他論著若貴陽宴談釣臺遺意備遺補贊諸書又若干卷先生本江隂流璜里人父襸贅無錫鄧氏生先生遂占數居錫先生既老不忘流璜瀕死自為文刻石以表先墓先生昆弟五人白首同居有無通假死喪患難惠恤惟勤於倫誼至篤也文某曰余家吳門與錫接壤少則聞有張先生企齊者宦學有稱同時若故邵文莊公今少保大司馬秦公嫓聲儷蹟實相曹耦其後二公浸涉華要功烈宏偉遂顯名天下而先生再起再躓卒老於有司而世乃無有知之者然考其平生其文學行義固二公者流使其得志以行其所學其功烈豈少哉顧春濳先生傳顧春濳者吳郡城臨頓里人也所居有田數弓每春時東作則有事其間因築室以居署曰春菴自稱春菴居士他日仕歸邂逅於濳人問於濳所為得名曰昔人謂於此可以濳隱也乃欣然笑曰吾亦從此逝矣遂改稱春濳春濳名蘭字榮甫嘗舉於鄉再仕為令長有官稱矣而人遺之不以稱稱春濳云春濳秀偉特達讀書不守章句而開絶人少以俊茂選充邑學生諸邑學生以經義相髙咸衆人視春濳春濳不恤也獨與同舍生文徵明友善徵明雖同為邑學生而雅事博綜不專治經義喜為古文辭習繪事衆咸非笑之謂非所宜為而春濳不為異日相追逐唱酬為樂𢎞治戊午舉應天鄉試去遊太學太學衣冠文物之㑹所與遊皆一時知名士若錢塘邵鋭若吳興蔣瑶若金陵陳沂同郡若方鵬方鳳若尤樾諸人其尤狎妮者後諸人皆舉進士去為大官春濳自𢎞治已未至正德丁丑凡七上禮部不中以太學生釋褐授山東淄川知縣淄川鄙小邑而賦調為煩更前政墮弛豪植縱橫往往席執規免春濳綜核鈎托一視資繦下上吏不得緣為奸至於屠酌榷㑹一切科謫凡以瘠民裕上者悉蠲放之拊循道利民用安集上官才之調知江西之樂安樂安視淄為劇俗陋而敝人死溺於禨祥或更數嵗不葬學校生徒或不冠而婚女婦夫死不俟成喪輒嫁春濳醜其事悉列上監司首為緒正里胥執役於公率欺鄉鄙而侵牟其利不令受事春濳測其隱而消息之崇良抑姦務為均適而展采錯事不以勢移不為利殉而將以勤誠逾年而民信以悅風以丕厚邑方有賴而春濳顧已倦遊竟投劾去居官尤事持廉常祿之外一無所取亦不以一物遺人在淄時屬當嵗覲故事入覲多行苞苴以要譽當路春濳徒手不持一錢父老知其如此率邑中得數十緡為贐春濳為詩卻之及是歸家徒四壁先所業田已屬他人獨小圃僅存有水竹之勝故喜樹藝識物土之宜花竹果蔬各適其性淺深有法播植以時而時其灌溉久皆成林花時爛然顧視喜溢循畦履畝日數十匝不厭客至燒筍為具觴詠其間意欣然樂也於是二十年餘矣自非疾病風雨及有大故未嘗一日去此而於世俗酬應仕路升沈與凡是非徵逐一切紛華之事悉置不問居常夷易不為岸谷亦不肯脂韋取容而受性堅决能激昻任事既多更練益用間習蓋嘗有志用世也屬時方重進士而庸視他途自顧晚暮不欲與時流相取下遂以肆志為髙以隱約自勝斯其所謂濳也已或謂昔之隱者必林棲野處滅迹城市而春濳既仕有官且嘗宣力於時而隨緣里井未始異於人人而以為濳得微有盩乎雖然此其蹟也茍以其跡則淵明固常為建始參軍為彭澤令矣而千載之下不廢為處士其志有在也淵明在晉名元亮在宋名濳朱子於綱目書曰晉處士陶濳與其志也余於春濳亦云甫田集卷二十七
