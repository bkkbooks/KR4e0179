body:
  text: 甫田集巻五明文徵明撰詩五十一首梨花山鷓物華無賴酒初醒奕奕梨花照晩晴恠底山禽啼不歇十分春色近清明同王履約過道復東堂時雨後牡丹狼藉存葉底一花感而賦詩邀道復履約同作推脫塵縁意緒佳衝泥先到故人家春來未負樽前笑雨後猶餘葉底花矮紙凝霜供小草淺甌吹雪試新茶慿君莫話蹉跎事緑樹黄鸝有嵗華偶過甫里乗月至白蓮寺訪陸天隨故祠一龕香火白蓮宫古社猶題甫里翁坐挹高風千載上依然舊宅五湖東雨荒杞菊流螢度月滿陂塘鬭鴨空故草已隨塵土化空瞻遺像寂寥中祠有唐時遺像為狂人所仆滿腹中皆翁手稿後像雖設而稿不可得矣王履吉示余春日即事之作久而未復三月望後汎舟出西郭借韻贈答郭西楊栁緑煙多續續春舟載綺羅落日千山眉歛黛清江一曲眼横波偶追勝踐抛塵慮坐惜芳華對酒歌欲赴江南遊子意古原春草恨如何晩晴茆簷漠漠晩風微曲院無人雨霽時忽見碧牕疎影亂一痕新月在花枝滄浪池上楊栁隂隂十畆塘昔人曽此詠滄浪春風依舊吹芳杜陳迹無多半夕陽積雨經時荒渚㫁跳魚一聚晩波凉𣺌然詩思江湖近便欲相攜上野航過吳文定公東莊相君不見嵗頻更落日平泉自愴情徑草都迷新轍迹園翁能識老門生空餘列榭依流水獨上寒原眺古城匝地緑隂三十畆㳺人歸去亂禽鳴陪蒲澗諸公㳺石湖杜若洲西宿雨過行春橋下長䕷蕪青松四靣山圍寺白鳥雙飛水滿湖故壘春歸空有迹扁舟人逺不堪呼相看不盡興亡恨落日長歌倒玉壺同履仁濯足劒池舍舟即嶔﨑探策入窈窕窮崖擘蒼鐡直下千尋表絶磴懸飛梁仰首心欲悼隂壑多長風六月更幽悄秋聲落井幹翠雨滴深篠與君富閒懐竟日恣幽討都將雙足塵濯向千年沼早起露坐炎宵不能寐起坐蹇絺幃繁星麗中天明河連曙暉凉風不滿髩落月猶在衣中庭草木稠宿露朝未晞人生亦旦暮急景無停機撫時懐美人欲徃情依依暑寒互推遷安得願無違與王欽佩顧華玉夜話燭䟦熒熒照酒明故人相對說平生差池何止三年别老大難忘一舉名殘夜池塘分月色遶門楊栁度秋聲不辭筆硯酬嘉㑹去住江湖各有程渡江曉􅑴龍江三百里蒹葭漠漠首重囬天連舊禁青雲繞日出中流白霧開滿目秋光聊北渡隨舟山色更東來分明記得盤㳺地一抹蒼煙是鳯臺烏衣鎮望滁州諸山東葛城頭曉月殘烏衣鎮上水潺潺偶來下馬三家市先見環州百里山道路重經渾不記人情未逺尚相關舊㳺最是西南勝儗辦青鞋一醉攀栢子潭絶壑溟沉古隧長飛樓散盡栢蒼蒼空山雨露曽沾溉春水魚龍已奮揚地脈何由關至治野人猶解說先皇只應壊碣奎文在秋草難埋永夜光滁州官舍侍少卿家叔夜話宦轍滁陽弟踵兄我縁諸父得重經只應故榻曽聴雨敢儗虚堂是聚星兩世相看親叔姪百年好在舊門庭夜䦨無限分違意月滿空階酒正醒㳺醉翁亭不果寄滁州故人當時踪跡兩峯間疋馬重來不及攀曽有題名留壊壁羞將塵面見青山未應啼鳥知人樂空望清泉裹茗還寄謝故人休見誚百年雙足㑹須閒宿江浦有懐定山先生驚風木葉夜毿毿􅍦宿江城酒半酣千載名山無謝傅一生知己愧羊曇青燈暮雨殘詩帖明月蒼松舊草菴二十年來頭欲白當時心事向誰談舟中望金山一笑推蓬見碧岑可堪行役負登臨舊㳺誰覔三年夢回首空餘萬里心初日樓臺相映照凌波草樹自浮沉無由去汲中泠水卧聴寒潮雜梵音失解無聊用履仁韻寫懐兼簡蔡九逵夜半休驚負壑舟已應吾道屬滄洲夢中桂樹青天月江上芙蓉玉露秋疲馬尚憐銜橜在㝠鴻翻困稻粱謀倦游更憶相如逺落日蒼茫立渡頭九日閒居用淵明韻端居念物化草屋秋風生白雲從東來因之感浮名素髮已充領世慾移聰明窮無致用資安事蜚英聲塵埃失故步老大懐弱齡菁華不復妍白日已西傾撫時不能忘徙倚當前榮寒花媚幽歜悵然傷我情愴兹霜露早寧知嵗功成贈王直夫憶昨追隨試有司少年先聴鹿鳴詩老無時命吾何恨君負才名衆所推盛世豈容駒在谷雲逵行見羽為儀馬蹄輕疾香塵起萬里天風拂桂枝東禪寺古寺謝車馬清臨緑玉灣雙禽啼竹逕􅍦犬䕶松闗落葉秋滿地夕陽僧自閒偶來還自去回首碧雲間石湖作落日淡煙消平湖碧玉揺秋生茶磨嶼人在越城橋樹色晴洲斷鐘聲古寺遥西風吹短髩還上木蘭橈秋日同杜允勝湯子重游東禪次子重韻人事無停機曦暉正流耀及兹東城游駕言謝紛要杪秋霽景澄寒原入高眺靜躁本無媒憂欣人自召蘼蘼霜蘤明歴歴幽禽調獨行心已怡况也偕二妙投社慚淵明能詩得清照燕談析𤣥㫖悲吟發孤竅一語何足稽後期真未料微風西北來冷然雜清嘯錢氏池上芙蓉九月江南花事休芙蓉宛轉在中洲美人笑隔盈盈水落日還生𣺌𣺌愁露洗玉盤金殿冷風吹羅帶錦城秋相看未用傷遲暮别有池塘一種幽題畫宻葉參差漏夕陽濺濺寒玉潄迴塘𤣥言消盡人間事一壑松風滿髩凉寂寞平臯帶淺灘幽人時共夕陽還水禽飛去疎煙滅目送秋光入斷山追和錢舜舉山居韻翠深山帶屋緑淨水通門泉石情還重丘園道自尊種莎添野色留竹䕶籬根樂事惟心㑹休逢俗子論次韻荅子重東城見懐之作愁雲薄層漢北鴈鳴覉棲天寒霜雪繁零葉被長隄逺洲宿修莽曲路紛留荑南牕夢佳人覺來隔山溪幽期不得將日暮聞莎雞秋風日已至蘭舟一何稽憂思無能解起行涉荒畦獨言疇與晤樽酒為誰攜終然無所適歸來對青藜素書自何來展讀情更悽人生貴恊志何用悲秦齊結交不從中對靣分雲泥邢麗文顧訪小齋話舊十年踪跡一追歡已覺蕭蕭兩髩殘里社與君游最乆頭顱如此見何難不忘習氣評新業相顧塵埃只舊冠為說流光堪戀惜故盟從此莫教寒題畫澤國霜清鴈影高空庭木葉已蕭蕭夕陽忽送西牕雨一片江南落素綃雙榦亭亭碧玉明翠隂凉沁石牀清南風吹㫁忩間酒卧聴蕭蕭暮雨聲病中辱履仁過訪西風零雨歇幽逕故人來落葉已滿地草堂寒未開清心香續篆引筆硯封埃無計留君得依然日暮回秋聲繞茅屋落日井梧寒疾病淹愁在風煙逼嵗殘閉門車轍㫁圍腹帶痕寛勞謝王𤣥度時來覔故歡寒夜茆屋寒初重無眠對燭光疎砧何處月殘葉滿庭霜攬物驚時改供愁有夜長空餘強學志撫巻視茫茫題竹寄履仁西齋半日雨浪浪雨過新梢出短牆塵土不飛人跡㫁碧隂添得晩牕凉竹間佳興屬王猷竹外風煙寫素秋市散人間詩欲就一簾疎雨入西樓題畫碧山𣺌𣺌隔晴川古樹垂藤鎖翠煙野鹿銜花時隠見石橋無路訪神仙秋清山木夜蒼蒼月出波平㫁岸長千古高情蘇子賦東風誰更說周郎矗矗青山帶白雲石梁鷄犬數家村江空不遣漁郎到落盡桃花自揜門樓前高栁翠煙迷樓外香塵逐馬蹄風揜歌聲春不散㫁膓人在畫橋西千山罨畫擁飛樓山木蒼蒼水漫流青鳥亂啼花細落石梁南畔是瀛洲蒼山曲曲水斜斜茆屋高低帶淺沙車馬城中塵似海多應不到野人家萬木縁山過雨青山迴路㫁水泠泠分明記得環滁勝只欠臨溪着小亭曲塘風急水横流百丈勞牽鬬石尤自古江湖分逆順不應回首羨歸舟陳魯南將赴試南宫過吳中訪别賦詩送之不盡金陵晤語情扁舟重見闔閭城江湖動是經時别雨雪仍看嵗晩行涉世與君俱老大勞生何苦事聲名秪應獻賦心猶壯西北青雲是玉京送錢元抑㑹試澤國寒深木葉彫征人欲發意蕭蕭公車儗奏長楊賦祖道先題駟馬橋三月東風春爛漫五雲西去鬱岧嶤一杯明日三千里看取清霜拂舊貂寄金陵許彦明兼簡王欽佩宫樹飛霜謝玉珂秋懐應屬許渾多寒城自映秦淮月游女新傳子夜歌别後風煙勞悵望嵗殘消息定如何官忙為問王司馬能放晨衙幾度過題畫緑樹敷隂翠荇香方舟十里下迴塘白鷗飛去青山暮落日唱歌煙水長登鼓角樓荒譙漠漠帶郊坰晩色浮空鼓角晴西望青山明落日北風吹雪滿江城繁華欲問都無迹興廢相尋毎繫情秋草不菲愁萬里古原南畔看雲生題太白像宫袍錯落灑春風玉雪淋漓殢酒容殘夜屋梁栖落月碧天秋水洗芙蓉麒麟豈是人間物眉宇今從畫裏逢一語不酬千載諾匡廬山下有雲松甫田集巻五
