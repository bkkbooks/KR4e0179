body:
  text: 甫田集卷三明文徵明撰詩五十七首元日試筆晨光藹藹散祥煙寶歷初開第四年井里蕭條占歲儉人情薄劣與時遷雪殘梅圃難藏瘦日轉氷池欲破堅老大未忘惟筆硯小窗和醉寫新篇人日立春東風剪韭薦時羞細雨江梅破晚愁眼底日辰剛數七夢中春色又從頭誰修故事裁金勝恰有殘寒送土牛珍重道衡今不作花前詩思總悠悠懷次明髙居寂歷鴈村前中有幽人抱枕眠見説常貧妨道味從教小病養間緣三旬閉户桃花雨一味安心柏子煙安得袚除將艇子橫塘新水緑娟娟春曉曲翠塵沃日煙霏霏彤光飛上干罘罳誰家髙樓鎖春色金鋪約户蟠雙螭東風掠幌鸞綃動瑶􅀢蘭溫睡初重起來臨鏡悄無言􅍭情自理雙鶯夢夢回生怕守宮殘捲袖移韝獨自看燕子銜春欲飛去海棠猶自勒輕寒簾幕垂寒朝不捲綺疏結香春較淺欲裁羅段作春衫自爇薰罏尉金剪春夜曲矞雲貫月溶金波碧煙羃樹春婆娑海珠泣紅花露重蜃脂流絳蘭逶迤越羅復幕交流蘇繡襦結帶明青蛾金壺轉刻銅龍濕漏水濺濺轆轤澀轆轤沉沉軋銀井晝轂難淹夜愁永起看青漢不成眠不見雙星見河影河明月淡斗橫斜通宵春思匝天涯眉端心事説不得自調新譜按琵琶庭中海棠為風雨所敗病起傷春試倚欄名花經雨已摧殘等間一片愁飛却滿地腥紅更忍看崇朝妬雨損花枝更著狂風徹夜吹莫自怨他風雨惡靚糚能有幾多時獨坐獨坐茒簷靜澄懷道味長年光付書卷幽事續罏香日出鳥烏樂雨收花竹涼蕭間習成懶不是寡迎將梨花剪水凝霜妬蝶裙曲闌風味玉清溫粉痕浥露春含淚夜色籠煙月斷魂十里香雲迷短夢誰家細雨鎖重門洗糚見説清明近旋典春衣置酒樽錢氏西齋粉紅桃花溫情膩質可憐生浥浥輕韶入粉勻新暖透肌紅沁玉晚風吹酒淡生春窺墻有態如含笑對面無言故惱人莫作尋常輕薄看楊家姊妹是前身春興青陽轉芳序淑景麗清嘉晨風扇微和百鳥鳴周遮繁隂泫清露朱英耀朝華端居愧物化起擷崇蘭葩貞芬媚幽獨常恐委泥沙青青陌上草日夕遍天涯妍英弄芳意桞色含春姿物華浩無涯駘蕩東風吹東風日以熙草色日以滋青春萬里道遊子有所思浮雲漏白白宿露朝已晞攀條惜婉麗忽得瑛瓊枝芳悰未有托暮景已西馳菁華難復恃結花聊自怡東禪寺古寺幽深帶碧川坐來清晝永於年虛堂市逺人聲斷小砌風微樹影圓筆硯更償間裏債茗薰聊結靜中緣落花啼鳥春如許却誦新詩憶遇賢遇賢宋神僧嘗住東禪有詩云門前緑樹無啼鳥庭下蒼苔有落花聊與東風論箇事十分春色屬誰家詩人孫太初過訪把劔南來賦逺逰又看東上浙江舟山齋動是經時别菜飯聊堪半日留醉裏江湖真有味春來花鳥正關愁天台鴈宕平生夢憑仗詩囊次第收暮春雨後陳以鈞邀遊石湖遂登治平貪看粼粼水拍堤扁舟忽在跨塘西千山雨過青猶滴四月尋春緑已齊湖上未忘經歲約竹間覓得舊時題晚煙十里歸城路不是桃源也自迷題畫東風吹春著幽谷宿雨浮煙樹新沐斜橋曲徑帶流水白日疏籬蔭濃緑晴江隔世不隔山百疊蒼螺墮茆屋輸却長吟抱膝人鎮日臨磯弄晴淥千巖拔地排青蒼古松謖謖連重岡岡回嶺復得奇絶瀑流千丈垂銀潢盤盤細路入雲長兩涯對起懸飛梁雲重路僻不知處應有仙家在深塢夕陽變滅晚山寒無限風煙屬倚闌與宜興吳祖貽夜話有作就簡李宗淵杭道卿吳克學有客扁舟自陽羡夜堂風雨對髙眠不辭談笑成佳會祗覺淹留有宿緣别後交遊如夢裏意中山水落樽前青燈酒醒還生戀明日煙波更渺然春日茆屋泥香燕子飛東風日暖谷鶯啼遊人漫自穿花栁别有春光在竹西金陵秋夜與彭寅之湯子重步月雙闕深沉夜向闌碧天露下葛衣單風吹急柝嚴城閉月照行人古道寒往事悠悠歌鳳去青山靡靡識龍蟠壯懷萬里同遊在滿目風煙引劔看題黃應龍所藏巨然廬山圖筠陽文學倦官職十年歸來四壁立探囊大笑得片紙不啻瓊球加拾襲㩦來示我俾品評謂是名僧巨然筆渙迹漓蹤那辨真行間雙印還堪識古篆依稀贛州字先宋流傳非一日要知源委出珍藏未論誰何定名迹墨渝紙敝神自存老筆嶙皺况超逸岡巒迤邐蒙密樹浦溆縈紆帶村室盤盤細路繞山椒斜引魚梁更東出途窮山盡得幽居穹宮傑構臨清渠仙邪佛邪定何處髣佛勝境如匡廬還從文學問何如大笑謂我言非虛自言逺遊真不俗曾見廬山真面目五老之峯披白袍玉虹萬丈時飛瀑某丘某壑皆舊遊展卷晴忩眼猶熟秪今老倦到無由對此時時作卧遊慚余裹足不出户聞君此語心悠悠髙懷只尺已千里眼中殊覺欠扁舟書吾尹扇溪頭古樹靜垂隂溪水盈盈不受塵五月江南新雨歇晚風多少納涼人雨洗鉛華一夕空枝頭青子却收功傍人不識天工巧猶戀飛花怨晚風道復西齋古石玲瓏蒼壁太湖姿浪蝕沙淘面面奇百穴晴窗通玉女一拳小石夢仇池乍逢合下南宫拜欲詠還輸白傅詞便擬髙齋題列岫朝來秀色滿簷帷吾尹邀遊虎丘奉次席間聨句使君置酒贊公房飛蓋追隨草木光選勝不辭蕭寺逺為間翻遣老僧忙千村霽雪人憑閣一塢碧雲山墮墻斜日離離賔客亂好修故事續歐陽同子重晚步過竹堂河股東來得斷垣一龕清梵托旃檀蒼苔繞徑無塵到落日敲門借竹看風急簾光先送暝春隂梅韻獨禁寒罏香深寂蒲團淨欲就山僧結淡歡暮春遊石湖郭外南湖一鏡開吳宮煙草暗荒臺道人不與興亡事只記溪名是越來過眼諸峯應接忙新晴草樹繞湖香不知參政移家後若個重來問海棠范石湖每歲㩦家泛湖賞海棠茶磨楞伽次第經淡煙消處五湖明一樽斜日湖亭上間看西山弄晚晴夏意五月江南櫻筍殘疏花吹盡緑漫漫雨來恰及梅黃候春去猶餘麥秀寒白日幽深茆屋靜野情蕭散苧袍寬美人何處經時别滿耳新蟬獨倚闌五月十三日種竹分得亭亭緑玉枝雨餘生意滿階除凌梢已展疏疏葉護粉聊營短短籬肯信移來真是醉不愁俗在未能醫人間此夜頻前席涼月虛窗更自宜早起殘更斷續天蒼蒼開門汲井夜欲央雞聲人語杳無際落月曙色相為光臨風短髮不受握泫露碧葉微生涼屋頭日出萬事集惜取靜境聊徜徉孔周經時不見目想髙勝居然在懷寫碧梧髙士圖并小詩寄意漠漠疏桐灑面涼濺濺寒玉潄回塘馬蹄不到清隂寂始覺空山白日長夜坐溽暑夜不寐涼風初解圍起看星漢動坐久語音稀殘月耿猶在流螢忽自飛一聲何處鶴露下欲沾衣九日泛石湖煙斂吳山翠擁螺重陽晴暖似春和間情已付青油舫斜日輕搖緑玉波橋外連錢遊騎屬水邊紈扇麗人過黃花何處酬佳節白鳥滄洲引興多余為黃應龍先生作小畫久而未詩黃既自題其端復徵拙作漫賦數語畫作於𢎞治丙辰詎今正德辛未十有六年矣尺楮回看十六年殘丹剝粉故依然得君品裁知增重顧我聰明不及前小艇沿流吟落日碧山浮玉漲晴煙詩中真境何容贅聊續當年未了緣十月五日出城暮歸門闔留宿南濠王氏樓與履約昆仲夜話有作永濟橋南水閣斜夜深投宿靜無譁淹留短榻行邊約只尺孤城夢裏家碧樹報風吟細葉青燈閃雨落寒花玄言寂寞都無寐消得清腴一味茶同次明九逵及王氏兄弟泛舟遊橫山蘭橈十里下橫塘漠漠風撩鬢影涼野水秋來寒玉淨碧山西去暮雲長行邊黃偃禾栖畝眼底紅酣樹飽霜飛盡落霞新月上空江渺渺白蘋香題畫隔浦羣山百疊秋青煙漠漠望中收松搖落日黃金碎江浸長空碧玉流水閣虛明占勝槩野情蕭散在滄洲人間佳境非難覓自是塵緣不易投題國用汗漫遊卷江湖蹤迹自年年去住隨緣興浩然三月鶯花燕市酒一牀書畫米家船留連勝事登山屐狼藉春風買笑錢回首馬遷今不作為君重賦遠遊篇不寐展枕不得寐沉沉玉漏淹一燈寒照壁半夜雨鳴簷有味留貧在多愁與病兼鬢邊新白髮應為小詩添新寒木落見清真端居物自春窗虛蠅擊紙院靜鳥窺人白日經簷短青衫卒嵗貧新寒滿城郭欲出畏風塵登樓萬里新寒襲敝裘故人何在獨登樓江山搖落愁無際鴻鵠哀鳴去有求北首長安雲日暮西風淮海戍塵秋誰懷杞國千年慮目繞碧天空自流次韻孫太初秋夜泛月之作煙斂依依樹鷗飛漠漠田短簫吹夜月髙興落江天遠火搖輕浪跳魚驚過船良辰不易得吾敢卜明年冬日楊儀部宅宴集會耆朱性甫朱堯民祝希哲邢麗文陳道復及余六人分韻得酒字徂冬肅玄隂涼颷集虛牖璚霙遘時晴朝旭射簷溜欣言對羣英況我平生友結交草年更復此同樽酒羽觴激清絲蘭羞粲朱豆豈無髙宴會重此文史舊兹焉申故好歲晏期勿負嵗暮雪晴山齋肆目偶閲謝臯羽詩窮冬疑有雨一雪却成晴喜其精妙因衍為韻賦小詩十章歲晏羣芳息枯條鳴北風層隂結黯霮朔雪飛長空元冥肅景象物化歸終窮妍華肇伊始冉冉收春功積雪縞晴晝離離見髙松眷兹歲寒枝不復知春冬旭光時明滅奄忽浮雲蹤塵心不能戢歲晏徒忡忡朝光射晴綺飛翼炫瑶姿微風吹竹藂文玉粉差差霜草行已繁氷谷流寒澌玄機抱終始逝矣夫何疑夜寒拂衾裯曉色明窗牖有客從叩門稚子方擁帚玉梅已敷英寒香在纖手一樽疇與同自入無何有空庭集飢烏景色入寒沍濃隂釀朔雪松石積縞素玉顔不堅好日出四簷雨薄晚北風微幽人啓朱戶朔吹號枯藤日暮殊未息居人事塞向鷙鳥厲髙翼不知夜來雪庭戶皓已積來牟端可期三白已兆一陽卉不復腓研沼氷初結雲日弄寒姿晶光互明滅雙扉風自掩陋巷人迹絶庭鳥忽自飛蒼松落殘雪初旭射茆簷枯叢戀寒雀睡起無餘聲風簷時自約展册娛道言樽酒獨斟酌無人不妨間客至亦不却擁寒不出户焚香娛燕清朝日照盂盎浮光上虛楹修竹不受風時時蒼玉鳴間情溢眉宇酒醒詩亦成殘雪不蔽瓦斷溜收寒聲晨威淒以嚴雲日麗新晴凌風振叢薄枯卉不復榮年光屬歸斂慘淡有餘情虎丘劔池相傳深不可測舊志載秦皇發闔閭墓鑿山求劔其鑿處遂成深澗王禹稱作劔池銘嘗辨其非正德辛未冬水涸池空得石闕中空不知其際余往觀之賦詩貽同遊者和而傳焉吳王埋玉幾千年水落池空得墓磚地下誰曽求寶劔眼中吾已見桑田金鳬寂寞隨塵劫石闕分明有洞天安得元之論往事滿山寒日散蒼煙除夕歡悰入病垂垂減素髮侵愁冉冉加誰有聲名垂宇宙自憐零落負年華東風綵帖裁春草殘雪青燈剪夜花惜取一樽酬見在中原戎馬暗驚沙甫田集卷三
