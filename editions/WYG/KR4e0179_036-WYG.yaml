body:
  text: 甫田集巻三十六附録先君行畧文氏姬姓裔出西伯自漢成都守翁始著姓於蜀後唐莊宗帳前指使輕車都尉諱時者自成都徙廬陵傳十一世至宋宣敎郎寶與丞相信國公天祥同所出寶官衡州教授子孫因家衡山元有諱俊卿者為鎮逺大將軍湖廣管軍都元帥佩金虎符鎮武昌生六子長定開從髙皇帝平僞漢賜名添龍以功授荆州左䕶衛千戸次定聰侍髙皇帝爲散騎舍人贅爲浙江都指揮蔡本壻定聰生惠自杭來蘇壻於張聲逺氏遂為蘇之長洲人惠生洪字公大始以儒學起家中成化乙酉科舉人仕為淶水縣學教諭洪生林字宗儒成化壬辰進士歴知永嘉博平二縣事進南京太僕寺寺丞仕終溫州府知府公之父也母祁氏贈安人繼母吳氏封安人公諱璧字徵明後以字行更字徵仲以世本衡山人號衡山居士學者稱爲衡山先生云少時外若不慧然敦確内敏雖在童穉人不敢易視稍長讀書作文即見端緒尤好為古文詞時南峯楊公循吉枝山祝公允明俱以古文鳴然年俱長公十餘嵗公與之上下其議論二公雖性行不同亦皆折軰行與交深相契合或有問先君於視君者君曰文君乃真秀才也公名既起然不茍為人述作或有托其名為文以售者楊公輙能辨之溫州於吳文定公寛爲同年進士時文定居憂於家溫州使公徃従之游文定得公甚喜因悉以古文法授之且爲延譽於公卿間溫州在南太僕寺少卿李公應禎博學好古性剛介難近少所許可而獨重公公亦執弟子禮惟謹一日見公書稍渉玉局筆意即大咤曰破却工夫何用隨人脚踵且曰吾學書四十年今始有得然老無益矣因以筆法授公南濠都公穆博雅好古六如唐君寅天才俊逸公與二人者共耽古學游從甚宻且言於溫州使薦之當路都竟起家爲己未進士唐亦中南京戊午解元時溫州在任還書誡公曰子畏之才宜發解然其人輕浮恐終無成吾兒他日逺到非所及也徐迪功禎卿年少時䄂詩謁公公見徐詩大喜遂相與倡和有太湖新録落花等詩傳於世及溫州在任有疾公挾醫而往至則前三日卒矣時屬縣賻遺千金公悉却之溫人搆亭以致美云溫州既沒公與游諸君祝唐都徐皆連起科目而公數試不利乃歎曰吾豈不能時文哉得不得固有命耳然使吾匍匐求合時好吾不能也於是益肆力為古文詞時雅宜王君寵異才也少公二十四嵗公雅相推重引與游處王竟以德學名公年漸長名益起而海内之交多偉人皆敬畏於公故天下傾慕之寧藩遣人以厚禮來聘公峻却其使同時吳人頗有往者公曰豈有所爲如是而能久安藩服者耶人殊不以為然及寜藩叛逆人始服公逺識廵撫李公充嗣露章薦公督學欲越次貢之公曰吾平生䂓守豈既老而自棄耶督學亦不能强竟以壬午貢上癸未四月至京師甫十八日吏部為覆前奏有㫖授公翰林院待詔翰林諸公見諸公推與大甚或以為過及見公咸共推服而新都楊公慎嶺南黄公佐愛敬尤至故事翰林以入之先後爲坐次公年既長其中又有為公後軰者遂以齒讓公公竟上坐衆亦不以爲迕既而與脩實録成當遷官或言宜先謁見當道公竟不往官亦不遷惟賜銀幣而已公亦無所懟也先是羅峯張公為溫州所㧞士公亦與交及張將柄用遂漸逺之公於早朝未嘗一日不往偶跌傷左臂始注門籍月餘時議禮不合者言多訐直於是上怒悉杖之於朝往往有至死者公幸以病不與乃歎曰吾束髪爲文期有所樹立竟不得一第今亦何能强顔久居此耶况無所事事而日食太官吾心真不安也遂謝歸方上疏時或言公居官已三年若一考滿當得恩澤或可進階公笑而不答竟不考滿而歸時丙戌冬也屬河凍舟膠不可行乃與泰泉黄公同守凍潞河有欲疏留公者公令人謝之曰吾已去國而偶滯於此若疏入是我猶有所覬覦矣何君不知故人如此留者遂止或勸公從陸路遄往歸公曰吾非以斥逐去國行止均耳何必窮日之力而後爲快哉明春氷解遂與泰泉方舟而下到家築室於舍東名玉磬山房樹兩桐於庭日裴徊嘯咏其中人望之若神仙焉於是四方求請者紛至公亦隨以應之未嘗厭倦惟諸王府以幣交者絶不與通及豪貴人所請多不能副其望曰吾老歸林下聊自適耳豈能供人耳目玩哉蓋如是者三十餘年年九十而卒卒之時方為人書志石未竟乃置筆端坐而逝翛翛若仙去殊無所苦也是嵗爲嘉靖己未二月二十日公配吳夫人先公十八年卒卒之年為嘉靖壬寅八月二十一日得年七十有三公古貎古心言若不出口遇事有不能决者片言悉中肯綮尤精於律例及國朝典故凢時事禮文之有疑者咸以公一言决之初歸時適玉峯朱公希周與公先後歸又同里閈時吳中前軰多已彫謝遂以二公之德望文學並稱者垂三十年公讀書甚精博家藏亦冨惟陽隂方技等書一不經覽溫州公善數學嘗欲授公公謝不能乃曰汝既不能學吾死可焚之及公奔䘮至溫悉取焚去少拙於書遂刻意臨學始亦䂓模宋元之撰既悟筆意遂悉棄去專法晉唐其小楷雖自黄庭樂毅中來而溫純精絶虞禇而下弗論也隸書法鍾繇獨歩一世性喜畫然不肯規規摹擬遇古人妙蹟惟覽觀其意而師心自詣輙神會意解至窮微造妙處天真爛熳不減古人時石田先生沈公周爲公前軰雅重公文行見公所作小幅亦極加歎賞詩兼法唐宋而以溫厚和平爲主或有以格律氣骨爲論者公不爲動爲文醇雅典則其謹嚴處一字不茍故一時文章多以屬公而獨持文柄者垂六十年或有得其書畫不翅拱璧雖尺牘亦輙藏弆為榮海外若日本諸夷亦知寶公之跡然公才名頗爲書畫所掩人知其書畫而不知其詩文知其詩文而不知其經濟之學也公平生雅慕元趙文敏公毎事多師之論者以公博學詩詞文章書畫雖與趙同而出處純正若或過之性鄙塵事家務悉委之吳夫人夫人亦能料理凡兩更三年之䘮及子女婚嫁築室置產毫髪不以干公之慮故公得以專意文學而遂其髙尚之志者夫人實有以助之也公兄䨇湖公徵靜性剛難事公恪守弟道而以正順承之䨇湖瀕渉危難公極力周䕶得不罹禍䨇湖亦遂友愛怡怡之情白首無間公平生最嚴於義利之辨居家三十年凡撫按諸公餽遺悉却不受雖違衆不恤家無餘貲而於故人子弟及貧親戚賙之尤厚與人交垣夷明白始終不異人有過未嘗面加質責然見之者輙惶愧汗下絶口不談道學而謹言潔行未嘗一置身於有過之地蓋公人品既髙而識見之定執守之堅皆非常人可及故雖年登九十名滿天下而始終操履未或少渝豈不爲難哉公恒言人之處世居官惟有出處進退居家惟有孝弟忠信今詳考公之平生真不忝於斯言矣子男三人女二人孫男五人孫女四人曽孫男女各四人𤣥孫男女各二人某等以卒之明年庚午十月廿五日舉公柩權厝于花涇橋之原卜吉乃葬夫葬必有銘凢以狀爲之先然不有所述狀亦無所據也但先君平生懿行甚衆不能一一載載其大者惟先生擇焉仲子嘉謹述甫田集巻三十六
