body:
  text: 甫田集巻二明文徵明撰詩七十一首方方壺畫煙沈宻樹蒼山暝波捲長空白鳥廻細雨斜風蓑笠具釣船何事却歸來新波獵獵弄風蒲雨後雲山半有無一叚勝情誰領略欲從畫裏喚方壺書昌國憶母詩後音容杳𣺌夢中塵游子空吟寸草春莫怪掩篇䨇淚落就中吾是有心人春草㝠㝠雨暗阡轉頭二十七更年平生自謂心如鐵腸斷徐卿泣母篇和答石田先生落花十首㸃徑沾籬已燦然飛簾撲靣更翩聯紅吹晴雪風千片錦蹙春雲浪一川老惜髩飄禪榻畔醉看燕蹴舞筵前無情剛恨通宵雨斷送芳華又一年零落佳人意暗傷為誰憔悴减容光將飛更舞迎風靣已褪猶嫣洗雨籹芳草一年空路陌綠陰明日自池塘名園酒散春何處惟有歸來屐齒香蜂撩褪粉偶粘衣春减都消一片飛蒂撓園風無那弱影揺庭日已全稀樽前漫有盈盈淚陌上空歌緩緩歸未便小齋渾寂寞綠陰幽草勝芳菲悵人無柰曉風何逐水紛紛不戀柯春雨捲簾紅粉瘦夜凉踏影月明多章臺舊事愁邊路金縷新聲夢裏歌過眼莫言皆物幻別收功實在蠭窠戰紅酣紫一春忙回首春歸屬𣺌茫竟為雨殘緣太冶未隨風盡有餘香美人睡起空攀樹蛺蝶飛來却過墻脉脉芳情天萬里夕陽應斷水邊膓桃蹊李徑綠成叢春事飄零付落紅不恨佳人難再得緣知色相本來空舞筵意態飛飛燕禪榻情懐裊裊風蝶使蜂媒都懶慢一畨無味夕陽中開喜穠纎落更幽樹頭何用勝溪頭有時細數坐來久盡日貪看忘却愁惹草縈沙風冉冉傷春恨別水悠悠不堪舊病仍中酒踈雨濃煙鎻畵樓風裊殘枝已不任那堪萬㸃更愁人清溪浣恨難成錦紅雨鏖香併作塵明月黄昏何處怨游絲白日靜中春急須辦取東欄醉倒地猶堪藉綺茵飛如有戀墮無聲曲砌斜臺看得盈細草栖香朱㸃染晴絲撩片玉輕明江風飄泊明妃淚綠葉差池杜牧情頼是主人能愛惜不曽緣客掃柴荆情知芳事去還來眼底飄飄自可哀春漲平添棄脂水曉寒思築避風臺沾衣成陣看非雨㸃徑能勻襯有苔穠綠已無藏艶處笑他蜂蝶尚徘徊王婆墩次楊儀部韻遥看塢一聚到只屋三間嫗姓隨墩在僧廊得蘚殷秋濃山照閣雨足水侵闗依舊刺船去回瞻樹杪欄江船對月效樂天何處難忘酒何處難忘酒江船對月時風聲傳笑語波影散須眉逺火山浮動明河天倒垂此時無一􅊦水月負佳期金山寺待月浮玉山前玉露凉晚潮微上月洋洋魚龍深夜浮光怪雲樹遥空帶𣺌茫水國題詩酬一宿中泠裹茗薦初嘗江風吹酒不能睡起踏松陰自繞廊金陵客樓與陳湻夜話巻書零亂筆縱横對坐寒窓夜二更奕世通家叨父行十年知已愧門生髙樓酒醉燈前雨孤榻秋深病裏情最是世心忘不得滿頭塵土說功名九月二十八夜夢中作碧桐已蕭蕭氷谷流决决獨行蒼莽間犬吠人跡絶旭日穿樹林青煙忽消滅時看殿簷風吹落松上雪題養逸圖書巻茶罏百慮融夢回午枕竹窓風忙身見畫剛生媿安得身閒似畫中榮貴匆匆僅目前靜中光景日如年荆州運甓成何事不博柴桑一醉眠立春日病起青絲裹餅薦春盤喜見鞭春在臘前便與一冬除舊病尚餘七日是殘年梅花消息嚴寒後綵勝情懐薄酒邊旋取物華供帖子暖痕浮綠草生煙元日書事效劉後村愁早無端到小齋問愁誰送與誰媒殘年原未將愁去不是新年別帶來不求見面惟通謁名刺朝來滿敝廬我亦隨人投數紙世情嫌簡不嫌虛人日停雲舘小集新年便覺景光遲猶有餘寒宿敝帷寂寞一杯人日雨風流千載草堂詩花枝未動臨佳節菜飯相淹亦勝期春色到今深㡬許小山南畔草痕知春日閒詠時節燒燈近羈窮獨臥家餘寒春挾纊殘困晚煎茶土潤先滋草梅晴薄試花新年眠食好隨分足生涯答彭寅之見贈寅之與余同筆硯交游最舊辱詩有相如之句推予過矣弱冠追隨漸老成中間多故各深更扁舟憔悴横江夢短榻淹留共硯情論學平生愧知已定盟當日是同庚贈詩珍重知君意貧病年來類長卿期陳湻不至美人期不至寂寞繞堦行短架閒書帙幽窓聽履聲空令開竹徑深負洗茶鐺春草暮雲合梅花初月明蹉跎殘諾在次第小詩成未敢輕知已終然媿後生新年池上夢舊雨酒邊情眼底非無客相看意獨傾春寒十日春寒擁毳袍簾幃漠漠與風鑣踈籬雪伴如相待落月梅魂大費招寂寞燈宵猶病在蹉跎花信轉陰驕芳情兀兀惟憑醉却是愁多酒易消詠次明風神凝逺玉無瑕十載論交似飲茶深静不教窺喜愠寛閒能自應紛華寄情時有摴蒱樂博物咸推鑒賞家猶自一經淹舉子年年隨伴踏槐花詠孔周圍坐清談麈尾長墨痕狼藉練裠香水亭紈扇歌楊柳春院琵琶醉海棠王謝風流才子弟齊梁煙月錦篇章豪華豈是泥沙物好在揮毫白玉堂詠寅之十年昂首抗風塵未信儒冠觧誤身行比曽參還負謗文師韓子力排陳雞羣落落孤栖鶴瑞世翹翹一角麟莫恠操竿經嵗困賞音須屬當家人詠麗文蕭散平生一布裘紙窓竹榻自夷猶常貧總坐能詩累績學曽為應舉謀方外老僧邀結夏山中啼鳥伴吟秋病妻稚子從侵迫眉上元來不着愁詠叔英白襴憔悴走埃塵曽有聲名動縉紳零落田園多故後淹留塲屋過時人羣居學道能違俗半世收書不諱貧怪是偏多巖壑意自家生長太湖濱詠嗣業楚楚璚枝出謝庭紫芝眉宇玉生稜茶經陸羽曽傳訣書品陽氷已入能閒洗碧桐留野客醉圍紅袖狎山僧相思不到西軒下想見清香對榻凝寫閒舟圖寄葛汝敬小舟依渡不施橈正似閒人逺世囂滿逕綠陰初睡起坐臨流水看春潮夏日雨後書事瓦溜初停旭日高苔花暈碧草齊腰一畨濃綠催朱夏昨夜新波失斷橋積雨情懐渾欲病乍暄衣着最難調西齋睡起都無事時有幽禽破寂寥次韻吳徳徵先生江南弄煙霏曉色彤樓開美人倚醉臨糚臺韶華孰駐顔如玉鏡裏年光轉朱轂春風江岸蘼蕪綠落盡閒花綺塵馥翠屛自度春寒曲簾箔重重燕䨇宿題沈侗齋修竹士女開盡閒花草漫坡青春零落奈愁何詩人自惜鉛華冷翻出天寒翠袖歌陳氏池亭納凉朱雲釁天漢金烏朗炎曦方夏苦埃鬱言遵芳圃嬉息鞅偎南榭褰裳蔭北池微凉度鮮颷淺碧漾寒漪短藻翻鱗鬛閒渚集鳬鷖流目落翔泳遊心寓篇詞願言領幽意况復酬心知坐撫景光寂還憐車馬稀消揺極瞻諷旦晝不知疲疇能均凉燠無為居所移夏夜煩熇􅌅修晷延緣遲清宵落景不歛暑餘火夕自驕陳牀弗能寐起坐蔭繁條珍簟無凉思瑶紈有溫颷安得凌風翮萬里随飄揺銀蟾麗皎皎雲幕捲寥寥仰睇河漢流無能挽天瓢似聞隴畝歡夏暵敷良苗既洽三農利奚辭一身焦所念肌骨柔不任寒暑消功業未有㑹已復朱顔凋題忙閒圖驅車遵長坂廻馬絶飛梁塵頭高十丈有客行趨蹌白雲帶松嶠仰睇鬱以蒼中有遺世人下笑流塵黄黄塵與白雲曽不隔流水心情一以殊相去各萬里寄陸安甫吾友陸士龍瓌姿照瑶璧誰令厄世網老大媚泉石海濵鬱相望無由慰乖隔蕭然㸃筆餘千里盈一尺飛泉落寒空細路緣絶壁如聞犬吠聲不見人行迹白雲縹緲際應有神仙宅閬風吹瑶華知君有遐適顧君廟廊器豈久在山澤次韻答希哲見懐兼乞草書墻外車音寂不聞閒緣誰觧病中紛凉風著意吹芳樹落日含情詠碧雲髙誼乍違黄叔度清篇先枉沈休文秋來定有臨池興榻得鵞羣儻見分三月廿二日家兄觧事還家夜話有感虚堂漠漠夜將分黯黯深愁細語真零落尚憐門户在艱難誰似弟兄親掃牀重聽燈前雨把酒驚看夢裏人從此水邊松下去但求無事不妨貧桃源圖桑麻雞犬自成村天遣漁郎得問津世上神仙知不逺桃花只待有緣人處州劉學諭敔乃劉龍洲逺孫便道拜龍洲墓於崑山作詩送之玉峯之陽荒古原秋草數尺封寒雲詩魂醉􅅎𣺌何許山人尚識龍洲墳龍洲先生天下士曽以危言犯天子肯緣祿豢倚時人竟把殘骸託知已彘肩斗酒意翩然不見風流三百年諸孫沿牒下吳船到此忍不相流連當日聲華元不改風雨荒祠儼猶在祭田修復勤故老仆碑重立煩賢宰旁人懐古尚勤惓况也博士諸孫賢源流不隔千里逺椒漿天假今朝緣精神恍惚如相授父老追随為搔首誰云聲迹不相聞要識忠賢湏有後宦途南北不終留片帆又逐浙江流白雲天際𣺌無極夢魂常在玉峯頭謝永嘉趙君澤寄蘭草堂安得有琳瑯􅅖案猗蘭奕葉光千里故人勞觧珮一窓幽意自生香夢回凉月甌江逺思入秋風楚畹長漸久不聞餘冽在始知身境兩相忘小齋盆蘭一幹數花山谷所謂蕙也初秋抽數幹芳馥可愛因與次明道復賞而賦之時雨袪殘暑凉颷集華軒春徂衆芳歇晚蕙抽璚根重兹蘭之属不與凡卉羣離離水蒼珮肅肅紫霞紳耿耿孤榻畔燕對如髙人啓扉得良友列案羅清罇於焉撫靈植一笑滌塵煩微風南牖來濃馥散氤氲有時㕘鼻觀即之已無存譬彼孤潔士可望不可親如何庭階近有此幽谷芬相忘餘冽中漸久不復聞魯哲日已逺楚纍亦沈淪無能被雅操且復酬芳魂丹陽道中次王直夫韻句曲東來草樹秋車音隔隴思悠悠西風黄土汚人面落日青山觸馬頭息影道傍分茂蔭濯纓橋下得清流平生笑殺朱翁子辛苦剛酬妾婦羞金陵詠懐鍾山日上紫煙收金闕參差萬瓦流帝業千年浮王氣都城百雉隐髙秋聲華誰覔烏衣巷形勝空吟白鷺洲回首壯遊心未巳西風策馬看吳鈎秋日過竹堂愛此蕭條逺市聲山門端不􅌅頻登破除塵夢來看竹糚㸃閒情坐有僧雨後秋光分短菊樽前風味擘新橙興懐先哲經游地欲繼髙蹤愧未能元日飲王漢章小樓元日髙樓小合併物華無語嵗年更一樽對靣貧親戚四袠臨頭老弟兄戀臘餘寒風漠漠入春生意雨盈盈向來日月尋常過誰有㳙埃荅太平題廬山圖余為林師寫丘壑髙閒用謝㓜輿事也而石田丈以廬山髙賦之輒亦賦此壯哉廬山天下奇瀑流千丈江瀰瀰何人巨筆冩奇秀歐公昔贈劉君詞蒐𤣥抉恠轢萬象萬古直與山爭馳莆田先生山澤姿壯節五老同崔嵬名通仕版偶服吏癖在泉石終難醫髙堂束絹風披披令我掃筆為􅋂崎飛橋細路緣翠壁偃松絶壑臨蒼坻已擬先生謝㓜輿故著逸士泉之湄就中有理未可說却被石翁加品題惟翁自有王維筆謂我觧畫歐公詩由來絶倡不可和况此粉墨那容追秪應披霧見突兀庻此峻㧞如吾師吾師真是劉凝之我視六一無能為凝之不作六一逺此詩此畫誰當知松雪花鳥圖踈篁顫葉風回枯老枝㸃玉梅花初韶華暗度人未識幽鳥得氣鳴相呼鳥呼花舞春舒舒髣髴生意當庭除青紅歴亂粉墨渝坐久始覺開珍圖印文依稀大稚字知是王孫吮筆餘王孫玉雪天人如冩生不數江南徐髙齋日暮松雪暗野亭何處鷗波虛百年手跡誰與辨一笑且看行間書題畫新霜㸃筆意蕭蕭不盡秋光鴈影遥䨇島欲浮天拍水夕陽人在虎山橋對雨獨吟池上雨拍拍水平堤暝色千峰合凉聲萬葉齊翠承深竹重寒壓晚簷低怪得經過斷街頭一尺泥十月塵凝四壁漠然空十月江南見朔風細雨挾寒催木葉弱雲將暝暗房櫳壯心迂拙懐時事病骨蕭條感歲功忍死不妨留筆硯儘堪相慰寂寥中齋前小山穢翳乆矣家兄召工治之剪薙一新殊覺秀爽晩晴獨坐誦王臨川掃石出古色洗松納空光之句因以為韻賦小詩十首急澍滌囂埃方墀淨於掃寒煙忽依樹窓中見蒼島日暮無來人長歌薙芳草道人淡無營坐撫松下石埋盆作小池便有江湖適微風一以揺波光亂寒碧小山蔓蒼蘿經時失􅍶崒秋風忽披屏姿態還秀出層峯上崇垣徘徊見西日清風自何來離離灑芳樹齋居不知晏但見秋滿户欲詠已忘言悠然付千古疊石不及尋空稜勢無極客至兩忘言相對飡秀色簷鳥窺人閒人起鳥下食寒日滿空庭端房户初啟怪石吁可拜修梧淨於洗幽賞孰知音擬喚南宫米百卉凌秋瘁堅盟憐穉松誰令失真性屈曲薙䰒鬆終然夭矯在寒月走蒼龍幽人如有得獨坐倚朱閤巖岫窅以閒松風互相答此樂須自知叩門應不納堦前一弓地踈翠陰藂藂有時㣲風發一洗塵慮空㑹心非在逺悠然水竹中西日在屋角落影揺窓光撫時懐美人還陟墻下岡風吹白雲去萬里遥相望雞鳴山金陵勝處徃嵗盖屢游之未有作也偶閱九逵憑虛閣記追賦金陵佳麗石頭城傑閣登臨正雨晴帝業稱雄維虎踞游人選勝得雞鳴長江天際孤帆滅落日煙中萬瓦明滿目廢興題不得獨看名畫繞廊行題畫百丈蒼山倚暮寒仙源無路欲通難晚來過雨添飛瀑只好幽人隔岸看天外青山半有無江流萬里月明孤夜深偶感曹瞞迹却被傍人作畫圖題畫送錢德夫南還匆匆歲暮束書還樽酒淋漓悵别間明日西齋檢行迹暮雲空見越南山甫田集巻二
