body:
  text: 甫田集巻十五明文徵明撰詩三十一首元日試筆雲霞駘蕩曉光和手折梅花對酒歌暮齒不嫌來日短霜髭較似去年多東風漸屬青陽候流水㣲生緑玉波鳥弄新音晴晝永相看不飲奈春何竹堂乗閒上日到僧家慚愧空門有歲華滿地碧煙新草色一痕春意早梅花人日王氏東園小集晴颸汛叢條浮陽散修莽良時及初正渉七氣已爽厥日肇惟人探占喜融朗駕言求友生名園欣獨往折蔬充朱豆扶藜企高壤陟彼墻下岡寄此天際想被草晨風和隔竹春禽響湛甘泉兵書以詩招遊衡山奉荅家世衡陽有釣臺江湖流浪未能囘政懐桑梓千年計忽枉封題萬里來月滿羅浮勞我夢雲埋嶽麓待公開追攀見説襟懐壯儻許春風杖履陪寄黄泰泉學士經時不得嶺南書白首無由慰索居北闕聲華應藉甚西山爽氣定何如殘編空復淹司馬當路何人薦子虚三十年前潞河夢一回相念一踟蹰除夕坐戀殘燈思黯然囘看殘厯已無緣萬千舊事空雙髩八十明朝乂六年笑飲屠蘇甘落後老嗟筋力不如前烽煙不隔春風信次第梅花到酒邊乙卯元旦滄溟日日羽書傳華髮蕭蕭節敘遷時不可追空逝水老今如此況烽煙漫抛舊厯開新厯却到衰年憶少年潦倒不妨詩筆在曉忩和墨冩新篇病中承次河携樽過訪病暑經時閉草堂故人挈榼漫相將高軒恰似清風至雅誼還同夏日長把酒臨軒疎雨潤捲簾深院碧桐涼晩來客散詩成處一樹蟬聲對夕陽閒興緑隂深覆草堂涼老倦抛書覺晝長塵土不飛髹几淨寶罏親注水沉香蒼苔緑樹野人家手巻罏薰意自嘉莫道客來無供設一杯陽羡雨前茶繞庭芳草燕差池滿院清隂樹綠離簾捲不知西日下自持閒客了殘碁酒䦨客散小堂空旋巻疎簾受晩風坐久忽驚涼影動一痕新月在梧桐閒門謝客日常扄好鳥隔林時一聲暖氣薰人渾欲醉碧梧忩下拂桃笙端溪古研紫瓊瑶斑管新裝亦􅇠毫長日南忩無客至烏絲小繭寫離騷乙卯除夕燈前歲酒笑相酬鏡裏流光又一周人世百年原有限吾生萬事總無憂餘窮不用焚車送殘病都從爆竹休去日已除來日在春風檢厯又從頭丙辰除夕百歲匆匆過隙駒等閒八十七囘除蹉跎日月前無幾俯仰乾坤樂有餘白首詩書重結課青春草木舊吾廬由來多病還多壽一笑殘痾未負余丁已元旦昔随元宰賀正元鹵簿分陳舜樂懸萬炬列星仙仗外千官鳴珮玉階前履端同慶承天語是日羣臣致詞畢上宣㫖云履端之慶與卿等同之山壽齊呼祝聖年潦倒今無朝省夢絪緼空憶御爐煙榖日早起空庭草色映簾明短髩春風細細生簷溜收聲殘雪盡忩光落几曉寒輕非賢寧畏蛇年至多難欣占榖日晴詩思攬人眠不得山禽屋角有新聲四月風雨將春去清和四月天桐隂揺白日草色散青煙興寄琴樽外筋骸杖履前若為消永晝忩下有殘編春雨緑隂肥雨晴春亦歸花殘鶯獨囀草長燕交飛香篋青繒扇筠忩白葛衣抛書尋午枕新暖夢依㣲五月逕草侵衫色庭梧生晝隂時光臨角黍穡事望梅霖習静罏薰細醒煩茗椀深草堂賓客散欹枕聽幽禽夜坐涼聲傳漏㸃夜色轉樓隂遥漢三星度空庭萬籟沉草輝螢箇箇樹影月林林稍覺塵氛逺閒愁不上心送彭赴嘉興訓導清時一命忝師儒百里鄰州接里閭志養于今欣有禄官貧莫嘆食無魚微名聊足酬初志多暇何妨讀舊書九十老人須在念頻頻書札問興居東望嘉禾近百程漫随儒牒去親庭蟬聮宦業承三世辛苦傳家有一經我老自憐衰髩白汝行不失舊氊青還應别後鍾情處飛夢時時秀水亭丁巳除夕易却桃符拂却塵窮愁殘病總更新三彭漫守庚申夜萬事重迎戊午春狼籍杯盤􅂓復醉盡情燈火笑相親孫曾次第前稱壽慚愧承平白髪人戊午元旦黄鳥風簷遞好音白頭忩下整冠巾喜聞海上烽煙息又見人間日月新霽景騰輝金勝曉暖痕霏雪玉梅春何當載酒尋芳去緑滿郊原草似茵初春書事三首疎簾掩映物華鮮睡起西忩思黯然落日斷雲收宿雨暖風纖草漲新煙寂寥樂事燒燈後懶慢情懐拄杖前幽興不緣愁病减時時覔紙冩新篇流雲冉冉度湘簾綠映輕衫草色鮮淑氣薰人淹宿酒花香入夢惱春眠影揺鎻影霏霏日篆裊罏薰細細煙門掩紅塵無過客自臨南牖了殘編晴雀飛飛戀草簷午風漠漠泛茶煙雪殘東圃梅花後春在南墻細草邊忩下螙編消永日鏡中華髪感流年詩逋畫債難推脱應負平生筆硯緣南樓南樓日上曉光澄北郭烟消萬井明膏雨一番甦弱栁春風幾處囀新鶯秪應舊病随寒盡無復閒愁共草生起遶江梅覔新句惜花自是老年情肇孫北行阿翁九十苦鍾情倚杖那堪送汝行壁水去遊天子學春風須聽上林鶯壯途初發千山軔雅志無忘萬里程三百年來忠孝在慎言無潰舊家聲己未元旦勞生九十漫随緣老病支離幸自全百歲幾人登耄耋一身五世見曾𤣥秪將去日占來日誰謂增年是減年次第梅花春滿目可容愁到酒樽前甫田集巻十五
