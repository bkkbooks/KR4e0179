body:
  text: 甫田集巻二十二明文徴明撰題䟦一十八首䟦宋通直郎史守之告身右通直郎史守之告身一通宋主管成都玉局史守之所受守之郢人越國公浩孫衛王彌逺之姪仕不甚顯人鮮知者而家傳載其事頗詳謂其志行不茍嘗心非其叔父彌逺所為著昇聞録以寓規諌按守之禮部侍郎彌大之子彌大仕乾道淳熙間亦不以父越公為是是宜守之之不得於彌逺也又謂其避勢逺嫌退處月湖與慈湖諸公講肄為樂寧宗書碧沚字賜之今吾吳中蔵書家所收古書有舊學史氏及碧沚印者多其遺書信清修好學之士也但謂淳熙十一年以祖䕃補官避叔父忠獻嫌奉祠主管玉局忠獻即彌逺也按彌逺開禧三年丁夘誅韓有功始自禮部侍郎資善堂翊善進同知樞宻院事上去淳熙甲辰二十有三年時彌逺仕猶未顯不應已有避嫌之舉且告以宣教郎磨勘轉通直郎宋制三年一磨勘通直去宣教才一資耳告受於嘉定三年則請祠當在開禧之末正彌逺用事之始彌逺嘉定元年自同知樞宻進知院事尋兼㕘知政事十月遂與錢象祖同為左右丞相十一月以母䘮罷明年五月起復為右丞相時象祖已先罷故此告稱左丞相闕而於右相之上加起復字蓋至是猶在服中也守之後以嘉定十七年起倅嘉興力辭不就以朝奉大夫致仕是嵗茂陵崩彌逺矯制立理宗益擅柄用事守之固未休致豈亦有意耶守之八世孫大行人立模得此告於族人裝池成軸自記顚末復徴余言夫守之行誼之高與夫此告授受所自諸公論著已詳獨嵗月出處稍異恐不可傳信畧為考訂如此題吳仲仁春遊詩巻後右詩一巻律絶共四十有五篇辭旨清麗書法遒美蓋前元時吳夀民仲仁者游吳中與諸文士春游倡和之作而書筆悉出錢良右翼之翼之吳人號江村民雅以書學名家而詩律尤精有高行年六十七卒於至正七年此至正三年書時已六十餘矣眞行間出姿態橫生不少衰竭吳人徐宗毓氏蔵此使人持以示余余惟吳中山水深秀自昔多文人游寓於時未被兵故得從容文酒如此夀民吳興人出處本末不少槩見惟趙文敏嘗敘其詩所謂南山樵吟者稱仲仁不以家事廢學故其詩清新華婉有唐人餘風然其詩竟亦不傳非此巻之存固不能識其妙也題歐公二小帖後歐公嘗云學書勿浪書事有可記者他日便為故事且謂古之人皆能書惟其人之賢者傳使顔公書不佳見之者必寶也公此二帖僅僅數語而傳之數百年不與紙墨俱冺其見寶於人固有出於故事之上者耶題李西臺千文西臺書世不多見此巻干文結體遒媚行筆醇古存風骨於肥厚之内按黃文節公庭堅評西臺書肥不剰肉如美女豐肌而神氣清秀又謂其字中有筆如禪家句中有律今觀此書信不誣也惟是題名為隠語或以為疑然宋元題識數人皆極稱賞而所謂柱史裔孫者固寓李姓其間也此其事雖不可考要之為西臺書無疑其中殷敬匡恒字皆有闕筆蓋翼宣藝真四廟諱也建中真宗時人故所諱止此然𤣥朗字真廟以之事神尤所深禁而不避者蓋祥符五年始上聖祖尊號詔天下不得斥犯二字而此景徳二年書實前五年也鄒君光懋世寶此巻余借留齋中數月因題而歸之題玉枕蘭亭玉枕蘭亭相傳禇河南歐率更縮而入石者按桑世昌蘭亭考備著傳刻本末所䟽不下百本而畢少董所蔵至三百本並不言玉枕疑是近世所為栁文肅云賈魏公家數本如玉枕則是以燈影縮而小之豈此刻即始於秋壑耶又秋壑使其客廖􅉷中㕘校諸本擇其精者命婺工王用和刻於恱生堂經年乃就特補勇爵酬之所謂恱生蘭亭也今世亦罕得其本余僅一見於沈石田家精妙不減定武此玉枕本有秋壑印及右軍像而刻榻亦精豈亦出用和之手耶余嘗收得一本與此稍異蓋又别刻也楊文貞云玉枕蘭亭有二一在南京火藥劉家一在紹興府二石今皆不存不知與此本及余所蔵本同異要皆不易得矣䟦宋高宗石經殘本右小字石經殘本百葉約萬有五千言前後斷缺無書人名氏余考之蓋宋思陵書也按紹興二年帝宣示御書孝經繼書易書詩春秋左傳論孟及中庸大學樂記儒行經解總數千萬言刻石太學後孝宗建閣奉安名曰光堯石經之閣即此是也蓋思陵平時極留意字學尤喜寫經嘗曰寫字當寫經書不惟學字又得經書不忘此書楷法端重結搆渾成正思陵之筆但所書惟易春秋左傳又皆不全視全本百分之一耳又按元初楊璉眞珈發宋諸陵造塔取故經石為塔址為路官申屠逺所遏而止然石經竟亦散落國朝宣徳初吳文恪公按浙命有司追訪所存無幾矣此本雖殘缺要不易得况紙墨佳好猶是當時榻本又可多得哉唐君伯虎寶蔵此帖余借留齋中累月因䟽其本末定為思陵書無疑正徳十二年嵗在丁丑夏端陽日跋題香山潘氏族譜後近世氏族不講譜牒遂廢非世臣大家往往不復知所系出今吳中士夫之家有譜者無幾或以世次不逺逺者又文獻無可徴遂皆不復著録嗚呼文獻無徴世次不逺豈非其前人之失乎及今弗葺則後之人將益逺而無所傳承或至宗緒顚錯少長失次又誰執其咎耶潘氏自宋雲卿下至崇禮八世矣崇禮又有子若孫將十世而不已其世數不可謂不逺而所與遊若倪元鎮若周伯器近時若吳文定公若李太僕應禎若沈石田先生皆一時名碩皆有詩文相贈遺其文獻又不可謂不著也崇禮譜録聚集使數百年文獻灼然可徴其有功潘氏不既厚矣乎所可恨者元鎭以前非無文獻雲卿以上非無世次特以前人失録無所於考今之所為亦惟使其子孫他日無遺恨云爾余雅聞崇禮之賢而吾友蔡九逵又數為道之嘗邂逅一見悃愊愿謹古所謂孝友力田之士也他日使其子鋹以此譜相示嘆其用心之勤貽謀之逺為題其後而歸之題郭忠恕避暑宫圖畫家宫室最難為工謂須拆筭無差乃為合作蓋束於繩矩筆墨不可以逞稍涉畦畛便入庸匠故自唐以前不聞名家至五代衛賢始以此得名然而未為極致獨郭忠恕以俊偉竒特之氣輔以博文强學之資遊規矩準繩中而不為所窘論者以為古今絶藝此巻水殿圖千榱萬桷曲折高下纎悉不遺而行筆天放設色古雅非忠恕不能也宣和御府所蔵三十四種有明皇避暑宫圖四此豈其一耶舊傳此為釣鰲圖按趙與時賓退録載唐人酒令有釣鰲圖一巻刻木為鰲魚沉水中釣之以行勸罰此圖有鰲魚之類浮水面豈避暑時用以行酒耶其事不可考而此圖則避暑宫無疑矣忠恕字恕先洛陽人通九經尤精小學仕漢為湘隂令從事謝去周世祖召為周易博士貶乾州司户秩滿不仕宋初復召為國子監主簿後竟尸解事具東坡集而畫譜稱忠恕字國寶不知何許人與坡集所記不同要為怪誕不經之人然其畫法之妙則不可揜也中書舍人王君子貞出以相示遂為記此正徳十四年己夘七月既望書題趙仲光梅花雜咏趙仲光書雖不脱文敏家法而行墨結字微有不同王子敬云外人那得知要之不可臆論也今世傳文敏及仲穆書不少而仲光書獨不多見至其詩尤不易得金陵許彦明蔵其咏梅花雜咏多至五十首可謂富矣仲光號西齋晚居吳中與崑山顧仲瑛交仲瑛稱其風流文雅有王孫風度而無紈綺故習觀於此詩有可想者文敏三子長亮次即仲穆仲光其季也或以為次子豈以亮早卒無所見耶已夘秋題䟦唐李懐琳絶交書右唐胄曹㕘軍李懐琳所摹絶交書今監察御史安成張公鰲山所蔵雙鈎廓塡筆墨精絶無毫髪滲漏蓋唐摹之妙者按海嶽書史及東觀餘論並言懐琳好作偽書世莫能辨今法帖中七賢衛夫人等帖皆出其手而唐竇氏述書賦亦云爰有懐琳厥蹟踈壯假他人之名字作自已之形狀觀此則懐琳在當時已推其摹榻之工矣此書相傳臨嵇康本而此巻後有右軍字不知何也續法帖雖載此書亦不言其臨何人惟張彦逺云嘗見叔夜自書絶交書云云故黃長睿以為此書唐世尚存懐琳見而倣之且謂中有古字非能自作愚按此帖字蹟多類右軍在前若劉伶阮籍字畫雖佳然皆踈宕縱逸非若此帖精神沓拖行間茂宻卓然名家也且其文與文選所載微有不同尤不可曉而長睿云此書去七賢衛夫人逺甚蓋亦有所疑也豈右軍嘗書此帖而懐琳摹之耶抑懐琳好右軍之蹟倣而為之耶正徳庚辰十一月晦䟦䟦吳中三大老詩石刻右宋吳中三大老詩皆為樂圃先生作信安王渙之書以入石者三老元絳字厚之天聖進士官翰林學士㕘知政事太子少保致仕家郡城之帶城橋程師孟字公闢景佑進士官集賢殿修撰京東安撫使正議大夫致仕後授光禄大夫家郡城南園之側晝錦坊盧華字仲華本徳清人慶歴進士乙科歴官知廣南提㸃刑獄光禄卿致仕後遷通議大夫退居吳中今吾家所居相傳為公故址傍有盧提刑橋尚存渙之衢州常山人王介之子元豐進士官吏部侍郎寶文閣學士知中山府其兄漢之嘗為吳郡故渙之嘗遊於吳樂圃先生朱氏名長文字伯原元祐進士本州教授秘書省正字以疾解任厚之詩叙稱同年光禄者伯原之父公綽也樂圃在今雍熙寺之西己廢為民居吾友朱性甫相傳為樂圃之後故此石留其家性甫没不知所在邢君麗文得拓本裝池成軸顧其字畫多已刓缺恐益逺而遂失之俾余重書一過併䟽其大畧如此䟦宋高宗御製徽宗御集序右宋高宗御書叙文一首前有斷簡後稱臣稱名蓋御製徽宗御集序也按紹興二十四年九月己巳宰臣進呈徽宗皇帝御集凡百巻上自序之權奉安於天章閣今序文無嵗月豈即當時所上耶後有龍舒故吏胡䟦亦無嵗月第云書於袁桷清容齋蓋元文清公伯長所蔵伯長自䟦亦缺其後按伯長生咸淳二年宋亡時才十有四嵗胡䟦蓋作於易世之後故不書年觀其書龍舒故吏而不稱臣可見已又云集蔵敷文閣而史云天章按杭宋内府寶文等十閣並貯諸帝御集而敷文實徽宗集所在天章則屬真廟而史云權奉安者豈當時敷文未成耶然前此侍臣已有帶敷文學士者而當時秦熺實為奉安御集禮儀使鄭重如此不應閣尚未成此皆不可曉也惟宋多右文之主自眞宗而下皆有御集多至數百巻今皆不傳而其所以為世輕重實不在此高宗翰墨尤號名家此文既典雅而翰札尤精然胡袁題識皆微致不滿之意誠以帝王之學自有所重也題東坡墨蹟右蘇文忠公與鄉僧治平二大士帖趙文敏以為早年眞蹟按公嘉祐元年舉進士六年辛丑中舉制科遂為鳳翔僉判越四年治平辛已召判登聞鼔院尋丁憂還蜀至熙寧二年已酉始還朝監官誥院四年辛亥出判杭州此書八月十六日發中有非久請郡之語當是熙寧中居京師作蓋公治平中雖嘗居京師然乙巳冬還朝而老泉以明年丙午四月下世中間即無八月又其時資淺不應為郡故定為熙寧時書於時公年三十有四矣公書少學徐季海姿媚可喜晚嵗出入顔平原李北海故特徤勁渾融與此如出二人矣帖故有二紙元季為吳僧聲九臯所蔵九臯嘗住石湖治平寺以此帖亦有治平字遂留寺中且刻石以傳而實非吳中治平也九臯既沒此帖轉徙他所而失其一吾友張秉道世家石湖之上謂是山中故實以厚直購而蔵之畀余䟽其大畧如此䟦東坡學士院批荅右蘇文忠公學士院批荅五道賜樞密安燾辭免恩命三賜户部侍郎趙瞻門下侍郎孫固各一按文忠内制集載賜燾不允批荅凡十有三此前二首元祐二年六月作後二首元年七月作趙瞻者作於三年三月孫固作於四月按固以元祐三年四月壬午守門下侍郎而燾為右尤禄大夫依前知樞密院事瞻為樞密院直學士簽書院事三人同日被命先是燾以元年閏二月乙夘自同知樞密進知院事為言官論列三月遽罷至次年六月竟被初命此二首蓋當時之詞也後人以三人並命因列於此而實非也後乃同知樞密乞退時所荅當在二首之前不知何故反列於後而其詞與集微有不同瞻所賜乃户部侍郎求外補時所荅而集中别有賜瞻辭免荅書二首實與固同日月而此首當是未受簽書之前宜其與固前首日月不同也最後祈雨道場齋文亦載内制集中而其文亦微有不同仰惟天命集作天人之師當以集本為是也按文忠元祐元年十二月入為中書舍人尋遷翰林學士知制誥至是恰兩年耳明年三月遂出知杭州於是公年五十有四矣此巻舊為寧波袁尚寶家所蔵余往嵗嘗見乃是冊子不知何人聨屬為巻遂至顚錯因李君仁甫出示䟽其畧如此若公文章翰墨之妙固不待區區論述也䟦江貫道畫巻右元季諸人題江貫道畫巻貫道名㕘南宋人居霅川畫師董巨畫法之妙余雖不能識而諸賢題詠皆清麗可喜至於字畫亦皆精謹不茍視近時大書狂語動輙滿巻者有間矣詩凡二十有五篇其尤知名者十有八人青丘子為高啓季迪長洲人國初與修元史官翰林編修終户部侍郎張適字子宜號丼白生仕終宣課大使王彛字常宗本蜀人流寓嘉定與修元史不仕而歸後與高啓皆死魏觀之禍徐賁字㓜文自毘陵徙居吳之齊門號北郭生仕終河南布政周南老字正道濂溪之後居長洲仕元浙省理問國初召議太常郊祀禮發臨安居住韓宜可字伯時越人仕終陜西㕘政杜環字叔循廬陵人隨父居金陵仕為贊禮郎終晉王府録事有行義事具宋濂所作小傳金問字公素一字公遡仕宣徳中為禮部侍郎錢紳字孟書仕終鄞縣教諭陳紹先字宗述元儒陳叔方之子仕終王府紀善年九十餘張倫字文伯仕為太醫院御醫青城山人為王璲汝玉傳仁廟為太子贊善卒贈太子賓客諡文靖陳繼字嗣初召為五經博士終翰林檢討倪瓚字元鎭號雲林子無錫人陶際字彦珩雲間人卞同字孟符張肎字繼孟號夢菴南郭氓為許觀瀾伯與卞張俱吳人有高行已上五人皆不仕而倪尤同時别有許觀亦字瀾伯洪武狀元及第仕建文時侍中後守安慶死靖難時乃安慶人與此許觀不同而皆有文學不知此詩誰作也題張企齋備遺補贊自古國家未嘗無骨肉之變而唐太宗之事出於不得已然不免後世之議者春秋責備之義也我朝壬午之際事出非常視臨湖之變尤為有名而一時死事之臣獨視王魏諸人有光焉則是我國家元氣之正與夫作養人材之盛有非前世所能彷彿萬一也惟是一朝史事廢缺統紀不傳實非細故文皇晚嵗稍稍悟悔蓋嘗形諸言矣而當時無將順之者遂使一時之事冺沒不傳則於靖難諸臣不能無責焉自睿皇以還國禁漸弛乃今遂不復諱故革除遺事備遺録次第梓行而一時死事諸臣遂傳於世於是有以見忠義之事不可終冺也有志之士讀其事而慨其人低佪慕仰往往形諸録贊豈惟以其人哉亦思所以補史氏之缺也觀企齋先生張公所補二十九贊辭義嚴正氣槩凛然意將追而及之於是先生年六十忠義之氣老而彌堅足以知其生平之所養矣某末學晚生知慕前烈亦嘗竊識一二而不能有言者不敢言也因讀斯贊輙書於後以識余愧䟦金伯祥瞻雲詩巻右瞻雲軒詩文一巻元季諸名賢為金伯祥氏作伯祥名天瑞世家長洲之笠澤富而有文且篤孝義所交㳺皆一時名流故所得詩文為多此其一也此巻序一詩共八首敘為陳基作基字敬初天台人至正間留吳仕張氏為學士院學士别號韋羗山人又號夷白子有夷白集行世詩首篇為楊維禎所謂鐵厓先生本㑹稽人晚居浙江泰寧丁夘進士元為江浙儒學提舉國初嘗徴入不仕歸卒次倪瓚字元鎭號雲林子無錫人不仕有高行又次蘇大年字昌齡號西澗維揚人避兵吳門張氏用為㕘謀稱為蘇學士而實未嘗仕也周砥字履道號匊溜生本吳人寓居無錫又居宜興晚居㑹稽死於兵吳毅富春人吳復見心之子父子皆鐵厓門人李繹字叔成錢塘人與陳義皆嘗仕張氏不甚顯故不得其詳此詩七首二首為瑞竹詩亦為伯祥作者按瞻雲詩當時賦者蓋不止此此數篇特以諸公手筆故其子孫尤加保惜如此餘存家集固可考也伯祥有弟天佐仕國朝為萬安主簿萬安六傳為茂仁名培賢而有文所謂保惜此巻者夫此諸賢皆以詞翰名家其手澤傳世夫人皆知寶之况其子孫哉又况賢而有文能不隕其世如茂仁者哉甫田集巻二十二
