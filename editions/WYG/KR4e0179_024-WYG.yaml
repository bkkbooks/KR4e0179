body:
  text: 甫田集巻二十四明文徴明撰祭文十一首祭劉美存文於戲美存木之美村玉之良璞不繩而治匪雕而琢生華貴之門而不為驕矜有高明之姿而不忘問學才優剸割而處家不煩是晦其能志在貫總而舉子得雋用揜其博蘭情欵欵人與其誠玉色温温天授之慤凡君之具匪貴則夀人之期君必大而逺蓋方享之有餘不圖甫行而遇蹇始塲屋之屢􅹾尚嵗年之未晚豈謂名花之方然竟不候實而先歛嵗行辛酉時復大比命數已極學力斯至何一疾之長終曽旬月之不俟三旬之夀不副其徳一第之榮竟齎其志嗚呼美存其何至於此極耶孤兒始孩老親萬里匪生世之足悲方身後之無倚目將不暝心實不死嗚呼美存其何至於此極耶君之尊人方衍澤西川宜有令子而君卒以身死至君之身聪明才逹宜承厚䕃而竟厄於命是皆造物之所為有不可以言語而致詰既非人力之致豈亦事變之極也嗚呼美存在庠校為才諸生於家庭為佳子弟朋友有推分之情鄉曲有長者之譽自君之亡舉城嗟吁好惡之私不足深據耳目之衆其何可塗縱所履或愆於小徳終微瑕不揜於良瑜余數人者或親或友或久或近雖所見有未得咸妮君而親厚由兹而觀固非强勉之所能推此以往將舉天下而無疚嗚呼美存所具者德而所不足者夀所不榮者身而所長享者名吾知有志之士固不以此而易彼而吾徒逰好之私終不能以理而喻情藐一尊之難屬惟既往之猶生祭徐昌榖文嗚呼昌榖濯濯淑靈英英異姿伊時之秀維邦之奇昔在髫年頴㧞而出排俗違時蹈古而癖著書滿家金鏗玉温孰其非之吾道攸存今昔異宜吾斯有盭稍抑弗伸益閎而肆有英其玉匪終則蔵旋收甲科棘寺徜徉維時孔艱世路云阻用失其才遂為物忤太學之遷寔行其私人皆君惜君自謂宜方適其情班資奚較弗諴於時益泳於道怡情佚志讀書詠詩名斯孔藉病則弗支聖明更化㧞幽登俊弗與維新君則有命嗚呼昌榖八品之階三十之夀胡付之材而享不有造物有意我則知之殆惜其祉而昌其辭瓌章閎議于今有耀視彼崇資孰則多少嗚呼昌榖在昔家食不妄交㳺惟吾二人心孚分投出入偕遨有無通假期惟暮終有允弗舍雲泥異趣差池嵗年身世乖隔心則弗遷疇昔之時恵言繾綣謂當南還展笑非逺曾未幾時訃音來馳丹旌在目遽哭君幃嗚呼昌榖百年悠悠君歸何遽豈無他人孰如君故嗚呼昌榖有官有家亦既有子名與世長庶其不死祭黃提學文吳郡諸生文某王寵謹具香帛之儀緘詞致祭於尊師提學先生黃公之靈嗚呼士死知已道義攸闗匪惟斯今維古則難故有終日相逐而不能相諒者矧復貴賤相懸曾無一日之雅而欲投情推分於一言一字之間嗚呼此余二人所為聞公之訃恨不能從公而不忘涕淚之澘也粤在曩嵗公來督學振溺起衰蹈厲揚㩁余二人者或以頽墮或在童孱偎以薄劣荷公陶甄與進則隆教詔無已葢將達其致用之材必欲致之奮庸之地觀其吹薦之勤用情之至使人中心銜感而直欲為之死也顧某等鄙昧弗率無所用成方將湔濯自厲以求無負於知已無累於高明豈圖一再見之後而契闊死生己邈乎其難慿嗚呼升沉榮辱在吾二人者固不可必而我公不可復生矣嗚呼悲哉嗚呼痛哉祭土地文夫居止所在有神司之而神之所職静惟其宜自我先君奠居於此延及某叨庇多矣今者偶葺先廬稍加充拓自春徂秋屢有興作築斯鑿斯不無冒犯迄始而終㒺有災患凡此平寧孰非神恵有徳弗報我則有罪嵗云暮矣我居告成敢脩薄薦用荅神靈祭陳以可文嗚呼以可崢嶸佚蕩之資慷慨邁往之氣金貂貴介之習磊落有為之志今皆己矣不可見矣嗚呼哀哉方其少也侍親宦逰翺翔京國入修子道出應賓客文采風流照映奕奕起家郎吏遂用恢宏高居甲第掲掲䡌䡌妙舞㜕娟綺筵狼籍張弛逶迤十年一日數致干金縁手散去曾無吝情亦弗終敝比其晚節悉反少習從事耕桑丘園自適行阡履陌居然逸民囘視曩昔如出兩人嗚呼以可不試其材用之􅅵畆射時高下盡地薄厚莫不適宜莫不可守再起其家足貽厥後所以然者由其具明智之徳是以識四時之運能與時而消息故隨行而㒺困殆不忝所謂名卿之子孫而實一時之雄俊也某不佞齪齪自全視君高朗奚啻天淵然幸不忘通家之好又重以文字之契所謂水火其性而膠漆其誼也二十年來氣浹情怡有無通假過失相規嗚呼以可今則已矣孰知我貧孰相我事契闊死生方從此始嗚呼哀哉方君病革之時正我失解之日君猶慰我執手太息葢能了死生之際而畧無兒女子之戚也曾一語之不酬乃千載之永隔嗚呼哀哉嗚呼痛哉鄉里祭沈都憲文維公純篤之性清明之質貞白之操粹美之徳公材則多公學無頗升從俊良翹然制科出典方州入司法比以莫不優式隆攸譽西蜀萬里忽把一麾不鄙其民爰拯其疲載言翼翼弗縱弗暴崇正闢邪是興文教一朝難淹起領藩牧直道不囘中遭讒逐明廷更化雪寃湔疵輿論弗釋亟踐台司維兹貴竹滇蜀門户梟獍以逆有詔往撫控制有方綏來有徳厭難折衝邉用靖謐東人阻饑公時在疚璽書臨門起公往救民則有懐公不少留位望駸駸而疾弗瘳舍旃來臨保兹素履清愼之稱至形天語優㳺桑梓曾無幾時胡不慗遺溘焉長辭訃徹中朝天子有恤龍章煌煌屭屭翼翼凡此茂恩惟徳之致恩則不愆公不可起國失貞榦鄉無老成顒顒爵望悠悠典刑某等忝仕同朝生復同郡出有後先莫不沾潤感兹殄瘁能不嚱吁緘詞致奠言與情具祭王于田母文於惟夫人明順而祥繄宗之淑來嬪于王雍雍令儀翼翼匪懈以承􅀈嫜協于中外展矣夫子維時之碩有相則賢式是云匹豈曰能匹亦教有成篤生二子允維邦禎赫赫中臺煌煌使節儷迹嫓聲奕然並起鸞封鼎養有來方殷有積斯受胡遽沉淪子失令母夫䘮厥良悼徳懐慈以莫不傷豈家則傷中外興歎人為母悲母則奚憾令名洋洋命服煌煌白髪高堂煜其有光子孫繩繩後先輝暎身享其榮目擊其盛七十三齡考終于家寵榮斯極夀匪不遐凡此榮夀世不並有於惟夫人庶其無負某等鄉里後進稔聞母徳矧與令子忝同朝籍既兹有情能不母悲爰陳一觴侑此些詞鄉里祭劉司寇先生文惟公世出清江族大以顯傳數百年弗替有衍爰遷來吳世徳攸隆山川淑靈是鍾我公高朗特逹少則英異起家甲科為時良吏連宰二邑聲光有煜進陟明廷遂官六察八閩五嶺時維大藩公兩奉使敦薄廉貪糾繩我司激揚我職出入中外以莫不克考牧之遷位不滿才爰從卿少進列中台璽書煌煌天子有命惟此西川爾往作鎮乃靖疆場乃清時弊迺匡迺襄式用寧敉文翁之教乖厓之識以公方之過無弗及於時多事允藉謀猷一再往撫實寛帝憂逆豎盜權讐我善類抉摘推求公遂得罪惟帝仁明事迄以白出自徒中援登台席甫司廷尉即佐本兵周旋臺省進列孤卿乃弼邦刑往司留鑰公業斯隆帝眷方渥胡爾遄歸言保其終寄懐泉石穆然清風優㳺十年考終故里帝聞有悼恤典優異再鍚之祭營𦵏自公龍章奕奕賁於幽宫嗚呼我公出入三朝年逾八袠遭逢治隆令名無斁公才既多公享亦厚如公始終世豈多有惟是鄉無老成國隕楨榦忝在鄉人能不悲嘆寄跡朝署望弔無縁緘辭寄奠聊寫憂悁祭施行人母文有賢孺人崇川令族既賦之明亦貞而淑乃擇之配于歸于施執孝􅁤物式隆婦儀内嚴􅀈嫜外諴宗戚俯仰勤誠以莫弗克凡起其家舊徳維新爰相夫子為時令人維膠州君賢闗碩士起倅一州式遄歸只維無内顧用全令名允兹完徳實相有成豈曰能相亦教弗弛愛不揜嚴是成令子維大行君英英儁造發身制科列官華要爰膺天命使於四方豈維弗辱煜然有光有來貤封弗逺伊邇胡弗少延溘焉長逝懿徳云亡莫不嗟吁矧惟令子痛傷何如某等忝仕同朝實深悲涕爰奠一觴通家之誼祭王欽佩文與陳魯南同祭嗚呼欽佩君遂止於斯耶始君家食之時交遊數人並以義氣相得以志業相高以功名相激昂葢不知古人何如也數年以來相繼登庸各以所能自見而吾二人升朝最晚於時君方秉憲外臺領中州斯文之寄顧以母老念歸飄然解任朝廷惜君之去稍進卿階畀領太僕雖以展君之才實以便君之養也豈其朝命甫下而太夫人顧已辭堂惟君顧復情深毁裂為甚某等方為君憂而君果以是致疾自去秋抵今數月之間傳聞之言日甚一日孱弱之軀加之至性深切勢必難任所兾吉人多福天必相之詎意竟此長逝耶嗚呼君起世科績學中秘繼逰郎署出領憲臺宣力中外聲望卓然論者方期君以大用將䇿勲一時垂烈後世而今遽止於是耶宏偉之才精深之學清眞之徳高朗之行今又何可得耶君之先公辣齋先生一代偉人齟齬於時不究厥用天下有遺望焉葢方有待於君而君又以盛年碩望厭棄明時天意果何所屬耶母䘮在殯妻亦去室孤子㷀㷀一室懸罄君葢有不可死者而卒死之嗚呼天乎何其酷耶其等二人聞訃以來相向悲慘不能為情者數日客寄於斯無由撫棺一慟緘詞往奠用致區區嗚呼欽佩今則己矣不可見矣嗚呼悲哉嗚呼痛哉祭徐崦西文維公祥雅其儀剛明成性修正含宏若淑貞定既靖有嘉亦儶而頴早升俊於甲科旋淑成於蘭省䇿名玉署允協輿情侍講金華式當明聖進宣忠讜上洽於淵𠂻出佐銓衡特膺乎簡命文章政業維聲實之並流鳳閣麟臺亶後先之輝暎既藉藉乎周行式駸駸乎華近豈其譽者在前而忌者已出於後宦途方逹而此身已落乎陷穽遂枉特逹之才投諸閒散之境乃寄蹟於溪山不失譽於鄉井時垂顧問知聖意之惓惓久鬰才情矧人心之耿耿謂直道難容雖蹔辭乎軒冕而高才㒺棄終致用乎台鼎胡二竪之不仁遂一疾而長瞑朝野増吁聖心為軫然棄捐淪落雖有負乎眷勤而哀榮始終卒㝠膺乎恤贈兹所謂身死而名存不幸中之大幸也某列官芸署幸聨鴛鷺之班息駕鄉閭叨侍溪山之勝時接話言數陪觴詠顧余潦倒長公十稔謂當托好以終身何圖棄我而先隕興言及此氣咽而哽陳詞薄奠言有終而意無盡也嗚呼哀哉甫田集巻二十四
