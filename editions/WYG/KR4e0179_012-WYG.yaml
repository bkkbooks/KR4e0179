body:
  text: 甫田集巻十二明文徵明撰詩二十七首李少宰杭中丞劉柴二光祿置酒丁亥冠葢雍容總卧龍清時吏隠大江東黄花初過重陽節白髪來邀栗里翁豈有聲名驚四海解忘形跡荷諸公浮塵不到清樽畔舉扇無勞障北風趙麗卿侍御邀遊冶城落水蕭蕭帶逺空冶城髙處見秋風重將白髪遊江左依舊青山似洛中有客樽前談夢鹿何人天際慕飛鴻荒墪寂寞埋秋草猶自風流憶謝公徒歩至寶光寺布襪青鞋短褐衣酒樽詩巻一僮隨白頭自笑曾供奉徒歩誰憐老拾遺五畝喜聞秔稻熟重陽還恨菊花遲松寮竹谷逍遥地時有山僧乞小詩九日與彦明登雨花臺雨花臺上雨初乾野色江光落坐間豈謂旅遊逢九日共來把酒看三山老年節物偏生感到處雲林不負閒落木滿空秋萬里暝禽遥帶夕陽還題蘭炎夏悠悠白晝長空齋睡起拂匡牀不須甲煎添金鴨氣泛崇蘭滿几香瀟湘八景濕雲載秋聲萬籟集篁竹江湖白髪長獨擁孤蓬宿瀟湘夜雨月出天在水平湖淨於席安得謫仙人來聽君山笛洞庭秋月孤帆落日明青山相映帶遥遥萬里情更落青山外逺浦歸帆征鴻戀廻渚欲下還驚飛葦深繒繳繁歲晩稻粱㣲平沙落鴈鷄聲茅屋午靄靄墟煙白市散人亦稀山空翠猶滴山市晴嵐曬網白鷗沙衝煙青箬笠欸乃一聲長江空楚天碧漁村夕照日没浮圖昏遥鍾出煙嶺應有未眠人冷然發深省煙寺晩鍾密雪灑空江雲㝠天浩浩寧知風浪髙但道漁簑好江天暮雪畫牡丹粉香雲暖露華新曉日濃薫富貴春好似沉香亭上看東風依約可憐人憶昔四首次陳魯南韻三年端笏侍明光潦倒爭看白髪郎只尺常依天北極分番曾直殿東廊紫泥浥露封題濕寳墨含風賜扇香記得退朝歸院静微吟行過藥䦨傍紫殿東頭敞北扉史臣都着上方衣毎懸玉珮聴鷄入曾戴宫花走馬歸此日香罏違伏枕空吟髙閣靄餘輝三年歸卧滄江上猶記雙龍傍輦飛扇開青雉兩相宜玉斧分行虎旅隨紫氣氤氲浮象魏彤光縹緲上罘罳幸依日月瞻龍衮偶際風雲集鳯池零落江湖儔侣散白頭心事許誰知一命金華忝制臣山姿偃蹇漫垂紳媿無忠孝酬千載曾履憂危事一人陛擁春雲嚴虎衞殿開初日照龍鱗白頭萬事随煙滅惟有觚棱入夢頻竹雀落木蕭蕭苦竹深茅簷斜日喚雙禽棘叢豈是藏身地三月春風滿上林千葉梅與方山人同賦緗梅奕葉照瓊枝不是横斜舊日姿繁雪吹香春翦翦冷雲團樹玉差差羅浮夢斷情稠疊瑶圃風生珮陸離一任堦前明月碎清真不負歲寒期静隠掃地焚香習燕清蕭然一室謝將迎坐移白日花間影睡起春禽竹外聲心逺自應人境寂道深殊覺世緣輕問奇尚有門前客却恨青山不揜名顧華玉以書邀予為西湖之遊病不能赴詩以謝之舊約錢塘二十年春風擬放越溪船却憐白髪牽衰病應是青山欠此緣漫説西湖天下勝負他北道主人賢只餘好夢随潮去月落空江萬樹煙中秋日晩雨忽霽與諸友看月晩雨新晴客欵扉天時樂事不相違眼前愁緒浮雲散坐上佳人碧月輝誰見入河蟾不没空憐繞樹鵲驚飛多情惟有清光舊照我年來白髪稀對酒晩得酒中趣三杯時暢然難忘是花下何物勝樽前世事有千變人生無百年還應騎馬客輸我北忩眠觀書老眼視茫然時時手一編未能忘習氣聊復遣餘年欹枕山忩下篝燈細雨邊誰應知此味自結静中緣煑茶絹封陽羡月瓦缶惠山泉至味心難忘閒情手自煎地罏殘雪後禪榻晩風前為問貧陶榖何如病玉川晏起林下將迎寡頽然萬事捐老知閒有益病與嬾相便殘夢荒鷄外輕寒繐帳前從教貧到骨不負日髙眠甫田集巻十二
