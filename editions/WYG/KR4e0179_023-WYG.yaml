body:
  text: 甫田集巻二十三明文徴明撰題䟦七首題蘇滄浪詩帖右宋蘇子美古詩一百五十言留别原叔八丈蓋王洙原叔也詩語峻㧞意氣悲壯歐陽公謂其廢放後時發憤悶於歌詩殆此􅁼也字畫出入顔魯公徐季海之間而端勁沉著得於顔公為多當時評者謂為花發上林月滉淮水豈其然乎按子美慶歴四年丙戌十一月坐監進奏院㑹客事除名徙蘇州此詩後題乙酉清明日則是被放之三閲月也時原叔以天章閣侍講史館檢討黜知濠州正坐子美事故詩云遂令老成人坐是亦見斥時子美年三十有八原叔五十一故有老成及八丈之稱又有今來濠州厓及明日又告行等語當是隨原叔至濠及是乃别耳其後子美竟以慶歴八年卒於蘇凡在蘇四年宜其遺蹟流傳吳中為多去今數百年所謂滄浪亭者雖故址僅存亦惟荒烟野草而已至於文章翰墨不少槩見宣和書譜謂雖斷章片簡人皆傳播豈在當時己不易得耶此詩雖非蘇事而實赴蘇時作少宰徐公子容以為郡中故實因重價購得之俾徴明䟽其大畧如此若其志節履行具正史者兹不復云附録原稿舜欽作詩留别原叔八丈閣下交道今莫言難以古義責錙銖較利害便有太行隔余生性闊踈逢人出胷臆一旦觸駭機所向盡戈㦸平生交㳺面化為虎狼額謗氣懆烈烈中之若病疫遂令老成人坐是亦見斥既出芸香署又下金華席摧辱實難任官名器非惜罪始職於予時情未當隙今來濠川涯日夜自羞惕高風激頽波相遇過平昔白玉露胏肝晴雲見顔色乃知天壤間自有道義伯明日又告行嗟嗟四海窄慶歴乙酉清明日書題趙松雪書洪範并圖右趙文敏公書尚書洪範并畫箕子武王授受之意為圖畫既古雅而小楷精絶殆無遺恨但無嵗月可考嘗見公所書莊子馬蹄篇乃初被召為兵部郎中時書其筆法與此正同疑此亦當時之作維公以宋之公族仕於維新之朝議者每以為恨然武王伐紂箕子為至親既受其封而復授之以道干載之下不以為非然則公獨不得引以自蓋乎公素精尚書嘗為之集註今皆不書而獨書此篇不可謂無意也因崦西徐公出示為著此語以備折衷不知公以為何如書馬和之畫巻後右馬和之畫相傳為清谿㸃易圖蓋寫唐人高駢詩意按荆州記臨淮有清谿山山東有泉泉側有道士舍所謂清溪道士也此圖一羽人趺坐榻中一人褰裳回顧若有所指陳二從者却立一執巻一捧古鼎二鶴一飛一止初無所謂洞門碧忩滴露研硃之狀疑自寫他事而後人目為清溪耳若其筆法之妙則非和之不能和之紹興間人畫師吳道𤣥好用掣筆所畫多經書故事思陵尤愛其畫每書毛詩虚其後令和之為圖此或其遺簡不可知也題張即之書進學解右宋張即之書韓文公進學解即之字温夫别號樗寮㕘政孝伯之子仕終太子太傅直秘閣歴陽縣開國男其書當時所重完顔有國時每重購其蹟史稱即之博學有義行而袁文清師友淵源録亦言即之修潔喜校書經史皆手定善本語乾道淳熙事先後不異史官書蔽其名按皇宋書録即之安國之後甚能傳其家學安國名孝祥仕終顯謨閣學士所謂于湖先生孝伯之兄即之之伯父也其書師顔魯公嘗為高宗所稱即之稍變而刻急遂自名家然安國僅年三十有八而即之八十餘咸淳間猶存故世知有樗寮書而于湖書鮮稱之者此書無嵗月可考而老筆徤勁大􅁼安國所書盧坦河南尉碑豈所謂傳其家學者耶周誥商盤下缺一字實徽宗御名韓文商本作殷豈亦以諱避就耶故浙江㕘政崑山張公敬之舊蔵此冊公卒無子圖書散失從孫比部員外允清以重直購之允清所謂惓惓於此豈直字畫之妙而已後之子孫尚知所寶哉題希哲手稿右應天倅祝君希哲手稿一軸詩賦雜文共六十三首皆癸夘甲辰嵗作於時君年甫二十有四同時有都君元敬者與君並以古文名吳中其年相若聲名亦畧相下上而祝君尤古䆳竒奥為時所重又後數年某與唐君伯虎亦追逐其間文酒倡酬不間時日於時年少氣鋭僴然皆以古人自期既久困塲屋而憂患乗之志皆不遂惟都君稍起進士仕為徒官君與唐雖舉於鄉亦皆不第君後雖仕亦不甚顯尋皆相繼下世余視三君最為庸劣而仕亦最後嗚呼三君已矣其風流文雅照映東南至今猶為人歆羨余雖老病幸存而潦倒無聞不足為有無也此巻雖君少作而鑄詞發藻居然𤣥勝至於筆翰之妙亦在晉宋之間誠不易得也嘉靖十五年丙申上距成化癸夘五十有四年而祝君下世已十有一年矣是嵗三月廿二日某題時年六十有七溪山秋霽圖䟦右溪山秋霽圖故鄉先生陳汝言所畫汝言字惟允號秋水本臨江人父天倪先生明善得吳草廬之傳流寓吳中二子汝秩汝言並有文學汝言尤倜儻知兵至正末張士誠既受招安辟為太尉㕘謀貴寵用事國初為濟南幕官坐事卒妻金氏守節教其子繼以文學名於時仁廟召為五經博士終翰林檢討所謂嗣初先生也此畫惟允未仕時作一時題識者二十有三人皆知名之士今可考見者二十人鄭元祐字明徳遂昌人寓吳少脫骱任左手號尚左生元末老儒嘗仕為平江路學教諭終江浙儒學提舉所著有僑吳集遂昌雜録朱徳潤字澤民宋睢陽五老朱貫之後博學能文尤工畫趙文敏公薦入翰林終征東儒學提舉所著有存復齋稿今尚書玉峯先生五世祖也倪瓚字元鎭元季高士清眞絶俗所謂雲林先生也張監字天民丹陽人寓吳中二子經緯皆仕張氏有名陳植字叔方寧極先生子微之子性孝有文亦能書畫元季不受徴辟以隠約終饒介字介之番陽人號華葢山樵自翰林應奉出僉江浙廉訪司事張氏承制以為淮南行省㕘政工詩尤以行學擅名蔣堂字子中泰定鄉試舉人元季不仕國初為嘉定州學教授周砥字履道號匊溜生吳人寓居無錫後與馬孝常避兵宜興有荆南倡和集陳秀民字庶子號寄亭又時稱四明山道士博學善書仕張氏為學士院學士秦約字文仲其先淮人後徙崇明洪武初應召試愼獨賦拜禮部侍郎改溧陽教諭所著有海樵集王蒙字叔明號黃鶴山樵趙文敏外孫善書畫洪武中官泰安知州坐事卒陸仁字友仁崑山人張憲字思廉號玉笥山人有玉笥集岳榆字季堅宜興人顧阿瑛字仲瑛號玉山樵者崑山人有文學家富好客時稱豪士元季削髪讀佛書以避張氏國初徙鳳陽卒陳汝秩字惟寅即惟允兄不仕張氏倪元鎮所謂外混光塵中分涇渭者蓋獨行之士也王行字止仲博學知兵洪武中為郡學訓導後遊京師坐藍玉黨卒先是惟允貴顯時行為門下客惟允卒後其子繼從行學故其辭稍倨惟允壻劉政見之罵曰此吾外父食客那得稱吾友以筆抹之今抹筆隠然猶存劉政字用理建文己夘解元方正學門人嘗草平燕䇿病未及上聞壬午之變嘔血死無子祭酒劉文恭其嗣子也俞貞木本名禎後以字行别字有立石澗先生玉吾之子元季不仕國初知樂昌都昌知縣清苦篤學敦行古道建文中坐事卒袁華字子英崑山人能詩尤長於樂府洪武中郡學訓導以子被罪坐累卒所著有耕學稿此巻世蔵陳氏今歸吾友江西㕘議王君直夫蓋陳氏壻也其畫嘗為妄人裂其半直夫以余嘗見元本俾為補之而題其後並䟽諸人事行如此䟦李龍眠孝經相右龍眠居士李伯時所畫孝經一十八事葢摘其中入相者而圖之按畫譜所載御府伯時畫一伯有七中有孝經相此巻葢宣和所蔵然無當時印識而有紹興小璽豈南渡後又嘗入秘府耶伯時喜畫古賢故事每薄著訓戒則孝經相當非特一本此殆别本也伯時之畫論者謂出於顧陸張吳集衆善以為已有能自立意不蹈習前人而隂法其要其成染精緻俗工或可學至於率畧簡易處終不可及也此昔人定論余不容贅言若文學人品在東坡山谷之間而博學精識出劉貢父之上官京師數年不一迹權貴之門佳時勝日載酒出遊坐石臨流翛然終日山谷謂其風流文雅不減古人而為畫所掩然而卒亦不能掩也甫田集巻二十三
