body:
  text: 甫田集巻十明文徵明撰詩八十七首午門朝見祥光浮動紫煙収禁漏初傳午夜籌乍見扶桑明曉仗却瞻閶闔覲宸旒一痕斜月雙龍闕百疊春雲五鳯樓潦倒江湖今白髮可能供奉殿東頭奉天殿早朝二首天外鳴鞭肅禁宸朝廷獻納有司存罘罳拂曙樓臺迥象魏連雲觀闕尊夾陛書思端萬笏上方求諫闢千門宫牆樹色深於染總受天家雨露恩月轉蒼龍闕角西建章雲歛玉繩低碧簫雙引鸞聲細綵扇平分雉尾齊老幸綴行班石陛謬慚通籍預金閨日高歸院詞頭下滿袖天香拆紫泥雨中放朝出左掖霏㣲芳潤浥霓旌歴落彤墀散履聲暝色浮煙迷左掖碧雲將雨近西清栁垂青瑣千絲重水落銀橋萬玉鳴沾灑不辭袍袖濕天街塵净馬蹄輕雪後早朝月滿長安雪未消分明銀海瀉秋濤光迷萬里璚珂亂勢壓雙龍玉闕髙曙色漸分鳷鵲觀凝寒猶在鷫鸘袍負薪亦有號饑者願得君王發漢厫元旦朝賀仙音縹緲恊和鸞天上春回白玉䦨日出鷄人齊唱卯雪消風伯為驅寒萬方玉帛看王㑹一嵗儀文重履端滿目昇平題不得白頭慚愧直金鑾進春朝賀玉殿千官拜冕旒紫衣京兆在前頭四時盛德初臨木先日嚴寒已送牛氣轉蒼龍當法駕風回明庶動宸斿聖王和令思行慶次第頒恩下九州恭候大駕還自南郊聖主回鑾肅百靈紫雲團盖翼蒼精屬車劒履星辰麗先駕旂常日月明十里春風傳警蹕萬方和氣恊韶韺白頭欣覩朝元盛願續思文頌太平觀駕幸文華聽講朝下鑾輿幸講堂徐看天仗轉東廂翠旂拂柳宫牆繞清蹕穿雲閣道長千載明良真際㑹九朝文物舊彛章小臣漫厠夔龍後彷彿還瞻日月光慶成宴花暎珍盤出上供風吹韶頀落遥空坐聨日馭紅雲暖恩湛宫壺瑞露融一代禮成郊社後百年身際太平中晩酣不記歸來處彷彿春光玉殿東再與慶成日射宫花淑景柔春風重醉殿東頭嫚姍不厭倡優拙宣勸親承禮數稠天上露華恩湛湛庭中和氣鹿呦呦一聲響節驚禽散錦服中官進御羞實録成賜燕禮部北府書成奏尚方南宫拜詔許傳觴青春照坐宫花麗瑞露浮樽法酒香邂逅鸞臺修故事遂令牛走被餘光濃恩恰似朝來雨散作槐㕔六月凉臘日賜燕綺筵錯落映朱旗百辟承恩燕赤墀薦蜡尚存周典禮賜酺聊舉漢官儀中厨次第催傳䏑列坐雍容各覆巵潦倒不慚書獵字殷勤還賦伐檀詩端午賜扇剡藤湘竹巧裁將珍重瑶華出尚方四海清凉初拜賜一時懐袖總生光最憐明月難捐棄即有仁風可奉揚真覺自天題處濕墨痕狼藉露華香賜長壽綵縷紫宸朝下錫靈絲金水橋邊拜命時文繡自天騰五色光華約臂結雙螭重慚潦倒隨恩澤還忝班行覩盛儀願得君王千萬壽日華常照衮衣垂實録成䝉恩賜襲衣銀幣雙銀爛爛出朱提稠疊文繒五色絲天子不遺牛馬走侍臣還忝鳯凰池青霄寵渥兼金重白首遭逢補衮遲狼籍天香擕滿袖春風湛露寫新詩再賜銀幣流銀嘉幣上方琛晝錫駢蕃雨露深朽質何堪施綺縠虛名元自愧南金敢忘珍重酬千載圖補絲毫有寸心白髮茂恩何所自三年供奉忝詞林翰林齋宿春星爛漫燭㣲垣獨擁青綾向夜䦨宫漏隔花銀箭永蓮燈垂燼玉堂寒坐聆宵柝霜圍屋想見郊禋月滿壇鈴索無風塵土逺始知仙署逼金鑾興隆寺致齋漠漠香燈佛座前寢衣相對不成眠明禋夙奉廷中戒清凈來修物外縁竹樹湘簾新月色鬢絲禪榻舊風煙無端忽憶朝元事笑隔春風又一年内直有感天上樓臺白玉堂白頭來作祕書郎退朝毎傍花枝入儤直遥聞刻漏長鈴索蕭閒青瑣靜詞頭爛漫紫泥香野人不識瀛洲樂清夢依稀在故鄉禁中芍藥仙姿綽約絳羅紳何日移根傍紫宸月露冷團金帶重天風香泛玉堂春千年想見翻階詠一笑羞稱近侍臣不似人間易零落上方元自隔凡塵遊西苑宛轉瀛洲帶幔坡􅠠蜷玉蝀壓銀河廣寒遥見空中樹太液㣲生雨後波雲捲紅籹千步障風吹璚葢萬年柯太平見說宸游簡馳道青青長薜蘿秋日再經西苑内苑秋清宿露晞盈盈日采動金扉松間翠殿團華葢天外銀橋入紫㣲錦纜稀遊青雀暗璚波無際白鷗飛彤牆高栁無人折時見中官一騎歸紫氣紫氣龍顔穆彤墀虎衛森萬年占帝運一念格天心日月何虧食華夷仰照臨誰應知有喜白首忝詞林頒厯鳯厯從天下千官列陛前青陽壺史奏黄帕侍中傳周禮存頒朔堯書重紀年白頭供奉裏慚愧得春先西苑詩十首萬嵗山在子城東北𤣥武門外葢大内之鎮山也其上林木隂翳尤多珍果一名百果園日出靈山花霧消分明員嶠戴金鼇東來複道浮雲逈北極觚稜王氣高仙仗乘春觀物化寢園常嵗薦櫻桃青林翠葆深於沐總是天家雨露膏太液池在子城西乾明門外周凡數里環以林木亭榭東西跨以石梁璚華島在其中泱漭滄池混太清芙蓉十里錦雲平曽聞樂府歌黄鵠還見秋風動石鯨玉蝀􅠠蜷垂碧落銀山縹緲自寰瀛從知鳯輦經遊地鳬鴈徊翔總不驚璚華島在太液池中上有廣寒殿相傳遼太后遊息之所海上三山擁翠鬟天宫遙在碧雲端古來漫說瑤臺迥人世寜知玉宇寒落日芙蓉煙裊裊秋風桂樹露團團勝遊寂寞前朝事誰見吹簫駕綵鸞承光殿在太液池上圍以甕城殿搆環轉如葢一名圓殿中有古栝數百年物也小苑平臨太液池金鋪約户鎖蟠螭雲中帝座飛華葢城上鈎陳繞翠旗紫氣曽迴雙鳯輦青松猶有萬年枝從來清蹕深嚴地開盡碧桃人未知龍舟浦在璚華島東北有水殿二藏龍舟鳯舸列殿隂隂水竇連漢家帝子有樓船蘭橈桂楫曽千里錦纜牙檣憶徃年汾水秋風空落日隋堤楊栁漫青煙今皇别有同民樂不遣青龍漾碧川芭蕉園在太液池東崇臺複殿古木珍石㕘錯其中又有小山曲水實録成於此焚槁小山盤折翠㟏岈松檜隂隂輦道斜草長蘭亭迷曲水雨深桃洞自飄花紫雲依舊圍黄屋青鳥還應識翠華知是史臣焚草地文光隱隱結紅霞樂成殿在芭蕉園之南引水為池中建三亭架朱梁以通梁左右浮以小山名曰九島其東别鑿澗激水以轉碓磨南田穀成於此舂治故云樂成太液東來錦浪平芙蓉小殿瞰虛明碧欄蘸影雙龍卧緑水浮渠九島輕漾日金鱗堪引釣拂天翠栁亂聞鶯激流靜看飛輪轉天子無為樂嵗成南臺在太液池之南上有殿曰昭和下有水田村舎先朝嘗於此閲稼青林迤邐轉迴塘南去髙臺對苑牆暖日旌旗春欲動薫風殿閣晝生凉别開水榭親魚鳥下見平田熟稻粱聖主一遊還一豫居然清禁有江鄉兎園在太液池之西崇山複殿林木蔽虧山下小池石龍昂首而蟠激水自地中轉出龍吻漢王遊息有離宫瑣闥朱扉迤邐通别殿春風巢紫鳯小山飛澗架晴虹團雲芝葢翔林表噴壑龍泉轉地中簡樸由來堯舜事故應梁苑不相同平臺在兎園之北東臨太液西面苑墻臺下為馳道可以走馬武皇嘗於此閲武日上宫牆飛紫埃先皇閱武有層臺下方馳道依城盡東靣飛軒映水開雲傍綺旒常不散鳥窺仙仗去還來金華待詔頭都白欲賦長楊愧不才嘉靖乙酉春同官陳侍講魯南馬修撰仲房王編修繩武偕余為西苑之遊先是魯南教内書堂識守苑官王滿是日實導余三人行因得盡厯諸勝既歸隨所記憶為詩十篇竊念神宫秘府逈出天上非人間所得窺視而吾徒際㑹清時列官禁近遂得以其暇日遊衍其中獨非幸與然而勝踐難逢佳期不再而余行且歸老江南追思舊遊可復得耶因盡録諸詩藏之他時邂逅林翁溪叟展巻理詠殆猶置身於廣寒太液之間也是嵗四月既望識遊西山詩十二首早出阜城馬上作有約城西散冶情春風輟直下承明清時自得閒官味勝日難能樂事并馬首年光新栁色煙中蘭若逺鐘聲悠悠歧路何須問且向白雲深處行是日迷道數數問程故云登香山指㸃風煙欲上迷却聞鐘梵得招提青松四靣雲藏屋翠壁千尋石作梯滿地落花啼鳥寂倚䦨斜日亂山低去來不用畱詩句多少蒼苔没舊題來青軒寂寂雲堂車馬稀髙明不受短牆圍好山宛轉雙排闥勝日登臨一振衣望裏風煙晴更逺坐來塵土暮還稀松間白鶴如嫌客顧影翩然忽自飛香山厯九折坂至𢎞光寺偃月池邊寳刹鮮不知賜額自何年行從九折雲中坂來結三生物外縁嵗乆松杉巢白鶴春晴樓閣湧青蓮誰言好景僧能占總落遊人眼界前碧雲寺中官于經所建極其雄麗翠殿朱扉翔紫清璇題金榜日晶晶青蓮宛轉開仙界玉闕分明入化城雙澗循除鳴珮玦三花拂檻映幡旌貴人一去無消息野老依稀識姓名宿𢎞濟院一龕燈火宿山寮人靜方知上界高閣外千峯寒吐月空中羣木夜鳴濤不愁雲霧衣裳冷秪覺煙霞應接勞辛苦忙縁難解脫五更清夢破雲璈遊普福寺觀道傍石澗尋源至五花閣道傍飛澗玉淙淙下馬尋源到上方怒沫灑空經雨急洑流何處出雲長有時激石聞琴筑便欲沿洄汎羽觴還約夜凉明月上五花閣下聽滄浪歇馬望湖亭寺前楊栁緑隂濃檻外晴湖白暎空客子長途嘶倦馬夕陽高閣送飛鴻即看野色浮天際已覺扁舟落掌中三月燕南花滿地春光都在五雲東吕公洞内有耶律椘材字何時神斧擘幽崖古竇春雲福地開翠壁未磨耶律字石牀曽卧吕公來隂寒四面凝蒼雪秀色千年蝕紫苔凡骨未仙留不得剛風吹下夕陽臺功德寺西來禪觀兩牛鳴曽是宣王玉輦行寳地到今遺路寢山僧猶及見鸞旌琅函萬品黄金字飛閣千尋白玉楹頭白中官無復事夕陽相對說承平玉泉亭愛此寒泉玉一泓解鞍來上玉泉亭濳通北極流虹白俯視西山落鏡清最喜須眉揺緑凈忍將纓足濯清冷馬頭無限紅塵夢總到䦨干曲畔醒西湖春湖落日水拖藍天影樓臺上下涵十里青山行畫裏雙飛白鳥似江南思家忽動扁舟興顧影深懐短綬慚不盡平生淹戀意緑隂深處更停驂病中懐吳中諸寺治平寺寄聽松七尺藤牀一畆宫青山何處不相容大官底用三升酒長樂愁聞五夜鐘笠澤風煙荒橘柚横塘秋色老芙蓉幾時歸去楞伽寺常伴林僧看古松竹堂寺寄無盡東城古寺萬枝梅一嵗看花得幾迴竹徑三年無我迹松門此日為誰開還應壊壁餘詩草只恐荒碑蝕雨苔憑仗山僧懸木榻長安倦客且歸來東禪寺寄天機從别林僧酒道塲幾回飛夢到溪堂夕陽松徑無塵鞅春水籬根有釣航坐憶同盟多隔世時聞老衲去遊方不知聽雨南軒下誰與幽人續斷香馬禪寺寄明祥閒情毎結道人縁不到東禪即馬禪花發來禽凡幾樹夢回啼鳥已三年朔風左掖籠貂㡌殘雪長安綰玉鞭不及祥師蕭寺裏茶煙一榻擁書眠天王寺寄南洲天王寺裏竹千頭曲榭迴廊舊日遊别後梅花應自發壁間詩草屬誰収憶看逺岫開飛閣曽弔荒宫上小丘白首思歸形夢想封書惆悵問南洲寳幢寺寄石窩乆客懐歸問舊遊雙娥精舍屋東頭絶憐近市無塵到曽是尋僧竟日留滿地緑隂誰結夏擁籬黄葉更宜秋玉泉清冽應無恙憑仗山厨設茗甌昭慶寺寄守山搔首長安望闔閭風煙漠漠九秋餘正思黄葉南朝寺忽把飛雲慧逺書東壁磨碑知有待北牕懸榻竟何如自憐白首無禆補虛棄閒縁卧直廬秋日早朝待漏有感鐘鼔殷殷曙色分紫雲樓閣尚氤氲常年待漏承明署何日掛冠神武門林壑秋清猿鶴怨田園嵗晩菊松存若為乆索長安米白髮青山忝聖恩懐石湖茶磨山前宿雨晴行春橋下緑波平吳兒越女齊聲唱菱葉荷花無數生落日夷猶青雀舫孤煙縹緲望湖亭平生走馬聽鷄處殘夢依依是越城感懐三十年來麋鹿蹤若為老去入樊籠五湖春夢扁舟雨萬里秋風兩髩蓬逺志出山成小草神魚失水困沙蟲白頭博得公車召不滿東方一笑中即事卯酒意醺然焚香閉閣眠長安塵十丈不到竹牕前其二露下葛衣单叅差林影寒依然殘夜月不在石湖看其三上書無復志把酒自多情籌國諸公在吾何耻聖明其四青衫跨羸驂白首供朝謁自笑老忘還不嫌官太拙送錢元抑南歸口號十首一官貧薄僅三年不計歸嚢肯計遷笑殺當時高隠者區區猶待買山錢吳田百畆嵗常荒家計蕭然只草堂却有春眠濃似酒不將朝市博江鄉黄塵車轂不曽停白髮懐恩戀闕廷誰是東吳錢若水歸來雙髩只青青風塵西北三邊警災沴東南萬姓艱世事去今無限在只應張翰不相關高人原不愛高官帝與官銜寵退閒添得空名將底用批風抹月管青山羨君五十賦歸歟我亦頭顱五十餘把袂不須傷逺别病夫行已厭塵裾少時同學晩同朝一着輸君去獨高落日黄塵回馬處滿頭衰髪不堪搔老去懐鄉不自欣况堪客裏送歸人只應曉夢隨君去茶磨山前看早春三月吳門栁絮飛到家應及子魚肥殷勤相送還相祝管領湖山待我歸舊遊何處石湖西故友相思意欲迷為語近來憔悴盡日騎羸馬聴朝鷄送石齋太傅致仕還蜀春風歸馬擁都城爭羨賢哉太傅行吾道正從占出處斯人端不負平生雲移玉壘堪支笏水落瞿塘便濯纓落日啼猿夔府道定依南斗望神京朝辭黄閣謝君王暮向成都問草堂璇轂親扶堯日月雲章曽補舜衣裳由來道大難為用此日功成且退藏滿地落花春夢醒濯清亭上聴滄浪送戴時重僉憲之蜀劒南旌斾拂重關新繫臺銜舊法官此去籌邉知有畧于今治蜀却須寛高懐雅稱江山壯聖代休歌道路難萬里橋東明月上定應回首憶長安姚太僕思永致仕進秩光禄少卿聖君應惜侍臣還特與卿階寵退閒餘澤猶堪賁桑梓散銜聊復領溪山向來馬署寧須問此去鴻飛不可攀莫道先生總忘世鳯毛今在紫宸班秦茂功出按江右就送母還越春風四牡正駸駸一道咨諏屬使君肯惜輶車馳坂道還應玉節動星文持輿見說能將母舍爵何妨自策勲聖代優賢兼禄養不煩回首惜孤雲大江西下號繁雄宣察遥煩繡斧公斥壌須憐新喋血逺人應識舊乘驄一時風節埋輪上千里江山攬轡中珍重咨詢臣子事願將民隱達宸聰追送石潭宗伯次歸舟喜雨韻宦情牢落澹於秋歸興蕭然一釣舟雨露難忘天地徳江湖還繫廟廊憂古來興廢非人力君子行藏與道謀滿目青山天萬里煙波浩蕩没輕鷗送何少宰左遷南京工侍二首拜章伏閣舉倫彛耿耿忠言動赤墀名義千年元自重禮文一代敢誰私直躬自古難忘蹇了事知公不是癡去去保釐非逺謫未須惆悵續騷詞何人發難干倫紀有客輸忠翼聖明禮重乾坤那可易事干名教得無爭百年富貴浮雲淡萬里江湖白髪生李白從來多感慨鳯凰臺上望神京送唐御史應韶應天府丞曽持繡斧事澄清暫輟班行佐尹京總為希仁能鎮物况來唐介有先聲萬年宫闕瞻豐鎬六代江山入宰衡去去望之非乆外安排台鼎望功成送胡承之少卿左遷潞州倅一行詔下便遐征太息天王本聖明此際亦知言可諱使君自以去為榮浮雲落日天涯恨白鳥滄洲物外情去去江湖塵滿目不知何處望神京送陳良㑹御史左遷合浦丞誰興濮議紊彛章國是紛然失故常慷慨一言思悟主艱難萬里遂投荒君於職業真無負我忝鄉人與有光去去還珠亭下路蘇公千載有遺芳送喬冡宰致仕還太原二首四十餘年仕闕廷歸來雙髩未全星一身用舍關天下千載風流尚典刑啟事從來誇水鑑移文曽不愧山靈等閒頌徳知何益自有勲名照汗青四朝文物仰前修一日功成遂乞休君子致身惟道在野人思治願公留狄門桃李叨知己白下江山憶舊遊莫謂白巖多樂事希文常負廟廊憂送柯竒純主事歸莆陽新命才看下玉除歸心早寄入閩車不須駟馬誇題柱且着斑衣慰倚閭因病得閒情好在移忠為孝樂何如春風佇㸔重來日黒髪光隂正有餘送陳尚書南京工部老成聞望壓羣僚南去台階八座高江左舊都供覽勝國家留務重分曹經營列省工惟叙出入三朝我獨勞最是闕庭忘未得鳯臺髙處首頻搔甫田集巻十
