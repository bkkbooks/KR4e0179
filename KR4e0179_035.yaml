body:
  text: 甫田集卷三十五明文徵明撰墓碑一首明故湖廣右參議致仕進階中順大夫東陽盧公墓碑公諱煦字子春姓盧氏其先出自齊文公子髙髙孫傒食采於盧因以為氏自秦博士敖以來世居范陽之涿郡漢北中郎將植為時大儒實生司空育育生侍中班班生尉衛卿志志生中書監諶皆顯名魏晉之世至唐為宰相者八人而承慶懷慎尤有名他如藏用照鄰綸同皆以文學著稱子孫雖散處四方皆以范陽為宗東陽之有盧氏則自宋院判公實始實四傳曰員父徙邑之雅溪是為雅溪始遷之祖雅溪七傳為宋郡馬公大振則公九世祖也髙祖康定以仲子貴贈都察院右僉都御史曽祖宰祖洙皆不仕父諱和以能醫稱有所著丹溪纂要行世以公貴贈刑部署員外郎主事母俞氏贈安人公生天順壬午十月二十有八日以縣學生領成化癸卯鄉薦凡九試禮部登正德戊辰進士越三年辛未授大名府長垣縣知縣甲戌召為刑部雲南司主事連丁內外艱戊寅服除改授本部四川司主事辛巳進河南司署員外郎嘉靖壬午超拜四川按察司僉事奉敕整飭敘瀘兵備甲申升湖廣布政司右參議奉敕提督太和山丁亥致仕明年戊子覃恩進中順大夫越八年丙申正月草又四日以疾卒於家年七十有五公生頴異而悃愊醇謹學務博綜然不事勦説質義揚榷必求道之所在以逹於用既仕有官守遂用推之於民長垣即仲由所治蒲邑故有學堂岡相傳先聖講學之地故祠敝陋撤而新之興學教民遵以化本而納之仁軌會盜發鄰壤流劫境上攻圍城邑所在阽危而垣備不素公練兵飭甲乘城固守矢心厲衆督率撑距寇再至再戰而却之摧鋒折北無所失亡最後大獲輜重盡散以享士復斥其羡以代民租民因不擾士亦用命迄用保邑完境而獲嘉之績為一時最在刑部尤號明審前後關決不下百數析律詳明持議平允傳爰論報未始骫法而矜怛仁隱恆存於中諳練之稱逹於上下遂有蜀臬之命蜀去朝廷逺俗獷而健豪民假貸例責倍息而敘瀘所轄夷獠雜居負險易動公誠心拊循民用安集而軌道要束俾咸協于理芒部土官兄弟讐殺官兵不能討議將撫之公持不可謂事有曲直而搆難方深撫處可救目前而姑息適貽後患計當發兵助順而相機進止一則假夷而近效可收一則助夷攻夷而禍本斯拔矣時前政墮弛民兵逋蕩公料檢鈎托悉為緒正軍民方恃以集事而湖南之命下矣湖雖專領祠事而兼撫鄖襄事緒棼出所守鈞陽適當顯陵孔道車徒結轍冠蓋相望供頓次舍咸取給於鈞鈞民疲不堪命嘗借助於鄖公為科謫踐更使資力相當民方稱便而當道不恱公者顧托拾以為公過然卒亦莫能為公纍也公性若淑而遇事詳緩不為激卬暴白之計然砥節履方亦不肯靡薄隨人班資崇庳任運而已流賊之擾公勞績居多同時有起邑為廷率者而公浮沉常調曾不為意其後繼歷南省聲稱甚籍一時薦進者雖多卒無有援之者而公亦已倦遊遂自引去平生尤事持廉初以進士督造蜀靖王墳贐謝千金悉拒却之守官所至俸請之外毫髮不染太和之役尤利源所在公雖操敕將事惟受計而已出納訾省一屬之中官雖供頓餐錢亦歸公帑有贏以新學宫治亭徼或代輸逋租利濟涉而已終無所取也家居以敦睦為事首輯譜牒置義田修復先墓而秩祀惟謹篤於昆弟以協於族屬又推之以逹於里黨姻戚有無通假患難相恤或有所侵悉置弗問而橫逆之來亦弗之較晚益廉靜蕭然事外竟以髙年令終嗚呼若公者其古之所謂偉人長者非歟公娶應氏有賢行先公三十二年卒贈安人子男二人堯俞以縣學生升貢太學堯亮亦太學生庶子堯工女二人皆適名族孫男四人仲文仲武仲瑛仲玘孫女五人嘉靖戊戌某月日葬邑之興賢鄉馬鞍山祖塋以應安人祔於是堯俞奉翰林編修程文德所為事狀請文勒石墓道辭不獲則為論次其大略系之詩曰煜煜盧宗肇自齊薑植奮有揚乃儒用張軼晉而唐弗替有衍既攸有文亦相丕顯維千斯年耳孫其翼孰其徵之藩參維克烈烈藩參植德維誠乃言有嘉亦修用貞維時多艱盜賊伊阻彼披斯昌公志孔武有攸維征弗遑暇食乃戡乃戢乃全之邑豈邑則全亦撫而教爰植之仁庸協于道烈烈藩參有德有言有才弗諼式於王官入司邦刑出奠藩服澄斯秩斯以莫不肅肅之維何維廉斯貞維公斯明乃言用成孰不有成當躋而顛知進而退公私用全烈烈藩參髙年維碩邦國之楨鄉人之式豈無公卿公德則有我作銘詩尚徵厥後神道碑一首明故資善大夫太子少保南京工部尚書山隂何公神道碑嘉靖十有四年乙未正月草又八日南京工部尚書山隂何公致仕卒於家訃聞贈太子少保遣官即其家賜祭命有司營葬事如制公諱詔字廷綸别號石湖舉𢎞治丙辰進士授南京工部都水司主事公有智計能勤敏任事會壽王分國之蜀道出南畿公承檄扈送行次荆州當用民舟入峽有司集舟千數公料簡處分損十之七審畫道利隨事節適中官在事者不令得肆往復萬里無少愆佚繼被檄督造海舟前政不時給直事用逋緩公先事飭申要以必成而無所系吝人歡趨之功是用集而人得不困壬子丁父憂乙丑服闋赴銓留為工部營膳司主事孝皇賔天山陵事嚴公分司通州當轉甓陵下陸行回逺更費浩穰公規畫趨便輕舟乘漲輸之損費十五人尤便利正德丁卯改本部屯田司歷員外郎郎中展采錯事督率精勤尤稱職辦值逆瑾用事事多猜阻公守正不阿為瑾所惡托拾他事下詔獄久之無所坐贖米三百石而釋之閲三年庚午出知永平府永平在畿內尤多中貴家昌黎石璫被盜誣執十四人付縣掠立成獄公行縣悉放遣之鎮守王宏尤悖謾􅀈驁公故不為禮王石皆瑾黨與將乘權陷公瑾敗乃已郡豪殺人當死詒其姪使逸去而文致其罪姪無以自明公探其獄而反之先是郡苦秋旱公至首出繫囚而慮之析律詳讞多所平反一時雨澤沾足飛蝗蔽天亦不入境嵗大穰郡以大治會盜起傍郡流劫四出公飭甲練兵繕治樓櫓作計城守而耀兵境上賊聞引去時諸郡多殘破而盧龍獨完壬申丁繼母憂乙亥服闋改知永州永即古之零陵地控衡湘俗獷而健郴桂夷獠時時竊發會用兵公在行間諜知兵官隂與賊通首發其罪以折賊謀乃悉衆陷堅遂獲戎首而盡釋協從幕府上功詔進一階鍚白金加幣在郡三年平徭薄賦務恤民隱而扶微興壞一如永平郡又大治庚辰升廣西布政使司右參政逋寇王堂狡獪隂賊而負險不服衆莫敢睨公獨犯衆議征之兵初不競人為公危而公不為懾轉戰而前竟以得雋功上鍚金加幣如前嘉靖癸未升福建右布政使軌道披決多所緒正故事右轄多循默逺權無所事事公摘實􅓪咨事必關決茍不當其意輒持不署或以故事言則曰吾食而不事是尸祿也迄不為止乙酉徵拜都察院右副都御史奉璽書巡撫保寧等處兼都督紫荆等關軍務公益思振職發姦謫伏務肅綱紀有武臣席寵貴禎翼姦亡賴為軍民患公首劾罷之先是境內小警集逹騎徼衛而廪之及是事平廩稍如故亦上疏釐革所疏地方事宜凡十餘事悉見施行風聲四被所治肅然丁亥召為工部左侍郎有旨建敬一亭亭成賜宴翰林院加賜銀幣繼被旨督造悼靈后山陵事竣賜銀幣如前有加明年己丑升南京刑部尚書尋改南京工部留京宫厰若諸司廨宇自洪武來百五十年于兹矣嵗久傾圮而太廟為甚因建議興修始自太廟以次及太學次六部諸司宏偉壯麗華煥一新集材庀功咸有法式區畫周審程省自躬人不得侵牟解嫚迄功而民不知擾初太廟成璽書褒嘉加賜銀幣方在簡注而公倦遊矣先是公年七十上疏引年乞休優詔不允至是甲午再疏復不允疏三上上察其誠懇乃賜允給驛以歸公歷事三朝閲四十年歷十有二任積階自承德郎歷資至資政大夫正治上卿年七十有六乃終嗚呼盛哉何氏宋相執中之後自暨陽徙山隂祖宗政父昶俱纍贈資政大夫南京工部尚書祖母王母沈繼母董俱纍贈夫人公生豐碩朗潤厚默而願謹少不好弄稍長知學益務勤誠修正疆執處事周審而退避自將未嘗以語言先人居官精敏前後官簿多在將作塋建之地材木輸將泉貨出內浩穰無隄而公訾省有程鉤校維審人不得並緣為姦轉輸共偫日以有贏初任南曹帑積才數千去之日乃有二十萬尤事持廉俸入之外不一毫妄取於人亦不以與人然軌迹夷易不事矯飾不收譽名一時雖若遲頓而積久考成往往出人之右孝性純至事二親順謹弗違一再居憂能崇禮執節不飲酒食肉不預人事初以主事歸省念父老乞欲終養父怒不許曰吾食息方強兒乃欲死視我耶公不得已勉出赴官出未幾公亡抱恨終身毁頓幾滅性居常儉素自將室無姬侍服食取適口體而已凡三娶元配唐繼孫又繼郭唐孫俱纍贈夫人男五人長鎬次鰲舉正德丁丑進士今為刑部左侍郎又次銓華亭縣丞暨國學生鮤郡學生女二人長適縣學生金愚次適江都主簿章元綱孫男十一人景昻前軍都督府都事景明景星俱國學生景員郡學生餘幼孫女若干人曽孫男七人公以卒之明年丙申閏十二月十日葬縣之西余山至是侍郎鰲言於某曰先人之葬十有六年矣墓木已拱而墓上之石未有刻詞願有請焉某生晚不及識公而侍郎辱與遊好不可辭銘曰繄何之先立氏以國有衍弗遺膠東維克孰其引之宋相則良山隂之宗肇自暨陽顯允尚書既貞亦榖入署郎曹出司民牧維此盧龍曰維畿輔我貞用明余孰敢侮零陵之墟越在荒徼爰緩弗諼有允斯蹈乃言振德亦懷用柔以佚以休以莫不優五嶺八閩周遊徵逐玉節煌煌奠兹南服天子有詔式遄其歸錦衣繡斧翼我邦畿何以翼之糾托姦究既貞厥度亦慎其履熙帝之載疇若于工僉曰詔哉汝其司空五材是宜百工惟敘有庸斯成登閎惟制翊翊王臣亶貞亦蹇匪時弗庸身則既倦舍旃來歸為時逸民胡志之得而命不辰顯允尚書維時德懿人之云亡邦國殄瘁天皇震悼錫命維優茂恩煌煌賁此藏丘西余嶐嶐松堂鬱鬱龍章在兹過者必式阡碑二首梅里華氏九里涇新阡之碑華氏自南齊孝子寶居鍚之慧山族屬衍大散處邑中無慮百數宋有原泉處士者始居梅里之隆亭原泉四傳為將仕郎無錫簿將仕生處州録判録判生元屯田打捕提舉屯田生太尉府知印知印生開二處士始不仕自開二以上十世並葬隆亭開二傳平一再傳康伯别葬報親院康伯而下曰荃曰本盛凡二世葬鴨城巢髦墩二墓去隆亭不一舍而近今九里涇則坦菴府君良用所葬始去隆亭而别為兆域坦菴子時禎實昉為之時禎又自穿其傍為壽藏所謂九里涇始遷之墓書梅里著所自也時禎之言曰吾家自梅里以降閲十有四世仕以政稱居以義立風流雅尚鬱為名宗我先君坦菴承奕世之懿而拓中亨之基至於麟小子祇若前休弗替有立他日獲保首領從先君於是凡皆前人之遺我先君之訓也於此而不有表焉是忘先君之訓棄前人之烈也乃立碑墓上請余文刻之昔太公封於營丘比及五世皆反葬于周君子曰樂樂其所自生禮不忘其本也詞曰煜煜華宗肇於戴公式招始封厥有孝子不易其履伊錫之始有嶐華坡在錫之阿奠焉弗他隆亭奧區梅里之墟列屋渠渠歌斯哭斯亦允藏斯維原泉之遺有允原泉實始東遷歷世其綿乃將仕之淑乃録判之榖屯田其續山川有聞開二維敦有衍諸孫秩秩百􅑤維克有引其奕有鄉揚名九里之涇鬱兹佳城孰其藏之曰良用甫既封亦樹是曰始祖是衍孫曽繼繼繩繩百世其承維生有植維懸有刻以永無泐董氏竹岡阡碑董氏其先汴人宋南渡徙松江之上海閲今若干世世有隱德至御史介軒父始用仕顯既而諸子相繼起科第列仕中外文聲政業鬱為名宗御史而上葬邑之楊涇原距楊涇之東三里而近曰竹岡之阡則御史公之所藏也公諱綸字誠之天順甲申進士仕為南京河南道監察御史卒葬于是公六子其從葬于公者仲子大理少卿恬少子西岡處士愈而第五子將仕郎懷之生壙亦在焉大理居仲以次當在右故其治先配喬宜人之葬也虛其左以俟伯氏將仕郎恢及西岡之沒伯氏已别營宅兆顧左不可虛乃葬西岡於左而五將仕則兆於西岡之次雖於禮有未盡合而勢不得不爾古之人有推權以附義者苟宜於人情君子不過也初大理之葬御史公也有夢徵焉葬未幾而大理與其弟肇慶守忱綿州守懌以次升朝推恩贈公奉直大夫刑部員外郎龍章炳煥於藏丘者再乃即墓次建二亭刻制詞其中益樹松檟植神道垣護扄鐍式嚴以固從而栖神之室享祀之堂守冢之舍以次告成而墓之制至是始備及又刻大理所被制敕于石大理之子宜陽之葬其父暨其母唐夫人支傾補敝飾故而新斥土崇封益事摽表凡制之所宜得者至是益備而加詳蓋自正德癸酉抵今嘉靖癸巳閲二十有一年凡一再舉事乃克就緒大理恬肇慶忱將仕懷實昉為之而宜陽用終厥志於是宜陽具事狀詣余請紀其成惟周禮墓大夫掌凡邦墓之地域為之圖令國民族葬而掌其禁令正其位掌其度數正位正其昭穆之位也度數以爵闕為丘封之度與其樹數所謂封髙則樹多封下則樹少所以别其尊卑也自周官之法不行庶事靡薄而墳墓滋輕我國家雖有墓制而無官守庶民往往踰分干紀而品官之家或墮廢不治樵牧不禁荆棘不翦委為狐之區者皆是也而董氏父子兄弟繼繼弗隕更二十有一年而繕治不忘是豈有教令為之哉是宜刻石以示其後人詞曰維松奧區奠吳之東海邑維雄三岡其隆有崇新宫既嚴既翼被隰依原肇此玄宅其宅維何董氏之藏爰立之阡曰竹之岡竹岡巖巖閈閎揭揭孰其崇之直指維烈維董之先有來自汴垂三百年弗替有衍顯允直指有德有文去隱即仕為時貞臣用弗究材駿發厥嗣憲憲列卿秩秩刺史科甲翩聯奕世其繼匪亡則繼亦美之濟有展廷尉式榖用貞際時休明以順而升進弼邦刑在公維劭鍚之用休天子有詔鸞章煜煜天恩煌煌巽命維申賁兹玄堂玄堂翼翼豐碑岌岌屭屭秩秩維天之鍚鍚之隆隆作之衝衝乃築乃封乃崇其墉其墉既髙亦周有廬有重其門式嚴之樞奚樞之嚴芻牧是逺狐攸逺荆棘斯翦既屏既營式度用恆孰其執之廷尉是經刺史攸承將仕用程歷歲滋更乃潰于成匪成之艱有攸維繼終厥先猷厥有孫子維孫振振不忘祖考再葺用揚於先有耀相此崇岡天實基之厥有夢徵爰奠於兹黃浦其南竹岡其東土膏壤淺秀允有鍾鍾之維何曰忠與孝我刻銘詞尚後有考碑二首太倉州重浚七浦塘碑吳號澤國故多水患太倉在郡東鄙地瀕大海乃多高仰之田非資海潤莫適溉灌海日再潮淀沙易淤在昔田各成墟墟必有長歲率其徒修築浚治之隄防垣固浦港通流髙下之田咸濟弗病夾亶氏謂廣深其源非直用以決低田之水亦使缸阜之地皆可耕而食也州既瀕海浦港為多而七浦塘最巨塘在州之東北橫亘五十里西受陽城諸湖之委以入於海海潮去來有時而湖不息駛迅激射淤沙不能為患斯固東人之恆利也嵗久厄塞民病不耕𢎞治初都水姚公文灝嘗一浚之賴以處業比嵗陽城之民並湖為斜堰堰湖水而分之其西流北折而入於白茅東流自尤涇南出巴城迂回而屬於七浦其勢漸緩而其流益微不能當海潮之衝日積日淤至於不通而高仰之田獨受其敝嘉靖丙午有詔興修三吳水利于時都御史歐陽公必進御史王公言秪詔維謹謀於副使敖公璠郡守范公慶議既克協乃糾民集財以是嵗十月之隙􅂒事即工而州同知周某實董其役於是躬履其地分程受事時其食作而公其勸懲民勸趨之秉鍤操畚偕手並作始浚自石橋墟東行若干里至於直塘延袤千八十丈有竒自直塘東行若干里至於沙頭延袤二千四百二十丈又自直塘東行歷塗松抵橫涇若干里延袤一千六十有一丈總為丈四千五百六十有竒其深自一丈至八丈廣自八丈至十丈極於十有五丈始殺而漸拓之以極其勢也於是輸瀉有委飛流迅疾淤沙滌不復留田之出於磽確而資以灌溉者頃畝以萬計而東民有粒食之望矣是役也凡用民夫萬八千四百靡銀為兩者七千八百二十有三自經始迄於告成僅九十有七日都御史御史實肇之監司郡守主之今御史陳公九德終之至於區畫之周督率之勤周君與其僚之在事者與有勞焉昉役之興也屬嵗不登民飢而虛議者謂事大而役繁更費無隄驅飢虛之民而責以重大之役更無隄之費不病亦瘠矣曽不知事有緩急勞逸相倚不一勞之逸終無日兹役雖巨實所以逸之也故曰以逸道使民雖勞不怨雖然不小任怨則將因循自恕莫克肇端而持之不固行之不力亦終於無成而已矣故事尤貴於有終也榖梁氏有言智者廉勇者行仁者守惟諸公有焉斯不可以無紀也系之詩曰粵吳奧區澤維其蔽乃眷在東曰維阜阜嶐嶐海波瀜瀜孰溉以庸陽湖維衝嵗攸有窒磽確以瘠民乃不粒為我心惻維皇明聖克念下民維諸公仁克艱厥臣明詔是承弗遑有斁周覽川澤爰通斯塞川源既通川流既從有來弗窮沃衍以豐嵗豐穰穰民歡懌懌豈不我勞以永有逸人亦有言利之弗庸尚千百􅑤毋忘厥功重修大雲菴碑吾蘇故多佛剎經洪武釐革多所廢斥郡城所存僅叢林十有七其餘寺院菴堂無慮千數悉從歸併遺基廢址率侵於民居或改建官署有基在而額湮者有名存而實亡者亦或鞠為荆榛瓦礫之墟併其名與迹而莫之知者百八十年來更革靡常禁網云弛殘寮廢剎稍稍興復聚徒焚修香燈不絶日引月翼往往藂林比隆亦有已興而復廢因循諉棄不復再振者則在嗣承之人何如耳大雲菴建自前元某人實始開山考之郡志菴嘗併于南禪寺洪武中寶曇以髙僧奉敕住南禪某蓋其徒也大雲實其子院寶曇示寂猶藏舍利於此石塔猶存豈當時雖屬歸併而以曇故不滅其迹承傳有人延引不絶以至於今耶菴在長洲縣之南雖逼縣治而地特空曠四無民居田塍縵衍野橋流水林木蔽虧雖屬城闉逈若郊墅菴介其中水環之如帶其水東自葑溪沿流入郭至此分支而南轉出菴後左右紆回匯其前為放生池池方廣數畝洲渚浮泊望若島嶼獨木為梁以通出入撤梁則菴在水中入菴則身遊塵外僧廬靚深古木森秀映樹臨流慌然人區别境余屢遊其間至輒忘反非直境壤幽寂而僧徒循循多讀書喜文所雅遊皆文人碩士若沈處士石田若楊禮部君謙蔡翰林九逵皆嘗栖息於此比嵗燬於回祿住山嵩一峯與其徒鎮松巖戮力起廢煥然一新禮部實記其成及是再燬而鎮之徒定昻亦再新之經始於嘉靖丙午落成於戊申之夏棟宇雄麗像設有嚴華幡鼓鐘列置如式門屏垣墉悉還舊觀於是伐石樹碑請書其事余惟像教之行於中國固以崇嚴為事昔之名僧髙士多留意於此名山勝境珍樓寶閣列剎相望玉函金相璀璨琳琅謂非此不足以極天人之觀以起人歸依之心其為道蓋如此而今之為佛學者髙談空寂務為虛幻視塔廟崇嚴之設凡一切丹青土木之設皆以為有為而非道之所存往往棄置不以屑意其或作意興修以基道業則題疏勸緣持盂請丐所成無幾而半入私槖此則佛氏之巨蠧無足言者惟兹菴起於歸併之餘其興廢之由不復可考然自正德以來三十二年之間再燬再新事功宏偉經費浩穰而皆取給衣盂之積一不假檀越之助而事無不集嚴翼有加豈非嗣承之得人哉比來兹道寂寥僧徒孟浪雖名藍寶剎號稱藂林亦多隳廢不葺荒寮敗堵榛莾蕭然燈炧香炷不絶如線視一已廢復植之區何如哉吾於定昻之徒之舉重有慨焉昻號半雲靖共有為今被推擇為郡都綱云作頌曰有崇大雲奠此幽墟孰其啓之其人寶曇斷崖其初巖巖寶曇衍德以紹爰寂於此於先有耀湜湜清池翼翼幽居石塔渠渠舍利其於維百斯年弗替有引有攸維人嗣承則允寶幢帙帙紺殿嶐嶐鬱攸示變維劫之逢載焚載葺亶輪以奐乃言有作式還舊觀華幡珠網像設中嚴諸光下賁人天具瞻一峯用凝松雲其繼匪法則然亦衷厥義我作頌言後人伊徵弗隕厥世尚慎其承甫田集卷三十五
