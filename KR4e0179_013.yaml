body:
  text: 甫田集巻十三明文徵明撰詩三十六首春雨漫興春雨蕭蕭草滿除春風吾自愛吾廬髙情時誦閒居賦老眼能抄種樹書金馬昔年貧曼倩文園今日病相如焚香燕坐心如水一任門多長者車雨後積雨初收風乍顛城南花事已茫然黄鸝繞樹空千囀白髪傷春又一年竹几蒲團供坐睡茗杯香鼎有閒緣客來莫話長安事自理南華物外篇壽方矯亭季鷹久已卧江東再入修門簡帝衷白首豈知東觀樂青山終戀北忩風一時出處如公少六袠庚年媿我同願把綸竿相逐去江湖滿地兩漁翁上已日石湖小集楞伽湖上晩風和茶磨巖前宿雨過士女競浮青雀舫野人自占白鷗波春來花鳥閒情在老去山林樂事多辦取一罇酬令節扣舷聊和竹枝歌結草菴僧相邀阻雨不行城南有約訪招提風雨滄浪只尺迷惆悵一春能幾醉蹉跎四事苦難齊花間細溜沾衣袖道上豐泥没馬蹄孤負山僧清淨供一忩離思共誰題夜坐幽人被酒夜不眠攬衣起坐垂堂前參差花影忽滿地仰見明月流青天微風吹空星漠漠時有羇鴻度寥廓美人不來更漏沉天南縹緲銀河落庭前蜀葵庭下戎葵髙十尺紫㽔入簾明的皪誰令豔質不逢春却有丹心解傾日輕塵不飛朱夏清翠翹鏤日隂亭亭南風吹幃殘酒醒寂寞䦨干晝方永賦得廬山送盧師陳誰見匡廬百疊蒼軺車八月下潯陽天開畫障芙蓉出風約銀河瀑布長秀色從來堪攬結壯遊還待發文章因君忽動江湖興便儗東林問草堂睡起睡起西齋片雨過綠隂庭院晩凉多烏衣春盡渾無語白苧秋來漫有歌世態風雲從變幻山林日月未蹉跎却憐逸少猶多事時冩黄庭換白鵞八月初九日見月暮空雲斂月初弦露氣星光共渺然囘首棘闈供試事秋風夢斷十三年無錫道中遇雪夜泊望亭北風吹朔雪飛霙雜零雨孤舟暮不前收帆得沙渚天垂野隂合日暝江雲沍川原入蕭條林木積縞素寒厖噤不鳴饑鳥驚還聚舉酒不成懽挑燈時自語飄泊豈在逺出門即羈旅長林風怒號天低浦雲黒空村煙火微近渚漁舟集路暗行迹稀蒼然見寒色野泊不成眠羈䰟還惻惻昏燈黯欲絶歸夢迷咫尺戍逺更漏沉川寒聲影息不知積雪深夜久孤蓬仄閏正月十一日遊𤣥妙觀歴諸道院晩登露臺乘月而歸次第得詩七首探春行覔羽人家洞裏仙挑未着花一段閒情杯酒外山童能供竹間茶行披犖确履蒼虬曲徑穿雲古洞幽只尺風煙千里外居然人境見丹丘仙侣登真幾百年清風遺影尚依然琳琅翰墨精神在我欲臨文唤恕先道人相見古梅邊為冩幽情拂響泉忩外南枝春尚淺雪英千片落氷絃春風吹髩思悠悠來上彌羅百尺樓城郭萬家塵似海祗應高處不知愁古殿悠悠徑有苔松扉端為野人開匆匆不盡登臨興有待他時看竹來神清殿曲倚䦨干市散人空萬井間莫負仙臺今夜月明朝日出是塵寰二月廿六日游天池諸山西北羣山列翠屏天池宛轉帶支硎行穿壑谷身忘倦忽聽松風酒又醒歲閏故應春緩緩民饑欣見麥青青老年行樂知無幾莫負樽前雙玉瓶九日婁門勝感寺晩禾垂穗野田平九日登臨宿雨晴出郭由來少塵事逢僧聊得話浮生秋霜落木黄花節破㡌西風白髪情却喜東林能破戒提缾沽酒醉淵明北江憲副自越州訪余呉門飲於杜氏明逺樓相逢相别思悠悠越水呉山爛漫遊時事難言聊對酒長安在望漫登樓百年春夢蕉中鹿萬里秋風海上鷗不盡平生相許意白頭頻把舊呉鈎除夕乙巳樽酒淋漓半醉餘疎燈寂歴夜何如一行剛了牀頭厯四壁聊齊架上書衰齒可堪時數換窮愁應與歲俱除東風喜得春來准早有梅花慰索居元旦書事丙午奕奕祥光報令辰融融淑氣轉洪鈞開門聊自占風色展刺先欣見故人晴日笑談驚隔歳暮年光景喜逢春桃符厯日年年事一度相看一度新五月望日登望湖亭是日微雨作寒木末虚亭瞰碧瀾倒飛天影入慿䦨嵐光浮動千峯濕雨氣薰蒸五月寒石磴躡雲芒履短松風吹雨苧袍寛狂吟莫怪遲歸去白髪還能幾度看汛湖春盡南湖碧玉流故人湖上共夷猶平橈野渡沿青草疊鼔中川起白鷗雲日霏霏梅子雨風蒲獵獵藕花洲行春橋外山千疊盡逐波光上綵舟除夕酒䦨燈燼夜茫然撫事追思十載前坐上漸看同輩少眼中殊覺後生賢江城寒薄梅花早原野霜清落木堅皮骨已空心力盡還將衰髩待新年丁未九日與履約諸君同泛石湖就登上方宿雨初晴水拍天碧雲㣲歛日華鮮時當黄菊茱萸候秋在滄洲白鳥邊栁外畫橋人似蟻湖心蘭棹酒如泉擕壺更醉湖山上白髪重逢又一年是歲閏九月再汎剛喜重陽臨閏月不辭老病復登臺多情秋色依前在有待籬花故晩開佳節從知難再值青山端不厭重來畫船記取横塘路十里笙歌載月囘題畫溪雲㝠㝠溪雨急長空倒垂溪水立凌亂春潮萬壑揺低迷暮靄千林濕余生雅有滄洲適曾擁孤蓬聽蕭瑟夢斷紅塵二十年江湖獨徃興依然偶拈秃筆掃東絹便覺呉淞落并剪金君家住雲水鄉朝煙暮雨對林堂若為老去厭真蹟翻愛狂夫灑狂墨就中妙解誰應識萬里雲煙開素壁紫璚翠琰開蒼壁下有蒼松幾千尺濃隂羃歴森晝寒虬枝拂空根束石石連灌莾榛欲絶路繞松根更斜出仙源近逺不可窮却有幽人在山澤山澤幽人坐倚松仰看出没山雲空眼中溶溶霏暮靄耳畔謖謖鳴天風崩崖一線削積鐵玉泉百丈飛晴虹呉中山水清且逺老我平生素遊衍偶然㸃筆冩秋巒恍惚遊蹤出東絹金君有癖與我同毎每神遊翰墨中贈君此幅應有以咫尺相看論萬里十月山城霧雨收江南春淺類清秋忩前覔得新成句木葉蕭蕭雜水流看山何必待春晴雨裏看山分外明持葢衝煙覔詩去不知身在畫中行長松揺日影亭亭無限江頭倚杖情鴻鴈欲來天拍水白雲收盡暮山横雙禽棲息一枝安映雪離離更好看一種羈情誰識得暮林風急羽毛单壽東畬錢先生東畬先生古貞臣平生耿挺標清真廿年中外肆敭歴所至秉節宣皇仁浮雲漠漠有變幻長岐徃徃多風塵孤征方出霄漢上一笑已脱風波身莫言有才用未極天地深機自消息憑將强徤博髙官留取有餘還造物秪今優游經幾年八旬行及顔蒼然霜松雪栢澗壑邊紫芝玉樹階庭前人世長生能有幾如公豈獨神仙比向來富貴等浮雲未盡勳名付兒子二兒駟馬日邊歸捧檄升堂試舞衣靈椿丹桂初光輝嗚呼靈椿丹桂初光輝千秋萬歲願無違賀東畬錢先生搆别墅共説于公治獄仁還聞韋氏薄籝金生兒已副髙門望作室能忘肯搆心一脉承傳書種在百年培養慶源深庭前手植三槐樹會見森森長碧隂己酉除夕八十衰翁仍送歲罏薰燈影共婆娑青雲志業消都盡白髪光隂得最多天地勞生空蠧簡江湖得意有漁簑孫曾繞膝情堪戀後飲屠蘇且笑歌甫田集巻十三
