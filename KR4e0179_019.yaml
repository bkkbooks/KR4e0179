body:
  text: 甫田集巻十九明文徴明撰記五首沈氏復姓記長洲朱天民既復姓沈氏來言於余曰吾沈氏世居吳中相傳數百年矣我先君壻於朱先外祖廷禮無子養外孫為孫故吾兄弟皆氏朱而嗣於朱於是四十年餘矣某自知事便思復之顧氏名録於學官不可私易也㑹御史按學吳中得以情告下其事有司如所請乃以正徳戊寅正月之朔告於先祠復今姓易名曰民望歸嗣於沈求於朱之族得再從姪輪告於廷禮之祠使嗣於朱嗚呼自吾失姓來恒懼不得追復其始以斬先世之澤貽辱先人今幸而獲志不可無言以示我後人子其為我記之竊惟古者天子建徳因生以賜姓而子孫别而為氏故有以字氏者有以諡氏者以官以爵若事者今之姓即古之氏也古氏雖多所從然莫不各本其所始百世而下雖叅錯紛糾可以一考而得其說雜出於傳記而左氏特書之不可廢也自秦有贅子子孫乃有以外氏為氏者吾吳中故多秦贅縁是而易姓者十室而四五至有名世大臣不能免者馴而習之往往不知其姓之所自出不知姓之所自出而昧昭穆之叙歐陽子以為雖禽獸不若也夫人而至於禽獸不若亦已甚矣而其所失乃在於區區姓氏之間然則人可以不知所謹哉閭井小民困陋習敝無足異者而名世大臣足以有為乃不知出此在當時豈有甚不得已者乎及今嵗月既遷族屬衍大雖有賢子孫無能為矣豈非當時之罪哉天民為此其亦無使後之人有慨於今日也若其縁情據禮續廷禮之嗣實惟仁道所在而不忘所始有孝存焉天民庶幾知仁孝之理哉褒節堂記正徳八年癸酉御史按河南上言汝寧民劉漢死妻余年十九矢死弗貳漢且葬喪行而水至余阻不得渡便哭踊溺水自殞父母救出之尋就雉經亦以覺免既求死不得乃撫二嵗孤林以居閱三十有五年養舅姑以夀終子亦成立今余年五十有三法應旌表事下所司核實以聞詔旌其門曰貞節有司奉詔書事惟謹乃十年乙亥樹表復其家如制於是其子亦登名薦書為鄉進士矣乃作褒節之堂用侈上命他日以縣文學來教長洲進其門生文某使為記曰吾微母夫人無以有今日微明天子至恩無以昭母夫人之徳如今日此吾所為名堂也余惟我國家以彛倫正天下而節孝莫先焉誕章敷治每申飭之有司課績用為殿最若是重矣然而以天下之大民物之庶而嵗之所上不能幾人推核之餘能終與明詔者加鮮焉其事誠有不易至者而非徒以其節也於此有限列焉年未三十而寡及五十而後旌未及五十與三十而寡者不與也夫豈以其非節耶惟是天下之大民物之庶非有限列焉則事力有所不及巧偽有所不能防其勢不得不然而人之所遭有幸不幸是故自其始遭比於五十踐更涉歴非獨一時而艱難變故非只一事幸而得全者蓋亦有數不幸不及年而死又不幸無子或有子而非賢皆所不得也此又出於法制之外有非吾人所得而强焉者而曠蕩之恩固所不能周也若余夫人之事與年足登法式而合於褒表矣然非有吾師文學君之賢以為之子其旌與否不可知也吾聞夫人之於文學也慈不忘教期於必成其始非直為今日也而今日之事卒用賴之夫豈幸而致哉文學君不忘母訓推衍國恩以為是堂其亦有意乎哉其教吾邑也軌法緒正必舉其職嘗曰吾惟無負吾君以求無遺吾母之憂耳是固名堂之意也而吾於此得忠孝之理焉是為記長洲縣重修儒學記嘉靖十有五年嵗在丙申秋八月長洲縣重修儒學成乃是月四日丁亥知縣事渭南賀侯躬率博士弟子釋菜於先師孔子新宫桓桓豆籩惟飭陟降旋辟儼肅有儀父老賓屬爰觀爰慶謂數十年來所未有既明日諸博士弟子相率言於某曰惟兹長洲實蘇之輔邑邑有廟學而制統於郡故事月朔廟謁春秋有事縣官師生旅拜於郡學以為故常有祭田瘠薄不足更費嵗時惟學官行事而有司不與也頃嵗有司之賢者間一行之牢醴狼籍取具臨時而其事亦不恒舉夫有司之賢有才者固足集事而或不然則委諸故事是故或舉或不舉惟其人而學之廢興以之兹學之建昉自宋季即浮屠氏藏殿為之陿隘弗稱歴元及國朝數有建置而踵其痺陋無所展拓正徳丁丑提學御史安福張公鰲山盡斥僧廬益之而未暇改為也侯始至以學校首政顧月朔不得專謁則以次日將事視學弗葺且敝慨然以起廢為任節用制財乗時僦工爰相厥攸亟請於監司於郡守既議克協悉撤其故而新之首禮殿次兩廡次講堂齋廬從而㦸門繚垣以若廪庾廬湢之屬亦以次告成礱以密石華以丹堊翬奐嚴翼實完實堅乃斥隙地俾居民占業而稅其閒架牟其所入以給嵗祀於是廟學之制始備而禮文始益弗諐謂某故學諸生也俾有述焉維古士見於師以菜為䞇故始入學者必釋菜以祀其先師是故有學則有廟廟而弗祀猶無廟也長洲為東南望邑學視上庠官有常貟士遊於學有常額而庠有廪餼事皆應於法而有廟弗祀豈其制則然殆有司之失也侯之為是豈獨行禮哉亦所以復國家立學之制焉爾夫學校之設所以育英才以為致禮之具其法自三代而下惟我國家為詳而其任為特重蓋仕者必選自有司舉於禮部然後登用於朝然非學校無自而升也故進雖多途惟學校之出為正而他途者不與宋慶厯間嘗詔天下立學矣然惟州郡有之縣不滿二百人者不得立至於學制雖見於程子之議而實未嘗用今内自畿甸外而荒服偏州鄙邑莫不有學學必具官士必板列必選於民秀而考其行能閑衛升黜必有法程而所授受肄習必孔氏之教莫不切於治理周於實用粹然一出於正嗚呼學校之習一出於正則凡有司之所選禮部之所舉與夫朝廷之所登用有不正焉者不可得也故百餘年來名卿鉅人所以出而為國家之用其立言立事與夫致身效命者莫非學校之出而出他途者蓋鮮也夫正學之效章明較著如此近時學者或厭其卑近而遊心髙逺於凡語言文字禮樂刑政之屬一切以為支離靡爛為不足為而惟坐談名理標示𤣥邈以為道在是矣而推究厥用不知其所以立言立事與夫致身效用於昔人何如也吾侯所為惓惓興學之意其亦有所擇哉或謂習久不滋事日就弛今之所謂學校特文具耳而何以興為是覩其迹而不知所以探其原也孔子曰君子之道譬猶防焉以舊防為無用而壞之者必有水敗以舊禮為無所用而去之者必有亂患侯其知所防哉侯名府字應壁己丒進士仁明愷弟而敏於政是役特其一事耳相是役者縣學教諭建昌李泓訓導安仁熊魁烏程潘佐董役者義官張璹玉女潭山居記宜興諸山銅官離墨最巨其次穿石山峻嶻不如二山而巖竇虚嶷湍瀨聨絡􅀢窔瑰譎最為竒勝而張公洞最有聞玉女潭在張公洞西南相去不三里而近相傳玉女嘗修煉於此唐以前名賢勝士多此遊覽而李幼卿陸希聲盖嘗居之一時倡酬篇詠流傳至今有以想見其盛也自後湮塞不通人鮮知者溧陽史恭甫葬母山中土人有以其地售者恭甫喜而得之乃䟽土出石决澮導流刳闢蠲刈盡發一山之勝幽巖絶壑靈湫䆳谷悉為標表而兹潭實首發之潭在山半深谷中渟膏碧瑩潔如玉三面石壁下挿深淵石梁亘其上如楣而偃草樹䝉羃中深黑不可測上有微竅日正中流影穿漏下射潭心光景澄澈俯挹之心凝神釋寂然忘去潭之漘有坻即坻為臺構重屋其上曰玉光閣閣成而潭之勝益靚以顯潭石之巔有靈應亭山中嘗旱禱於潭而雨因為亭以識潭四周無隙水伏流而南出巖石之下匯為小池玉潔不流為亭其上曰凝玉凝玉之西淵泓洄洑其流漸駛别疏一渠激其流北出行亂石間縁石旋轉可以流觴曰流觴嶼凝玉之南古櫸一株根柯鬱磻礧磈如石獨孤及詩所謂日日思璚樹者即此其下湍瀨瀠洄與樹暎帶曰璚樹湍漱玉軒在焉湍流西下折旋而南屬於灣碕石累屬如龍馬下飲如砥柱中矗水奔注激射如鬭再折而東水益駛石亦益竒夭矯如虬蟠如鼉奮飛流噴薄濺沫成輪聲震蕩如行峽中曰虬鼉峽峽左石梁曰沸玉橋踰沸玉橋而北地多美箭間以江梅曰梅竹隩琅玕所聽玉寮在焉又北偃沼如初月曰生明池絶沼為梁曰隔凡橋隔凡而上則玉陽山房也中為玉虚堂周堂為八室室三楹依易卦為面勢隨方署名曰純陽曰中陽曰初陽曰循陽曰明陽曰通陽曰來陽曰升陽自升陽北出地漸髙且廣葢山之麓也因山為臺嵦爽層出陟級而上延閣若干楹前軒施檻可以肆目曰大觀廊廊之後為丹室又後為雲耆臺臺方三十尺有竒始築臺而耆生也又其後為環玉岡由環玉岡東下出雲耆臺之左曰澄觀樓其前為上元祠又前為東岡别館為䕶雲莊為仙寓仙寓之南為來仙橋由環玉岡而西轉出玉潭之後藂祠奠焉曰玉清祠祀玉女也祠右隙地白礫纍纍散臥松竹間如羊曰初平林出初平林西行二百歩巨石盤踞環匝如墉曰盤玉隈自盤玉隈西上繞出山椒有亭直太湖之縹緲峯曰縹緲亭亭下怪石林立鯨騫獸伏競為竒狀嘉木出石罅一本七幹挺特修聳與石爭秀曰琪樹峽琪樹峽之西為集靈谷又西為飛雲洞自此下上登頓縁石逕而行逕盡出於山脊平壤空曠甃以文石曰瑶臺負臺為室曰超然宇宇後羣石掀舞如華葉駢植聨延如睥睨曰芙蓉城石之有竒者曰天成碑曰雨􅀢曰小蒼弁曰青騾巖曰三珠洞曰二姑曰雙仙皆以狀類名而二姑雙仙之間有期仙壑由期仙壑東下二百步為文殊峯又東為普賢峯觀音巖在焉山自環玉岡而下左右盤互蜿蜒不絶總若干畝其中臺榭樓閣祠宇杠梁凡三十有一林壑巖竇可名者二十有三他細𤨏不暇紀者不在也以其地在玉女潭之陽因名玉陽山而標其前曰玉陽洞天玉陽洞天之東境之可紀者四金晶巖最勝巖去玉陽五百步軒揭如垂石下燾巉顔如斷齶深廣十尋其中石壁竒峭水出壁下平流兩涯交絡如織瀕水石坻可羅坐十客水環之如玦巖石晶瑩日射之㶷爍如金故云金晶金晶巖之東稍南曰佛窟窅陿䆳深中空洞可居别竇尤深秉炬而入詰屈不可窮其北為囘陽洞玉潭之水至是囘流而南故曰囘陽青鳥磯在焉其上有留仙橋踰橋而東為鐘竇水激其中聲洪如鏞也玉陽洞天之西境之可紀者六龍湫最勝湫去玉陽數百步在積石之下而淵濳澄湛微類玉潭懸艇而入中空如室石皆下垂㟏岈岝㟧不可名狀其後石壁挿水壁盡處有穴劣可容舟欹仄以入中空如外室而通明虚敞石尤竒麗縁石而上得穴甚隘僂而入轉出石室之下中空如土室石柱合抱色正白如玉曰玉陽洞此龍湫尤異處龍湫之西曰水犀洞水足勝舟而石壁幽峭石上有穴通天故曰水犀其水濳行而南出於南洞磐石之下石平衍可坐水瀠之如浮曰浮磐浮磐之南為君陽洞洞凡三穴最後一穴稍深曰白龍藏三洞相屬石皆穿漏如蹄股交峙水瀉其間湍激若瀧掲跣行可環遊出入彼此嘯呼與水聲相雜亦一竒也水自凝玉而來東南互流至此凡百折乍盛乍㣲乍浮乍伏而其源皆出於玉潭石自玉潭而來或隱或見亦皆綿亘相屬其間松檜楩楠幽蘭靈卉叢生蔓被與水石相蔽虧周遊其中若去塵寰歴異境既違復合若窮而通綺錯繡綰不出里道而羣景畢集殆造物者効竒呈異獨媚於兹以成一方之勝如此夫自清濁肇判流峙攸分而是境已具其前未暇論考之唐賢篇詠玉潭之外他固未有聞也由唐至今八百餘年始自恭甫發之豈天秘絶景必待其人之賢而勝者而授之耶恭甫以粹美之質具有用之才不究於時而肆情丘壑摉竒抉異發幽而通塞俾伏者以顯鬱者以申而無有所蔽夫其志豈直山水之間而已哉昔謝康樂伐山開徑以極遊放柳子厚發永柳諸山而著為文章皆以髙才棄斥用攄其抑鬱不平之氣耳或謂恭甫類是而實非也恭甫恬靜寡欲與物無忤而雅事養神邂逅得此用以自適而經營位置因見其才初非若二公有意於其間也雖然二公在當時或有異論而風流文雅千載之下可能少其名乎嗚呼地以人重人亦以地而重他時好竒之士遊於斯庶幾有知恭甫者重修蘭亭記紹興郡西南二十五里蘭渚之上蘭亭在焉郡守吳江沈侯省方出郊得其故址於荒墟榛莽中顧而嘆曰是晉王右軍脩禊之地也今禊帖傳天下人知重之而勝蹟蕪廢守土者不當致意耶既三年道融物敷郡事攸理乃訪求故實稽遺起廢時其贏詘以次修舉而蘭亭嗣葺焉亭所在已非故處壞且不存而所謂清流激湍亦已湮塞乃翦茀决澮尋其源而通之導其流行於故址左右紆囘暎帶彷像其舊而甃以文石視舊加飭闢其中為亭榱棟輝奐攔楯堅完墨池鵞沼悉還舊觀經始於戊申之闕成於己酉之闕不亟其工也侯於是集僚友賔客而落之以書抵余俾紀其成余惟右軍去䕶軍而為㑹稽也其嵗月不可考而開倉賑饑上疏爭吳㑹賦役與執政書極陳郡中敝事其於為郡盡心焉爾矣蘭亭之㑹殆其政成之暇歟昔人謂信孚則人和人和故政多暇余於右軍蘭亭之遊有以知當時郡人之和已至其兩諫殷浩北伐而策其必敗若㑹稽王須根立勢舉而後可以有謀不然社稷之憂可立而待當時君臣漫不加省而卒皆蹈之晉之為國迄以不競迹其所為豈空言無實者使其得志行其所學而功烈施置當不在茂𢎞安石之下時不能用而斂其所為優游於山林泉石之間至于誓墓自絶嗚呼豈其本心哉若其所謂虚談廢務浮文妨要斯言也實切當時之敝而以一死生齊彭殤為妄誕於斯文特致慨焉其意可見已自永和抵今千數百年國有廢興人有代謝而蘭亭之名迄配斯文以傳其事又有出於泉石遊觀之外者君子於此葢有所識矣夫遊觀雖非為郡之急而考古尚賢亦有政者所不可廢矧蘭亭諸賢皆天下選文雅雍容極一時之盛委蛇張㢮古訓攸存文章翰墨又所未論也然而文翰之美自兹以還亦未見的然有以過之者則夫所以掩其心志而失其實者有以哉史稱其清真任率釣弋自娛亦言其迹云耳故余於沈侯之請特著其心之所存出於晉諸賢之上如此然則沈侯斯亭之復也豈獨遊觀為哉是役也侯首捐俸入以倡而一時僚寀若通守蕭君竒士推郡王君慎徵咸有所助貳守俞君汝誠最後至復相厥功於法皆得書因附著之侯名啟口山字子由甫田集巻十九
