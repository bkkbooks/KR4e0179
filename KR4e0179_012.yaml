body:
  text: 甫田集卷十二明文徵明撰詩二十七首李少宰杭中丞劉柴二光祿置酒丁亥冠蓋雍容總卧龍清時吏隱大江東黃花初過重陽節白髮來邀栗里翁豈有聲名驚四海解忘形跡荷諸公浮塵不到清樽畔舉扇無勞障北風趙麗卿侍御邀遊冶城落水蕭蕭帶逺空冶城髙處見秋風重將白髮遊江左依舊青山似洛中有客樽前談夢鹿何人天際慕飛鴻荒墩寂寞埋秋草猶自風流憶謝公徒步至寶光寺布襪青鞋短褐衣酒樽詩卷一僮隨白頭自笑曾供奉徒步誰憐老拾遺五畝喜聞粳稻熟重陽還恨菊花遲松寮竹谷逍遙地時有山僧乞小詩九日與彥明登雨花臺雨花臺上雨初乾野色江光落坐間豈謂旅遊逢九日共來把酒看三山老年節物偏生感到處雲林不負閒落木滿空秋萬里暝禽遙帶夕陽還題蘭炎夏悠悠白晝長空齊睡起拂匡牀不須甲煎添金鴨氣泛崇蘭滿几香瀟湘八景濕雲載秋聲萬籟集篁竹江湖白髮長獨擁孤蓬宿瀟湘夜雨月出天在水平湖淨於席安得謫仙人來聽君山笛洞庭秋月孤帆落日明青山相映帶遙遙萬里情更落青山外逺浦歸帆征鴻戀回渚欲下還驚飛葦深繒繳繁歲晚稻粱微平沙落鴈雞聲茅屋午靄靄墟煙白市散人亦稀山空翠猶滴山市晴嵐曬網白鷗沙衝煙青箬笠欸乃一聲長江空楚天碧漁村夕照日沒浮圖昏遙鍾出煙嶺應有未眠人冷然發深省煙寺晚鍾密雪灑空江雲冥天浩浩寧知風浪髙但道漁簑好江天暮雪畫牡丹粉香雲暖露華新曉日濃薰富貴春好似沉香亭上看東風依約可憐人憶昔四首次陳魯南韻三年端笏侍明光潦倒爭看白髮郎只尺常依天北極分番曾直殿東廊紫泥浥露封題濕寶墨含風賜扇香記得退朝歸院靜微吟行過藥䦨傍紫殿東頭敞北扉史臣都著上方衣每懸玉珮聽雞入曾戴宫花走馬歸此日香罏違伏枕空吟髙閣靄餘輝三年歸卧滄江上猶記雙龍傍輦飛扇開青雉兩相宜玉斧分行虎旅隨紫氣氤氲浮象魏彤光縹眇上罘罳幸依日月瞻龍衮偶際風雲集鳯池零落江湖儔侣散白頭心事許誰知一命金華忝制臣山姿偃蹇漫垂紳愧無忠孝酬千載曾履憂危事一人陛擁春雲嚴虎衛殿開初日照龍鱗白頭萬事隨煙滅惟有觚棱入夢頻竹雀落木蕭蕭苦竹深茅簷斜日喚雙禽棘叢豈是藏身地三月春風滿上林千葉梅與方山人同賦緗梅奕葉照瓊枝不是橫斜舊日姿繁雪吹香春翦翦冷雲團樹玉差差羅浮夢斷情稠疊瑶圃風生珮陸離一任階前明月碎清真不負歲寒期靜隱掃地焚香習燕清蕭然一室謝將迎坐移白日花間影睡起春禽竹外聲心逺自應人境寂道深殊覺世緣輕問奇尚有門前客却恨青山不掩名顧華玉以書邀豫為西湖之遊病不能赴詩以謝之舊約錢塘二十年春風擬放越溪船却憐白髮牽衰病應是青山缺此緣漫說西湖天下勝負他北道主人賢只餘好夢隨潮去月落空江萬樹煙中秋日晚雨忽霽與諸友看月晚雨新晴客欵扉天時樂事不相違眼前愁緒浮雲散坐上佳人碧月輝誰見入河蟾不沒空憐繞樹鵲驚飛多情惟有清光舊照我年來白髮稀對酒晚得酒中趣三杯時暢然難忘是花下何物勝樽前世事有千變人生無百年還應騎馬客輸我北忩眠觀書老眼視茫然時時手一編未能忘習氣聊復遣餘年欹枕山忩下篝燈細雨邊誰應知此味自結靜中緣煮茶絹封陽羡月瓦缶惠山泉至味心難忘閒情手自煎地罏殘雪後禪榻晚風前為問貧陶榖何如病玉川晏起林下將迎寡頽然萬事捐老知閒有益病與懶相便殘夢荒雞外輕寒繐帳前從教貧到骨不負日髙眠甫田集卷十二
