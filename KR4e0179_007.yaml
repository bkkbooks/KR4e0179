body:
  text: 甫田集巻七明文徵明撰詩三十六首賦王氏瓶中水仙羅帶無風翠自流晩寒㣲軃玉搔頭九疑不見蒼梧逺憐取湘江一片愁新黄㸃額淡生春日暮含顰故惱人老去陳王才力减相看無那洛波神已而復取古梅一枝暎帶瓶中轉益妍美漢臯委珮碧琳琅更着瓊枝玉雪香大似孤山貧處士寒泉配食水仙王㜕娟綽約並含羞氷骨霜姿本一流今夜遊仙千里夢知他是洛是羅浮喜雨弱雲將暝暗柴闗急雨蕭然落坐間山鳥近人呼滑滑春泉隔屋送潺潺小牕破睡茶甌淺别院生凉羽扇閒滿目新詩題不得登樓自看郭西山明妃曲漢廷議和親佳人使絶域明妃隨例行秪謂掖廷職一朝臨遣動天子始信深宫未曽識當日丹青亦等閒今知不得黄金力正縁平日懐貞素非敢從前恃顔色由來顔色不自知愛惜自是君王私君王顧妾恩何厚竟按臣工戮延夀佳人自有命畫工何能為長信宫中長别離當時豈亦有人欺悠悠青塚胡沙裏千載終為漢家死紅顔命薄古云然不恨臣工况天子雨中雜述春歸楊栁暗四月雨垂垂紅洗花無迹青沾草有私倚樓迷曉望出郭滯幽期客去茶甌歇閒愁總上眉凝情不自得看雨獨登樓緑樹千門晩凉雲五月秋暗梁栖濕燕高壁上枯牛有待新波長南湖弄小舟雨從四月晦數日尚愆晴潤與黄梅併寒侵白苧生斷煙迷竹色懸溜雜雞鳴莫自嫌行潦東郊久待耕十日江城雨霖淫勢已滔簷端宿雲霧屋脚巻波濤已掃蘇端迹仍深仲尉蒿無錢供晩醉行儗質春袍雨中撿篋得石田先生丁夘嵗贈詩云多時契濶費相思就見江城喜可知時事但憑心口語老人難作嵗年期林花及地風吹糝簷溜収聲雨散絲明日孤踪又南北教雲封記壁間詩後題五月十一日適是日亦五月十一及今丁丒恰十年而先生下世八年矣因追和其韻以致感嘆碧雲何處寄遐思徃事惟應嵗月知奕奕風流今昔夢離離殘墨死生期憶公感慨身難贖顧我飄零髩亦絲欲詠江城當日句淚花愁雨不成詩花落江城有所思雙娥寺裏寫相知高人不見王摩詰長笛空悲向子期細草含煙情脈脈凉風吹雨淚絲絲十年不踏西州路忍啓緗奩讀舊詩夏日同次明履仁治平寺納凉竹根雨過石苔斑鍾梵蕭然晝掩關坐愛微凉生碧殿忽㸔飛雨失青山雲分暝色來天外風捲湖聲落樹間最是晩晴堪眺詠夕陽横抹蓼花灣山中六月可逃禪相與清齋佛座前風細石壇松落子雨深沙竇竹垂鞭别來光景渾依舊壁上題名不記年底用忘歸歸自好晩霞新月載溪船寂寂雲堂車馬稀隂隂灌木暑光微竹根雨過蛙爭吠松下日斜僧未歸毎見青山羞世網欲臨流水置柴扉紫薇勝槩吾能領只恐時情與願違東禪寺與蔡九逵同賦何處晩凉多溪堂夜來雨喬然兩青杉繁隂遽如許山僧候巖扉喜聴松間履為破明月團自汲寒泉煑秋興浮雲奄忽互相逾北首長安萬里餘㶚上將軍真戲爾回中消息近何如祥麟誰見遊郊藪塞鴈空聞有帛書澤國西風秋正急有人東望憶鱸魚清秋早晩自江東揺落河山日夜風白馬去從天竺國銅駝誰問洛陽宫九朝文物于今盛萬里車書自古同憔悴嵇生無復事只留雙目送飛鴻江上芙蓉玉露零秋風乍起闔閭城白龍終見沙蟲困黄鵲何時羽翼成四海秪今懐徳化諸公須用荅昇平蒼梧萬里雲千疊日暮空懐帝子情郊臺寓目徙倚郊臺酒半醺千年陳迹草紛紛風煙又與行春别秀色平將寳積分水落平湖洲亂吐天垂四野日初曛春山何似秋山好紅葉青松鎖白雲朔風朔風吹慘渡江城北鴈時傳塞上聲此日文章寧有益中朝爵禄久還輕徒聞漢室誅曹節不見長沙召賈生千里蒼蒼雲日暮更梯高閣望神京驚寒驚寒木葉已紛紛老大悲秋不自欣旅鴈南來違朔雪夕陽西去隠浮雲支離嵗月都無益粉飾承平漫有文愧殺仲連天下士只將談笑却秦軍雪夜宿楞伽寺朝泛石湖雪暮宿楞伽雲山空夜寒重對酒不能醺三更山月高起視皓無垠水天相映射氣色凌氤氲増輝巖壑姿㓕没鷗鷺羣亦知光景殊照灼難為分有如開玉府珪璧羅繽紛時於萬木末瞥見飄珮雰山僧事茗設掃積供殷勤勌來支石鼎自束松枝焚龕燈落殘燼寳罏㫁餘熏還憐江梅色玉痩氷肌皸天寒萬木僵月出四山靜積雪縞清夜幽崖自輝映上方衣裘单俯視寒芒正長風掃纎雲平湖竟天凈倒影落僧牕横飛濕銀鏡㣲瀾玉塔揺秀色千巖競俄然萬象沉坐覺羣翳屏一鳥不復飛光華久逾盛吟懐共朗徹禪心寄枯勁秪覺塵界卑忘身在高夐半空擊瑶簪冷然發孤詠萬里吾目中悠悠一漁艇嵗暮閒居陋巷還車馬高齋漫簡編塵埃銷短日雨雪入殘年攬照空雙髩探囊有一錢西風灑修竹吾意已蕭然南樓南樓氷雪盡江郭嵗年窮暮嶺延西日枯條振北風孤雲天一握萬事髩雙蓬徙倚青煙㓕蕭條在眼中西山開晩霽返照落牕中嵗事収殘雪生涯入㫁鴻寒多裘失重愁劇酒無功零落雙桐樹蕭蕭不受風新年擾擾復闐闐鷄聲妨晏眠江城収宿雨衰髪受新年寒盡梅花後春生草閣前郊原芳草近早問石湖船汎舟江上疎疎梅子雨煙中嫋嫋竹枝歌暖風初汎青蓮舫斜日輕揺緑玉波南浦春光啼鳥寂西來山色過橋多美人只在横塘曲手把芙蓉奈逺何登上方春風吹白髮醉上碧岧嶤帆落天邊雨人行樹裏橋舞臺青草合霸氣白煙消吳越横分地登臨不自聊王氏溪樓晴雲拂棟思悠悠來上元龍百尺樓落日正臨官渡晩春江自抱古城流夾堤煙火千家市下水帆檣萬斛舟舊事凄凉芳草滿不知何處是長洲虎丘千頃雲閣閣外雲千頃風前首重搔倚䦨雙鳥下落日亂山高積水連横浦疎松帶逺臯冷然發清嘯吾意欲凌囂新秋夜坐空塵月落夜蒼蒼還見枯桐下井牀病裏秋風驚已至坐來寒漏不禁長疎螢時映青燈㓕短髮初沾白露凉鴻鴈不知年嵗惡滿天蕭瑟自南翔聞砧明㓕踈燈鑒薄帷誰家𢷬練夜遲遲驚回短夢千門月不斷秋風萬里思嵗晩江城還自急天寒閨閣最先知髙樓人靜星河爛正是霜華欲下時十一月六日初度與客飲散獨坐誦太白紫極宫詩有感次韻西風自何來吹我簷下竹更䦨客已散夜色悽可掬起行照疎燈履影不愧獨百年已強半大夢才信宿老作負轅駒無疑我何卜圓影有盈虚逝水無終復天道良不私吾人自傾覆豈無徑路趨思之亦云熟甫田集巻七
