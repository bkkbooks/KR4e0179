body:
  text: 甫田集巻四明文徵明撰詩四十二首元日承天寺訪孫山人六街斜日馬蹄忙自覔幽人叩竹房殘雪未消塵迹少一函内景對焚香當年結習住僧家對客分泉自品茶欲識道人高潔處紙牕殘雪照梅花人日孔周有斐堂小集華堂漠漠悄寒輕聊應芳辰設菜羮竹外風煙開秀色樽前榮日麗新晴占微誰問東方朔思發空懐薛道衡短髩寂寥花勝在相看無復少年情九逵期人日㑹城中既而不至作詩見懐奉荅人日故人偏入望洞庭煙水隔蒼蒼不教縷菜傳纎手空復題詩寄草堂老髩金花誰鬬勝古梅殘雪自吹香尋常佳莭多惆悵何况差池負酒觴次韻毛大叅辭召有感之作十載中朝仕有聲青雲末路更収名久知元亮多高韻聊托嵇康事養生尊酒風流青髩在草堂歸計緑隂成君恩不與塵心㫁回首江湖萬里情桑梓棲遲已有年可能騎馬負春田九天雨露雙龍詔滿地江湖一釣船曉起青山供短笏雨餘修竹長新鞭投間不落幽居事一任浮雲過眼前上已日獨行溪上有懐九逵郭外青煙栁帶柔洞庭西去水悠悠故人不見沙棠楫燕子齊飛杜若洲日落晩風吹宿酒天寒江草喚新愁佳期寂寞春如許辜負山花挿滿頭寒食自横金歸汎石湖澤國春深霧雨収越城橋畔水爭流㫁煙西去浮蒼嶼斜日中川起白鷗村店寂寥寒食莭行人迢逓木蘭舟芳情滿目東風急欲採汀花不自由三月既望同吳次明蔡九逵陳道復湯子重王履約履仁汎舟石湖遂登治平以天朗氣清惠風和暢為韻分得朗字良期每多違佳節悵虛徃薄言城西游餘春遲幽賞日色漾漣漪天光發融朗清吹飄文裾瑶湍激蘭漿寄懐涉清川平目眺遐壌晴霏動遥岑清煙散修莽亞竹孤卉明隔水春禽響及此單裌成聊寄臨流想題虢國夫人夜游圖紫塵拂轡春融融參差飛鞚驕如龍錦韉繡帶簇妖麗絳紗玳燭圍香風春風交花光屬路後騎雍容前却顧中間一騎來逡巡秀眉玉頰真天人翠㣲垂髩衱稱身彷彿當年虢與秦佳人絶代真難得安得君王不為惑豈知尤物禍之階不獨傾城竟傾國一時喪亂已足憐後世方誇好顔色晴牕展巻漫多情百年青史自分明莫言畫史都無意尺素還堪鑒興廢晩雨飲子重園亭髙齋落日偶追從樽酒淹留一笑中芳草滿庭飛燕子晩凉和雨在梧桐江魚繞筯肥烹玉野樹藏春淺映紅潦倒莫言歸更緩習家池舘愛山公游幻住菴行行西郭兩牛鳴路轉橋横得化城深巷鳥啼山木暗清溪日暖白煙生興懐徃哲悲陳迹毎到空門損世情坐戀蒲團留不得碧雲回首暮鐘聲次韻題王山農墨梅西湖老樹凌風霜敷英奕奕先羣芳貞姿不作兒女態炯然氷玉生寒芒窮寒襲人膚欲裂幽人自詠孤山雪至今秀句落人間暗香浮動黄昏月却恨無人續高韻墨痕聊寄江南信不闗素質暗緇塵剛愛鉛煤㸃新髩恍疑寒影照昏缸刻畫無鹽誰濫觴逃禪已逺嗣者寡彷彿尚寄山農王山農何處骨已冷展巻令人雙目醒何因為喚玉妃魂極目晴波湖萬頃病起秋懐卧病經旬一榻空起來高閣見秋風蒼茫野色浮天外狼藉霜痕落鏡中滿地江湖愁託足何時淮蔡却収功浮雲奄忽行銷滅雙目依然送㫁鴻蕭蕭木葉下平臯衰髩鬅鬙怕自搔烽火東南滄海暗夕陽西北暮雲高閒懐已負青團扇野興初生白苧袍蕭散只應輸宋玉能將九辨續離騷秋日西齋紈扇無聊髩怯風芙蓉波冷月溶溶不知秋色來多少飄盡西齋一樹桐寄魯南陳子江入秦淮八月寒長干只在㫁雲間閉門自覔驚人句細雨秋風憶后山滿地干戈卒未休吳江楓冷又驚秋美人何處煙波𣺌手把芙蓉特地愁中秋日同諸友月洲亭看雨有作為愛芳洲緑玉灣共來沾醉野亭間一年索莫中秋雨百匝空濛負郭山水竹㑹心非在逺天時多故不妨閒獨憐日暮移舟去不得高歌載月還漕湖一名蠡湖相傳范蠡所開或謂通漕運而設癸酉秋八月十有七日同錢元抑陳道復顧朝鎮朝楚夜汎有作𣺌渺中流㴑小舠露華初冷碧天高一痕落鏡秋宜月萬籟無風夜自濤消盡霸圖猶說蠡傳流餉道不通漕浮樽自適東南興何必淋漓汙錦袍道復西齋偶成風生迴渚玉漣漪秋晩茆簷白日遲一事不經心境寂離離松影坐來移過孫文貴不在對庭中新竹一室纔容膝居然不受埃恍如城郭外時有野人來簷緑揺新竹堦紋蝕古苔未妨酬對寡撫景自徘徊九日期九逵不至獨與子重游東禪作詩寄懐兼簡社中諸友東郭名藍帶曲隈三年行樂兩回來依然舊境牆遮樹久㫁塵踪砌有苔落日懐人流水逺秋風撫掌菊花開良辰在眼休教負相對山僧把一盃詠庭前藂菊寒英翦翦弄輕黄百卉凋零見此芳天意也應憐晩節秋光端不負重陽郊原慘淡風吹日籬落蕭條夜有霜輸與陶翁能領略南山在眼酒盈觴秋夜新寒高閣夜何其野笛荒砧不㫁思澤國變衰菰菜老長安迢逓帛書遲江空露下芙蓉葉月出風吹桂樹枝何必潘郎能自省年來青髩已絲絲病中遣懐經時卧疾㫁經過自撥閒愁對酒歌意外紛紜知命在古來賢達患名多千金逸驥空求骨萬里㝠鴻肯受羅心事悠悠那復識白頭辛苦服儒科潦倒儒冠二十年業縁仍在利名間敢言冀北無良馬深媿淮南賦小山病起秋風吹白髮雨深黄葉暗松關不妨窮巷頻回轍消受罏香一味閒題西川歸棹圖奉寄見素中丞林公莆陽中丞千人英懐忠事君老彌貞向來聲華四海傾一言忤志還歸耕歸來憂世殊未已况也黑頭方壯齒天子俄縣西顧憂尺一到門投袂起巻甲宵馳萬里輕竟翦窮㐫報明主捷書朝入劒門關高情暮在壺公山豺狼滿道不可徃錦城雖樂何如還功成身退古所難角巾東第疇能攀蜀江溶溶日千里歸心更比江流駛玉壘浮雲千萬重不如先生歸興濃瞿塘灧澦聲撼空落日慘淡揺長風鳥道衡絶悲蠶藂娥眉宛轉開芙蓉青天一髮付回首江山與我俱無窮嗚呼江山與我俱無窮先生一櫂岷峨東賦得野亭秋興㫁雲狼藉近簾櫳天地蕭條四壁空盡日倚䦨黄葉雨一畨吹髩白蘋風年光搔首孤鴻外山色供愁落照中欲寄閒情無那逺煙波江上採芙蓉對雪短榻無聊擁敗綈開門深雪壓簷低蒼松白石寒相照曲巷斜橋去欲迷舞態不禁風脈脈覊懐都似鳥凄凄小山詩思清如許不見高人出剡溪冬夜煙鎖凝塵四壁空青燈欲燼夜溶溶涼聲度竹風如雨碎影揺牕月在松病枕蕭條聞永漏草堂揺落已深冬不堪酒醒淒然地撫景懐人意萬重月夜登閶門西虹橋與子重同賦白霧浮空去渺然西虹橋上月初圓帶城燈火千家市極目帆檣萬里船人語不分塵似海夜寒初重水生煙平生無限登臨興都落風欄露楯前先友詩有序某晩且賤弗獲承事海内先逹然以先君之故竊嘗接識一二比來相次淪謝追思興慨各賦一詩命曰先友不敢自托於諸公也太僕李公應楨太僕在三舍抗言拒刑臣公在太學中官牛玉欲延教子公正言拒之平生彊執志已究未達身十年更外制耿挺標清真矯矯孤飛鴻翹翹一角麟卿監晩翺翔白髮已盈巾故國有佳山長岐多風塵終然絶俗姿逸去疇能馴㕘政陸公容陸公婁東鳯少小已翺翔公少與張滄洲泰陸靜逸釴齊名時稱婁東三鳯耿耿文莊公識公在班行職方振風采抗疏扼羣璫章程在司馬至今猶耿光名隆毁斯來讒搆伺其傍叅藩亦晩達竟為讐者傷清風不終冺遺書滿緹緗定山莊公㫤定山古通儒學道希聖賢古義與時違歛息賁田園黄花媚幽徑白鳥泳清川悠悠青山適一徃三十年高羅弗為求欲致無由縁非無濟世心亦有清廟篇惜哉用違材零落成棄捐文定吳公寛有偉延陵公居然古明徳道義周一身文章可華國悠悠明堂思允矣清廟瑟惜哉晩登庸位用殊未極還能敦薄夫坐亦消讒慝徳淵物為遷曽誰覩聲色聖賢不復生斯人重吾憶禮侍謝公鐸巖巖天台山下有幽貞士咀英擷芳鮮煜然散霞綺早嵗登延閣回翔石渠裏璧雍育羣材金匱抽青史雖復恩眷殊不為纓組累方巖有書堂歸來還兼耒屢召不終淹誰應會深㫖處士沈公周東南有一士蘭帶芙蓉裳璚珠雜瑶玦皎然明月光不隨鳴鳯下甘與黄鵠翔秋風自寥廓羅網漫高張采芳涉秋苑看雲撫層岡不為平世得白雲聊徜徉悠悠天隨子千載永相望㕘議王公徽王公夫何如侃侃古遺直一命青瑣闈慷慨思効職此身朝闕廷暮已在絶域所期言職伸寧計一身抑丘樊樂優游天子思舊徳陜郊甫旬宣遄歸一何亟松菊媚幽人鍾山有佳色太常吕公㦂太常名家子英英蒼玉玕文章足華煥秉志亦堅完禮曹肅供奉弱冠已騫摶不愛䕃補郎自致青雲端滁山詠列錦銀臺達紏彈所至必宣秉云胡不終安只應千首詩終古無能刋蘭房曲戲贈王履吉效李賀彤雲旖旎霏祥光蘭椒沃壁含璚芳流蘇嫋嫋開洞房晩波繡燭揺鴛鴦鴛鴦雙飛情宛轉紫帶垂螭覺螭緩緑膏照粉玉缸斜瑶鴨融春翠雲暖海綃落枕夜何如美人笑擲雙明珠巫雲朝歛金釵溜不恨巫雲恨花漏除夜擁寒枯坐夜無聊杯茗罏薫次第消獨有戀人燈黯黯可堪卒嵗雨蕭蕭醉供春帖閒吟草病撫辛盤嬾頌椒少日馮陵都遣却只將雙髩待明朝甫田集巻四
