body:
  text: 甫田集巻二十九明文徵明撰墓誌銘九首沈維時墓志銘沈君維時諱雲鴻其字維時世家長洲相城里曾大父孟淵大父恒吉父曰石田先生啓南石田先生既老四方之人就之者日益衆先生日從事筆硯寄笑談一不問其家然家用治集賔客無廢懽而先生亦怡然自樂以有君為之子也君侍先生唯諾進止慤而有容間從計事舉細周大慮遠於始造以無所茍而論議品藻輒中肯綮其所為益於先生豈獨能順適其意而已而不得終事先生以死是豈獨君之不幸哉君病且死猶强食飲力起居以慰其親而迄於絶其情有足悲者嗚呼君御物燕整處族屬能規以正而不失歡撡家三十年業日加拓而人不怨其積蓋其賑荒赴急寔一鄉所倚成也故死之日親者哭之疏者惜之而遠近奔弔殆千人焉嗚呼君已矣豈獨一人一家之不幸哉君醇質醖藉詞㫖雋永與人款款有情致性喜劇飲而不為亂中歳益折節事問學既操其家去治於别業訾省鮮暇曽不離圖史其學長於考訂或舉一事必深竟顛末齗齗不厭為詩工用事而不茍於命意特好古遺器物書畫遇名品摩拊諦翫喜見顔色往往傾槖購之菑畬所入足以裕慾而惟用以資是縹囊緗帙爛然充室而襲藏惟謹對客手自展列不欲一示非其人嘗曰米南宮願作螙書魚遊金蹄玉躞而不為害余之癖殆是類邪至尋核歳月甄品精駮又歴歴咸有據依江以南論鑒賞家葢莫不推之也又喜積書讐勘勤劇曰後人視非貨財必不易散萬一能讀則吾所遺厚矣念奕世充盛而嗣承之艱因命其居曰保堂而教其子若弟􅈤悃周至意圖有以振之也而豈意其不能竢邪嗚呼悲夫君生景泰庚午八月一日年五十有三以𢎞治壬戌八月十七日卒明年癸亥十一月甲申葬益字鄉新塋娶徐無所育側出子履聘蔣女字錢鉅君長余二十年而修世講特厚相知為深故其葬也余不得不銘而石田先生實又命之君嘗一試吏為崑山陰陽訓術今書維時而不以官示非其志也銘曰學則奇孰曰仕之崇卑匪壽不頎而志養之違吁嗟乎維時亡友閻起山墓志銘閻君起山之卒也為書屬其友文某為墓銘病甚不能執筆則口授其父亦不能詳他日其父以其意為書并書其事行為狀屬某曰此亡兒之志也嗚呼余忍負吾亡友於地下邪余始識君於尤君宗陽之門尤君為言其敏慧朂學于時年甚少余猶意其經生也卽而叩之其言甚高其志甚銳而其為學已卓乎可畏矣旣而君館授劉氏所居去余近率日一至吾廬至即出所業評訂或考論古人或商近事踰年不厭益勤比改館去猶數日或月一見每見而其學輒益進盖浩乎未見其止也喜積書見書必力購求家惟一僮日走從友人家借所未讀書手抄口吟窮日夜不休所獲學俸盡費為書資家甚貧或時不能炊至質衣以食而翫其書不忍棄竟以積勞得羸疾家用重困余以其貧且病數諷止之雖時頷余言然終不能改也君學甚邃而喜讀左氏司馬遷班固書至於論議之際雖古人猶有所擇而牽於塲屋不得伸故其見於論著者甚鮮其意葢有待也而以盛年殀死惜哉君性高朗與人無所俯仰見賢者欣慕不怠而恒庸衆人視人故知者莫不愛之而終不能勝夫嫉之者之多也然其卒也知與不知又莫不嗟惜之豈以其畜而未施而貧困殀折非其所宜得邪嗚呼惜哉君惟一弟先數月死而父老且病貧不能自存妻娠而未育君蓋不可死者而卒死之天邪人邪何其酷邪余辱君相知覩其所遭不能不戚然而莫克振之媿君多矣又忍不銘君以慰之地下哉閻之先臨江人國初以事徙𨽻蘇州衛遂為蘇人祖宗實父鉷娶馬氏生君於洞庭山中因名起山而字秀卿卒年二十有四正德丁卯正月乙亥也閱兩月為三月辛酉葬吳縣張古村先塋銘曰不售奚畜匪年奚穀嗟誰為之命伊酷祁府君墓志銘府君祁氏長州人諱春字元吉先夫人母兄也先君平生特賢愛之居常非府君莫與計事葢與同憂樂通有無者四十年府君長數歳嘗約先君我死子必銘我及先君亡乃以屬某曰汝其終而父之志他日治壽藏則又命曰吾老矣尚庶幾及吾見之葢久而未能亦恃府君康裕有可竢也詎意遂銘其死耶嗚呼先夫人之亡先君官永嘉余兄弟才數歳家旣赤貧又無強近親戚府君居數里外率日一至吾家委衣續食哺鞠周至終三年不衰于時微府君余兄弟且死故余視府君猶母也府君慈戀雖切而不忘訓飭自先君之亡所嚴事者獨有府君蓋又有父道焉而今已矣嗚呼尚忍言哉余兒時往來母家及見外大父怡閒翁高朗喜客客至觴詠終日翁家非充羡而修供精鑿往往不命而具葢有府君為之子也既而翁得末疾而大母徐亦瞽廢府君調視加慎至厠牏之㣲皆身親之而二親並享高壽以卒翁嘗曰吾有孝子故得不前死謂府君也府君蚤歳嘗從其外舅施宗道官嶺南既壯去游閩越渉淮泗修貿遷之業自二親老遂不復出晚歳益事簡密非弔問不輒出出必以良日其行跡可數而待也性既愿慤又被服古雅人莫不望而禮之雖居㕓井不肯茍有所利坐是家日益落然未嘗以貧干人尤不樂與人競年垂八十未嘗一至訟庭嘗有僕事府君謹一日告去府君即召其嘗所與游者飲之酒而遣之去數年忽有欵門投書稱南嶽某尊師致聲蓋向所遣僕去為道士矣府君謝不見有所遺亦不納語人曰久不相聞安知其非道士也萬一事出意外何以拒之其周審慎重如此府君雖未嘗問學然於先儒格言終身誦之故其所履有儒生法士所不必能者嗚呼老成凋謝安得復有如斯人者乎余所為致慨於是者豈獨渭陽之思而已邪府君卒於正德戊辰五月二日享年七十有八明年己巳九月十又三日葬陳公鄉先塋配施氏繼朱氏又繼羅氏子男二人仁娶卞氏繼朱氏義娶吳氏女二人壻周鏞王泰孫男一人山女二人銘曰守之居居行之于于閱嵗其逾乃全之軀令言弗失有允斯蹈廼慎旃斯孰則匪孝維孝有則維孝子之力既鑿之粒亦鮮之擊豈乏鮮與粒繄貧而克孰不儒言亦裒其久亶祁府君學則不有而中靡違嗚呼噫嘻昔稱孝亷爰有力田世也非古野有遺賢嗟斯人兮何愆朱性甫先生墓志銘吾蘇有博雅之士曰朱性甫存理朱堯民凱两人皆不業仕進又不隨俗為㕓井小人之事日惟挾册呻吟以樂好求昔人理言遺事而識之對客舉似如引繩貫珠纚纚弗能休素皆高貲悉費以資其好不恤也成化𢎞治間其名奕奕望於郡城之東人以其所居相接而業又甚似也麗稱之曰兩朱先生正德壬申堯民死明年性甫又死自兩人死吳中故實往往無所於考而求其遺書亦無所得惜哉初信甫嘗相約為傳不果及是葬而其子以狀來速銘狀固不若余能詳也性甫長洲人宋樂圃先生之後曾大父元英大父明父灝母周氏性甫生頴異少學於里師覺其所業非出於古人遂謝去從杜瓊先生游於時東南名士若吳興張淵若嘉禾周鼎仕而顯者若徐武功有貞祝叅政灝劉叅政昌劉僉憲珏並折節與交且推之為後來之秀既而諸老彫落吳文定公石田先生繼起而性甫復追逐其間最後則交楊儀制君謙都主客元敬余視性甫丈人行也性甫不余少而以為友視諸公為親葢其自少至老未嘗一日忘學故亦未嘗一日忘取友以自助也居常無他過從惟聞人有奇書輒從以求以必得為志或手自繕録動盈筐篋羣經諸史下逮裨官小說山經地志無所不有亦無所不窺而悉資以為詩其詩精工雅潔務出新意得意處追躅古人所著野航集君謙實叙之尤精楷法手録前輩詩文積百餘家他所纂集有經子鈎𤣥吳郡獻徵録名物寓言鐵網珊瑚野航漫録鶴岑隨筆總數百巻既老不厭而精力不加又坐貧無以自資而其書旋亦散去每撫之嘆息其意殊未己也而豈意其遽死耶性甫性閒慢待人無鈎距晩歳嗜酒婆娑益事閒曠或時乗醉忤人人亦不以為異尤為郡邑大夫所禮前守洛陽史公新㑹林公先後修郡志並以性甫從事歳時鄉飲必致為上賔時人榮焉性甫死時為正德癸酉七月廿又五日享年七十是歳十一月甲子葬陳公鄉愛字圩先塋娶監察御史張惟善女生子四人男延娶湯氏建娶尹氏女適金爟范汝舟孫七人男曽庚乾女適彭暐王普張源倪宥曽孫女二人銘曰維朱有聞自樂圃君德言孔碩為時令人五百斯年耳孫其秩有賢一人性甫維克其克伊何維文之揚維行之祥德懿其章有嗟性甫少也則勤枕經籍書窮終其身抉摘雕鎪既揚亦摧豈無利途弗易其樂其髪蒼蒼其視茫茫歸視其家其書滿牀樽酒婆娑百年維適彼榮亦崇孰得孰失陳公之鄉有𤣥者堂既藏既安後永有光故嚴府君妻祁氏墓志銘府君卒之三十有七年厥配碩人卒且葬於是其子恱泣告余曰先府君之亡恱生甫五年府君懿行無所知今日益遠莫可追述惟是碩人之葬不可無銘子其圖之嗚呼碩人余從母也先夫人之亡先君官永嘉余兄弟穉弱無所歸依外大母徐以居而徐老不事事碩人寔撫鞠之時碩人新寡家又赤貧無所得衣食檢故篋得敝衣浣濯補綴隨燠寒以給昫沫備至故余兄弟雖孤貧不知有餒寒之苦蓋於余有母道焉嗚呼先夫人之亡於兹三十年餘矣歳時升堂見碩人猶見先夫人也矧有恩焉而今已矣其何以為情耶而於其葬也忍不有銘以昭之耶碩人祁氏諱守清余外大父祁公之中女年若干歸府君為再繼室府君卒時尚少日撫恱以泣恱稍長教以治生俾從姊子習乾没而戒飭之甚至恱或時持錢貨歸必問其所從得茍不出其身則不色喜蓋未數年而恱以有成家日充拓而碩人目撃其盛人咸稱之謂庶㡬府君之不亡也府君諱珵字廷美蘇之吳縣人曽祖仁祖信父禎母鄭氏府君初娶秦繼王生一女適陳士榮碩人生子即恱娶郭氏女適徐暄孫男三庠序府女三府君之卒為成化十四年某月某日年若干碩人之卒為正德三年某月某日年七十有一葬以九年十一月三日墓在吳縣至德鄉銘曰有相弗終而慎節以終弗失其躬弗失其躬爰成其子家厥用敉以綏福履碩人之祉至德之鄉有崇者岡粤四十年徃從夫藏以永有光趙碩人墓志銘碩人文氏諱素延余曾大父存心府君長女先大父淶水府君女弟先君温州之姑也歸趙氏為故修職佐郎良玉之配良玉諱瓊嘗游學官後從事鎮江衛滿考銓註吏部垂仕而卒時𢎞治四年辛亥也後二十有二年碩人年七十有六乃卒是為正德八年癸酉正月二十五日又明年乙亥正月三日葬吳縣天平山從修職君之兆初修職君學於先大父故碩人歸焉歸時趙氏方盛羣從兄弟並聨婚富室繡縠姝麗奕奕炫人而碩人以儒素處其間不忮不艶卒用若淑為諸姒所親一姒蚤寡適人將持其二女去碩人不可曰此趙氏子去將何從乃身自收養哺被訓迪視均已女二女亦視猶母焉碩人讀書知大義尤歸信佛果晩歳目失明日猶黙誦内典不輟俄得異人治之復初人以為善徵然自是日益老而操事出言無少失外家女婦視為儀矩歳時吉㓙必迎致之請所宜行以為常先大父初食貧碩人與同患苦及是大父昆弟惟碩人在時時為言吾家先貧時事俾無忘前人嗚呼碩人已矣吾文氏老人至是且盡有如碩人可復得耶碩人生子銓錦女適烏程訓導吳鳴鳳吳縣學生周芝孫孫男女十有二人銘曰嗚呼天平之山修職所藏碩人往偕後永有光故通江縣知縣黃公墓志銘公諱佑字時濟姓黃氏其先金陵人世居句容之黃寨宋建炎南渡避兵崇明之黃魚垜遂家焉有黃八府君者生五子其第四子曰四耆府君公所自出也四耆八傳至文虎有子曰義洪武初登科為平陽尹高皇召對稱㫖面拜左軍都督府斷事官俄為尚書郭桓構陷死兄仁懲義死非罪戒後人勿得踐仕籍故其子公素孫明善咸績學弗仕而明善尤博雅知名事具縣志公明善次子生七歳始言及入小學明慧異常未㡬遂通經能文辭他日以里役給事縣庭縣官試諸生公從傍代對縣官訝其雋捷詰知為公召公挑試所學立遣為學官弟子貟其父猶執先訓不許強之乃就成化中貢入太學釋褐授四川通江縣知縣縣小而貧民復剽悍易動撫以恩信道以化本甫三年政平訟理歳亦比登廪畜贏羡通民歌焉俄盗起傍邑官軍臨勦頓犒不貲公念民疲不忍徵發毁家以給民不知擾而盗迄平既平築城浚隍俾有以守凡所為利通民者盡心焉竟以不能曲事上官罷歸既歸以崇明有海患留居郡城家貧授徒自給凡二十有六年年八十有四乃卒寔正德二年丁夘五月廿又七日也公丰神朗潤辭㫖雋發性長厚未嘗忤人而友愛諸弟尤至或有侵奪一聼之弗問勢利之事平生未嘗經懷臨終泊然而逝類有道者公娶沈氏有賢行子栗娶龔女適施豳郁克彰孫奭娶袁孫女適張璿曽孫韶頀􅀈曽孫女適郡學生陳廉醫士陳約其一尚幼自公之喪子栗隨没家復多難越八年正德乙亥十一月二十日壬寅始克葬公長洲縣鳳凰墩之原沈夫人祔於是公曾孫韶念公濳德弗傳乃以其所聞於家人者告余為叙而銘之銘曰鳳鄉葱葱堂封隆隆是惟通江之宮既固既完尚後人之逢陳以可墓志銘以可諱鑰故都察院左副都御史長洲陳公諱璚之仲子也公起家進士官中朝涉歴臺寺所交游皆當世偉人以可以佳子弟周旋其間珠玉朗潤進止詳雅大為諸公貴人所喜比長歸吳中更激昂任事啓拓門户廣事生殖田園邸店縱横郡中尋用推擇為隂陽正術既被官使益治大第蓄童奴建麾策駟日從賔客少年出入讌遊漿酒霍肉歌呼淋灕意氣奕奕僩然以貴介自將下視庸流如無人人茍拂其意雖富貴有氣力必求下之不少讋然喜接賢士大夫琴書在前從容晏語虛徐謙約類儒生逸人俄解官築室姚城江之上曰此吾先廬所在吾將老焉於是劭農振業疆理阡陌陂魚養花以文酒自適不復與城市關聞晩得末疾乃稍稍就醫城中疾亟輒舁以徃曰吾生於斯固宜終於斯也竟以正德十一年九月癸酉卒於姚城年五十有三以可本吳之洞庭人國初徙姚城曾大父某大父某並贈通議大夫都察院左副都御史曾祖妣某祖妣某並贈淑人母嚴封淑人娶林生子淳今為郡學生側出子沖女嫁國子生顧􅔩孫男四女一以可性資明豁不樂委瑣少嘗學舉子以不能受程格謝去賦詩作字亦有思致奪於事弗究所止獨能審畫世務有所規剏徃徃出人意表菑播畜牧必盡地利而訾算乾沒尤其所長然能緩急赴人數致千金亦縁手散去翕張揮霍殆不可以銜橜局束亦一時之䧺俊矣乎以可卒之明年二月辛未葬吳縣塘灣伏龍山之新阡其友文某為銘銘曰氣則昌志彌彊既耀而光弗隕厥良不規以隨而奮其馳卒歛以綏巻而違益絅而輝孰其與之要厥歸明故奉政大夫工部都水司郎中張公墓志銘正德初元逆瑾始盗事權翕張狡獪思蹂踐士大夫以恐讋海内鈎摭細瑣横肆羅織都水郎中吾蘇張公寔首罹其禍公時領漕河奏績於朝俄飛語告變捕繫詔獄推考無所得乃以奉使時乗肩輿非制落職戍遼陽庚午更化悉召還諸流人公還以故官待次於家吏部奏為浙江叅政不報久之再奏為廣東叅議為嚴州府知府皆不報閱數年丁丑十二月癸夘以疾卒享年六十有五公諱瑋字嘉玉别號歴齋其先真揚人洪武初以赤籍徙𨽻蘇州衛曾大父聲遠大父宗德南京國子監助教父静源累贈奉直大夫工部虞衡司貟外郎母陳氏累封太宜人公少為助教公所愛生四齡即坐膝上口授經書甫成童已貫總羣籍乃益擇名士與遊時吳文定在太學遂從受業焉歸補郡學生成化癸卯舉應天鄉試丁未舉禮部試廷試賜同進士出身循例歸省丁虞衡公憂𢎞治庚戌服關授工部營繕司主事奉使江西督造寜靖王墳辛亥還理部事癸丑分司杭州𣙜商人竹木甲寅還部尋陞虞衡司貟外郎已未進都水司郎中領漕河事分司徐州庚申以疾賜告壬戌還朝復除都水郎中領漕河如故公居官嚴慎所至率職杭𣙜塲舊多姦利徃往商旅困弊而國課或不登公摘蠧式法務平其值課溢有贏然不以羡奏蒞徐益樹風聲釐革繕治必盡民利而軌法緒正不為勢撓中貴人道管内輒歛輯相戒避張郎中于時張郎中之名聞江淮間赫赫若神明然然卒以此掇禍尤事持廉歴官二十年田廬服用乃損於舊晩嵗益貧家徒四壁晨夕饎爨或不時舉既死室無一錢郡邑為賻襚始克就􅀈鄉人士共斂貲葬之嗚呼若公者不亦誠亷吏哉公事母夫人至孝方七歳時母夫人病目俄失公所在已而自外持藥物歸舉家驚異及貴自非有故不輒去母傍赴戍時母年八十念無再見理日夜悲泣洎歸乃康復愈前時至是與公相繼死人尤異之公纎痩多疾居常若不勝衣當被罪時貫索關械荷百斤重校日夜㬥市中市人傍睨竊嘆莫敢近數日羸竭氣息僅屬更两日且死幸而不絶而配所又邊朔寒苦非人所居葢皆置之必死之地而得不死人以為生平苦節之報庶幾後福未艾茲惟顯大之基乎天其意者在此而同時罪人並湔濯登用乃公卒困以死嗚呼天邪人邪果孰任其咎耶公先夫人王氏生子希范今為郡學生後夫人梅氏生子希宋孫男一孝承女二葬以卒之明年正月乙酉墓在吳縣奇禾山二夫人袝銘曰肅肅張公抱堅翼德有卓其履既允亦式弗傾惟克式修之職淮河湯湯使車皇皇再蒞其將亦孔有揚揚之維何譽與謗俱我修我官有死弗逾孰其生之天皇聖明日月重華遘茲休貞穢恩汪汪滌瑕濯垢羣工彚征以莫不宥嗟嗟張公一斥不復豈天則仇伊命之酷命之不仁有作斯僨僨于其身不殞厥問奇禾之山公歸有藏後千萬禩其永有光甫田集巻二十九
