body:
  text: 甫田集卷三十四明文徵明撰墓表三首陜西布政使司左參議盧君墓表嘉靖十年辛丣閏六月八日陜西參議盧君卒於家年五十有一先是君為武選郎中有兵官驕揚喜訐君以職分臨之遂為所誣逮繫詔獄有司畏其人莫敢申理賴朝廷聖明卒白而出之尋有陜藩之命時君已被疾抵陜未幾聞其父御史公之訃疾遂加劇至家數日遂不起嗚呼傷哉君諱襄字師陳國初有為青州府通判者始徙居吳之橫山遂為吳人高祖彥實曾祖立祖士誠父綱以長子貴封河南道監察御史母孺人陳氏生君兄弟二人長雍仕終四川提學副使次即君自幼頴異讀書不煩督率稍長受易於提學君既而卒業於高安令周君振之已又為都御史徐公仲山所知徐公撫山東遂携以往比歸又遊王文恪公之門遊道既廣造詣日深𢎞治甲子以儒士試應天不利歸補郡學生丙子再試遂中高科有司録其經義以傳嘉靖癸未登進士初授刑部某司主事改兵部職方主事丁亥升禮部祠祭員外郎戊子再升兵部職方郎中尋改武選君初官法比即思以政業自見克勤其職暇輒檢閲故牘求其傳爰論報而習之故析律詳明不少骫縱然亦不事深文有竊盜四人法不至死御史掠立當以三犯君閲實以初犯抵罪或以成獄為嫌君曰避嫌而殺人忍為之耶卒論出之故雖不久而所平反為多其在本兵尤留意戎政嘗奉使校閲邊關及閲馬近畿所至訪材官謹亭徼展采錯事尤多緒正又嘗奉命典試江右讐閲明審取舍惟公凡名流久淹場屋者悉見識拔一時稱為得人君立朝未數年凡閲三部皆在本科本科者凡諸曹章奏悉從關決君所在職辦諸尚書並器重之然亦操切疆執不為時人所喜其橫被口語亦以是也君長身孑立而矜嚴自持羣坐中不妄出一語而其中與奪分劑末始少失尤善廉事有所審畫必中事機遇政有缺失或民間疾苦必具疏以聞如言維揚賑飢西北邊備及江南農田數事皆經逺之謀非徒茍焉圖塞目前而已雅性喜學家居時每得異書輒手自繕録既仕益勤雖簿領雜襲而不廢占俾為文敷腴明暢能逹其志詩尤精詣不茍出出必求過人所著有五塢草堂集所編集有石湖志石湖文略盧氏世譜他所纂葺多未成書君文章政業皆以古人自期視一時曹耦莫有當其意者使天假之年稍及下壽其所見當不止是顧方精進有為而死遽及之可哀也已君家自彥實以來世業農至御史公始讀書教授鄉里而君兄弟相繼起進士皆至連率顯官又皆以文學政事著稱可謂盛矣曾未幾時皆以盛年即世吾不知造物者果何如也余交君兄弟僅二十年見其始出而仕仕而歸以及於死始終盛衰如電露奄忽能不有慨於中乎因表其墓以著其志亦用抒余之悲云爾嗚呼傷哉君娶陳氏封安人子應坊娶馬氏側出子應垓聘魏氏女適張師詠孫男一人邦鉉葬以卒之後二年癸已十月草又六日乙未墓在西橫山之陽敕封承德郎工部都水司主事陳君墓表工部主事陳鏐以嘉靖乙巳四月十有七日乙酉葬其考府君於長洲縣鳳凰山之麓妣莫氏祔友人文某表其墓曰嗚呼是為敕封工部主事陳君之墓君諱冕字威仲别號厚齋陳氏蘇之吳縣人家世業農至直道公永錫始用文學起家舉進士歷仕永樂正統間纍官福建按察司僉事清忠徑節卓然名臣而陳氏遂為吳郡衣纓之族直道公一子寧仕為新野王鎮國將軍教授二子懷恱恱官永定知縣而君則懷之子也懷娶于鄭無子君與兄冠皆出少房張氏君生三月而張卒鄭氏實哺鞠之君稍長即知慕鄭事鄭不啻所生巽言愈色隨所惡欲而承意維謹鄭本賢淑有母道用是益憐愛君顧復恩勤孝慈融浹人不知非所出也事兄冠尤極恭順冠亦誠篤親妮事必資君志意交孚用能戮力起家家庭之間雍睦順敘同居五十年莫有間隙直道公剛方履儉垂範有素君服習見聞能揫􅀢自愛不徇俗尚不比匪人獨能推贏急匱雖忤弗悔尤嚴於賔祭豆籩潔修禮文維帙以家世齊民顯融光大昉自直道公建直道祠俾子孫世祀之其事雖出於冠而發之自君凡君所為往往歸德於冠冠亡無子以嘗撫鏐有恩使鏐服喪三年曰吾兄宗子法不可絶他日有子當為立後今之喪服亦義起耳然君子不以為過也君少業舉子病薾中廢乃篤意教鏐鏐舉進士官工部三年推恩封君工部都水司主事階承德郎封莫氏安人命甫下而君以疾卒於家享年七十有三元配沈氏早卒繼即安人同邑莫公諱淮之女生而願謹未笄歸君與君嫓德儷義恭敬弗違色笑端詳和而有别能推君之愛致孝於韓姑婉容順志靡有愆佚喪之過時而哀遺言懿訓佩之終身事其姒如君之事兄君所為協和其家不間於中外者安人為有助也始君之卒鏐在京師家無強近親戚沐浴含􅀈咸自安人被服衾稠纖悉曲備不令鏐歸有遺恨也時年已六十有六苫寢蔬素不以老廢竟用憂傷得疾越明年遂卒實嘉靖癸卯十一月草又三日也距君之卒為壬寅九月草又八日才十有四月耳嗚呼傷哉生子男一人即鏐女四人劉芾周詩朱宏蔣垕壻也余與陳氏比里而居少則遊君仲伯間暗暗愈愈友恭篤至每竊嘆以為忠賢之後德澤深長如此雖然幽贊隂翊必有所以順之於道者顔之推有言姊姒之比兄弟則疏薄矣以疏薄之人而節量親厚之恩必不合矣言勢之不能以有叶也則夫安人內行之良又豈易得哉故余表君之墓而輒附著之鳳山趙先生墓表先生趙氏諱宗魯字應麟以字行别字文亨鳳山其號也先世杭之仁和人宋季有舉進士為醴泉令者元世俶擾避地盩厔之白陽山生子士安因占數為盩厔人先生之高大父也曽大父純徙居樓觀鎮大父彬字大儒高朗篤義以峭直好施長雄其鄉鄉人有政咸從取平焉始自樓觀徙居邑之東門力本振業雅喜讀書教其子䇿以儒業起家由武鄉訓導仕終王府伴讀而趙氏遂隱然為衣冠之族伴讀娶于某生子二人先生其仲也生而頴異少則知學稍長習春秋為舉子業尋選𨽻學官為弟子員益精進不怠然試有司輒不利念春秋旨微而盩厔偏鄙無所師承乃裹糧束書走由漢之蜀􅑴三峽沿湘江至麻城而次止焉時麻城阮公朝東以春秋鳴先生從之受業鑽研淬礪居一年盡得其旨以歸歸試有司又輒不利而先生病矣於是盡以其所學授其子欣曰吾厄於時命不克遂志成乃父之志於汝有望焉欣甫升庠校而先生卒卒十有三年而欣舉進士且顯於時而先生不及見矣嗚呼傷哉先生剛毅有為砥節履方而執志堅定雖貧不茍取於人而與人亦無所茍處家應物咸協於道蓋有用之才也使占一第或不第而以貢入官必有以自見而不幸無所售又不得年以骯髒死嗚呼豈不重可惜哉雖然先生不獲自試而其子以髙科入仕試邑於此財決敏利擲伏若神道利拊循有古循良之風昔人云子道之行父志之成先生庶幾可以無恨矣先生生某年某月日享年若干卒於嘉靖己丑某月日以某年月日葬某鄉某原娶李氏生子二人長恪次即欣辛丑進士今為長洲知縣云甫田集卷三十四
