body:
  text: 甫田集卷十七明文徵明撰敘十一首玄墓山探梅倡和詩敘吳玄墓山在郡西南臨太湖之上西崦銅坑映帶左右玉梅萬枝與竹松雜植冬春之交花香樹色鬱然秀茂而斷崖殘雪下上輝煥波光渺瀰一目萬頃洞庭諸山宛在几格真人區絶境也但其地僻逺居民鮮少車馬所不通雖有古剎名藍嵗久頽落髙僧韻士日逺日無茍其人非有幽情真識不能得其趣非具髙懷獨往之興不能即其境而遊矧能發為歌詩品目詠讚以深領其勝耶此余於方伍兩君探梅之作而有取焉古之名山往往以人勝所貴於人豈獨盤遊厯覽而已有名德以重之髙情雅致有以領之然非文章雄傑發其竒祕亦終泯泯爾是故山無淺深近逺茍遭名人皆足稱勝天下吾吳號山水郡然知名當世則虎丘靈巖耳蓋顧野王之文清逺道士李太白韋白諸人之詩歌有足重也若玄墓之勝誠有不在二山之下者而一時之人能道其名者鮮矣豈非未遇其人文章之不立歟或謂永柳諸山以柳子諸文傳而柳子之文之竒非永柳諸山不足以發二君他詩固多清麗而評者謂玄墓諸篇尤勝殆山水之竒有以發之耶而其幽情真識與夫髙懷獨往之興實足領之又其人皆清修有立仕以政顯隱以操稱不肯碌碌後人充其所至必將名世他時當有讀其詩而想見其人以歆兹山之勝者余故敘而傳之送太常周君奉使興國告祭詩敘今天子入繼大統之初首議推尊所生而輔導大臣以宗法不可紊正而繼統不得顧私據禮執論至於再三天子用其議卒考孝宗以端萬年之統帝所生以隆一時之孝事出權宜尊有所屬天下翕然是之而建説者獨謂追崇所生疑若未盡天子亦以為未盡也顧禮有經常不欲自用特付大廷議之而大臣守前議不變天子孝思純篤必欲申其至情微示所向諫官往往獲罪而二三大臣遂相繼引去於是巷議紛然謂且悉從説者之言而遂廢所後之禮人心危疑中外洶洶然而天子實不用其議也乃嘉靖三年四月有詔尊所生為皇帝而所以考孝宗敦所後於前議無改焉詔若曰朕於正統不敢有違而所生至情亦當兼盡王言一出中外釋然知聖天子之意特欲申其至孝焉耳於戲孝者天之經地之義也聖人制孝所以盡人之情以行夫禮禮者天理之文人事之則聖人制禮所以節人之欲以正其情是故天下不可一日無禮無禮則亂亦不可一日無孝無孝則賊夫禮與孝也凡民不可無也而况天子乎而况大臣有經天下之責者乎二三大臣所為不忘引去者欲以行夫禮也聖天子惓惓於所生者欲以行其孝也然孝不可無禮而禮實有以通於孝愚於此有以仰見聖天子之明能用其孝以祔於禮而尤重夫二三大臣之去得申其禮以全夫孝孝之至禮之盡天下其庶乎名號既成儀文斯舉於是天子有事於園寢以從臣將命而太常丞周君德瑞與焉在朝諸君咸賦詩贈行以余有同鄉之雅俾敘首簡始禮之舉也時多異議而君子或不能無疑於其間故余於此深論其事以備他時折衷云送陸君世明教諭青田敘吾友陸君世明以鄉貢士試禮部得乙榜授青田教諭或謂君髙才雋望當收制科躋膴仕以大有為於時冷員散地非君所宜得而君不恤也國朝之制雅重進士之科而乙榜即進士之副然今之髙官要職非進士不畀而乙榜例得學職一墮其中輒不復省録浮沉常調或終其身其間以譽望自拔而顯仕者間亦有之然而鮮矣故進取之士往往匿年規免以覬他日而或時命不偶迤邐嵗年乃有畢志儒官不沾一命者嗚呼豈不重可惜哉君少與余同遊學宫而君天才敻出矢口迅筆藻麗煜然每就試據案疾書視他人章追句琢方事思惟而君數百言已就莫不暢達雋永而傳於理故御史按試莫不賢異之謂其取進士不難也然每試應天輒斥不售自𢎞治乙卯至正德己卯凡九試始得舉於鄉及試禮部又斥不售自正德庚辰至嘉靖丙戌凡三試始得乙榜夫以君之才之敏如此而其進之之難如彼豈不有命哉茍不自省而勉焉以求其畢志儒官不沾一命吾不敢謂無也萬一有焉豈不重負其所有哉而况其所就或有出於進士之上者此君所為俯首以求就其所志而冷員散地有不暇恤也我國家學校之設甚緩也而實要也甚輕也而實重也何者世之盛衰繫人才之賢否而天下之賢胥學校焉出今夫修一職治一事其效易見而所及有限豈若賢者之興隱然為一世之重而其澤之所被有不可量者然則何有於進士哉吾知君必以此自貴而無用彼為也雖然學校誠要也而或緩焉誠重也而或輕焉則系其人何如耳是故得其人則重且要不得其人則緩且輕君尚進於是哉送周君振之宰髙安敘國家入仕之制雖多途而惟學校為正學校之升有進士有鄉貢有嵗貢嵗貢云者有司嵗舉一人焉鄉貢率三嵗一舉合一省數郡之士羣數千人而試之拔其三十之一升其得雋者曰舉人又合數省所舉之士羣數千人而試之拔其十之一升其得雋者曰進士凡今之名臣碩輔與夫建功植德顯名當世者皆進士也故凡今之髙官要職非進士不畀進士尚矣其次則鄉貢鄉貢率起自冗散其得邑往往鄙小其畀授率下進士一等其能建功植德自拔而埒於進士者蓋有之矣然非銖積寸纍矻矻自守鮮不敗者非聲名隆赫突過進士不得顯官而浮沉常調終於下位者比比也故有志當時思自樹立者往往厭薄不屑必需進士以升此其所志良是矣而君子所恃以自見乃有出於進士顯官之外者余少𨽻學官同遊之士無慮百數十人而與余同志者才三數人三數人者其氣同其業同其發為文章著於行乂與夫羣試於有司無不同者蓋莫不􅍀然思以自見於世也故一時之人所望而覬其有立未嘗不在三數人者周君振之其一也既而三數人者以次升用而振之數試不利竟以鄉貢從選調得知瑞州之髙安振之在三數人中其名獨盛而滯於學官為獨久又不得進士而從選調以去故知振之者莫不惜之謂且不屑也而余獨不謂然何者其所恃以自見於世者在志在氣業在文章行乂而非以進士也且國家所謂隆進士之科者豈不以其所業哉其業則經史也言行也修治之具聖人之道也是皆學校之所講習固鄉貢之士之所同也嗚呼振之之所志猶夫進士也而其所業與其所求而至者猶夫進士也其自拔而埒於進士也何有哉若夫銖積寸纍屹屹自守固其所素負以自立者而聲名隆赫突過進士以獵顯官則有命焉而非振之所能容心其間余固不暇為振之道也髙安瑞之輔邑在江右為劇地前此皆進士領之今授振之經國者固以進士望吾振之也振之行矣其無以鄉貢自畫送周君天保知來安敘山陰周君天保以辛巳進士知兖之東阿期年而縣大治當道者才之謂縣小不足為也移知應天之溧陽未上以憂去服闋改授滁之來安於是人咸歎之謂周君之才常小東阿不足為也移而去之宜得壯縣以騁而來安猶東阿也周君為之得微枉其用乎而余獨謂非然也我國家用人惟其才其畀授視其所堪惟進士入官則惟以名弟其用為縣亦惟以名弟然縣有逺近地有厚薄事有簡劇而人之才有能有不能或盩焉鮮不敗者近制稍事消息期年而察之視其治狀與地之宜而易置之俾得隨力展錯無廢材焉此誠經國者曲成夫人材類古器使之道而實非也凡今之仕有中外而仕外為難仕州縣為尤難縣有小大其相去不啻倍蓰而其為之難易亦倍蓰然而君子視之均之為不易也誠以縣令之職導揚風化撫字黎氓其事有祠祀有學校有傳置廥積有河堤道路有科差有籍帳勾稽省署悉總於令而盜賊蟲霜旱潦又其異者初不以小邑廢也茍處失其道其敗也視大邑為甚何者地狹鮮産民貧而寡業賦出無幾而役力章程不可但已非若大邑地大以饒儲偫有素而人力物産足以供之處得其道誠無難者是故邑無小大無難易惟在處之得其道與不得其道耳來安在大江之北實惟畿輔望縣其地當淮徐河洛之衝旱暵蟊賊嵗比不登民飢而虛而盜時竊發周君之行科差籍帳紛錯叢挫勾稽省畫悉萃其身其憂方大也而何枉之云哉或以君才敏而志髙工為文章力追古作喜得僻左地而以其暇逸究于其業又其地屬滁有琅琊醉翁之勝而君寄興髙逺將以自適今若是不已負乎雖然不足病也昔者子貢問於子賤曰何為瘦也曰憂官政也世謂子賤宰單父彈琴而治則為縣而暇逸無若子賤者而其言如是則亦何嘗不憂哉憂得其道樂在其中矣周君亦求其道而已得其道雖日事吟諷肆情林壑不害其為憂官政也不得其道則矻矻簿書徒見其勞耳何補於治哉余嘗識周君之兄若弟雅聞其人及是邂逅傾吐遂得其心事蓋能以道自勝而非可以地而易其志者會其鄉之大夫士徵文為贈遂深言之而不嫌於規也陳氏家乘序陳氏家乘者長洲陳公希正所修陳氏宗譜也不曰宗譜而曰家乘者凡陳氏所受三朝辭命與凡纍世文獻皆在焉陳之先徙自鳯陽由建炎南渡抵今四百年可考而知者元翰林學士同知太醫院事良炳而下僅僅七傳傳其所可知其不可知者不敢強附以重誣其先也按陳媯姓系出於虞周武王求虞後得胡公滿而封於陳因以為姓其後楚滅陳敬仲奔齊故齊楚皆有陳氏秦末勝起陽城死於汝陰平起陽武而封於曲逆子孫散處莫詳所終漢魏之間蕃實最著而莫究所始要皆胡滿齊完之裔也鳯陽在宋為濠州故屬楚之淮南漢御史大夫萬年魏尚書令矯矯子侍中騫皆故濠人公之先必有所祖而文獻無存莫之有考焉且學士仕元官三品既顯融矣在當時豈無辭命之頒交遊文翰之贈而一迹不傳及今子孫欲追其始藐不可得蓋不能無遺憾焉公之為是夫亦無使後之子孫有憾於今猶今之於昔也余讀其書詳而核析而不分聨屬而不紊上不誣其所出而下焉得以引其世而所為不忘本始之意蓋惓惓焉厚矣哉公之志也夫昧於源本不知所祖者失之薄援引攀附而妄祖名人者失之誣與其誣也無寧略於所始而傳其疑焉乃或因仍茍簡併其所知廢而弗録時移世易子孫至不相通如蘇洵氏所謂相視如途人然失亦甚矣其又甚者歐陽子曰不知姓之所自而昧昭穆之敘則禽獸不若嗚呼可不懼哉若公者庶乎免夫其得逭於歐陽子之責也已公名寵以儒醫擢用厯官太醫院使致仕進通政使司右通政云宜興善權寺古今文録敘宜興古荆溪之地帶江襟湖在東南為山水之邑谷巖幽窅流瀨清激昔人有樂死之願其勝有可想者又壤僻而迂更兵燹為少故又多古剎名迹善權寺其一也寺據離墨山之南麓有三洞之勝榱甍桓桓猶唐故物豐碑巨刻亦往往而在然其事具郡乘甚略而寺未有特志也寺僧方策取金石之存者合近時名賢篇詠輯為古今文録於是山之文獻始備而其勝乃益顯夫山水之在天下大率以文勝彼固有竒瑰麗絶無待於品題者而文章之士又每每假是以發其中之所有卒亦莫能廢焉柳子厚記永柳諸山本以攄其抑鬱不平之氣而千載之下知有黃溪鈷鉧者徒以柳子諸記耳然則山水之勝果不有待於文哉若夫佛氏之學務以悉空諸有而言語文字又其所幻而惡焉者然而古之名僧勝士又不皆離乎言語文字之間而其名迄以是傳豈無上之業未易登援而言語文字即其次耶此䇿之所以惓惓於文録之輯也策又發山水之竒釐為二十四詠而吾鄉沈啓南先生悉為賦之是又不特能輯其成而已余嘗約策遊山中而未能遽往姑敘其書以先之晦菴詩話敘子朱子之學以明理為事詩非其所好也而其所為論詩則固詩人之言也嗚呼理固無不該也而况詩乎哉世蓋有工於吟諷而不得其故者或終日論議而諧諸音聲輒不合作要之其於理於詩皆未為有得也練川沈文韜氏以明經遊學官而特好為詩取凡朱子平日論詩之語萃而為書曰晦菴詩話豈將會理與詩而一之耶夫自朱氏之學行世學者動以根本之論劫持士習謂六經之外非復有益一涉詞章便為道病言之者自以為是而聽之者不敢以為非雖當時名世之士亦自疑其所學非出於正而有悔却從前業小詩之語沿訛踵敝至於今漸不可革嗚呼其亦甚矣説者往往歸咎朱氏而不知朱氏未始不言詩也觀於文韜之書可槩見已若其所論當自有識者取之小子何述哉重刋舊唐書敘嘉靖己亥吳郡重刋唐書成書凡二百卷本紀二十卷志三十列傳百有五十石晉宰相涿人劉昫撰初御史紹興聞人公詮視學南畿以是書世無梓本他日按吳遂命郡學訓導沈桐刋置學宫工未竟而公以憂去及是書成以書來屬徵明為敘按唐令狐德棻等撰武德貞觀兩朝國史至吳兢始合前後為書百卷而柳芳韋述嗣緝之起義寧訖開元僅僅百餘年而于休烈令狐頔以次增緝之起建中而止於大厯元和以後則成於崔龜從厥後韋澳諸人又增緝之凡為書百四十有六卷而芳等又有唐厯四十卷續厯二十二篇皆當時紀載之言非成書也晉革唐命昫等始因舊史續成此書然五代史昫傳不載此事豈其書出一時史館而昫特以宰相領其事耶然不可考也或謂五代搶攘文氣卑弱而是書紀次無法詳略失中不足傳逺宋慶厯中詔翰林儒臣刋修之自慶厯甲申至庚子厯十有七年成新書二百二十五卷視舊史削六十一傳而增傳三百三十有一别撰宰相方鎮及宗室世系宰相世系四表續撰儀衛及選舉及兵及藝文四志所謂其事則增於前其文則省於舊實當時表奏之語而弟賞制詞亦謂閎博精核度越諸子良以宋景文歐陽文忠皆當時大手筆而是書實更二公之手故朝野尊信而舊書遂廢不行然議者則以用字竒澀為失體刋削詔令為太略固不若舊書之為愈也司馬氏修通鑑悉據舊史而於新書無取焉惟周益公稱其刪繁為簡變今以古有合於所謂文省於舊之論而劉元城顧謂事增文省正新書之失唐庚氏尤深斥之乃極言舊書之佳其所引決海救焚引鴆止渴之語豈直工麗而已自是一代名言也然則是書也其可以無傳乎雖然不能無可議者段秀實請辭郭睎有吾戴吾頭之語新書省一吾字議者以為失實是矣而舊史秀實傳乃都不書夫秀實大節固不以此而此事亦卓偉可喜柳宗元敘事尤號竒警且鄭重致詞上於史館若是不得登載則其所遺亦多矣甚者詆韓愈文章為紕繆謂順宗實録繁簡不當拙於取舍異哉豈朝氏所謂多所遺漏是非失實者耶甚矣作史之難也心術有邪正詞理有工拙識見有淺深而史隨以異要在傳信傳著不失其實而已今二書具在其工拙繁簡是非得失莫之有掩焉彼斥新書為亂道誠為過論而或緣此遂廢舊史又豈可哉此聞人公所為梓行之意也是書舊嘗刻於越州卷後有教授朱倬名倬忤秦檜出為越州教授當是紹興初年抵今四百年矣其書復行而公又出於越其事豈偶然哉先是書久不行世無善本沈君僅得舊刻數十册較全書才十之六七於是遍訪藏書之家雖殘編斷簡悉取以從事材閲惟審一字或數易厯三暑寒乃克就緒其勤誠有可嘉者因附著之何氏語林敘何氏語林三十卷吾友何元朗氏之所編類倣劉氏世説而作也初劉義慶氏採擷漢晉以來理言遺事論次為書標表揚𣙜奕奕玄勝自兹以還稗官小説無慮百數而此書特為雋永精深竒麗莫或繼之元朗雅好其書研尋讀繹積有嵗年搜覽篇籍思企芳躅昉自兩漢迄於有元上下千餘年正史所列傳記所存竒蹤勝迹漁獵靡遺凡二千七百餘事總十餘萬言類列義例一惟劉氏之舊而凡劉所已見則不復出品目昈分維三十有八而原情執要實惟語言為宗單詞隻句往往令人意消思致簡逺足深唱嘆誠亦至理攸寓文學行義之淵也而或者以為托裂委瑣無所取裁骫骳偏駮獨能發藻飾詞於道德性命無所發明嗚呼事理無窮學奚底極理或不明固不足以窮性命之蘊而辭有不達道何從見是故博學詳説聖訓攸先修辭立誠畜德之源也宋之末季學者習於性命之説深中厚貌端居無為謂足以涵養性真變化氣質而究厥所存多可議者是雖師授淵源惑於所見亦惟簡便日趨偷薄自畫假美言以護所不足甘於面墻而不自知其墮於庸劣焉爾嗚呼玩物喪志之一言遂為後學深痼君子蓋嘗惜之元朗於此真能不為所惑哉元朗貫綜深博文詞粹精見諸論撰偉麗淵宏足自名世此書特其緒餘耳輔談式藝要亦不可以無傳也是為序備遺録敘備遺録者録建文死事諸臣而備國史之遺也録昉於宋公端儀而成於張公芹郴陽何公孟春實嗣葺之今太倉守馮君意有未盡又為補益而並刻之刻成使門人太學生王夢祥視余畀敘首簡夫忠孝節義天下之大間死義之人國家元氣之所繫昔之論者謂夷齊存殷以排周周以有道興而夷齊不害為仁聖人亟稱之所以礪生民而窒不軌也自古國家未嘗無骨肉之變而唐之太宗出不得已然不免後世之論者春秋之義也我國家壬午之際事出非常視臨湖之事尤為有名而一時死事之臣獨視王魏諸臣為有光夫王魏身事建成親覩臨湖之事卒之反面以事太宗曾不聞有所徇其豐功偉績為一代宗臣而天下之人莫有異議徒以髙祖在上而王魏固髙祖之臣也然則齊黃諸臣獨非我髙皇之臣乎即使睢紆避禍以全身立功獨不得引王魏以自蓋乎乃皆駢首就戮之死不悔者則大間之不可踰耳而我國家元氣之正與再世作養之功不可誣也惟是統紀不立史事廢闕實非細故文皇晚嵗稍稍悔悟蓋嘗形諸言矣而當時無有將順之者遂使一時之事泯沒不傳則靖難諸臣不能無責焉自睿皇以還國禁漸弛乃今遂不復諱實維纍朝列聖之盛所謂礪生民而窒不軌者固古聖人之意也甫田集卷十七
