body:
  text: 甫田集巻二十明文徵明撰贊七首元馬國珍像贊元賜號靖逸處士省劄云皇帝聖㫖裏集賢院竊見儒人馬國珍禀性剛明持身雅正讀書學道志操軼於古人樂善安閒簡靜宜為君子不為禄仕安分山林可號靖逸處士噫是惟有元靖逸處士馬公之像貎質而揚道幽而光義髙天下名動帝王錫之命書隆以名號考徳無慚於身有耀然而九重之意雖云能極其褒而一時議者猶恨未抵於用是徒見道行之可尊夫孰知隱者之所重盖雖真宗之賢不能奪魏野之志而和靖之稱適用為孤山之寵也是以節義顒如光於里閭聲名煜如久而弗渝余生百數十年之後亦得以起敬於丹青之餘方質夫像贊是為吾友方君質夫之像也蒼顔槁如其貎之臞或視以為愚大裙䄡如其服之儒或誚以為迂夫孰知其行之拘而心舒外之枯而中腴枕詩籍書居居于于夫誰與徒嚴灘鑑湖然句秀而姝燦乎璣珠曾不療其貧痡譽籍而孚煜其載途適為造物者之所娛盖嘗稽其家世出𤣥英處士之後原其鄉里在金華文獻之區噫嘻質夫我知其人下求一世而不足上師千載而有餘廷尉湯公贊大廷尉沂樂湯公既罷之六年為嘉靖十一年甲午以疾卒于江陰里第於是公年七十有四矣公起家進士歴仕中外垂四十年為良有司為明執法累更藩臬聲實並流晉撫貴竹繼鎮三川戡難敉邦所至振肅遂自御史大夫入為大廷尉且向用矣㑹朝廷有疑獄議久不决天子赫怒從中下其事事既反正而在廷與議之臣咸得罪罷譴所罷諸臣多累朝老臣一旦以詿誤去天下咸共惜之而公清忠練達尤為時望所屬故言官數有論薦久之聖意稍釋一時被罪諸臣或湔濯登用而公竟疾不起嗚呼豈其命耶抑天道有不可知耶惟公博碩脩正有徳有言進退本末皦無瑕纇居常不立厓異而遇事激昻不少骫骳方獄之興也聖怒叵測或道公自疏引却公不可曰吾位九列實與聞國政有不率職則國有明憲豈可首鼠其間茍為避就及詔㫖臨責羣臣震讋而公抗言自理觀者傍懼脅息而公弗恤也嗚呼若公者其古之所謂抱道守貞不為威詘不可利誘者哉贊曰有偉湯公國之楨碩既煜有章亦恒其徳發身以儒守之有道更陟險夷不易其操奕奕星朗憲憲六察入直文螭出奠藩臬風聲所被無有邇遐有庸弗釋天子曰嘉進陟大廷為廷尉平以仁以明以莫不經經之維何弗枉而直相古有賢孰如定國法不可逾民用不寃有偉湯公徳罔有遷維堯有宥臯陶執之維帝之仁豈臣則私維天有仁維國有法謇謇脛脛匪躬維烈臣罪不赦帝徳如天弗隕以捐迺歸而全古亦有言天王聖明位則不究道斯用亨維道之亨維志之得退不失身進不失職有偉湯公徳懿孔醇古之遺直今之令臣張可齋少叅像贊嗚呼是為可齋先生少㕘張公之像氣和而平言辨而貞惟其秉徳之明既騫用揚亦敏有章惟其賦才之良奕奕文聲顯顯政譽亶收效於甲科遂宣猷于朝著方武皇在位之時正國家危疑之際逆豎盗權四郊多壘公以郎署之英適當本兵之寄發蹤厭難左右折衝迄靖羣冦曰籌有庸曾是弗酬顧用為異豈皦皦之易汚乃隆隆而來毁嶺南之擢實嬰時忌既逐于朝尋奪之位盖舉朝皆不謂然而公曾不以自懟優游林泉考終盛世雖用不盡才而志行靡虧况公論在人而此心無媿嗚呼先生於此亦足以自慰也桑廷瑞畫像贊余家於海虞桑氏有世締至先大父淶水府君於瀹齋闕齋通守復講筆硯之好而柳州於先温州尤親狎故某獲接諸父緒餘有以知其淵源之學出廷瑞公而生也後不識其人他日瀹齋示某葬文畫像始得其詳像出瀹齋意想其惓惓不忘可重也昔人謂一鬚髪不類即是他人者豈論其情哉敬瞻之餘輒贊數語有腴其容惟徳之充曾謂是人弗永而終有襜者裾惟行之儒曾謂是人甫命而殂雖藉不為禁近之儲而章服猶太學之具豈造物者好厄於全而可見者僅永其譽顯融之志經術之用弗究於身發諸羣從盖不特登仕之有人方此文聲之靡窮曾嵗月之幾何已藐然其音容遺像之存意想而已顧惟手足之情又奚鬚髪之議儼然長軀蕭然圖書余盖得於世好漸於風聲而有以知其然者非獨起敬於丹青之餘也朱秋厓像贊是為御史中丞秋厓朱公之像清真閒靖儼乎其儀脩正剛方卓乎其性早策名於彤廷旋敷宣乎民政出入中外敭歴臺省操靡効勤秉貞執勁雖齊政或過乎嚴而處心一出於正迨乎出鎮閩越聿樹風聲逺臨海嶠志清梟獍夫何譽者在前而議者在後事緒甫寧而此身已病間闗䟦涉惟在事行偃蹇﨑嶇竟以身殉惟重國以輕身亦守義而正命迺見之明迺志之定在公自以為徳之無慚而君子猶以為用之不盡也張曲江遺像贊是為唐相曲江張公之像憲副洛南陳君紹儒其鄉人也歆其名徳常挾以自隨比奉使吳門出以相示俾余為之贊於戲張公丰儀醖藉意氣崢嶸文章爾雅志節公清郊祀之疏早已占其卓識金鏡之録益以見其忠貞羞仙客為比惟其正識禄山之逆惟其明此所謂有唐之賢相此所謂南海之精英昔嘗閱其事業於編簡今獲瞻其風度於丹青是誠無媿為千古之名徳宜其為鄉後學之所儀刑也字辭三首王氏二子字辭王君清夫居金閶南濠之上地中囂㑹人習華詡利賄惟其常王君恬性文雅雖塵壒鞅掌而能收蓄古器物書畫以自適喜親賢人士夫與相過從為樂視他市人獨異也余間嘗過君君見其二子伯守仲寵秀頴好修器業並可觀竊嘆君之所為非獨可以潤身而所為沾溉其子者亦既可徵矣已而有司選士二子並以里儁補校官弟子貟於是以其父命詣余再拜請字惟古之冠者賔字之尊者祝之又或見於先生長者從而誨之若晉趙文子之於欒武子諸人是已今三加之禮已廢不行而命字之義固在或從而衍其字義為文而致之是猶祝辭之遺也然惟鄉長者與冠者之執友為宜顧余非其人則辭之踰年不得命其師沈明之余友也又從為之請乃即其名義訓之守之文從官從寸寸法度也所以執乎物也天下之事浩穰無極而理亦無極然有要焉得其要則治不得其要則廢寵之義為尊為居為愛為恩其訓則榮也上之所以榮我無間而吾所以迓承之者有勝有不勝而榮辱繫焉然有所謂不假寵以為榮者則人所自貴也是故守之要在約而人所自貴者孰愈於仁孟子曰守約而施博者善道也又曰仁則榮不仁則辱字守曰履約字寵曰履仁而申之以辭辭曰惟萬斯物厥理孔殷何以酬斯維兹一身身則匪勞事㒺弗克乃操之權乃履之實維天有樞維海有濤茍得其持靡逺弗操守約施博聖訓則明君子脩身天下攸平維人之身莫不有貴匪金而玉匪禄而位豈不榮斯寵之在人匪人則專繄命之存人之所榮人亦能辱惟仁自我履之而足君子履仁勿替允延以允以延有錫自天凡厥斯訓匪我伊詞軻書昭昭夫豈我欺式斯庸斯是在二子有攸惟中尚慎所履王錫麟字詞侍御王君敬止嘗被麟服之賜名其子為錫麟昭君恩也錫麟既冠余字之公振而申之以詞有姣維麟維獸之祥山川孕精靈圖煌煌化洽周南爰有麟趾孰其尸之振振公子振振公子瑞世如麟何以瑞斯信厚而仁麟之仁矣有趾弗履麟之厚矣有定弗抵維子有父維邦之瑞靡賢弗酬天恩斯賁賁恩如何煌煌麟服允昭厥徳亦仁其族匪族則仁賞延于世允言復始敬在小子吁嗟小子服此嘉名字之公振公族是徵公族振振如麟在囿如麟之仁如麟之厚厚則匪刻仁則匪虐可以人斯而弗麟若耶石氏三子字辭吳城石君宗大以髙貲推於里黨而朴茂愿謹有古孝弟力田之風晩始生子而連得三子長􅔩仲岳季巖韶秀朗徹並循飭向成而君愛之慈不忘訓乃􅔩之冠也因其師錢徳孚謁字於余且致其父之意乞言自朂余於是有以知君之能愛之也古者生子父名之賔字之又請於其父之執友而訓之其意皆有所重而余非其人也顧其意不可辭則為析其義而命之命􅔩曰民立遂亦命岳曰民望巖曰民瞻盖􅔩之訓獨有特立之義岳之訓宗有羣望之情巖之訓峻有瞻聳之勢因又廣三加之意祝之以辭辭曰有嶐者􅔩維山之竒既㧞有貞弗附而麗屹焉峙之矗焉植之君子攸行企其庶之企之維何有允斯立弗倚弗傾在心之執孑孑其持㟧㟧其嶷維立之竒維􅔩之師崧髙維岳維山之宗曰恒與岱泰室維中彼岳則崇曰維羣望何以企之有徳斯仰徳何崇斯弗以利卑弗以智私岳髙同歸徳之崇矣望之隆矣孰其庸矣維岳之宗矣巖巖者石赫其有瞻顒顒其人肅肅其嚴豈嚴則持曰身之示一或靡䖍百凡斯墜徳之墜矣事斯斁焉儀之忒矣民何則焉噫岳之顒惟徳之峻民之瞻之亦罔弗敬維立之持維望之嵬既瞻有威維衆山之儀維山有儀維人有徳峨峨葢髙脩罔弗克我作訓詞式徵厥父小子服斯以永有祜頌一首王武寧去思頌有叙余讀顧君志仁所為王武寧去思碑為之嘆曰王君其古之循吏耶何其得民之深耶或以碑所書皆為縣常事無他赫赫異政嗚呼此王君之所為不可及也古循吏莫盛於西京之世然考之正史皆無劇蹟可傳至書何武之事謂其所至無赫赫之名豈武為治皆茍簡因循無所建明而彼所謂循吏者豈皆無所事事耶惟夫濬徳淵㣲濳濡黙被出於至誠而泯於無迹受之者不能知而知之者亦不能為之辭也然則王君其真古之循吏哉君仕在𢎞治六年癸丒而碑建于嘉靖二年癸未相去三十有一年而民思之不忘則豈特既去思之而已哉此又以見君之徳澤深長而非茍焉圖塞目前之為也為之頌曰巖巖武寧維洪壯邑帶江襟湖民嚚以譎有賢令君脩正維祇展采錯事式貞以綏民役孔艱時予之毒我度我均如垢思沐或罹于辟維我有訾載讁用懲納于仁軌繄軌之脩範於四民迺教迺申迺興於文文教攸興亦有廥積豈富則儲于㐫之備有賢令君重食敬教凡斯有作去惡從好越禩三十民思靡忘何以永斯匪異伊常考古循政平易斯理赫赫何為君子攸耻有賢令君益逺維新尚千百年視此貞珉甫田集巻二十
