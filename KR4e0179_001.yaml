body:
  text: 明文徴明撰詩八十首附録四首秋夜忽忽故園夢悠悠滁上城一夜耳不息水邊踈柳聲開門月如畫十里秋盈盈中心亂無執散上岡頭行吳山望不際眼角柔雲生男兒志遺世物故難為情故園屋舍小山村終然思故園雨晴秋倚閣月出夜開門好景亦時改逺人空目存梅花未消息行矣晚何言有懷劉協中東風度幽館羣鳥相和鳴念子會無期茫然過清明春江芳草逺懷人心目驚如何多朋友我獨傍山城豈無樽酒歡亦有花木榮所憐異鄉物徒念心怔營白雲度水去日暮山縱橫倚闌詠修竹千里何當并答唐子畏夢余見寄之作故人別後千回夢想見詩中語笑譁自是多情能記憶春來何止到君家行色秋山馬前空復橫馬蹄不作看山行悠然回首何處所此心已到他州城火燈匆匆雞一聲貴賤富貧俱有程相看一語出不得細雨欲落空江明東葛城夜發蕭蕭東葛路馬上聽嚴更月出髙山黑天空逺水明年光秋漸索客子夜猶行村落知何處時聞犬吠聲至定山辱莊先生贈詩次韻奉答稚齒窮身豈有知偶陪髙論得移時感公不以愚頑棄顧我何堪逺大期草閣便須終歲住僕人休訝出山遲歸來乞得堯夫句暮雨秋燈不斷思定山莊先生贈詩附一燈何處寫相知對坐寒窗暮雨時詩本平生非杜甫琴才臨老遇鍾期儘堪出手名家早但覺忘年得友遲儻許無言真妙意欲將千載慰相思不寐孤坐忽不樂挑燈當我前素書橫几案欲讀已茫然當年念有負誓志軼前賢富貴亦何物未老已自憐嗟哉昔惡聞零落今同焉大雪不出偶成八韻自齊中所見外皆禁不犯靜坐朝慵出不知風雪臨凝暉上窗紙積冷到衣襟小片投墻隙餘威結研心聆音琤可喜想像浩難禁童子傳來看家人報說深卷書空自照杯酒不辭斟意賞何煩對傳聞不害吟未應閉戶臥不及放舟尋簡子畏落魄迂疏不事家郎君性氣屬豪華髙樓大呌秋觴月深幄微酣夜擁花坐令端人疑阮籍未宜文士目劉義只應郡郭聲名在門外時停長者車甲寅除夜雜書千門萬戶易桃符東舍西鄰送厯書二十五年如水去人生消得幾畨除多事關心偶不眠隨人也當守殘年不須更說新春事來嵗今宵在目前人家除夕正忙時我自挑燈揀舊詩莫笑書生太迂闊一年功課是文詞小童篝火潔門閭為說今年忌掃除却有窮愁與多病無因歲晚一般驅遙夜遲遲燭有花家人歡笑說年華人生勿苦求身外常得團圓有幾家崇義院雜題小院風清橘吐花墻隂微轉日斜斜午眠新覺書無味閒倚闌干嗽苦茶縹眇游絲墮不收悠然庭砌緑隂稠院凉僧少音聲絶時聽敲門亦自幽六月門前暑似炊殿堂深處未曾知晚凉浴罷思歸去更為松風佇少時殿閣微凉吹葛衣檻前梅子雨霏霏清談時有間僧對手擘棕櫚當麈揮白日悠悠抵歲遙困來書卷暫相拋馬蹄不到松隂下手弄殘棋獨自敲茗碗罏薰意有餘日長人散閉精廬俄然屋角凉風順吹起新蟬亂讀書繞寺松杉近百栽孤花明透緑叢開晚凉却扇池邊立嫋嫋餘芬度水來髹几新揩滑欲流時時弄筆小窗幽自憐多好還成纍揮汗為人寫扇頭修廊如洗斷塵囂白粉墻圍碧瓦寮擁鼻徐行成獨詠晚風吹亂石芭蕉飲子畏小樓今日解馳逐投閒傍髙廬君家在臯橋喧闐井市區何以掩市聲充樓古今書左陳四五冊右傾三兩壺我飲良有限伴子聊相娛與子故深密奔忙坐闊疏旬月一㑹面意勤情有餘蒼煙薄城首振袖復躊躇余畫金焦落照圖吳水部德徵先生寄詩二首題謝長句憶昨浮船下揚子平翻渺渺波千里何來雙島挾飛樓璀璨彤煌截濤起夕峯倒墮滿江隂霜樹高浮半空紫舟人指㸃落日處凌亂煙光射金綺平生快覩無此竒却恨歸帆北風駛至今偉蹟在胸中回首登臨心不已偶然興落尺紙間便欲平吞大江水固知心手不相能塗抹聊當臥遊爾晴窗舒卷日數回不敢示人聊自喜水部先生詩有名忽寄瑶篇重稱美漫云家法自湖州自愧區區何足齒由來題品係名聲何况先生是詩史君不見當年畫馬曹將軍附名甫集猶不死又不見閻公自謂起文儒池上俄蒙畫師耻人生固有幸不幸拙劣何堪古人擬江山千載等陳迹一笑寧須論非是水部二詩附戲拈秃筆寫金焦萬里青天見玉標未用按圖神已往耳邉似接海門潮閒寫金焦鎮海門夕陽孤鶩淡江痕一枝畫筆承傳久須信先生老可孫乙卯除夕糕果登盤酒薦椒笑歌聊用永今宵老親自喜還家健幼女仍誇學語嬌終歲悲歡言莫盡一燈團聚福難消桃符日厯年年好不謂青春却暗凋暮春髙榆風定翠相圍天氣悠揚思轉微畫閣凝香新試扇春肌生汗欲更衣乍聞幽鳥渾無見時墮游絲忽漫飛惆悵東闌尋曉夢落花芳草已都非靈巖山絶頂望太湖靈巖山正當胥口落日西南望太湖雙島如螺浮欲吐片帆和鳥去俱無閒論往事何能說不見髙人試一呼愼勿近前波浪恐大都竒絶在糢糊讀于肅愍旌功録有感南遷議起共倉皇一疏支傾萬弩强既以安危繫天下曾無羽翼悟君王莫嫌久假非真有祗覺中興未耿光淺薄晚生何敢異百年公論自難忘老臣自處危疑地天下遑遑尚握兵千載計功真足掩一時起事豈無名當時欲赦于王或謂不殺二人則今日之事為無名然則復辟之事豈無名哉未論時宰能生殺須信天王自聖明地下有知應不恨萬人爭看墓門旌因讀旌功録有感徐武功事固鎖髙垣事可吁更憑何罪易皇儲諸公方有同謀懼識者能無意外虞機㑹如斯何可失功名之際本難居寃哉一掬江湖血信史他年未必書冬夜讀書故書不厭百回讀病後惟應此味長千古精神如對越一燈風雨正相忘卷中求道深知謬意外圗名抑又荒束髮心情誰㑹得中宵撫几自茫茫寂夜一首效子建中宵聞零雨撫枕起躇踟昏釭栖素壁流熖照重幃感此寂無語戚然興我思我思何鬱伊欲舉棼如絲少壯不待老功名須及時男兒不仗劔亦須建雲旗三十尚隨人奚以操筆為文章可腴道曾不療寒饑仰屋愧浮塵俯睞影依依人生良有命何獨令心悲心悲髮為白失腳令身危欲為絶世行道逺恐不支世情忌檢飭斂目俟其疲誰能七尺身受此千變機役役亦徒爾多憂得無癡惟應愼厥躬古人以為期春閨緑隂生寂晝遲遲薄汗沾裳氣力微起傍曲闌垂手立清風細細落薔薇兒子晬日口占二絶句堂前笑展晬盤時漫說終身視一持我已蹉跎無復望試陳書卷卜吾兒吾家積德亦云稠不易生兒到嵗周印綬干戈非敢冀百年聊欲紹箕裘秋夜不寐有懷錢二孔周客散西堂夜悄然修筠凉吹供清眠踈螢紈扇秋無賴淺水紅蕖月可憐侍女銀杯搖雪乳誰家玉笛唱嬋姢意中憶得城東闕孤鶴翩翩骨有仙前年前年伴嫁南鄰妹今歲仍陪北舍姨老我無媒心獨苦閉門好畫入時睂詠堯民案上盆蘭崇蘭移自荆溪上小盎春深自著花賔客清閒塵土逺曉窗親沃案頭茶渺渺微風約珮環楚江清落研屏間美人不見瑶琴歇一卷離騷對掩關詠文信國事四首地轉天旋事不同老臣臨市自從容誓將西嶺填東海忍著南冠向北風千里勤王空赴義百年養士獨收功人間別有成仁樂未用區區悼此公倉卒勤王萬里身風塵顚倒作纍臣三綱已去嗟何補一死臨期認自真直以安危繫天下未宜成敗論斯人遺文尚可誅姦賊何但悲辛泣鬼神國勢已離天命去孤臣狼狽阻殘兵分當如此餘非計事訖無成死有名平日公卿咸肉食千年忠義屬書生天心悔禍寧無日惜不令公見肅清南北間關百戰餘此身宗社許馳驅可憐功業惟詩在自决存亡與國俱强敵至殘猶歎服皇天無意竟何如平生心事堪誰訴漫托他年半紙書枕上聞雨有懷宜興杭道卿時道卿客唐子畏西樓三更風雨閙虛簷燈熖寥寥抱枕眠應有旅遊人不寐淒凉莫到小樓前崖山大忠祠鼎湖龍逺野雲隂慷慨中流誓國心臣力不支香氣竭忠魂有限海波深百年仁義空澌盡此日神州遂陸沉峻節竒功磨不得崖山突兀自千尋皇天不祐宰臣謀萬里樓船一浪休飄蕩已知吾事去覆亡安用此身浮祗今潮自如期至終古江應不盡流折㦸併銷塵海換行人猶自說碙州頻年航海欲何為天厭中原遂不支滿地江湖無死所際天風浪有平時倉皇一念聊臣分寂寞中流賴史知回首又看强敵滅寒潮自繞大忠祠千載英雄餘恨在怒濤驚浪日摏撞有天肯與仇同戴無面能看主再降烈士深悲甘蹈海中原不復竟如江君王莫罪風波惡應是憸人解覆邦追和倪元鎮先生江南春象牀凝寒照藍筍碧幌蘭溫瑶鴨靜東風吹夢曉無蹤起來自覔驚鴻影彤簾霏霏宿餘冷日出鶯花春萬井莫怪啼痕栖素巾明朝紅嫣鏖作塵春日遲遲春波急曉紅啼春香霧濕青華一失不再及飛絲縈空眼花碧樓前柳色迷城邑柳外東風馬嘶立水中荇帶牽柔萍人生多情亦多營雪後寒日晶晶曉溜聲中庭快雪一宵晴墻西老樹太骨立窗裏幽人殊眼明想見漁蓑無限好怪來詩思不勝清江南殘臘相將盡㑹看門前春水生與邢麗文登葑門城樓天風異制木蛇空雉堞差差夕照中百里山川形勝舊萬家煙火歲年豐迤南茂苑迷陳迹直北荒原識故宫㑹取千年興廢理與君極目送飛鴻夜坐聞雨有懷子畏次韻奉簡臯橋南畔唐居士一榻秋風擁病眠用世已銷橫槊氣謀身未辦買山錢鏡中顧影鸞空舞櫪下長鳴驥自憐正是憶君無奈冷蕭然寒雨落窗前歲暮齊居即事簷樹扶疏帶亂鴉蕭齊只似野人家紙窗獵獵風生竹土盎浮浮火宿茶日色射雲時弄彩雨絲吹雪不成花庭中卉物凋零盡獨有蒼松領嵗華陋巷蕭條少過從燕閒真味泊然空荒雞寂晝深庭院寒雀西風小樹藂撫事蹉跎歲云暮懷人牢落雨其濛罏香欲歇茶杯覆詠得梅花苦未工過吉祥寺追和故友劉協中遺詩殿堂深寂竹林閒坐戀棕隂忘卻還水竹悠然有遐想㑹心何必在空山塵蹤俗面强追閒慚愧空門數往還不見故人空約在黃梅雨暗郭西山協中詩附城裏幽棲古寺閒相依半日便思還汗衣未了奔馳債便是逢僧怕問山景德寺古屋無人犬護籬偶拋塵土得幽棲不知何福能消受滿地松隂一鳥啼次韻題子畏所畫黃茆小景斜日翻波山倒浸晚晴幻出西南勝絶島雙螺樹色浮遙天一線鷗飛剩誰剪吳淞尺紙間唐君胸有洞庭山古藤危磴黃茆渚細草荒宮消夏灣我生無緣空夢墮三十年來蟻旋磨睡起窗前展畫看恍然垂手磯頭坐湖山宜雨亦宜晴春色蘢葱秋月明知君作畫不是畫分明詩境但無聲古稱詩畫無彼此以口傳心還應指從君欲下一轉語何人㑹吸西江水吳隱之畫像貪廉自我非泉致刺史詩篇萬古新展卷蕭然袍笏在世間多少負慚人十年遺像識真難重是髙風不可刋一樣廣州俱刺史幾人傳入畫圗看暮春齊居即事經旬寡人事蹤跡小窗前暝色連殘雨春寒宿野煙茗杯眠起味書卷靜中緣零落梅花瘦風吹更可憐閒庭青草積春半思蒼茫小雨作寒食微風泛海棠芳情經病減白日廢書長何物供欹枕縈簾一炷香畫鵲日光浮喜動簷楹鳥鵲於人亦有情小雨初收風潑潑亂飛叢竹送歡聲畫烏城頭霜落月離離匝樹羣烏欲定時㑹有人占丈人屋微風莫自裊空枝與逵甫燕坐小齊為寫竹石對坐焚香習燕清好風如水泛簾旌夕陽忽見疏疏影落木空江生遠情秋夜懷昌國初秋雨時霽夕景斂炎疴躡屐遵廣除矯首睇明河白露浣衣帶商颷振庭柯縞月升雲闕照我東墻阿故人不得將良夜空婆娑非無一樽酒顧影當奈何陰蟲抱莎啼秋風在庭戶微凉逗短葛月出照團露驚禽飛漠漠顧見庭中樹柔枝日以疏安得共遲暮人生豈獨堅坐閲衡杓度憂來搔短髮衰薄已堪數除夕梅花欲動意婆娑雪霰侵陵奈歲何呵凍笑供春帖子殘年清債已無多辟瘟細細爇靈丹坐倚寒檠向夜䦨臘意亦知人戀歲為留殘雪隔年看題王侍御敬止所藏仲穆馬圗犖犖才情與世踈等閒零落傍江湖不應泛駕終難用閒看王孫駿馬圗洞庭東山詩七首太湖沙渚依依雲不動風煙漠漠鳥飛回橫空暝色翻波去絶島秋聲繞樹來今古奔騰疑地盡東南偉麗自天開眼中浩蕩扁舟在欲喚鴟夷酹一杯百街嶺遙街百磴轉嶔崎落日扶輿下嶺遲與樹蔽虧湖冉冉因山髙下屋纍纍儉勤成俗從知富靈秀鍾人信有竒十載一行殊恨晚分金不見橘黃時宿靜觀樓守溪先生作記抱被何緣三宿戀燒燈一笑兩人俱秋山破夢風生樹夜水明樓月在湖盡占物華知地勝時聞人語覺村孤不煩詩句追清賞太史􅎝間記是闍游能仁彌勒鬱然臺殿鎖芙蓉見客山僧自打鐘小檻浮空秋水閣虛庭隨影夕陽松泗州名在池無塔寺有泗州池能照僧伽塔今廢飯石師歸寺有峯飯石禪師嘗住此寺有飯石峯欲掃南墻留半偈白雲回首愧塵蹤宿靈源寺夜隨鐘梵入靈源一笑虛堂解帶眠旋接僧談多舊識偶依禪榻豈前緣離離松檜搖山月兀兀樓臺宿暝煙塵句何年傳到此壁間有佘詩篝燈試讀已茫然翠峯寺雪竇禪師道場中有降龍井悟道泉空翠夾輿松十里斷碑橫路寺千年遺蹤見說降龍井裹茗來嘗悟道泉伏臘滿山收橘柚蒲圑倚戶泊雲煙書生分願無過此悔不曽參雪竇禪游洞庭將歸再賦城中遙指一螺蒼到此依然自一鄉曉鼓隔溪漁作市魚舟至則鳴鼓聚人秋風吹枳橘連墻名山更倚湖增勝清賞剛臨月有光正爾㑹心空又去不如僧住竹間房再和昌國游洞庭西山詩八首自胥口入太湖蒹葭繚繞帶胥塘百里沿洄笠澤長新水浮天舟浩蕩遠山沉日樹蒼凉風煙西去堪乘興雞犬中流别有鄉詠得鱸肥人膾玉自敲漁榜答滄浪縹眇峯剃草遙遵鹿兔蹤飛嵐拂袖映疏松平湖萬頃玻璃色落日千尋縹眇峯煙樹吳都晴上掌秋風雲夢晚填胸無煩咋指傷韓愈儘有閒情在短笻下縹眇峯小憩西湖寺回嶺懸藤稍倦攀稅鞍中路得禪關百年清淨山中債半日浮生竹院閒小雨磬聲延午夢方池雲影淡秋顔此行别有堪誇事得與髙僧共往還經桃花塢塢名雖存已廢夕陽下馬桃花塢不見桃花塢亦蓁溪壑春風空舊夢柴扉流水或秦人圗經可按桑田異詩客多情燕麥新不用苦辛仍買種梁園金谷總成塵左神洞裹粱懷炬探幽𤣥稍即唅呀復曠然蕩潏微聞頭上浪光晶别有地中天千年何物扃丹刻相傳有神禹丹書在洞一勺憐君負紫泉內有紫泉飲之長生莫嘆虛酬十年願秪應凡骨未能仙左神道中玉虛靈府千年祕恣討知君眼境新平日登髙推短賦西來濟勝有輕身湖山四面天開寺橘柚千家土著民他日菟裘如有意願㩦書册作比鄰謁毛公壇雨不果行擬攀棲迹拜靈仙辛苦佳期一雨愆短策空多探古興方壇剛缺訪真緣興懷丹篆愁雲外敗意簷聲客枕前賴是勝情初未減錦囊添得卧遊篇遊資慶寺老衲深居湖上山松扉斜掩磬聲寒袈裟對客妨秋定蔬筍開厨破晚餐未愧逡巡留偈子自緣疏野戀蒲團歸來煙月篇章富乞與幽人得細看何蓑衣故跡塵世神仙事渺茫緑蓑誰識老佯狂華夷日月尋常語掉首當年動帝王福壽院殘碑秋風塵劫草離離曾是前元福壽基願力未隨文字滅有人下馬讀殘碑甫田集卷一
