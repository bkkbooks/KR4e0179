body:
  text: 甫田集卷十四明文徵明撰詩四十八首人日直夫東園小集雪後江梅燦玉英蕭然人日半隂晴雜占誰問東方朔妙思空懷薛道衡綵勝千年傳故事菜盤七種薦春羔白頭不落山林事又向名園聽早鶯立春雪消紅日麗中天喜見鞭春在臘前次第三陽開景運尚餘八日是殘年梅花消息嚴寒後綵勝情懷薄酒邊辦取物華供帖子暖痕浮緑草生煙玉蘭花綽約新籹玉有輝素娥千隊雪成圍我知姑射真仙子天遣霓裳試羽衣影落空階初月冷香生别院晚風微玉環飛燕元相敵笑比江梅不恨肥張夏山挽詞憶隨仙侣仕瑶京幾度朝回並馬行回首舊遊成大夢燕山吳水不勝情出守毗陵歲再更我時吳苑亦歸耕相逢相别多惆悵何况泉臺隔死生春風陽羡百花明携手張公洞裏行二十年來誰在者白頭揮淚讀題名三年常守念孤窮教養雍容有古風為理無名百年賦至今赤子頌張公驄馬使君前建守仁恩十載兩回施武夷山下棠千樹盡是張公去後思參藩江右寄旬宣一道清風萬口傳底事讒言能亂國又將書劒下西川西川戡難策勳名信是胸中有甲兵才大恨無施用地西風吹淚錦官城扁舟北上又新除别我吳門意有餘豈謂間關魂獨返傷心空讀寄來書記得相逢十載前我時白髮子青年却憐後事翻多恨寒月淒風倍黯然夏王山下月離離宰樹驚風不盡思惆悵高人埋玉地何人為寫墓前碑春歸三月春光積漸微不須風雨也應歸與人又作經年别回首空驚昨夢非江燕引雛芳草滿林鶯出谷杏花稀沈郎别有傷情地不為題詩減帶圍題漁隱圖江南雨收春栁緑碧烟斂盡春江曲十里蒲芽斷渚香千尺桃花春水足溪翁鎮日臨清渠坐弄長竿不為魚太平物色不到此安知不是嚴光徒右春江頭夏雨十尺强晚波搖日空江涼遊魚瀺灂樂深藪不謂人間有漁笱笱得江魚不稅官自食自漁終歲歡輸租轉賦世途惡漁家自得江湖樂右夏漁翁老去頭如雪短笠輕簑舟一葉百頃魚蝦足歲租十隻鸕鷀是家業橫笛朝衝栁外風浩歌夜弄波心月不嫌湖上有風波世路風波今更多右秋煙沉風緊鳴蕭蓼江湖歲晚𤣥冥肅寒塘日出曉光浮村甕茅柴酒初熟網得氷鱗不入城自漉瓦盆招近局欸乃一聲煙水長葦深江靜燃湘竹右冬阻風宿九里湖雲沍長空斷鴈呼水聲摧岸雜風蒲扁舟卧聽三更雨一葦難航九里湖繞榻波濤歸夢短隔林煙火逺村孤人生何必江山險咫尺離家即畏途梁溪道中夜行雨餘新水漫風外一帆輕山繞湖南去人從畫裏行天空雲樹渺月出暮潮平煙靄知何處漁歌時一聲辛亥除夕守歲坐戀殘年漫有情夜堂燒燭待天明不愁老大無同輩祇覺聰明愧後生得歲笑看新舊厯無眠厭聽短長更香消酒冷人初靜忽報晨雞第一聲壬子元旦飲毛石屋家觀郡邑迎春蓋明日立春也次東坡韻昨夕今朝迹已陳頭顱種種歲華新土牛郭外才驅厲綵燕筵前已得春對酒不應談世事賞心剛喜及良辰坐中潦倒誰應甚老我頽然第一人新夏暖風庭院草生香晴日簾櫳燕子忙白髮不嫌春事去緑隂自喜夏堂涼閒心對酒從時換老倦拋書覺晝長客有相過同一笑竹罏吹火試旗鎗袁魯仲邀豫登列岫樓豫自胥臺沒數年不登矣故人湖上有髙樓十載清樽續舊遊飛翠忩中仍列岫片帆天際見歸舟依然緑樹啼黃鳥無賴青山笑白頭不盡阿戎淹戀意渚雲江草兩悠悠是晚過行春橋玩月再賦行春橋上月姢姢杜若洲西宿畫船萬鏡不波天在水四山沉影夜如年已知世事皆身外肯著閒愁到酒邊宛轉清歌出林表晚煙依約正蒼然虎丘觀雨海湧春嵐濕翠鬟生公臺下雨漫漫風回隂壑奔泉黑雲鎖蒼池劒氣寒淨洗塵氛開絶境不妨煙靄是奇觀詩人自得空濛趣悟石軒前獨倚闌送族弟彥端還衡山彥字諸孫端甫良秋風訪族自衡陽百年文物家聲在纍葉松楸世澤長君視前人應不忝我於同姓自難忘不堪相見還相别楚水吳山意渺茫舊送彥仁一首追録於此南望衡陽舊德門虎符元帥有諸孫山川我正懷桑梓水木君能念本原兩地衣冠曾不乏百年忠孝至今存相違不盡相留意狼籍秋風酒滿樽寄顧橫涇我别橫經三十年同遊都盡獨巍然淵明誰送東籬酒季子原無負郭田貧病豈知翻益壽聰明莫道不如前相思相見知何地夢破秦淮月滿川寄許仲貽問訊幽人白下蹤若為清世不相容幾回對月思𤣥度安得披雲見士龍落日橫塘折楊栁秋風南浦夢芙蓉相思滿目煙波逺吟到新詩手自封題吳雪洲磨崖神異卷齊雲西來巖壁立天削芙蓉千仞碧誰能題字碧雲端吳生袖有如椽筆蟠金屈鐵紛琳琅天門慌忽蛟龍翔夢中神授若有得覺來信手筆已忘二句坡詩也坡翁此詩信奇絶千年似為吳生設老夫拈筆贈吳生一笑千峯秋月明九日雨中虎丘悟石軒燕集何處登髙寫壯懷生公說法有層臺漫修故事擕壺上不負良辰冒雨來應節紫萸聊共把待霜黃菊故遲開白頭八十三重九竹院浮生又一回素髮素髮絲絲不滿梳衰容覽鏡已非吾蕭條暮景看籬菊次第秋風到井梧物外機心聊奕㫖老來多事坐詩逋秪應雙足能强健著屐登山未要扶壬子歲除殘燈明滅照頭顱八十三齡過隙虛一歲又從今夕盡餘生消得幾番除老知無地酬君寵貧喜傳家有父書獨有梅花堪慰藉春風消息定何如癸丑元旦咿喔鄰雞過短垣起看曙色拂塵冠升平滿目新頒朔日月無窮又履端短髮蕭踈霜葉脫壯心零落曉燈殘從前卉物冰霜盡一樹梅花獨耐寒夜泊南潯春寒漠漠擁重裘燈火南潯夜泊舟風勢北來疑雨至波光南望接天流百年雲水原無定一笑江湖本浪遊賴是故人同旅宿清樽相對散牢愁晚泊楊莊碧雲微斂四山蒼晚泊孤舟對夕陽店舍寂寥斜帶水人家籬落盡栽桑風煙入望知何處雞犬相聞自一鄉正自旅懷眠不得數聲漁唱起滄浪寄胡柏泉當日籌邊事最更曾看疏草識髙名旋收書札渾如面未及交歡已有情塞上底須論馬失周南空復著書成遙知西澗春潮急野渡孤舟盡日橫南樓狂搔白髮倚南樓落日邊聲入暮愁萬里長風誰破浪一時滄海遂橫流敢言多壘非吾恥空復崩天負杞憂安得甘霖洗兵馬浮雲明滅思悠悠送袁裕春僉憲之建寧拾遺省闥歲才更忽領行臺撫建寧喜見勝之持使節却教汲黯去朝廷民情有待隨車雨天漢先瞻執法星雅志髙懷何處寫武夷山有晦翁亭秋夜四壁鳴蛩露下餘片雲收雨酒醒初風撩墜葉秋聲早月印空庭夜色虛衰病不禁時敘改蕭閒自與世情踈若為白首安眠地時有驚塵報羽書九日遊雙塔院次淵明已酉九日韻時敘不容淹忽忽寒暑交矧余蒲栁姿望秋已先凋山林樂閒曠勢途利崇髙人性各有適奚但壤與霄爰以一日歡酬此卒歲勞古來明哲士取材不遺焦銜觴輒忘世何似栗里陶得酒且復樂安能待來朝十日遊治平寺再疊前韻季秋氣未肅鳴禽尚交交澄空霜華薄木葉不盡雕撫輿陟前岡不覺身已高回視平湖東逸峯聳晴霄但欣雙目明寧辭一身勞物理㑹有窮何以心煩焦世情共擾擾吾樂方陶陶逹人悟遷化千載猶一朝自華亭還吳夜泊磧礇放棹華亭指故園九峯晴色接吳門秋風沽酒唐行市斜日維舟磧礇村墟落風煙沙漵口人家燈火竹籬根機雲踪跡今何處一望岑山一斷魂送何元朗南京孔目一命周行列鎬京閒官剛喜玉堂清紫薇蘭省聊通籍緑水紅蓮亦宦情爽氣鍾山秋拄笏春風鰲禁曉聞鶯白頭老友難為别飛夢先馳建業城寄何叔毗禮部為愛君家好弟兄列官同在鳯凰城遲遲宫漏薇垣靜浥浥罏香畫省清風雨夜堂聮榻處池塘春草看詩成相逢相别還相憶白髮江湖無限情維亭夜泊孤篷燈火宿維亭宿酒微消夢不成人語煙中江月墮舟橫渡口夜潮生閒情歲月都無迹舊歷村墟尚有情四野孤霜菰葉冷時聞沙上水禽聲除夕白髮婆娑夜不眠孫曾繞膝更翩蹮已知明旦非今日不覺殘齡又一年舊事悲歡燈影裏春風消息酒杯前更䦨人靜雞聲起却對梅花一燦然甫田集卷十四
