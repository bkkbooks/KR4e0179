body:
  text: 甫田集卷十六明文徵明撰敘十三首送周君還吉水敘故工部尚書周文襄公撫循江南大有功德於民去之五十年為𢎞治己未有詔以公與故户部尚書夏忠靖公並祠於吳從有司之請以慰答吳民之願思也明年廟成廟有像設而公去吳久蔑所擬似於是公之孫廷器自吉水以公畫像來訖事乃去吳之老長先生以吳人幸於奉公顔色而喜廷器君之來也謂其歸不可無言猥以屬某某之生在公去吳二十年之後然習聞遺德宛猶瞻承有不容已於言者方宣德之初當朝家多事之後公私弊極公以幹運之材撡富民之術以拓賦財之源博收衆議首勤民隱劭農振業歲亦比登民樂於所入而不知苦其出上享其用下茹其澤者二十有二年徵公之績法得祀久矣顧方相安於無事而事之成固亦有俟於論之定也是故公在而樂既去而思思久而不能忘越五十年而卒用食其報於吳此固無傷於緩而益有以見公之德澤深長非茍焉圖塞目前之為也竊惟東南賦財之㑹百需出焉不培其根而日竭其出出倍而末亦益瘁矣方公未至之先有司誅求不少㢮而積逋至八百萬公既損民常出而官復羡贏此雖公之才局去人逺甚而其理亦豈不有可推者哉今聖天子不違民思以昭厥勳誠不能無所望於後之人也惟公恩澤繫民心功業在史官而血食之詳當有記廟之成者余特敘其槩以榮君之行亦聊以寄吳人之思云爾僉憲伊先生感事詩序僉憲伊先生侍其家君承德公之居吳門也某以里中契家子獲從容侍杖屨先生為言先朝拔擢之恩與先夫人子育之德輒慷慨流涕如不能已他日示某三詩則感事之作也先生成化末自蜀臬入賀萬夀節屬龍馭升遐弗獲成禮為二韻詩二章先是以刑曹郎推恩褒録其親而母氏遺榮久龍章賁於藏丘為四韻詩一章還吳來十又四年而遺弓之痛罔極之情不少置至是出其詩屬交遊諸公和之而命序於某某小子何用知此受簡纍年未有所復顧其意不可虛辱也則為之序曰忠孝天下之大間也然非有出於尋常日用之外顧其事有本末而人道之所為盡與否存焉是故厄窮顛頓不能自見於世者常患不獲申其志而一豢於富貴狎於恩私則或犯名廢義而併其所學焉負之至於事變恩移不能無悲摧感蹙之情其事足慨也而君子乃有取於先生以為得忠孝之理焉夫豈以其悲摧感蹙以為難哉先生以進士髙科踐揚中外為明執法為良監司道究當時譽聞敷於上下而寵被於君私又得以顯光其親雖其所學所養有以迓承之而遭罹昌㑹獨非君親之賜乎顧吾所以復之者方永而遽絶欲用其情而無所於施其悲摧感蹙當有甚於不幸而不得志者其何能已於言邪此先生之詩之所為作也讀其詩知其不忘於逺而極其情為能不負於所事夫仕而不負於所事而又不忘於逺雖古聖賢之事無出此者而余顧謂無難焉何哉夫其始也不出於厄窮顛頓而卒又能不辱其身以及其親是其見於行事者既已卓然名世使無是詩固不得少其忠孝之名也而是詩之發實又至誠惻怛而出於不能自已之中然則何難哉夫惟其不難也而後知其本於尋常日用為能得忠孝之實焉悲摧感蹙果足以盡先生哉先生名乘字德載其先有尚寶卿恆工科給事中侃皆名臣先生其世濟忠賢者歟送侍御王君左遷上杭丞敘國朝以仁厚立業更纍朝列聖綱維綜核之餘誕章丕緒深密完固殆無可施力而士之用世亦惟持重博大為宜或稍出亷隅有所建畫往往得喜事狥名之謗及今百餘年所以消沮浮薄崇長忠厚誠不為無益也而其間固亦有幸於無事以自蓋其瘝曠之愆者矣蓋遄耍蓄朒謂惟因循自恕足取持重博大之名嗚呼古之所謂持重博大固如是哉往歲先君以書問士於檢討南屏潘公公報曰有王君敬止者奇士也是故吳人他日還吳某以潘公之故獲締好焉及君以行人遷監察御史先君謂某曰王君有志用世其不能免乎乃𢎞治庚戌君以事下詔獄鐫兩階左除福建上杭丞始君按遼陽明法守軌多所緒正用事者不便為飛語中君而其徒有氣力者又從中醖釀之而君遂得罪去議者謂君不自省約以斂怨時人迄抵禍敗或又謂君感槩激昻不能俯仰其得罪固宜而亦其所樂受凡此皆非所以論君也君以聖天子耳目之臣奉使邊檄其任不為不重而遼陽國家要害不得不慎茍為避喜事之名因循自恕以僥幸塞責則循習之弊將久而益滋而一旦事出非料則其禍之所遺豈獨一身一家而已哉故操切屏捍惟法之循至於得罪以去固非所樂而實亦所不暇計其心誠不欲以一身之故而遺天下之憂若君者今之所謂喜事狥名而古之所謂持重博大者歟此潘公之所謂奇士而先君之所為嘆其不免也君將赴上杭取道還吳吳摓掖之士聚詩為贈而推叙於某因敘君之所以得罪之故而復推本其所存如此雖然天下之事尚有大於此者君當無以是自懲靖海頌言叙正德改元之祀侍御曾公以簡命按蘇蘇屬邑崇明治東海中其民素獷健梗治先是豪民施天泰爭魚葦之利噪於海濵有詔徙其家逺州其黨鈕東山者潰歸逸於海復嘯其徒為亂出沒鹵掠民不勝擾於是瀕海諸邑復大震有司以聞詔發諸路兵討之而公與今中丞艾公實領其事夏四月首事徂秋八月竟扼賊而殲之降其脅從俘其老弱而四民用寧方賊之猖獗也郡郭亦警及是解嚴士民歡曰凡所以惠安我民以保生聚得不及於難者皆侍御公之力侍御公實生我民其曷以報乃相率為詩詠歌其事而屬序於余竊惟天下之事不可常而人之才貴乎養之有其素今夫銜一命寄一方孰不幸其無事也而事變之來或出於意料之外彼齷齪遄耎往往避事而害成而好為不靖者又或挾之以僥幸於一擲以為功名之㑹此其人皆以身為計者卒之亦不能辦其身而民用受其辜焉侍御公之來當夫承平百年之餘而蘇又在畿輔之內豈常有意於變哉而卒然遇之有不易於為計者而公處之無難焉方師之興餉給浩瀼文檄旁午凡審勢相方部分調發莫不於公之出人皆訝其不素而克而不知其所已試於為邑者既嘗驗矣蓋公初以進士宰定逺適妖賊搆亂勢張甚公設奇禦之用全其城今悉數郡之衆以當區區竊發之徒固已優為之矣是豈僥幸於一擲者哉公之出按也以志計銷頑梗以德惠撫疲癃仁威並著吏畏民懷庶政之舉不可殫述兹特著其平寇之一事云爾送劉君元瑞守西安叙正德戊辰金陵劉君元瑞以刑部屬出守紹興尋以先事忤權幸罷自被命至去郡為日僅五十有六然而紹興之人惜其去如失慈母父老子弟奔走追餞爭致餽遺君悉麾去無所取乃相率飾祠廟肖君像事之於是劉君之名一日聞天下庚午更化悉起前時被斥之人首擢君知西安府君初罷官貧不能歸迤邐至吳興吾友吳君汝琇客之至是汝琇與郡摓掖士聚詩為君贈不逺百里走吳中乞余敘其事余惟劉君奇才雋望遭罹盛㑹當有名公碩儒道譽揚榷而何以余言為哉汝琇曰此劉君之意也雖然古之人贈人以言得其善則稱知其過則規余於劉君何居曰劉君不走求王公貴人而必子焉是徵其意非直以譽而已嗚呼此劉君之所為異於人而一郡有不足言也夫君以兩月之政而能歸乎數十萬户之人以聳動乎天下雖天下之人莫不以劉君為不可幾及也而君顧不以自足若有望焉誠以事變之來靡有窮既而隆譽之下讒毁攸基方其去紹興也天下之人想聞其風采莫不欲以為郡以為猶紹興也然而風土有遐邇事緒有順逆而人心有從違君自視於此果能皆副其意乎一有不獲則舉向之所有而盡廢之加疵焉是故以黃次公之良天下習其名人主欽其節而卒之不能周旋於末路夫豈其後之所為真有忝乎哉良以望之者厚也望之也厚則其責之也深顧兹藐焉而人之望之若此其責之若彼則亦豈易為酬哉君不以人所不可及者自多而以所不易為者自力則其所至獨可以收譽於一郡而止邪始君之罷也間關羈逆人將不堪其憂而君蕭然自得方益進於學圖史筆硯若將終其身一旦起自閒廢寵以壯郡莫不為君喜也而君方有懼焉此其中豈無所見哉往余嘗從人聞君紹興之政而吾友陳君魯南王君欽佩顧君華玉君鄉人也又為余道君文學制行之詳竊慕之其居吳興距吳門數舍而近雖不及接話言而相聞為稔故於君之行也不嫌於規送提學副使莆田陳公叙正德壬申之秋詔嘉興守莆陽陳公為山東按察副使領提學事先是𢎞治中公以監察御史視學南畿振德警愚軒輊惟允數年之中士修名行而文以丕顯朝野翕然稱之謂公之道化流行得古人表帥之義未幾逆竪盜權謀亂庶政天子惑之公上疏極諫遂以得罪鐫兩階左遷潮之揭陽丞朝野又翕然稱之謂公之風采磊落有古人正諫之風及朝廷更化同事者往往內補而公稍起倅嘉興尋以為守於是朝野之人莫不惜之以為公之賢明宏逹宜在師資之地守振肅之職而顧浮沉常調不亦負乎此固天下之公言而某則以為世俗之見耳非所以論公也比公雖官御史而奉使於外非在得言之地可以不言而言之兾有以行之耳得罪去國豈其志乎夫既已得罪則投竄摧辱有所不辭又奚班資之計耶茍計於是則患失之心惟日不足充位固恩齪齪自守又甚而敗名棄節以獵華要髙爵厚祿垂手可得舍是弗圖而區區於外內升沉之間雖愚人不為也而公豈為是哉惟其無心於是是能效忠輸誠慨慷激發得以行其志而成其名視彼僥幸恩私以徼榮一時者涕唾之不若也又足以辱公乎哉而天定理還事不終敝所謂高爵厚祿卒以畀之此雖理所必至而事有不盡然者則幸不幸存焉幸而得之於公為無負不幸失之則其所為髙一世而望天下者固在也公又何愧乎夫公不圖世之無負於我而求有以無愧於世充是心也蓋有無入而不自得者雖宰天下可也一方視學之寄果足為公重輕哉雖然自公為丞而倅而守天下之人想聞其風采蓋莫不願為之奔走也而魯獨得之經天下者殆有意乎何者魯為聖人首化之地比歲盜賊殘毁瘡痍特甚非仁明愷悌以斯道為任者固不能撫摩而振起之也公行矣濟溺起衰將為天下先也某以諸生辱公國士之知十年於此潦倒無成方懼為門墻之羞而公眷存不已今兹由浙而魯得再見於吳門因獻是言而必以天下望之者固天下之論也送開封守顧君左遷全州敘余友顧君華玉少負才雋以文學聞於時筮仕宰廣平又以吏能聞升朝為郎以清强聞及守開封綏懷得情剸裁靡窒而其聲聞益閎以達余交其人久竊嘗考其所為而得其所存蓋天下士也或從毁之數其隱過不遺餘力余始駭歎考其所為與察其所存無或異也正德癸酉君得罪中官逮赴詔獄一時人莫不危君而余竊為君喜已而君竟被罪鐫三階左除廣西之全州余乃益信余之所見不妄而君之事誠有人所不可及者蓋人之所為誘於外者不能堅其中而順於道者未始計其外使君而能周於外以獵譽於時人則譽日益至毁亦從之身躋膴仕而道斯詘矣君子求信於道而不必崇其身寧失時名而不受識者之毁言考君之所為得罪果以其道歟抑不以其道歟必有識之真而辨之得其實者毁若譽於是乎在而向之毁之者安知其不愧而為譽乎夫始之毁之不遺餘力將以敗其行也卒之無益於敗而反以譽焉至其得罪而去人方危之而余竊以為喜若是則譽毁榮辱皆不足以論君而所謂文學吏治足以盡君乎哉然余卒以天下士韙之亦求其所存而已君故吳人而家金陵及是便道過家上冢以行余得合諸友賦古律詩八首為餞敘其首送崇明尹吳君赴召叙崇明為蘇屬邑治大海中僅若一島故雖稱內服而不得與列邑比其官府制度賦出章程視列邑率損十九然其民獷健易動又其地有魚鹽之利易爭以擾而與戍兵雜處一失撫寧輒梟獍以逆故其令長必循良重厚為宜而仕者往往不願得之或得焉憂畏忿懟同於投竄一日代去輒喜如釋所負蓋其心鄙夷其民不屑與理而恆傳舍視之噫亦過矣臨川吳君之為是邑也值邑豪施氏俶擾之後痏痍潰竭公私頽敝而遺孽方潛禍未巳君爬疏剔抉隨事經理而誠心撫循之邑用大治逋蕩消弭無釁以發久而民益附以信未幾有游寇之警君益料簡民兵繕治干櫓甫集而寇至以有備得弗擾及是被徵且行為余道邑中事歷歷謂茍嗣得其人可以永理無患不然更兩年敝矣蓋苛條煩獄與夫鋭事徼名之為皆足以尸之而其憂方深也若是豈獨崇明之人不能釋君而君之心殆不欲遽遺其民而去之也君為崇明四年而厭難折衝恆居六七此人情所不屑所謂憂畏忿懟同於投竄者而君安焉既釋而去孰不幸喜顧獨置憂不已此其心豈以崇庳近逺為念而區區官爵烏足以易其愛民之心哉以愛民為心則政必出於實而不以崇庳為念則所職為易修操履實之政而供易修之職焉往而不得治哉易外而內去州縣而即省臺固不足為君喜而亦不足為君慮也送嘉定尹王君赴召叙國家之制特重臺臣而其任也往往選於有司之良惟其職與民親而所理錢榖獄訟與夫簿書期㑹皆官常所急既久而習可以推衍宏致故其授不得不重而於其中尤重進士之科然其位下且逺視京朝官尊重不啻什伯進士入官或厭棄不屑而得之者庸庸循守以基歲月甫三朞而已束裝俟徵矣視其民曾傳舍之不若而民之視之亦若過客去來漠然無所與者嗚呼國家之所為重臺臣之選而必有待於有司者其意固如是哉四明王君以戊辰進士出知蘇之嘉定歷歲甲戌始以御史徵而嘉定之民重惜其去顧其勢不可留則謀所以繫君之思而耆民劉璹氏從余乞言余於君有雅故固嘗重其為人而於其去嘉定而就徵也加重焉蓋君自戊辰入官抵今六七閲歲茍能規隨趨辨以釣聲名以承上官之意則君內徙久矣萬一前此徙而去也不知嘉定之民所為戀惜君者視今日何如也古之仕者重久任而下聲名蓋任不久則澤不流而聲名盛則誠或不至而民受其敝故余不惜其徙官之獨後而獨幸其得民之久且深也於此有以知君之所存能以民事為急以久逺為計而非茍焉圖塞目前之為也若夫錢榖獄訟簿書期㑹與夫官常所急乃所深習而練焉而朝廷所為重臺臣之選必有待於良有司者君庶幾其無負哉送提學黃公叙國家取士之制學校特重自學校升之有司茍諧其試則謂之舉人自有司升之禮部茍諧其試則謂之進士凡世之大官膴仕悉階進士以升進士之升有司禮部實操之樞焉然而士習之隆汙儒風之顯晦不與也惟督學憲臣為能軒而輊之憲臣之所趨士亦趨之憲臣之所格士亦格之有不待文法教令而自無不及者蓋其職專而其地又近故其於士也親而為之化之也易學校之所養有司禮部之所舉皆是人也是故有司禮部能舉之督學憲臣能化之憲臣之所任不既重哉比歲督學南畿者操其所謂主意以律士而峻法臨之謂必合於是而後可學者至於摘抉經書牽率詞義以習其說而士習為之一變有識者嗤之於是莆田陳公至特矯其弊而變焉陳公去而黃公嗣之黃公蓋嘗出陳公之門者凡其所為悉出陳公而輔以髙朗之識優以雍容之度破崖岸略章程而一出於正其所取士往往向時摘抉穿鑿者之所不齒而向所稱合格之士率廢不録於是士皆崇碩大而黜異說上博綜而下訓詁數年以來士習為之一變而善焉士習而善則有司之所選禮部之所舉與夫朝廷之所登用有不善焉者不可得也嗚呼若公者豈非所謂能充其任者耶正德九年公以年勞擢拜按察司副使視學廣西屬學諸生咸惜其去而某特敘次其所為變士習者如此某在諸生中最為凡下然不能摘裂牽綴在曩時為甚而其見廢也視諸生亦甚故今之惜公之去也視諸生為獨深送侍御吳公還朝詩敘正德八年監察御史吳公持節按太平諸郡軌道緒正無所規隨抉微興壞所部振肅屬傍省盜起流劫新安公疏捕追北境以寧敉一時稱才焉然公重遲自將不事搏擊而能逹一方之急以宣明天子之恩其展采錯事有出於尋常按職之上者列郡譽之而新安之民懷其保釐之庸加譽焉及是代去相率歌其功能不逺千里以序屬余余不及識公而獨喜公得下人之譽有不易易者夫國家建置百司各有專職惟御史隨事任授不恆厥居而其任特重是故在內御史能言之而羣僚九列聽之在外御史能行之而藩鎮諸司承之昔之論者謂其居中得與宰相相可否以為重而不知今之在外者之重也而其中尤重巡按之任蓋今之制凡倉儲學校軍政茶馬鹽鐵之屬並御史關决然皆不相侵越而巡按御史獨得綜理而所部百官聽其軒輊事竣例以數語標刺其名上諸天官卿天官卿按以黜陟恆十九焉蓋天下之大天官卿不盡見聞而天子之耳目惟御史是寄御史實代天子行事故所至藩鎮大臣郊迎惟謹郡刺史而下謁見拜俯惴懼惕息若不勝任而御史坐而詔之一有號令自藩鎮以下莫不奔走趨赴而是非得失往往竊議於下不以白間有以誼爭執者然亦鮮矣夫御史以一身臨百司之上以隆重之勢下視俯首趨事之人以當其傍睨竊笑而不之知若是得不敗以完足矣而或譽焉非其才足以濟物明足以燭理而重遲周慎有以任其事固不可得也余於新安之人頌公之言而有以知公之不易也公名鉞字宿威撫之崇仁人壽大中丞見素林公叙成化𢎞治間中外之臣以氣節行能高天下者三數人而已一時朝廷之所倚注臺諫之所掄擬與夫大夫士之瞻屬依歸必在三數人者今大中丞見素先生莆田林公實一人焉孝考當寧三數人者以次奬擢亦既效用於時至於今三十年或老或死淪落殆盡而公巋然猶系天下之望嗚呼偉哉公於是年六十餘聰明強健不減壯時而居閒既久無復當世之念㑹蜀寇告急中外恇擾乃復有意事功朝召夕起束甲西馳敷融妙略卒用戡夷大難保蜀餘命功甫告成而公之身已在閩山之南矣夫聞難而出功成而去之豈獨今之人所少哉而公履之已素有不待今日而見者公初以司寇屬上書言天下事指斥侫幸幾蹈不測既而收自放棄起歷要途若可懲矣而軌法糾撿又多忤物旋起旋廢曾不能三年留也而天下之人方共髙之公之心固不可誣哉推公之心求公之事其有無益於當世必有能辨之者今四方多事用材如渴朝廷每申求舊之典而公方堅保晚之節或者謂公用不盡材於海內有遺望焉嗚呼此又奚足病公哉太史公有言人有所貴亦有所不如天不尚全故世作室不成三瓦而陳之使公都位食祿而享上壽造物者且將忌之矣於此或有損焉豈朝廷天下之利哉吾是以謂究公之用固不若完公之福之為美也公文章道誼蓋於一時聲名出處重於朝著婆娑故里順登期頥為天下大老以潤飾斯世顧豈不多於彼哉此公所為有樂於是而無用彼為也公於先溫州最故而外舅參政吳公惟謙在郎署時實又聮官相好某以通家之故凡一再接公别去十餘年光儀教範奕奕在目公之弟壽州守曩教長洲某以諸生獲出門下及是解郡南歸道出吳門為余道公動定甚悉因徵言為壽用敢論次如此而不以公用世為願者斯特徵明厚公之私言也若夫君相之情朝野之論與夫小人望治之心固將挽公而出之莫釋也嗚呼三朝舊臣所餘無幾天下之事將有屬焉公其自愛贈長洲尹髙侯敘長洲為蘇輔縣𨽻於郡下郡當東南要劇賦發章程率倍他郡而餼館勞猍靡有休間郡既壯大而郡官尊安往往委勞於縣而長洲率先任之其繁視他支邑不特相百而已又其地介於東南卑瘠多潦民衆而貧稍急則斂怨緩則僇辱隨之繁詞藂獄又每困塞故為之者鈎托審畫矻矻簿書間救過不暇矧能潤飾以儒優游文翰而稱治辨乎若夫才優剸割而譽以文敷雍容燕笑而課奏罔後數十年來吾得高侯焉侯以進士髙科試邑於此始至而吏讋其嚴既而民安其業上官與其能朞年之間邑以大治譽聞隆赫旌褒加焉然求其所以為理每出於簿書期㑹之外而讀書為文無廢業焉間引邑中賢士與相倡酬所歷山溪輒形紀述風流篇翰照映一時論者往往以文學譽侯而不知侯之心未嘗不以民也昔宋王禹稱以大理評事知長洲日事賦詠竟以文學知名徴入館閣在當時未嘗以吏最稱也然其言曰一邑之政田有暴賦丁有常傭春役而夏不休朝令而夕必具小則懲之以殿最大則懼之以刑法蓋極敘為縣之勞而不以宓子彈琴為是是豈專事賦詠以文章自好者哉蓋以政事行其所學而以文章蓋其所長其志固有在也豈若區區健吏收譽於一邑徼榮於當世哉去今五百年為邑而課最者不知幾何人今皆不能舉其姓字而禹稱風流奕然可想然則侯之志固有在此而不在彼者侯今以政事被旌固侯乃心斯民之效而非侯之所榮也以為文學而譽之又豈足以盡侯哉甫田集卷十六
