body:
  text: 甫田集巻二十五明文徵明撰書上守谿先生書頃者恭侍燕閒獲承緒論領教實深又承命獻其所為文竊念某自蚤嵗即有志於是侍先君宦游四方既無師承終鮮麗澤倀倀數年靡所成就年十九還吳得同志者數人相與賦詩綴文于時年盛氣鋭不自量度僴然欲追古人及之未幾數人者或死或去其在者亦或叛盟改習而某亦以親命選隸學官於是有文法之拘日惟章句是循程式之文是習而中心竊鄙焉稍稍以其間隙諷讀左氏史記兩漢書及古今人文集若有所得亦時時竊為古文詞一時曹耦莫不非笑之以為狂其不以為狂者則以為矯為迂惟一二知已憐之謂以子之才為程文無難者盍精於是俟他日得雋為古文非晩某亦不以為然蓋程式之文有工拙而人之性有能有不能若必求精詣則魯鈍之資無復是望就而觀之今之得雋者不皆然也是殆有命焉茍為無命終身不第則亦將終身不得為古文豈不負哉用是排羣議為之不顧而志則分矣緣是彼此皆無所成而長老先生或見其所作從而稱之於人以為能而不知者以為真能也遂相率走求其文往往至於困塞某不能逆其意皆勉副之所求皆餞送悼挽之屬其又下則世俗所謂别號率多强顔不情之語凡某之所謂文率是類也嗚呼是尚得為文乎然既被長者賞識遂不容以陋劣自晦檢其中得論議十有四首敘事十有五首輒塵尊覽昔張籍皇甫湜雖皆一時豪俊精於文者然其所作視韓愈非其儗也而韓公得其文以為奇從而品目焉而世徒以其常出於韓之門以為是固韓愈氏之徒也相與躋而列於韓氏而天下後世遂不能少其文焉某於藉湜無能比儗而明公則今之韓子也儻不以某為不肖而與進焉使他日人稱之曰是亦嘗出王氏之門者豈不幸哉干冒台嚴不勝悚仄不宣三學上陸冡宰書比承榮膺簡注進秉鈞衡邸報播聞薄海外内莫不鼓舞稱忭况鄉里後生與有光寵者乎恭惟明公累朝舊徳盛世珪璋特達光明大雅愷悌出入將相聲望偉然天下之人所為望霖雨於明公者非一日矣今兹端委廟堂進退百官以佐天子出令而運斯世於掌握間固明公分内事也某等猥賤晚末莫展賀私方與四方人士詠嗟盛徳以為天下斯文之慶豈敢意外干犯輒有陳請而事機可乘勢有不容已者亦恃雅度汪濊不深譴責故卒言之竊惟我國家入仕之階惟有學校一途而當時法式章程咸出我太祖髙皇帝親定最為詳密而累朝列聖不無少有更張誠以聖化優游泳涵滋久人材蝟興其勢有不得不更者故隨時消息而行者不以為敝論者不以為非蓋自洪武二十五年重定嵗貢額數郡學嵗貢二人州學再嵗三人縣學嵗一人當時人材尚少儒學生徒往往不充廪増正數除鄉試中式之外其餘在學者不過五六年升貢者不出三十嵗故其人皆精力有餘入仕可用而其功名政業往往㕘於正奏之列無少軒輊也自永樂元年正統二年景泰元年三次開科各處解送舉人不拘額數遂有頓増至二百名者一時國學人衆乃量減貢額然中間或行或否皆視解額増損厥後解額既定而貢額竟不能復坐是學校壅滯遂有垂白不得入仕者於是胡忠安公在禮部思以通融振塞建行四十强仕之例而士子稍復自拔歴五十餘年人材又多學校又大壅滯太原周公在禮部乃舉復洪武二十五年之例然僅僅五年而止迤邐至於今日開國百有五十年承平日久人材日多生徒日盛學校廩増正額之外所謂附學者不啻數倍此皆選自有司非通經能文者不與雖有一二倖進然亦鮮矣畧以吾蘇一郡八州縣言之大約千有五百人合三年所貢不及二十鄉試所舉不及三十以千五百人之衆歴三年之久合科貢兩途而所拔才五十人夫以往時人材鮮少隘額舉之而有餘顧寬其額祖宗之意誠不欲以此塞進賢之路也及今人材衆多寬額舉之而不足而又隘焉幾何而不至於沈滯也故有食廪三十年不得充貢増附二十年不得升補者其人豈皆庸劣駑下不堪教養者哉顧使白首青衫羇窮潦倒退無營業進靡階梯老死牖下志業兩負豈不誠可痛念哉比聞侍從交章論列而當道者竟格不行豈非以不材者或得緣此倖進而重於變例乎殊不知此例自是祖宗舊制而拔十得五亦古人有所不廢豈可以一人之故倂餘人而棄之或謂四十之例若行則不勝求仕者之多將遂無所位置此又何足病哉今但杜其願受教職之請限以依親之例程其入監之期一時士子幸而解其學校之苦稍紆目前之急莫不甘心自引豈皆以得祿為榮哉不然即有所授亦不至大妨天下之賢即如近時上馬入粟者皆得比於充貢之例循資歴嵗亦皆有所畀授此其人固有能自立者然而倖進者不為不多朝廷所得於彼者幾何遂使紈袴之子得以奪賢俊之路有識者固嘗疾首痛心於此矣明公崛起學校奮身賢科操古人之心負天下之望目歴而知身更而信能不有概於心今當可為之時在得為之地能不惜一舉手振袂之勞則其事無不濟者若四十之例事大體重不敢覬覦而嵗貢二人則是洪武舊制又經近嵗舉行伏望留意檢察或因人建言舉行或乘大霈條下使士子得沾涸轍之恩而仕路無復鮎竿之嘆則豈特區區鄉里與有榮澤實天下斯文之幸也昔宋富鄭公當國而同學友段希元魏升平猶滯塲屋公不欲私於二人乃建一舉三十年推恩之例當時以為盛事後世以為美談近時胡忠安公四十强仕之舉太原周公一嵗二貢之例或謂皆有所為而行蓋皆不欲私於一人而必推之天下也二公一代名臣世之論者曽不以此少公而更以為美誠以其能公天下之心而行也若明公今日之舉則又以天下之心行天下之事初無二公之為則其所成所益又當出於其上不特二公而止也伏惟留意處分天下幸甚斯文幸甚謝李宫保書某竊聞薦士之難也昔人以為非茍一而已矣謂知之難言之難聽信之難也故以馮衍尹緯之材遭漢世祖王景畧之明終日左右而卒莫之省而趙括何人得代廉頗馬謖虚名能惑諸葛甚而周仁許靖之屬土木之類皆得尊顯嗟乎士誠不易為薦也公卿不薦士久矣非獨今之時然也而今之時為甚豈今之為公卿者皆不復有是心哉勢有所不行也何也科舉之法行也科舉之法行則凡翹楚特達之士皆於科舉乎出之於是乎有以功業䇿名者有以文章著見者有以氣節行能見稱於時者問之皆科目之士也其間亦有不出此者然而鮮矣此豈科目之學為能盡之世之所尚者在是上之所用者在是是以有志事功有志文章有志節義行能者皆俛焉求合有司之尺度以求自見於世也夫士之所為固無有能外於事功文章節義者而皆今之科目之所收也然則科目之外豈復有遺材哉有之皆潦倒無成齷齪自守者世固無所用之無所用之則亦無因知之矣至於懷珍抱奇道義自將者方且韜黙逺名人又烏得而知之哉彼不知者不必薦也不得而知者不得而薦也其有可知者多是立異徼名工言無實之人柳子所謂士之賊也若是雖謂之無士可也是無怪乎今之公卿之不薦士也士誠不易為薦也而今之士又有不必薦者科舉之法行也外此而有舉焉不以為迂不適時則以為愚不知人而非笑集其身矣某家世服儒薄有䕃祚少之時不自量度亦嘗有志當世讀書綴文粗修士業而受性樸魯鞭䇿不前加之憂患交攻日以墮廢自𢎞治乙卯抵今嘉靖壬午凡十試有司每試輒斥年日以長氣日益索因循退托志念日非非獨朋友棄置親戚不顧雖某亦自疑之所謂潦倒無成齷齪自守駸駸然將日尋矣明公領鎮三吳下邑雖在治屬間嵗一臨實未嘗弭節其地某在諸生中蓋嘗一再望見顔色而猥賤無階莫得自前誠使其身有所取材公固無從見也況其所能所守頽敗若此明公何所據知遂錄其姓名露章薦之于朝犯迂不適時愚不知人之議不顧非笑而斷然行之某誠愚不知所以受知於公者以為誠有材耶彼科舉之士非有甚髙難能者業之三十年曽不得一雋以自振發其效亦可見矣若夫懷藏道徳抱節守貞某實非其人即其人將自韜約逺引不令公知矣或采聽人言得之游揚又安知其非立異徼名工言無實者哉安知其非趙括馬謖非周仁許靖之儔哉即萬一有焉所為損公不小矣而公豈亦嘗念之哉乃公之意則有在也龎統有言當今雅道陵遲所冀拔十得五使有志者自勵耳某誠知陋劣不足辱公而公豈以區區一人而懈其厲人輔世之盛心哉必如郭隗先從隗始之言則某豈不得為燕國之馬首哉若是則公之於某也又何必知之深見之審而後為能用其情哉然其所以知之見之實有出於至深極審之上者誠以明公三朝舊臣出入中外垂四十年好賢禮士聞於天下一時及門之士多矣其文學行義踰於某者亦多矣豈無工言語露才諝以求知於公者公皆不之顧而獨有意於某豈不以求於人者深則得於已者淺也某視一時文學行義之士誠不敢望其後塵而獨不欲求知於人是故雖以公之好賢禮士作鎮吳門相望一舍而私門無某之跡只尺之書未嘗一至左右此非髙亢自賢而有所要也士之體當然耳使於此有求焉是失其所以為士矣失其所以為士而欲以士薦雖愚人不為也而謂公為之哉某之所以受知於公必有的然當其心者而語言才諝不足云也是故古人之知人也夫惟以古人之道知人則亦能以古人之道薦人用是天子信之宰相受之朝奏夕報而某遂得以白衣被命列官清禁周旋多士之中自顧能薄望卑不應得此而舉朝不以為非天下咸歆其遇豈不以公之志行素孚於人朝廷中外舉鑒其誠謂其所為惟以輔世勵人為心而非有所私於某也夫始也某未嘗有求於公也而公薦之又不有私於某某之所恃者士之體也公之所操者王公大人之職也士存其體王公大人守其職雖古之至理之世不過如此而所為致之乃在明公一舉措之間某何幸身自際之其所為感公之知飲公之徳宜何如其深也或謂明公此舉實用司寇林公之言果爾益以見公之徳之不可及也昔張安道與歐陽文忠雅不相能及薦蘇明允乃獨屬之歐公謂非永叔不能薦歐公不以張公為嫌卒薦而官之當是時惟知與明允為地他皆不暇計也卒之明允以文章名世議者謂不負為歐公門下士而千載之下歐陽子獨享知人之明林公誠知某也豈不能自薦哉所以必屬之公者以歐陽子待公也某無似視明允無能為役亦圖無負為公門下士耳不宣與郡守肅齋王公書夫聲聞過情君子所恥有損無益賢者不為今大巡郭公欲為某建立坊表出於常格區區淺薄豈所宜蒙深有不自安者自惟潦倒儒生塵伏里門又以衰病蹇劣不能厠跡士大夫之間故揫􅀢退縮非以是為髙也今以為賢於他人郡士夫誰為不肖且某在今諸士夫中名位最㣲人品最下行能才智最為凡劣一旦以為賢而拔出其上冒然居之豈非君子所深恥哉某雖不敢自托於君子然亦安肯靦然無恥甘於小人之歸哉嘗閲郡志宋蔣堂希魯以禮部侍郎致仕居吳時胡文恭公守郡以其名徳因即所居表為難老坊蔣公愀然不樂曰此俚俗歆豔内不足而假之人以為誇者何以至於我也胡公即為撤去當時以為美談迄今傳示方冊某自視於蔣公無能為役而明公則今之胡公也且某素蒙垂愛其忍以俚俗小人待之哉某雖非足於内者然竊欲自附於知分守已之士以求免於務外為名之愆惟是憲府崇嚴無由控訴欲望明公轉達此情得賜寢罷實出至幸也況今嵗歉民窮賦無從出一有興作不無動擾此亦明公所宜軫念者且某世居此里自祖父伯叔以來世叨薄宦里中父老每為贊喜然於其人實未嘗有毫髪䕃庇萬一舉事則匠作夫役勞頓實多夫不能覆庇而反至勞頓豈當時贊喜之意哉彼雖自受其役而區區以一身標表之故坐視其勞亦何能安然不為之意哉徒費財力而又使人不安正所謂無益而有損竊為明公不取也比者蕭二守顧訪首及此事某即欲以此事上瀆明公彼時猶以為未必遽爾乃者反覆思之恐一旦文移下督材木既具營繕既嚴則勢不可復止雖欲有言不可得矣緣是不得已輒露血誠先此懇請惟明公曲賜處分儻得幸免則明公之惠不淺淺矣區區此請在於必得若以為非出至誠姑為是退托以激冒時譽則重得罪於左右矣然而不敢避也病薾不前無緣躬叩鈴階謹勒手狀令兒子俯伏以請臨紙不勝願望之至行狀二首沈先生行狀髙祖懋卿曽祖良琛祖孟淵父恒吉母張氏本貫蘇州府長洲縣相城里沈周年八十有三狀先生諱周字啟南姓沈氏别號石田人稱石田先生世居長洲之相城里自孟淵先生以儒碩肇家生二子曰貞吉曰恒吉才美雅飭並有聲稱恒吉號同齋生三子先生嫡長也生而娟秀玉立聰朗絶人少學於陳孟賢先生孟賢故檢討嗣初先生子也諸陳皆以文學髙自標致不輕許可人而先生所作輒出其上孟賢遂遜去年十一代其父為賦長聽宣南京時地官侍郎崔公雅尚文學先生為百韻詩上之崔得詩驚異疑非已出面試鳳凰臺歌先生援筆立就詞采爛發崔乃大加激賞曰王子安才也即日檄下有司蠲其役先生既長益務學自羣經而下若諸史子集若釋老若稗官小説莫不貫總淹浹其所得悉以資於詩其詩初學唐人雅意白傅既而師睂山為長句已又為放翁近律所擬莫不合作然其緣情隨事因物賦形開闔變化縱横百出初不拘拘乎一體之長稍輟其餘以游繪事亦皆妙詣追蹤古人所至賓客牆進先生對客揮灑不休所作多自題其上頃刻數百言莫不妙麗可誦下至輿皂賤夫有求輒應長縑斷素流布充斥内自京師逺而閩浙川廣莫不知有沈周先生也先是景泰間郡守汪公滸欲以賢良舉之以書敦遣先生筮易得遯之九五曰嘉遯貞吉喜曰吾其遯哉卒辭不應然一時監司以下皆接以殊禮尤為太保三原王公所知公按吳必求與語語連日夜不休一日論諫先生曰對章伏諫非鄙野人所知然竊聞之禮上諷諫而下直諫豈亦貴沃君心而忌觸諱耶公遽曰當今之時將為直諫乎抑亦諷乎先生曰今主聖臣賢如明公又遭時倚賴諷諫直諫蓋無施不可公徐出一章示之曰此吾所以事君者試閲之先生讀畢曰指事切而不汎演言婉而不激於諷諫直諫兩得其義矣公以為知言同時文學之士為上官所禮者往往陳説時弊先生不然曰彼以南面臨我我北面事之安能盡其情哉君子思不出其位吾盡吾事而已然先生每聞時政得失輒憂喜形於色人以是知先生非終於忘世者先生去所居里餘為别業曰有竹居耕讀其間佳時勝日必具酒肴合近局從容談笑出所蓄古圖書器物相與撫玩品題以為樂晚嵗名益盛客至亦益多户屨常滿先生既老而聰明不衰酬對終日不少厭怠風流文物照映一時百年來東南文物之盛蓋莫有過之者先生為人修謹謙下雖内藴精明而不少外暴與人處曽無乖忤而中實介辨不可犯然喜奬掖後進寸才片善茍有以當其意必為延譽於人不藏也尤不忍人疾苦緩急有求無不應者里黨戚屬咸仰成焉平居事其父同齋無所不至同齋髙朗喜客飲酒必醉先生不能飲每為强醉以樂客同齋沒乃絶母張夫人年幾百齡卒時先生八十年矣猶孺慕不已弟召病瘵不内處先生與俱卧起者嵗餘及卒撫其孤如子庶弟豳穉未練事為植産使均於已一妹早寡養之終其身其天性孝友如此先生娶於陳生子雲鴻文學稱家嘗為崑山縣隂陽訓術側出子復郡學生女三長適崑山縣學生許貞次適徐襄又次適太學生吳江史永齡孫男一人履女二人曽孫男一人女二人先生所著詩文曰石田稿總若干巻他雜著曰石田文抄石田詠史補忘錄客座新聞續千金方總若干巻正徳四年己巳先生年八十有三八月二日以疾卒於正寢於是雲鴻先卒數年矣復乃相其孫履治喪以七年壬申十二月廿日𦵏先生於所居之東某鄉某原属將求銘當世有道以信於後俾某有述某辱再世之游耳受目矚知先生為詳遂不克讓用論次如右謹狀南京太常寺卿嘉禾吕公行狀祖考嗣芳萬泉儒學教諭累贈通議大夫南京太常寺卿妣顧氏累贈淑人考原翰林院學士贈禮部侍郎諡文懿妣徐氏封太淑人貫浙江嘉興府嘉興縣甲乙鄉呂㦂年六十三狀公諱㦂字秉之姓吕氏為嘉興人先宋時有諱玹者以碩儒顯於時玹生茂卿仕元為提舉茂卿生仲雄仲雄生伯誠俱不仕伯誠生嗣芳仕國朝為萬泉儒學教諭生二子長本景州儒學訓導次原翰林院學士贈禮部侍郎諡文懿公之考也母徐氏初封宜人累加太淑人公生正統己巳七月辛卯自小穎異甫七齡從文懿授書未嘗挾冊呻吟文懿篤遣乃就席按文疾讀一過目而數百言已成誦矣比成童諸書已多淹洽操筆為詩文已多警語一時老長先生咸畏下之性尤慧解天順初京師不雨彗星犯牽牛時文懿柄國頗以為憂公侍側言嵗凶常數小人之厄也星變實聖人復辟離燭萬方當無他虞所憂者援立之人失望而怨或恃恩驕誕不可不慎也及曹賊竊發文懿方入朝母顧聞變泣曰兒及禍矣公曰大人甫出而難作當猶未至且賊舉火向内恃有應也而不得入豈朝廷有備乎頃當撲滅矣已而皆然文懿以母憂卒於家公年十五入訃于朝上悼惜顧羣臣欲授公中書舍人格於例不果已而補國子生遣還郡守楊公繼宗為延師教之師顧公所學出已上遂遜去曰吾不能為若師也服闋還朝詔令内閣辦事明年丁亥拜中書舍人時年甫弱冠鋭志於學譽聞藉藉起辛卯上疏乞應試言者劾公矯枉沽譽且命官不應得試上特許之是嵗中順天鄉試錄其程文以傳自壬辰至乙未凡再試禮部皆不中遂不復就試己亥中書滿九載陞禮部主客司員外郎辛丑陞本司署郎中壬寅真授本司郎中琉球乞嵗一入貢自言小國事大國如子事父若再嵗一朝則定省間而音問疎矣公折之云既知父子之禮何緣屢逆父命已而廣東守臣上言夷人生事擾民不宜聽其請人乃服公先見迤西回囘夷援例奏討廣東海道歸國朝廷將從之公執不可曰故事如此不宜妄有改易以啟他覬因檄錦衣衞訪草欲薦之夷人懼而止計所省有司經費千萬丙午陞南京太僕少卿戊申孝宗登極公上言乞不許州縣改委官吏及減省拽擠乳牛隻處置操備馬匹免徵苜蓿種子四事癸丑萬夀節公奉表入賀上言節財用激貪殘教戚里起宿學久委任等六事是嵗改南京通政使司右通政尋轉左通政丙辰陞南京太常寺卿太常掌祀事頗多更格文移檢閲往往困塞公集累朝更格故事為太常條例事至按籍行之故在官無謬誤而事亦易集己未詔求直言公上疏言立誠信習禮樂查署户修祭器尊前王表英靈賞年勞重供薦備牲牢免雜役追逋欠清㕑役凡十有二事皆本寺弊政多見施行先是禮儀怠廢春秋丁有事文廟科道官多不與祭公移文督之有知豺獺之報本何筌蹄之遽忘之語㑹太廟時享不以新果監察御史劾公不敬公舉髙皇敕旨復之御史乃無言然自是不悦於當路矣已而科道交章論列謂公冒進不止公上疏言臣立朝四十年出處遷除自有本末冒進之言臣實恥之因乞致仕不允㑹太淑人卒遂乞解官持服詔工部遣官營𦵏命有司諭祭服闋再授南京太常寺卿前後在太常六年庶事多所緒正今上登極再乞致仕有旨令馳驛囘而公已先還矣時年五十有九既歸日以詩酒自樂絶口不及時事逆瑾用事方督過諸大臣雖家居不免公益韜斂憂畏閲四年為正徳辛未六月三十日戊申以疾卒於家年六十三積階自承事郎七轉至通議大夫先夫人沈氏廣州知府琮之女有賢行初封孺人加宜人累贈淑人後夫人陸氏封淑人子男五人言沈出䕃補國子生為處交俱側出學陸出婦項徐周毛陶皆令族孫男四人女六人公性資開朗而風儀醒藉與人處悃欵有情致居官甚廉而不為矯枉暴白之行平生未嘗發人隂私尤不念人過初應試被劾或言同官某所為公不以為然後同官以剛直得罪中官幾陷不測公曲為庇䕶禮部時有主事者倚時貴多所陵轣他同官不能堪公曰勢亦易過姑俟之已而果敗謫淮安通判而公適為太僕有相臨之分待之如初其待僕從尤有恩義故事卿監從臣得役辦事官擁輿持刺往往皆其人公深以衣冠為辱曰若曹他日皆當長人吾不忍若為此態也在侍從二十年未嘗輕役一官下人過誤犯輒行遣雖不為姑息而亦未嘗鈎距罪人若吏牘章程皆有限列關决精敏人亦不能欺也公雖生長貴族而貧終其身不喜姱侈生理靡密一無所問惟好學不倦自志學至老未嘗一日廢書雖以夏侯氏書應舉而尤喜毛詩周易在太僕時讀易凡三終諸子若史若他文集莫不貫總而左氏兩漢書尤精洽少接諸老先達諳國朝故事雅善談論對客舉一事必深竟顛末舉止詳雅奕奕如瞻承聽者傾注喜為詩日必三數篇操札輒就若不經意而出語渾雄用事精當往往追躅古人一時宗工讓能焉其文尤嚴整有法無愧作者而詩名大噪遂用揜其所長然公惟以自樂未嘗矜人故人始或忌之終亦不厭其多能也晚嵗居休益事隠約浮沈里閈若初未嘗有官者郡邑燕㑹或不時往而鄰里有召輒赴曰彼貧人不易為具不可負也其宅心淳厚往往類此故死之日自郡邑大夫而下至於販夫牧竪莫不嗟惋相弔謂善人亡矣嗚呼此豈有勢與力致之哉言以卒之明年某月日𦵏公縣之長水鄉祖塋之傍將乞銘於太史以某通家相知俾有述焉比先公官太僕實公同寮某因得給事左右竊聞緒餘于今二十年雖不敢謂為知公而行事之詳耳受目矚庶幾不失之誣云甫田集巻二十五
