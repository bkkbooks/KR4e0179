body:
  text: 甫田集卷二十一明文徴明撰題跋二十二首跋夏孟暘畫右雲山圖崑山夏孟暘作孟暘名昺太常卿仲昭兄能書作畫師高房山初未知名洪武季年為永寧縣丞謫戌雲南永樂乙未仲昭以進士簡入中書科習字一日上臨試親閲仲昭書稱善仲昭頓首謝因言臣兄昺亦能書召試稱旨與仲昭同拜中書舍人時稱大小中書既而謝事終於家其書畫平生不多作故世惟知太常墨竹而不知孟暘豫往年見所書西銘頗有楷法此軸為王世寶所藏亦不易得也題黃庭不全本宋諸賢論黃庭衆矣然但辨其非換鵝物卒未嘗定為何人書雖米南宫亦第云並無唐人氣格而已至黃長睿祕書始以逸少卒於升平五年後三年為興寧二年黃庭始出不應逸少先已書之意宋齊人書然不可考矣豫按陶隱居與梁武啓已有逸少名蹟黃庭勸進等語隱居去晉為近當時已誤有此目則書雖非逸少筆其為晉宋間名人書無疑而趙魏公獨以為楊許舊迹豈别有所見乎唐石刻數種並佳傳流近代轉益失真無足觀者此本紙墨刻榻皆近古中𤣥字並缺末筆固是宋本自還坐隂陽門下皆無之校他刻才得其半字勢長而瘦徑涪翁所謂徐浩摹本為是都元敬不知何緣得之以遺從父慶雲令轉以付某雖非完物自可寶也跋楊凝式草書右楊少師神仙起居法八行南宫書史東觀餘論宣和書譜皆不載余驗有紹興小璽及內殿祕書諸印蓋思陵故物後有米友仁審定跋尾及譯文四行按紹興內府書畫並令曹勛龍大淵等鑒定其上等真蹟降付米友仁跋而曹龍諸人目力苦短往往剪去前人題識此帖縫印十餘皆不全是曾經剪拆者其源委受授莫可得而考也標綾上有曲腳封并閲生萌蘆印是常入賈氏蓋似道枋國御府珍祕多歸私家最後有商左山參政留中齊丞相跋留稱野齊者元翰林學士承旨李謙受益號野齊居士博雅好古虞文靖詩所謂五朝文物至於今者又有廣東宣慰使郭昂彥高亦號野齊而其出差後李在世祖時為應奉文字正與商留同時商又同郡人此帖必李氏物也跋李少卿帖家君寺丞在太僕時公為少卿某以同僚子弟得朝夕給事左右所承緒論為多一日書魏府君碑顧謂某曰吾學書四十年今始有得然老無益矣子其及目力壯時為之因極論書之要訣纍數百言凡運指凝思吮毫濡墨與字之起落轉換小大向背長短踈密髙下疾徐莫不有法蓋公雖潛心古法而所自得為多當為國朝第一其尤妙能三指尖搦管虛腕疾書今人莫能為也豫雖知之而心手不逮蓋數年未始有得今公已矣嘗欲萃其言為李公論書録而未暇也今日偶閲此帖不覺感愴疇昔用記如此又自書學不講流習成弊聰逹者病於新巧篤古者泥於規模公既多閲古帖又深詣三昧遂自成家而古法不亡嘗一日閲某書有涉玉局筆意因大咤曰破却工夫何至隨人腳踵就令學成王羲之只是他人書耳按張融自謂不恨已無二王法但恨二王無已法則古人固以規規為耻矣此帖為郎中時書其轉摺處鋒芒削利蓋蚤年嘗學虞恭公碑如此後五日又題跋東坡楚頌帖真跡世傳蘇文忠喜墨書至有墨豬之誚而此實用淡墨蓋一時草草弄筆而後世遂寶以為奇玩宋元題識凡九人而周益公加詳豫往時嘗蓄石本比在滁始得觀於太僕少卿李公所其先藏金陵張氏李以十四千得之嘗欲歸閣老宜興公未果而卒卒後宜興託家君寺丞致之凡留豫家半嵗蓋宜興公以其鄉故事致意特勒石本即公所刻無毫髮失真但去曽從龍莊夏仇逺三跋而益以買田奏狀二帖題其後云文忠嘗愛吾鄉山水之勝而欲居之今所存惟斬蛟橋八字而已按橋題經崇寧禁錮沉石水中今十二字乃天台謝米伯家真跡紹定間其子奕修宰義興攜以入石者非當時之物也題石本汝南帖後虞永興汝南公主墓志起草真跡先宋時藏洛陽好事家後歸張直清米元章嘗見之元初在郭佑之處後不知所在亦不知何年入石按元章云豫臨汝南帖浙中好事者以為真刻石今觀此刻字勢長而肥頗類米筆又張氏本十六日下有闕文校之良是然無旁注小字赫赫高門等語及𤣥幾題字雲烟過眼録記郭本有米跋今亦不存蓋米喜臨晉唐書往往逼真而一時題記多略不録况此帖世無别本必米蹟也豫以孔子廟碑易於朱君性甫都元敬見而稱愛遂題以歸之書東觀餘論後右東觀餘論宋祕書郎黃伯思長睿撰長睿元符庚辰進士年四十而卒好古博雅喜神仙家所著文集一百卷然世未見所見惟法帖刋誤及此耳别有博古圖說十一卷王楚宣和博古圖實基於此然楚書頗涉牽合容齊隨筆嘗論之而陳振孫書録解題謂圖說有牽合處亦因宣和時有所刪改云爾非盡出於長睿也今觀此書亦有瞿父之說豈亦曾經刪改耶中多書帖跋語考論頗精鄭枃著衍極謂其自有劉盛注而衍極多出於元章而實不然按文獻通考書凡三卷今惟上下兩卷前有刋誤標目而文不載蓋亦一卷也嵗㫋蒙單閼十二月草日從唐子畏借觀因題跋家藏趙魏公二體千文右趙魏公二體千文後有跋語而無名氏驗印章為方公孝孺永樂初禁藏其書故當時人刮去名字以避禍耳最後則高公遜志二公皆題為葉夷仲所藏夷仲臨海人名見泰博學善草書仕國朝為刑部主事此書或疑其筆弱子始亦以為然而出規入矩有非餘人所能舒卷數日見其波發轉摺皆效智永因取永石本比觀了無差别遂定為臨永書按栁文肅稱公蚤年喜臨智永千文與之俱化入朝後乃自成家不區區泥古而無一毫窘東之意此帖正少時書也宋中書謂中年筆恐未必然跋家藏坐位帖右坐位不全帖元袁文清伯長所藏自題其後定為米海嶽臨本文清好古博識所見必真而跋語考訂精當無容復議竊猶有未然者按書史謂少時曾臨不知所在後謝景溫尹京見於大豪郭氏縫有元章戲筆印云云則當時所臨實全本今此本乃是半幅且無縫印跋意若臨於安氏分析之後者然師文元符間尚存不應子孫先已分柝且謂以石刻較之正居其半今比石刻才得三之一耳此皆不可曉者豈文清别有所據邪抑米老所臨不止此邪題七姬權厝志後張羽文宋克書盧熊篆僞周據吳日開賓賢館以致天下豪傑故海內文章技能之士悉萃於吳其陪臣潘元紹以國戚元勳位重宰相雖酗酒嗜殺而特能禮下文士故此石出於倉卒之際而一時文章書字皆極天下之選羽字來儀一字輔鳳潯陽人元末避地來吳入國朝為太常司丞其文清雄峭拔足以配古克字仲溫長洲人國朝為鳳翔府同知博學任俠其書稱逼鍾王熊字公武崑山人國朝為兖州知州篆籀之精獨步一時方賓賢盛時三公與楊廉夫高季迪輩俱號高邁不為所屈者今不免亦為之俯首執筆其禮羅之勤有可知者昔人謂時衰代替武人所好涉於衣冠觀此有深感焉跋送梨思言二帖石本昔人謂晉唐真蹟不易得得見墨本佳者可矣今雖墨本亦豈易得哉此帖米氏所刻蓋真蹟舊藏其家即書史所載送梨帖也經宣和收購遂屬禁中此本猶是未入時刻前十字大令書後十二字實右軍書栁誠懸自太宗書中辨出前帖而又誤連後帖元章已曾勘出不知何故仍刻作一石豈當時雖已辨正而前人題字印記惜不忍便拆耶至宣和書譜直以前帖置右軍書中而王秋澗玉堂嘉話又目為太宗帖皆不可曉也東坡詩跋正為米氏作者後人誤裝入蘇氏雜帖中今聨於此紙墨刻榻誠出一手跋山谷書隂長生詩右山谷書隂真人詩三章自題云書以與王瀘州之季子而不著其名末云紹聖四年四月丙午禪月樓中書按公紹聖元年謫涪州時王獻可帥瀘遇之甚厚獻可字補之嘗遣其少子至黔省公公集中有與其少子王秀才書云車馬逺來將父命以厚逐客者是已蓋王嘗遣其季子至黔此書相見時書故不及於簡札耳觀其稱與而不云寄可見矣黃㽦作公年譜嘗援以為據而不得詳豫因略疏之此書初作方寸字後皆拳許大書蓋用敗筆草草寫成環偉跌宕一出顔東方朔贊但字字剪輳成卷必是大軸經庸人裝截耳題沈石田臨王叔明小景石田先生風神𤣥朗識趣甚高自其少時作畫已脫去家習上師古人有所模臨輒亂真跡然所為率盈尺小景至四十外始拓為大幅粗株大葉草草而成雖天真爛發而規度㸃染不復向時精工矣湯文瑞氏所藏此幅亦少時筆完菴諸公題在辛卯嵗詎今草又七年矣用筆全法王叔明尤其初年擅場者秀潤可愛而一時題識亦皆名人今皆不可得矣題陸宗瀛所藏柯敬仲墨竹文湖州畫竹以濃墨為面淡墨為背東坡謂此法始於湖州柯奎章此幅頗竒人多不知其本蓋全法湖州也虞文靖云丹丘雖師湖州而坡石過之但時世所傳湖州竹絶少余兩見又皆小幅無坡石可驗用書伯生之論以答宗瀛聊當評語敬仲名九思號丹丘生天台人仕元文宗時為奎章閣鑒書博士頗見寵禮畫有訓忠之家印蓋文宗題其父墓有訓忠之碑故云題趙魏公二帖右趙魏公與丈人節幹月囱判簿二帖節幹即公舅氏管公直夫月囱不知何人意亦是管之姻家當時跋者十有三人陸友仁謂兵部時書帖意以除授未定欲遣二姐歸侍二姐管夫人仲姬也以公至元丙戌入京除兵部郎中後二年戊子始以夫人北上不應先有是語或是元貞元年自濟南赴史館時而公是嵗竟歸吳興此是未歸時所遣不可知也二帖行筆秀潤與他書殊不類是蚤年學思陵書如此其署名猶襲宋人或謂出聖教序者非也管公無子公奉之甚至及殁建孝思道院以主其祀亦厚矣哉題沈潤卿所藏閻次平畫元季崑山顧仲瑛氏好文重士家有玉山草堂多客四方名流所蓄書畫悉經品題此畫仲瑛物也自題其後目為閻次平筆詩之者四人于立彥成錢惟善思復袁華子英釋良琦元璞彥成仲瑛特厚之為設行窩於家彥成至如歸焉思復錢塘人號心白道人嘗領鄉解以所賦羅剎江有名稱錢曲江子英崑山人雋敏長於歌詩楊鐵崖稱為才子洪武中被纍卒於京元璞吳僧住浙之龍門寺有禪學詩筆尤俊仲瑛後亦以事徙臨濠卒書畫散落人間甚衆此為吾友沈潤卿所藏真贋余不能辨然而諸公題品具在可愛也暇日從潤卿借觀因疏其後而歸之題趙松雪千文永禪師書千文八百本趙魏公所書當不減此此卷大德五年為韓定叟書定叟㑹稽人與公厚善集中贈定叟及留别詩可考公以大德三年為江浙儒學提舉此當是為提舉過㑹稽時書是嵗公四十有七正中年書也跋者四人韓性字明善定叟諸姪道德文學為元中世名儒宇文公諒字子貞元統進士為史官張伯雨茅山隱道士所謂勾曲外史也三公並有盛名而祖銘亦禪宗大老所著有四㑹語録其字石鼎杭州徑山僧其云四明者本奉化人也跋沈仲說小簡仲說名右號寓齊故吳中富家嘗取妾得范復初女即具資裝嫁之其文學行誼皆有足重而出處之跡不少槩見而嫁范女之事亦僅見於浯溪集中相傳與沈仲榮同族然不可考也其詩篇書跡流落吳中甚多此紙與安素高士者蓋金天瑞伯祥也仲說書法最精見者咸爭寶愛况金氏子孫哉跋林藻深慰帖右唐林藻深慰帖元人跋者五李倜士𢎞河東人官侍讀學士諡章肅張仲夀希靜本內臣帶學士承㫖邵亨貞復孺睦人寓華亭袁華子英崑山人國初郡學訓導張適子宜長洲人終宣課大使按諸跋謂此帖即宣和書譜所載今驗無祐陵印記惟有紹興二小璽似為思陵所藏蓋南渡後購收先朝書畫民間藏者或有內府印記即拆裂以獻又當時多屬曹勳龍大淵鑒定二人目力苦短往往剪去前人題語此帖或民間所獻或經曹龍之手皆未可知也又有柯九思陳彥廉名印柯字敬仲天台人官奎章鑒書博士此帖印記特多且有祕笈字蓋其所藏也而仲夀所題亦云嘗藏之彥廉名寶生泉州富商元末居太倉家有春草堂所蓄書畫極富袁張二人嘗主其家此跋又為陳氏題者則此帖經三氏收藏無疑後歸吳江史明古而吾師匏菴先生得之故某數獲觀焉今疏本末如此其詳則俟博雅君子龍茶録考蔡端明書評者謂其行草第一正書第二然宣和書譜載御府所藏獨有正書三種豈不足於行草耶歐公云前人於小楷難工故傳於世者少而難得君謨小字新而傳者二謂集古録序及龍茶録也端明亦云古之善書者必先楷法漸至行草某近年粗知其意而力已不及觀此則其行草雖工而小楷尤為難得當時御府所收僅有三種而茶録在焉蓋此書尤當時所貴嘗刻石傳世數百年來石本已不易得况真蹟乎侍御王君敬止不知何緣得此間以示余蓋希代之珍也按公以慶歷四年為福建轉運進小龍茶時年三十有四後三年為皇祐三年入修起居注選進此録後知福州失去藏稿懷安令樊紀購得刋行當是至和二年再知福州時至治平元年始定正重書相距皇祐又十餘年公年五十有三遂卒晦菴評蔡書謂嵗有蚤暮力有深淺公書至是蓋無遺法矣元人盧貴純跋云歐公最愛公書而此書晚出惜不及見余按歐公云集古録序橫逸飄發而茶録徑實端嚴結體雖殊各極其妙則此書必嘗入其品題矣且後題治平甲辰即元年重書之嵗也又按劉後村云茶録凡見數本則當時所書宜不止此此帖南渡後嘗為蔡修齊所藏修齊永嘉人名範字遵甫幼學尚書之子仕終吏部侍郎嘗官閩中與端明家通譜因得此帖不知即御府藏本或後村所見諸本今不可考矣元人題語二十餘皆記修齊之孫宗文授受收藏之故而不及書之本末余因疏其大略如右其詳則俟博雅君子跋趙魏公馬圖右趙魏公畫馬元人自張紳而下詩之者四人紳字士行青州人號雲門山樵洪武初仕終浙江布政使鄭元祐字明德遂昌人以脫骱任左臂號尚左生任元季浙江儒學提舉錢惟善字思復號心白道人以賦羅剎江得名又稱錢曲江仕終儒學副提舉王畦字季耕福清人仕江浙行省宣使士行所稱季野都司即季耕之兄名畛畛與畦俱參政王都中之子與張鄭諸公皆嘗流寓吳中此圖蓋王氏物也轉而為吳人沈孟嘉氏所有尋又失去其孫世應購復之目為玩德圖而使余題其後魏公嘗云郭祐之贈余詩世人漫說李龍眠那知已出曹韓上曹韓固不敢望使伯時尚在當與之抗衡也夫魏公自許如此後人尚敢置喙其間哉顧世應之所貴有不専在於馬者而祝君希哲己詳之余無可言姑疏四人本末俾觀者可考焉跋東坡五帖叔黨一帖右蘇文忠公五帖首帖與郭君廷評者無嵗月可考次二帖皆與忠玉提刑按公同時還往有王瑜馬瑊並字忠王集中不載此帖莫知為誰然王嘗為浙憲公元祐六年三月罷守杭州四月到闕內一帖以四月四日發而有來日渡江愈逺左右之語當是自杭赴召途中與王忠玉者又次歙硯帖亦元祐四年在杭時書公嘗云高麗墨如研土炭此又自矜其墨用高麗煤何耶最後食蠔帖己卯冬至前二日書是嵗元符二年公自惠移儋之三年於是公年五十有四矣明年移廉尋復官北歸以迄於沒距是才兩年耳風流笑傲蓋未嘗減也先是公在惠與中原故人書謂頗習其風土食物而議者亦謂公飲醎食腥凌暴颶霧恬然自樂觀於此帖豈直寄其謔浪笑傲而已友人朱子儋藏此五帖裝為一冊而附以叔黨三詩自由里寄至俾為評記公書尚敢評哉然涪翁謂公晚年書挾海上風濤之氣非餘人所能到則食蠔固優矣斜川詩語字畫妙有家法昔人謂能亂真乃翁此帖非題名固莫能辨也正德庚午正月二十八日跋倪元鎮二帖倪先生人品高軼風神𤣥朗故其翰札語言奕奕有晉宋人風氣雅慎交遊有所投贈莫非名流勝士右二帖一與慎獨有道一與寓齊先生慎獨為陳植叔方寓齊為袁泰仲長皆吳人陳之父曰寧極先生名深字子微袁之父曰靜春先生名易字通甫二父皆先宋遺老抱淵宏之才高不仕之節故二公淵源之學皆巋然為吳中師表特與倪公相善倪游吳中多於二陳氏及周正道家二陳其一為陳惟寅汝秩其一即慎獨也慎獨之孫紹先嘗仕為王府教授袁之孫某嘗仕為都察院檢校三十年前猶存余雖不及識然聞其人皆有前輩典刑今其子孫零廢理言遺事往往散落人皆得而寶之此則吾友黃郡博應龍所藏間徴豫題為疏其略如此跋趙松雪四帖右魏公四帖中一帖與鮮于太守有南來㑹晤之語蓋至元丁亥為兵部郎中奉使還家時所發是嵗公年三十有三常聞故老云公早年學思陵書及入仕後與鮮于公往還始専法二王此帖殆初學晉人時耶若與進之三帖皆率意而作莫不精妙雖無嵗月要為晚年書無疑且其中有鄧善之簽浙之語鄧公簽浙在延祐間公時六十餘矣觀者或疑此書如出兩手故為詳疏其事甫田集卷二十一
