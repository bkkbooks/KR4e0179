body:
  text: 甫田集卷三十明文徵明撰墓志銘七首李宗淵先生墓志銘宜興有朴學質行之士曰李宗淵先生形神木槁而博洽善文負其所有頗孑孑自好不能降意徇人人故不之喜而當世大人顧多好之往往折節與交而君卒亦不為之下也君少遊學官有聲一不合即棄去北遊京師徐文靖當國稍欲牢籠之不可拂衣竟歸家居授徒給養學者經其指授往往去取高科而君再試再詘遂屏不事舉業以古文自見其後年益髙貧益甚所知或稍振植之旋起旋仆卒困以死雖其命數所值如此要其志氣􅀈􅀈有不可以利勢軒輊者嗚呼足重哉君諱瀛字宗淵其先晉陵人國初有吉甫者贅宜興於氏生子文逺遂家宜興文遠藝而有文君之曾大父也大父某父某母邵氏生君六年而亡君能追思致孝又曲意事其後母孫孫有子四人獨賢愛君雖所生不逮也及諸弟長有室遂遜所居與之别營一室奉二親以居既而弟復有廢業者復遜而去之所至雖冥窔狹隘必事泛潔圖書行列花竹秀野客至焚香瀹茗燕笑以怡勢利紛華之事一不入其心惟喜讀書揚榷究竟必求抵止非若他人涉獵而已為文簡嚴不茍於投贈詩尤工往往更數歲改竄不已其敏勵精進白首不衰也所交皆天下士故少司空沈公暉吳文肅公儼今少司徒二泉先生邵公寶吾吳楊儀部君謙都太僕元敬處士沈周先生其尤厚者歲乙卯余試應天因元敬識君一言定交明年扁舟過余吳門示余所著書頗自悼其齟齬不遇余為著衍毁一篇自是歲必一至或再至雖相去數百里未嘗終數月不見也正德戊寅從其子采來留凡數日燒燈夜語意思悽然曰吾老恐不能數至尚庶幾兒輩無相忘耳蓋歸未幾而病病數月竟死嗚呼疇昔之言豈謂遂成永訣耶君生景泰六年乙亥六月四日卒正德十四年己卯三月十七日享年六十有五所著健齊集似遊録宜興新志多未脫稿娶蕭氏生子四人長即采今為縣學生次柔築蘖女適邵椿年葬以卒之又明年辛巳二月某日墓在縣南之篠嶺於是采以治命來乞銘銘曰荆流瀜瀜國巖嶐嶐維秀之鍾匪伊孰逢有隱先生崟崎歷落形槁心存怡怡寥廓翩其白羽泳於長波即之不得矧彼高羅崇之孽孽操之孑孑弗脂以韋寧劒之折篠嶺之陽有岡蜿蜒生斯藏斯是曰歸全明故嘉議大夫河南布政司右參政吳公墓志銘公姓吳氏諱愈字惟謙晚號遁翁世家蘇之崑山曾大父子才大父公式皇贈承德郎刑部主事父凱字相虞仕終禮部主客司主事修正彊執事母篤孝年四十棄官歸養以高年令終鄉人私諡貞孝先生母安人陳氏公生正統癸亥八月一日成化戊子以縣學生舉應天鄉試乙未舉禮部㑹試廷試賜進士出身戊戌授南京刑部廣東司主事己亥丁母憂甲辰復除本司主事歷貟外郎郎中𢎞治庚戌升四川叙州府知府癸亥進河南右參政明年甲子致仕嘉靖元年壬午以登極恩進階嘉議大夫五年丙戌五月十又九日終于家年八十有四公自少開朗書過目不忘嘗詣外舅夏公仲昭閲壁間文纍數百言閲已取筆書之不遺一字資既頴異又敏學彊解不遺餘力既連舉得雋益精進不懈初官法比即思明法以逹于政每退自公輒取獄詞翻閲探竟凡事始章程傳爰論報悉究而通之事至迎解不煩檢㑹所部兼理畿輔事尤苛劇公省决敏利庭無留獄析律詳明所當必允茍得其情雖貴勢不避時留守中官驕不奉法㑹有事當按公持之急中官使人宣言款公且懼以禍公酬對閒整語直而遜卒竟其獄不少骫骳然不為深文內庫遺火事連中司坐死者數人公具獄以比請尚書言情罪既得奚以比為公曰法如是不可踰也尚書執不從獄上何文肅公當讞閲其牘稱善曰此吳郎中筆也但所坐非正律宜以比言卒改用比律奏之尚書乃悔不用公言由是益任公每公當遷輒奏留之凡一再進官皆不離故署㑹詔大臣舉屬吏尚書鄭時侍郎徐懷聨章薦公堪長藩臬奏上而敘州之命已下敘去京師萬里俗獷喜訐吏多並緣為姦公始至判牘日以百數吏故矯列數事嘗之公且判且閲徐擲所矯數事訊吏吏即叩頭具伏公既精敏善發摘而濟以嚴重有犯即繩以法吏畏民懷訟用衰鮮尤慎刑獄每行縣録囚必有平反慶符盜正晝劫縣縣誣執二十七人皆抵死公審鞠左驗惟二人真盜乃悉縱遣二十五人其後果獲餘盜貴州都勻用兵叙當轉餉而道路險遠公調遣節適民不勞而事集出諸郡上有詔錫楮繈文幣旌之所屬長寧筠珙夷獠雜居剽悍易動公撫以恩信示之禮法久皆懷附然無故不輕調集㑹撫臣移文發其渠率至省閲習公執不遣曰犬羊之性未易擾伏萬一奔迸不可安輯撫臣不以為然必欲致之已而椎剽鹵掠旋不可制公手書片楮諭之即復弭帖蓋公推誠待物素為夷獠信向如此土官安鰲以馬湖叛有詔掩捕而叙實比壤藩臬重臣咸㑹於叙公言鰲輕剽無遠謀然器甲精利兵亦蹻捷未易攻取不若重圍困之彼中無水不一月可坐而降也議未决而鰲棄城走將糾諸夷為亂衆相顧不知所為公徐曰鰲在吾彀中矣問故曰彼以郡守將兵接戰勝負未可知既離巢穴一窮虜耳所轄諸酋長皆其深讐彼且無以自容又何能為因遣人襲而執之曾不血刃而元凶授首及改設流官其醜類不服復嘯境上劫郡印為亂衆益恇擾公親叩其壘好言諭之曰若等情有欲言言諸朝當有處分何以印為印出朝廷失一印復制一印於我無損若持去特一敗銅耳吾憐若以無用之物自陷罪辟故為若言若無以印為也衆即委印解散自首事至敉寧公皆在行間謀畫多自公出比奏報而賞不及公衆為不平公曰敘與虜接師或不競敘實先受禍此守臣責也今得無恙幸矣敢覬賞乎在郡九年劭農振業興學教民民靖化洽歲亦比登乃平繇更賦勾考邊儲之侵於民者得四十餘萬輸將轉調亦數十萬廪庾既充以時賑發流亡來歸戶口增羡郡以大治在河南兼理屯田時田多為藩府乾沒及勢家漁取或假中官芘覆厭抑詆讕莫能致詰公訾省鈎校多所緒正在省一年展采錯事方將有為而臺評出矣㑹蜀士有不恱公者復從中醖釀之而公亦已倦遊遂致仕去公識慮精審舉動詳緩每計事必要其終斟度分劑不少滲漏一時雖若迂逺而積久考成往往有餘沿牒往來非公事不輒乘官舫雖逺不給過所官中餽遺一不受亦不以官物遺人嘗自言在官經費一錢以上皆注籍令皆可覆其所為必視法所在故歷官中外未嘗一掛吏議其待屬吏特嚴雖所喜不少假色詞所不喜者亦不輒肆􅀈挫不立科條不收聲譽而質行履方往往出名上故所在政事卓卓而人鮮復稱之尤不欲有所附麗初登第觀政兵部部􅒼有與當路交比者雅喜公故為引重欲援致要地公謝曰某忝列進士入官自有本末因緣進取非所志也其人愧謝後當路敗所引咸坐廢而公無與時已韙公卓識其後益勵不變浮沉常調者垂三十年晚始邂逅一奮而竟以讒罷嗚呼此足以占公之所立矣家居尤事檢持出入起居咸有常度接人和而有辨故雖燕笑融洽而人莫敢慢易人有過不面加誚讓惟對之不言而已其待子弟亦然然人每以是候公顏色所加甚於質責也故諸子若孫咸孑孑自將無少縱弛閨庭雍睦訾毁不聞邑中稱詩禮家必首及之雅喜賔客宴設精鑿禮文詳雅周旋樽爼間終日忘倦晚歲聰明不衰音吐洪暢理言遺事記憶歷歷每對客舉似必深竟顛末風流雅尚奕奕照人蓋以高年令德為鄉邑之望者二十有二年嗚呼今則已矣有如公者可復得邪公娶夏氏太常卿仲昭女封安人有賢行先公三十年卒無子側室姚氏生子四人長東浦江縣丞次南國子生為仲兄靜菴後次西次守中國子生東西皆先卒夏安人生女三人長適王銀以子貴贈翰林院編修次陸伸戊辰進士死逆瑾時追贈大理寺評事次文徵明翰林院待詔側室趙氏生女二人適陸澯朱希韓餘一人尚幼孫男四人詩訪許詠詩國子生訪縣學生許夭女六人曽孫男二人女三人葬以卒之又明年戊子十二月十又七日墓在邑東積善鄉興仁里夏安人祔銘曰顯允吳公既貞既碩有言庚􅏤亦順其德侃侃貞孝為時令臣弗大厥施發于嗣人憲憲邦刑翼翼盛業豈曰世踐光于有烈維烈如何肅肅在公入守郎曹出疇民庸惟此叙服獠夷易豗有綏弗諼式柔永懷豈民則懷亦貞厥履穆穆􅌈􅌈納于仁軌道隆罔嚇功成不言天子有詔往奠中原有攸王臣既貞亦蹇時弗我違身則既倦菟裘既營式遄其歸公歸維何鄉人有依顯允吳公維民之則出建邦猷處範鄉國國則殄瘁斯人云亡後千萬年以允有光人亦有言維德則久我作銘詞尚詔厥後俞母文碩人墓志銘碩人文氏諱玉清先公溫州府君女弟徵明之姑也維我先大父少卿府君生子四人先公最長次即碩人皆出先大母陳夫人碩人甫四齡而陳夫人卒鞠於繼母顧夫人已而顧夫人又卒於時大父方遊校官家既赤貧荐罹多難幾不能自存碩人夙遭憫凶長益更練既笄歸俞氏為縣學生俞君濟伯之配俞故吳中名族業儒而貧碩人拮据卒瘏倍嘗虀苦而事􅀢嫜以禮相夫子順而有則俞君既數試不利家益困而二親日益老碩人事之益謹二親死俞君方試金陵家徒四壁又無強近親戚碩人盡撒環瑱囊衣以給􅀈事䡺禭纎悉情文畢備不令俞君少有遺憾嗚呼可謂難矣碩人少受學家庭通孝經語孟及小學諸書皆能成誦與人言必舉古訓行必踐之雖倉卒糾紛不少淆亂教子女必以道義不為姸嫌婉孌之態雖貧衣被完潔器物雖敝不輒棄與俞君處白首益恭或饎爨不繼亦無愠見之色先公及仲父中丞相繼起科第列官中外家日顯大碩人未嘗少有所干以是先公特賢愛之先公殁仲父中丞及今季父事之尤謹歲時來歸諸女婦若諸子姪迎侍恐後吉凶事必請而後行晚益慎重而意獨歡浹每為言文氏先貧時事以示規誨某歸自京師拜碩人牀下碩人撫慰甚至時中外至親雕落殆盡而碩人巋然尚存庶幾時時見之猶見吾先公也詎意哭仲父未幾又哭吾碩人嗚呼傷哉吾文氏自衡山徙蘇家世武辨我先大父諱洪始以文顯仕終淶水教諭以先公及仲父貴纍贈中憲大夫太僕寺少卿先大母陳贈安人繼顧及呂俱纍贈恭人碩人生正統己巳十月十六日卒嘉靖戊子十月二日享年八十子男三人長有慶先卒次有孚次有恆女四人長適縣學生顧春早寡刺目自誓有司以貞烈奏旌其門次適沈濓次吳岡次賀巽孫男三人女三人有孚以卒之明年十一月二日葬碩人梅灣祖營合俞君之兆俾某為銘義不得辭則敘而銘之俞氏之先具余所著俞君墓志兹不復云銘曰慧而明亦順而徵命之竒艱苦百罹蹈之弗違乃全而歸嗚呼噫嘻梅灣蒼蒼有封若堂是為俞君之藏碩人往偕後永有光彭寅甫墓志銘彭君寅甫以進士出知湖廣之公安便道過家戒其家人曰吾方服官政義不得顧家慎無以家纍我遂單車至縣縣屬荆南連江帶湖民貧而俗陋君披抉道利悉意拊循稍以經術緣飭之誕章敷化朞年而治成然軌道自信不復以文法自拘一時文法吏咸憎疾之而君不顧也㑹枝江盜發一夕斬關而入縣故無兵倉卒不能拒盜遂執君讋之以刃不屈披其槖空無一錢乃舍去曰是亷官也然帑藏所有燒劫略盡矣事聞有詔督捕定罪盜既得而藏繈無獲法得不問而素疾君者從而媒孽之坐不戢盜鐫一官責降廣東德慶州判官久之或言其非罪稍遷知廣之新㑹新㑹即古之岡州負山阻海夷獠雜居溪峒夷獠乘間時時竊發君至而鄰境已為賊據節鎮大臣方事招徠而夷性險譎不可擾馴稍急則降已復叛去勢不可終弭始議用兵而賊皆蹻捷阻險乘髙出沒不常官軍轉戰不前多所亡失無已取平民被誣者掠立成獄付縣杖之日以百數君既不義其所為多不時承令又供需浩穰不忍剝斂以徇用是積忤上官欲求其罪罷之捃托無所得乃以惰弱不勝任劾君而君亦倦逰矣既歸杜門掃軌不與流俗競相還往日發其所藏書披閲涵泳間為論著亦往往賦詩自悼然皆不以示人或時引酒酣暢輒復理詠意淒然若不能自釋者久之竟以疾不起嗚呼悲哉君性質融朗而氣復邁往少則勤苦自將能以志帥氣既通諸經又貫綜羣籍揚榷探竟得其雋腴發為文章馳騁奔放頃刻數千言而詞㫖精詣若出硎鍊激昻蹈厲以古人自期下視曹耦莫有當其意者然數試不偶年四十始領鄉薦繼登上第於是人始望之謂庶幾有以逹其志也而連宰二邑皆值俶擾方以厭難折衝從事而剛方直致與物齟齬竟連蹇骯髒以死凡其所負卓越之才精深之學與夫名世經遠之圖曽不得一試而竟亦莫有知之者嗚呼豈不重可悲哉彭氏世以高資甲於里中君既仕顯而先世田廬乃復加損其貞白之操有不可誣者而世之人顧以官簿不逹議君嗚呼君則何罪哉君諱昉字寅甫其先清江人高祖學一國初以尺籍徙隸蘇州衛遂居蘇之長洲曽祖仲英祖斌父至朴母某氏君生成化􅏤寅正月某日卒嘉靖七年戊子二月十又三日享年五十有九娶胡氏子男二人長年次科女一人適國子生劉遺明年庚寅葬吳縣隆池山既而墓為水所嚙二十年辛丑某月日改葬某山某原距君之卒十又三年矣銘曰氣則奇亦昌于詞而不利於施甫引而馳端厥綏中蹶以違吁嗟彭君其命之罹耶抑有盩於時耶明故鴻臚寺寺丞致仕錢君墓志銘嘉靖甲申錢君元抑以鴻臚丞致仕還長洲閲六年庚寅三月四日卒年五十有九是歲十二月草又八日葬闕鄉新阡嘗自為志至是其子寄文寄道復請為銘嗚呼余與君生同邑里少則同遊學官晚仕同朝相繼歸老於家延緣追逐四十年於此矣君雅喜交遊所與皆當世偉人而相從之久相知之深固莫余若也余不銘君將屬之誰哉君諱貴字元抑姓錢氏吳越武肅王之後宋有寶文閣學士諱端問者卒官平江遂家長洲漕湖之上君曾祖珖祖迪父腴世有隱德而腴尤業儒有聞以君貴贈文林郎太常寺典簿母陸氏贈安人君生頴異數歲聞父讀史從傍諦聽若領解者問之即能以意對父大奇之授以家學年十六選𨽻學官始從師習舉子業不數月悉通其義御史按試輒占高等𢎞治戊午中應天府鄉試益淬礪精進期取甲科既而試禮部數不中而其名日益起從遊者日衆君質義演榷必盡底裏又為游揚引重使皆有聞一時學者咸親附之正德辛巳以太學生試吏部入格授太常寺典簿時方用羽流為太常卿少君上言秩宗之任典司禮樂統和神人職重位尊不宜以異端參列其中又言太監蕭敬叨陂懷諼屢遭論劾不宜在上左右又集姦璫王振曹吉祥劉瑾事著三患傳上之時上新即位中官有用事之漸君言隱然有所指陳人咸韙之㑹有事興獻帝園陵君奉詔副大臣往治禮儀禮成復命賜白金五十兩及追崇議起君因論籩豆之數乘間有所論列或謂非所宜言君曰吾職祠事既有知不敢不以聞禍福非所計也在太常三年執事節適多所建正而操亷履慎莫或過舉既舉最當遷而君雅有歸志遂上疏乞骸骨朝廷以年未及不許疏再上乃進今官以榮其歸既歸即治塜壙於所居之傍治木待盡人以君年甫艾服不應有此方共訝之而豈意其遽止於是耶君篤於倫誼事二親孝喪之戚而有禮待族屬尤有恩義家居為善族㑹㑹必導以義方申以法守使咸順于道或緩急有求必極力拯之至於家人生植則未嘗出口所居或不蔽風雨饎㸑朝夕或時不繼皆泊然不以為意賦性敦悃而有情致雖中存介辨而接物圓融未嘗以詐逆人人有過必曲為覆護務不令人知而稱人之善常若不及或有推薦往往不自知其身之窮而赴人之急恆自忘其家之匱也君學博而識精辨析亹亹能起人意文詞藻麗所論著爾雅有法一時文學之士咸讓能焉及官中朝與翰林應元忠鄒謙之遊而太常博士馬子闕陳惟濬又聨官相好諸君皆道學名流君與朝夕下上其論議始從事於治心養性而一切支離文字悉謝去老退林下益集諸生相與講明其說僴然自以為有得每以文藝喪志諷余而朂余以道余笑曰人有能有不能各從其志可也一時或有異同之論而余與君實相好無間嗚呼言猶在耳而君不可作矣尚忍言哉尚忍言哉君所著有易通乾坤纂遺讀史例餘吳越紀餘檀天解略騷經標注有問録杜律便覽芹遊記太常都編總若干卷藏于家娶鄒氏封孺人子男二人寄文寄道俱文學弟子員銘曰有卓斯道匪人弗立匪文弗宣繄言而克矯矯錢君賦才孔良神明內腴式昭用揚既藝以紛靡言不析乃終有融㑹言歸極翼翼秩宗豈不有試位卑言高維時之罪乃卷而懷遂厥有初彼將不足我恆有餘何以餘斯身則有道弗究厥施式隆于教惟教有成道斯用明志斯用行乃困而寧矯矯錢君實德則踐胡身之修而年弗衍其所不亡遺書陸離孰云匪至道乃在茲漕湖之陽有𤣥者宅我銘君藏後有考德杜允勝墓志銘嘉靖辛卯杜君允勝以郡學生試應天病不克試歸卒於家家貧不能喪故人門生相與賻而葬之陳君道通實經紀其事以余最故俾為之銘嗚呼允勝一至于是耶允勝貌不甚揚而風度雅馴外若憒眊而精明內藴皂白井然微有瞶疾而四方之事無不采聽對客舉似蟬聨纚屬無有掛漏聰明者不逮也至人有過亦不為諱然亦樂道人善故人雖或疾之而終不能勝夫憐之者之多也余與君比里而居又志業相契每有疑義必從君問難數日不見必有異聞所為資益余者甚衆而今已矣嗚呼有如君者可復得耶君少羸多疾故學最晚而其志最篤家世以醫顯君雖習醫而雅不欲以藝名遂從經師受易鑽研淬礪窮日夜不休有聲望出已上者輒從之講習析理辨疑斷斷懇至有得輒手自箋記毫劄精謹朱墨燦然眀經之士咸讓其能而君不以自足王文恪公歸自內閣遂往遊其門因得作文之要益務博綜羣經子史靡不講習下至稗官小說若唐宋諸名賢文集亦皆雋永而掇其腴聞人有異書輒走求之期以必得得則手自繕寫祈寒盛暑不離占畢故其學粹而深為文光潔而傳於理非如一時舉子工為程試之文而已自正德丙子至嘉靖戊子凡五試試輒斥然每斥而其學輒益進至是極矣而竟不售以死嗚呼豈不有命哉君諱璠字允勝别號淡巖先世淞江之青龍鎮人曾大父宗敏贅於長洲林子恆氏故今為長洲人大父明善父恆菴先生祥仕為崇明醫學訓科初恆菴娶於吳生二子璧琮皆長大美好而君出於少房已又喪其所生母顔氏嫡母憐而鞠之及是二兄相繼物故而恆菴夫婦並高年令終生事死葬君能致力焉君兩娶皆劉生子四人錞銶鏞鈁女三人孫男一人君卒於是嵗九月二十有七日享年五十卒之後某月某日葬魏珠山祖塋之次以劉氏祔銘曰學則充亦藝而工豈不有庸而卒困以終吁其逢亡兄雙湖府君墓志銘府君諱奎字徵靜後以字行别字靜伯有田在陽城沙湖之間因號雙湖居士吾文氏自廬陵徙衡山再徙蘇占數長洲高祖而上世以武胄相承至曾大父存心府君諱惠始業儒教授里中先大父諱洪始登科為淶水教諭後以先君升朝追贈太僕寺丞繼以叔父中丞貴加少卿先君諱林起進士仕終溫州知府先夫人祁氏府君生成化己丑七月草八日卒嘉靖丙申五月草日是嵗閏月十日葬吳縣梅灣從先君之兆配姚氏子男三人長伯仁娶朱氏次仲義娶王氏俱縣學生又次叔禮出贅淞江趙氏女一人適劉稚孫孫男四人女五人府君讀書善筆劄聰明彊解逹於事理平生氣義自勝不為貴勢詘折雖素所狎嫟一不當其意輒面加詆訶至人不能堪不為止然不藏怒畜怨或時忤人人方以為懟而府君則既忘之矣人知其易直亦樂親附之然卒不能勝夫不知者之衆也居常嚴於事先旦起必衣冠謁先祠非有故及疾病未嘗一日廢歲時祭享必精必慎遇時物必薦或未薦雖倉卒燕㑹不輒入口待里黨姻族有情緩急有求必為盡力雖宿有嫌釁悉置不問某少則同業長同遊學官依戀翕協白首益親癸未之嵗隨計北上府君追送至吕城執手欷歔意極慘阻比歸相見甚歡自是數年無時日不見疾且革顧謂某曰吾生無善狀即死慎無為銘譽我取人譏笑無益也其明逹如此雖然不可以不志也銘曰維伉而直弗以勢詘弗仇有疾而維義之克豈不有嚴秩秩先宗肅言將之敬德維躬生無矯情矢死弗欺乃坦有夷乃全而歸隰隰墓田于梅之灣葬從先公式永以安甫田集卷三十
