body:
  text: 甫田集卷六明文徵明撰詩三十九首甲戌嵗朝明日立春東坡元日詩有土牛明日莫辭春之句因以為韻賦七詩三元肇兹辰東風被衡宇青春麗雲日朱光已垂户駮隂不窮寒朝和散為雨死草行復菲潛陽滋下土昨日風北厲長河水膠舟今日暢柔和好鳥鳴高丘芳春肇伊始寒氣畢泥牛誰為頌椒花引酒聊自酬芳埃潤朝雨風幡麗春明感時念所期駕言出春城賞心每差池古人崇合并漫刺無所投悵然返柴荆東郊迎新春寒氣從此畢先民季冬儺時制用先日通衢聞鼓吹士女空戶出歡悰不復遭撫時還自失青陽逐寒回今日已非昨辛盤忽在眼引酒聊自酌古人惜端良今我胡不樂啓扉得嘉賔相對慰寂寞開嵗四十五吾行已云衰豈乏青雲志老大難為期學道苦無成白首操文辭東風泛碧草緬然起遐思梅花忽已動嵗時行亦新傾城出行樂誰念端居人端居豈不好負此芳樹春昨嵗花前客今為樹下塵新正六日同子重晚步至竹堂佛座香燈竹裏茶新年行樂得僧家蕭然人境無車馬次苐空門有嵗華幾日南風消積雪一番春色到梅花坐吟殘照歸來緩古樹荒煙散晚鴉次韻答子重新春見懷樽酒離懷強自開長歌宛轉勝悲哀梅花不與春光在茅屋相將燕子來十日殘寒風約雨一痕新緑水生苔相思忽唱江南曲白苧含香取次裁次韻履仁春江即事二月江南黃鳥鳴春江千里緑波平朱甍碧瓦參差去水荇蘭苕次苐生風外鞦韆何處笑日斜鐘鼓隔花晴洞庭煙靄孤舟逺茂苑芳菲萬井明唱斷竹枝空復恨流連芳草不勝情何時載酒橫塘去共聽吳娃打槳聲題沈氏所藏石田臨小米大姚江圖長洲沈氏舊藏小米真迹成化間有假中官之勢取之石田為追摹此圖春雲沉空山有無眼明見此姚江圖圖窮爛漫得題字照人百顆驪龍珠平生雅識敷文書紹興嵗月仍不誣豈知尤物能媒禍繭紙蘭亭已非故石翁信是學行人能使邯鄲還故步憶昔憸人賄為囿黷財更假狂閹手千里珍竒歸撿括故家舊物那容守沈氏藏兹二百年一相掣去心茫然誰言物聚必有散手澤相關常纍歎未能一笑付忘弓且喜百年還舊觀豈余鈍眼錯顔標抵掌真成孫叔敖區區不獨形模似更存風骨驪黃外一時點筆逈通神得非小米是前身從來藝事關人品敢謂今人非古人三月晦日登上方上方啼鳥緑隂成落日登臨宿雨晴春事蹉跎三月盡碧天浮動五湖明山連越壘人何在水繞長洲草自生未遂扁舟從此去眼中無限白鷗情虎丘雲巖四月野棠開無數清隂覆緑苔意到不嫌山近郭春歸聊與客登臺芳墳誰識真娘墓水品曽遭陸羽來滿路碧煙風自散月中徐棹酒船回五月十三夜與子重履約履仁石湖行春橋看月夕光沉山蒼靄橫行春橋東江月生長風吹波天鏡濶白沙渺渺菰蒲聲微瀾壓玉搖空明扁舟忽動江湖情罾頭魚蝦夜可買得酒試與諸君傾山空夜久人竟醉髙歌互答漁舟驚漁舟天上來棹入滄溟去似聞漁歌縹眇不斷出煙蘿水逺天長不知處一髮青山落鏡中萬里橫河碧空曙人生行樂不易得賞心况有樽前客江山如畫酒如澠相看不飲空頭白不見橋東千尺臺吳王曽此夜銜杯歡燕不堪芳漏促西施舞罷越兵來越兵已成功越王安在哉鴟夷竟去不復回吳宫越壘空復生蒼苔千古興亡總湮滅只有湖山未消歇吳王去來今幾時幾人能醉湖中月追和楊鐵崖石湖花遊曲石湖雨歇山空濛美人却扇歌回風歌聲宛轉菱花裏鴛鴦飛來天拍水當時仙伯醉雲門酒痕翻汚石榴裙遺蹤無復芳塵步湖上空餘昔人墓昔人既去今人來千載風流付一杯雪藕縈絲薦氷碗蛺蝶飛來逐歌板夕陽剛在畫橋西一段春光屬品題傷心不見催花使只有黃鸝啼再四無限春愁誰與箋玉奴會唱紫霞篇同次明諸君采蓮涇間泛采蓮涇上雨初收秋色催人爛漫遊日暮白蘋風乍起陂南黃葉水交流美人齊唱滄浪曲綵鷁斜穿窈窕洲落盡晚花無那冷一樽相屬更夷猶石湖石湖煙水望中迷湖上花深鳥亂啼芳草自生茶磨嶺畫橋橫注越來溪涼風嫋嫋青蘋末往事悠悠白日西依舊江波秋月墮傷心莫唱夜烏栖張明逺索畫久而未成嵗暮隂寒雪霰將集齋居無聊為寫溪山欲雪圖并賦短句嵗暮天欲雪郊原風色饒山寒增突兀樹暝入蕭條野水照茅屋歸人爭斷橋窗前有新句欲覔已寥寥題高房山橫軸春雲離離浮紙膚翠攢百疊山糢糊山空雲斷得流水咫尺萬里開江湖依然灌莽帶茅屋亦復斷渚迷菰蒲岡巒出沒互隱見明晦隂晴日千變平生未省識匡廬玉削芙蓉正當面宛轉香罏霏紫煙依稀夢澤分秋練未遂扁舟夢裏遊酒醒獨展燈前卷問誰能事奪天工前元畫史推高公已應氣概吞北苑未合胸次饒南宫南宫已矣北苑死百年惟有房山耳秪今遺墨已無多窗前把卷重摩挲世間吮筆爭么麼掃滅畦徑奈爾高公何劒守南寧李君璧與余雅不相識比以仁和教諭校文南畿頗有意於淺薄格於異經不果薦甲戌自杭赴蜀道出吳門邂逅及此因賦贈二詩木落柴門轍迹荒使君五馬自錢塘虛名羞問吳楓冷往事空憐古戰場邂逅扁舟江郭晚蒼茫離思蜀山長殷勤相勸勞相憶手結青蘭雜佩香使君策士南畿日曽把文章謁後塵今古成名真有命江湖知己負斯人一經已浹錢塘化五馬還行劒閣春回首吳山應入夢野雲楓葉渺通津春日懷子重履約履仁梅花繞樹玉叢叢憶共花前醉晚風别後輸君能領略春光曽不到城中二月東風已物華誰教寂寞向僧家關心夜雨應無寐侵曉開門看杏花湖上花枝暖欲然寺前楊栁緑生煙憑君莫信春光早寶積山頭有杜鵑新晴積雨浮宿潤新晴人意適消搖竹窗中啼禽破幽寂初陽動簷瓦殘溜時自滴曲巷行迹稀苔花繡深壁寄宜興杭道卿古洞花深謝豹啼春來頻夢到荆溪坐消嵗月渾無迹老惜交遊苦不齊多難共添新白髮翻書時得舊封題亦知造物能相忌從此聲名莫厭低簡履仁端居苦長夏思我平生友獨坐聞車音開軒竟何有空庭飛鳥雀間門蔭榆栁白雲團午隂悠然落虛牖對此情更怡無能共樽酒西郭隱層樓下臨清江口積雨江流深南風藕花秀相望不可即長吟一搔首晚意風吹白苧晚涼生乍試蘭湯尚不勝阿閣東頭新月上玉盂纎手自調氷送春野桃開盡麥初秋十日南風柘葉稠水暖池塘飛乳鴨雨深籬落長牽牛似聞弄玉催團扇誰見凝籹上翠樓便擬開樽歌此曲只應春酒解消愁戲簡履約青天缺月映江流不見嫦娥抱影愁玉宇參差孤笛起夜深獨上水西樓新秋江城秋色淨堪憐翠栁鳴蜩鎖斷煙南國新涼歌白苧西湖夜雨落紅蓮美人寂寞空愁暮華髮雕零不待年莫去倚闌添悵望夕陽多在小樓前承天寺中隱堂古徑無車馬間門帶蔦蘿秋風吹宿雨日暮盻庭柯世味逢僧盡新涼入寺多居山未有計此地數來過憶城西夜遊寄履約兄弟官街車馬去如流正是濠南宿雨收燈火蘭橋穿夜市月明歌吹滿江樓别來西郭添新夢坐對秋風感舊遊黃菊凄涼重九近思君欲上五湖舟月夜葛氏墓飲酒與子重履仁同賦明月照行路青松起悲風涼秋饒霜露草木行已空顧影不自得起行荒寂中道逢雙石闕知為古幽宫古人不可見豐碑自穹窿上題生前爵下表沒世功辛勤名世圖嵗久已塵蒙剔蘚三過讀漫滅不可終人生本柔脆所恃身後公金石且復爾浮雲安足崇步出城西門言登葛君墓葛君生世時聲光盛流布那知百年內倐忽草頭露遺骸委空山風雨誰一顧寒月照玄堂荒蒿斷行路誰應識君來惟有青松樹見樹不見人青松乃堅固乃知人易雕獨以嬰情故鑒此念前人云胡復悲慕驚風西北來肅然動情愫揚杯謝諸公願言保遲暮履仁獨留治平寒夜有懷遙遙治平寺乃在楞伽麓之子神情秀空山裹雲宿月冷石林清孤眠豈能熟還持一束書起傍梅花讀燈昏夜參半飢鼠鳴古屋凄風西北來吹墮簷間木感此霜露繁坐覺芳華促少壯曽幾時嵗月在空谷念子隔重城何能慰幽獨玄隂失昏旦朔吹號枯株懷君别未久奄忽嵗云徂空庭飄微霰慘淡集飢烏城郭黯以淒况復空村居空村白日短寒雲暗郊墟青山不為容黃葉繞精廬遙知松窗下時披古人書古人不可見願言掇其腴誰令事干祿雕􅦒失其初嗟余亦喪志與子同厥趨豈不懷逺業均受貧賤驅朱門富華屋長途有高車寧知飢寒士一飽不願餘棲棲斥鷃翔豈與鴻鵠俱何當長風發共奪青雲衢立春日遲道復不至東風吹綵燕曉色動簾旌遲子不時至南樓春自生裁詩供帖子閣酒聽啼鶯白日流雲暖梅花初雪晴間窗落香燼殘火宿茶鐺敗葉鳴階圮分明識履聲春日遊支硎天平諸山麥隴風微燕子斜雨晴雲日麗江沙遙尋支遁煙中寺初見天平道上花過眼溪山勞應接方春草樹發光華夕陽半嶺歸輿急慚愧城中自有家煎茶詩贈履約嫩湯自候魚生眼新茗還誇翠展旗穀雨江南佳節近惠泉山下小船歸山人紗帽籠頭處禪榻風花繞鬢飛酒客不通塵夢醒卧看春日下松扉陪蒲澗諸公遊石湖橫塘西下水如油拂岸垂楊翠欲流落日誰歌桃葉渡涼風徐渡藕花洲蕭然白雨醒煩暑無賴青山破晚愁滿目煙波情不極遊人還上木蘭舟客贈閩蘭秋來忽發兩叢清香可愛靈根珍重自甌東紺碧吹香玉兩叢和露紉為湘水佩凌風如到蕊珠宫誰言别有幽貞在我已相忘臭味中老去相如才思減臨窗欲賦不能工七月六日喜雨一雨蕭然萬瓦鳴好風如水坐來生江聲入夜驚圍屋秋色明朝定滿城郊外共知農事足里中爭説長官清野人何以酬佳興自汲新泉破茗烹邵二泉司徒以惠山泉餉白巖先生適吳宗伯寧菴寄陽羡茶亦至白巖烹以飲客命余賦詩諫議印封陽羡茗衛公驛送惠山泉百年佳話人兼勝一笑風簷手自煎間興未誇禪榻畔月明還到酒樽前品嘗只合王公貴慚愧清風被玉川失解東歸口占七試無成只自憐東歸還逐下江船向來罪業無人識虛占時名二十年初歸檢理停雲館有感京塵兩月暗征衫此日停雲一解顔道路何如故鄉好琴書能待主人還已過壯嵗悲華髮敢負明時問碧山百事不營惟美睡黃花時節雨班班九日子畏北莊小集野蔓藤梢竹束籬城闉曲處有茆茨主人蕭散同元亮勝日登臨繼牧之踏雨不嫌莎徑滑撫時終恨菊花遲欲酬良會須沉醉况有霜螯送酒巵過履約浪迹歸來意渺茫思君今日上君堂厭看流俗求同志喜對時羞是故鄉白髮持螯能幾醉黃花在眼即重陽馬蹄不到闌干曲日暮江樓數鴈行采蓮圖橫塘西頭春水生荷花落日照人眀花深葉暗不辨人有時葉底聞歌聲歌聲宛轉誰家女自把雙橈擊蘭渚不愁擊渚濺紅裳水中驚起雙鴛鴦采桑圖茜裙青袂誰家女結伴牆東採桑去採桑日暮怕歸遲室中箔寒蠶苦飢只愁牆下桑葉稀不知牆頭花亂飛一春辛苦只自知百年能著幾羅衣有懷觀音菴舊遊曲巷不容車馬到山人曽是一春留别來空鎖眠雲榻嵗晚常懷聽雨樓窗外梨花應自好壁間詩草屬誰收似聞黃葉秋逾靜憔悴無心覔舊遊次韻答九逵見寄季子徒存舌相如已倦遊人方誇北苑吾自愛東丘病卧吳門雨遙憐震澤秋渚雲淹暮景江草識離憂朴學難為用微名費屢求千金懷敝帚半夜失藏舟伏櫪餘初志投襦愧本謀網羅空自密零落不堪收楞伽寺湖山樓石湖春盡水交流來上支公百尺樓尊酒吟分茶磨雨疏簾橫捲越城秋一窗粉墨開圖畫葛里風煙入卧遊正是倚闌愁絶處不禁長笛起滄洲雪景愁雲滅沒無飛鳥新水微茫有斷津誰識溪南千壘玉輸他高閣倚闌人甫田集卷六
