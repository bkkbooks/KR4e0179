body:
  text: 甫田集卷十一明文徵明撰詩五十首送冡宰朱玉峯之南京留司晚望重衡鈞三十年來侍從臣逺去獨安恬退節衆中欣見老成人兩京規制遙相望六代江山迹未陳盛世宦遊應自樂有人東望惜音塵晚通仕籍喜同朝此去江東屬望勞留務從來須長者雅懷自喜得間曹百年家世睢陽重一代文章甲榜髙去去壯遊知未巳秋霜才入鬢邊毛送孫從一編修僉憲浙江羡君瀟灑玉堂仙顧我飄零亦備員海內論交兼兩世班行聮署恰三年别腸忍折燕臺栁宦況遙飛越水船誰謂江南身漸逺憂心常在五雲邊盛斯顯南京司封薊門秋風天早寒潞河生波楊栁殘沙塵吹衣日色薄仙郎九月辭長安長安東下浮官舸去去心馳大江左人情往往計南北委順知君無不可憶我前年入國門連珂接珮多鄉人豈無同朝歡不及同鄉美蕭條逆旅中吳音更堪喜宦轍羇人不得齊一朝散去各東西向來坐客日以減子行更使吾悽惋何如重為交遊惜再世通家非一日況也葭莩添姻戚人生得意無南北我漫惜君君自適建業江山天下竒聖皇昔此開鴻基穹宫傑構比豐鎬列職分曹同保釐百年形勝真雄壯奕葉名家更清暢畫省雍容如列仙簿書蕭散清而間坐曹讀書百不關有時騎馬看鍾山送趙麗卿青驄欵欵斾悠悠遙指孤雲向石頭到日長安應在望夕陽江上更登樓旅居鄰近最多情幾度趨朝並馬行今日吾留君却去共誰長樂聽鐘聲西風吹散馬頭塵忍見南來白水津不獨别離傷逺道衰遲亦是要歸人清秋北鴈盡南征我獨東歸計未成為計金陵文酒伴年來白髮滿頭生送洪玉方才接鴛行喜有餘又驅王事駕軺車君頻有役難為别我老思家欲附書道路風波方浩蕩歲寒氷雪定何如此行國計從知重四海民勞亦可虞送于器之亷憲還滁東風吹盡燕臺雪潞水垂楊已堪折自笑人生得幾時三年兩度都門别都門日日有行人我獨與君情最親向來宦轍苦南北去此尚是江湖身君向江湖我塵土從此雲山亦修阻豈惟去住隔雲泥本自疆封限吳楚憶得滁陽始相見紺髮垂雲俱弱冠四十年來轉首空升沉異勢容顔變不獨容顔改舊時世情翻覆浮雲移江湖風月足濤浪道路天險藏嶔􅀢君能不易平生志豈識人間有機事不將嫵媚獵時名更樹風聲招物忌踐揚中外垂草年空囊羸馬意蕭然昻藏不受世人識骯髒徒為知己憐知己憐君君不恨浙水東西有公論但須俯仰面無慚未怕憐􅀈身獨困平生頗厭乞墦徒昏夜哀憐正堪憫若教遊宦損初心相去中間不能寸此志悠悠我獨知青山不負當年期幽谷雲深每獨往琅琊月出詠歸遲醉翁亭下泉堪釀君去歸兮我惆悵四時朝暮古人情同負幽懷不同賞送盧師陳奉使紫荆關季冬繁霜雪塞草寒不菲之子遵朔方駕言即長岐揚旍灞水北促轡漁陽西豈不念修阻王程有嚴期丈夫既策名委身事馳驅咨諏重將指辛苦焉得辭况君志逺遊夙昔攻文詞上谷古雄鎮幽并勢威夷於焉寄慷慨亦足宣遐思豈若抱槧人終年守金閨鳴珂紫雲闕端簡白玉墀通籍豈不佳旅進曾何俾古賢榮有事去子行無稽念惟羇愁中復此相仳離長風西北來吹我雙鬢絲髙歌激清商願倒風前巵送王承恩侍講參政四川鳥道巇嶇萬里賖從臣分省向三巴中朝聲望雲山重內史文章錦水華爛熳新恩蒼玉節依然舊署紫薇花只應未忘論思地翹首金鑾北斗斜送蔡巨源參政草年湖海漫相知再見都城總别離旅客倦遊常卧病使君王事有程期清風萬里閩山節明月孤舟潞水思塵土欺人雙鬢短不知何處更論詩送陸舉之三載追隨供奉班方舟千里又同還君行問寢辭青瑣我已焚魚住碧山塵土自憐羸馬倦江湖莫羡白鷗間匆匆手袂何須戀剡曲吳淞一水間致仕出京言懷獨騎羸馬出楓宸回首長安萬斛塵白髮豈堪供世事青山自古有間人荒餘三徑猶存菊興落扁舟不為蓴老得一官常臥病可能勳業上麒麟白髮蕭疏老祕書倦遊零落病相如三年漫索長安米一日歸乘下澤車坐對西山朝氣爽夢回東壁夜忩虛玉蘭堂下秋風早幽竹黃花不負余馬上口占謝諸送客十首三忠祠下夕陽明幾度含情送客行今日諸君還送我多應不異昔時情昔時送客每懷歸千里鄉心日夜飛回首三年幾離别只應今度不沾衣小試間官便乞身素衣曾不染緇塵諸君亦自多情致不送官人送散人散人草載盜虛聲敢謂從前少宦情補衮銘鍾羣彥在功名原不到書生解却朝衫别帝州一竿煙水五湖舟故人莫作登仙看老病無能自合休諸君送我帝城東立馬傳杯犯朔風莫嘆栁枯難折贈春光都在酒波中别酒淋漓滿路岐酒闌無奈客東西多情獨有斜陽色一路殷勤送馬蹄浮雲世事兩悠悠一出都門百念休獨有懷人情不極雙溝南畔數回頭立馬雙橋日欲斜沙塵吹霧暗征車從今絶迹江南去只見青山不見沙三載愁聞長樂鍾夢魂常繞五湖東此身忽在扁舟上開眼猶疑是夢中阻冰潞河簡同行黃太史才伯長河十月朔風悲零落貂裘不受吹冰雪崢嶸驚歲晚江湖寂寞滯歸期誰憐阮籍窮途泣自笑穰侯見事遲忽憶同行黃太史篝燈何處擁書帷次韻答徐子容學士見懷三首解却從前供奉衣朝行除籍簡書稀非關疏拙明時棄自惜驅馳雅志違飄泊又驚年欲暮蹉跎再見月流輝玉堂學士青雲上也念天涯人未歸霜華慘淡襲征衣關朔蕭條鴈影稀遊子天涯苦行役故人歲晚惜分違還家短夢秋無賴伴客殘缸夜有輝猶勝前時羸馬上滿頭風雪趂朝歸南來拂拭芰荷衣旋覺沙塵出郭稀我已去來無復戀天於人事每多違流澌十月關河冷積雪千山草木輝想見幽居無限好春風應待主人歸次韻答唐雲卿禮部二首關河歲晏客衣單滿鬢秋風裹鶡冠塵土自憐疲馬倦江湖誰念白鷗寒去來信有天機在閲歷方知道路難憔悴不忘飄泊處方舟冰雪潞河干漂泊東吳萬里船漫勞詩帖慰窮年君知世有東方朔我愧身非魯仲連夢斷五湖天渺渺愁懸雙杵月娟娟相逢總是羇棲者目送飛鴻共黯然次韻答張西峯少參司空揣分自宜休元亮無心任去留四海何人憐白髮百年吾道有滄洲破除塵夢惺惺在點檢山林事事幽即去已輸君一著十年前與白雲遊臘日與才伯小酌追懷去臘午門賜燕去歲嘉平燕紫宫長筵錯落午門東一時隨例沾恩澤此日追思嘆轉蓬節敘不禁雙鬢改江湖猶幸一樽同栁條萱草何須問且共天涯目斷鴻旅懷隂凝冰未泮雪盡歲還窮世事浮榮外生涯久病中心旌搖落日天影度冥鴻短髮垂垂白那堪犯朔風野行因過廢寺久客念搖落意行還寂寥餘寒棲短褐斜日帶荒寮歲事行將盡羇魂黯欲銷雲房才咫尺便覺逺塵囂某比以筆劄逋緩應酬為勞且聞有露章薦留者才伯貽詩見戲輒亦用韻解嘲不用浮文薦子虛底須滄海問遺珠若為尚作稽康纍懶慢難酬滿案書絶澗深林付窅冥三年慚負草堂靈青山應笑東方朔何用俳優辱漢廷千年處士説林逋漫有聲名達帝都只辨梅花新句好莫論封禪有書無春風次第水增波千里清淮一棹過更恐南行勞應接隨堤新栁似新鵝平生藝苑説荆關點筆雖忙意却間何用更騎黃犢去右丞胸次有江山才伯過訪落日生愁地窮隂欲雪天歸心聞斷鴈衰鬢逼殘年光景陳編裏情懷薄酒邊平生黃叔度相見即欣然除夕二首撥盡罏灰夜欲晨不知飄泊潞河濱燈花自照還家夢道路誰憐去國人浩蕩江湖容白髮蹉跎舟楫待青春只應免逐雞聲起無復鳴珂候紫宸黯黯離愁酒半醺不眠間讀送窮文旅忩燈火寒猶在村巷雞聲歲又分千里家山歸有漸百年心事老無聞未妨去國還飄泊已把間身等白雲丁亥元日次才伯韻二首東風早晚到天涯客子逢春正憶家柏葉漫傳元旦酒江梅應發故園花不愁逆旅無親戚依舊江湖有歲華深負鄭莊騰薦剡遊巖痼疾久煙霞鄭謂啓範也朝日曈曨照水涯春風次第到貧家輕煙漠漠初含栁殘雪飛飛不作花芳草開筵酬上日紫雲飛鞚憶東華即須作伴還鄉去滄海東頭看落霞冰泮志喜次黃才伯韻吹面東風不作寒斷冰千片下晴灘已看積雪經冬盡正好垂楊映水看滿目江山勞應接到家櫻筍未闌殘只應今夜扁舟夢先繞吳門鬭鴨闌過揚州登平山堂二首鶯啼三月過維揚來上平山郭外堂江左繁華隋栁盡淮南形勝蜀岡長百年往事悲陳迹千里歸人喜近鄉滿地落花春醉醒晚風吹雨過雷塘平山堂上草芊綿學士風流五百年往事難追嘉祐迹間情聊試大明泉隔江秀色千峯雨落日平林萬井煙最是登臨易生感歸心遙落片帆前還家志喜緑樹成隂徑有苔園廬無恙客歸來清朝自是容疏懶明主何嘗棄不才林壑豈無投老地煙霞常護讀書臺石湖東畔橫塘路多少山花待我開甫田集卷十一
