body:
  text: 甫田集卷九明文徴明撰詩三十八首五月五月雨晴梅子肥杏花吹盡燕飛飛時光已到青團扇士女新裁白苧衣黃鳥故能供寂寞緑隂何必减芳菲子雲自得幽居樂不恨門前轍跡稀金陵中秋雨晴秋色滿長安月貫黃雲百寶團見說清光天下共不圖今夜客中看天垂紫禁星河淡江繞金城風露寒吹斷碧簫丹桂發玉人何處倚䦨干不寐欹枕數寒更漫漫不能旦天寒雞再號燈昏鼠窺案藥罏火已微羣兒睡方鼾清風自何來冷然動虛幔病眼苦不眠循牀發遐嘆人世百年短吾生已強半况此貧賤軀時為小兒玩一卧五經旬形消髮垂燦神情日以摧志業交凌亂豈不懷明時流光榻中換平生二三友雅志在霄漢下夀曽不滿半逐浮雲散感此念微名悠悠何足羡明月度孤音霜華滿庭院病中久病生蟣虱搔頭有雪霜自憐身蹇劣漸與老相將擁榻衾裯薄挑燈刻漏長意衰神亦倦心事轉茫茫敗褐擁殘軀寒檠照屋廬轉憐兒女好漸覺友朋踈藥餌恆侵食胸懷久廢書明朝休覽鏡不是舊頭顱明經三十載潦倒雪盈簮疾病乘虛入摧頽覺老侵安心方外藥適趣箇中琴淡泊窮生計高人獨賞音一病連三月侵尋嵗又更人皆傳已死吾亦厭餘生髮脫相將盡耳虛時自鳴安心是良藥此外復何營揚州道中次九逵韻一痕春草緑含滋滿目風波聽竹枝多少兩京賢相業江都獨有仲舒祠維揚煙水帶江湖仙客帆開十幅蒲不是白雲遮望眼平山山色本糢糊揚州竹西簫管玉參差栁外樓臺舞陸離落日蕪城非故國春風后土有荒祠錦帆煙月千年夢禪榻情懷兩鬢絲二十四橋何處是扁舟西去不勝思徐州清明新煙一抹起茆茨翠栁千門映酒旗此日斷魂當客路誰家濺淚有花枝等閒行役輕墳墓忽漫逢春感嵗時日暮滿帆風獵獵蕭然雙鬢不禁吹泊舟泗上看月停舟清泗興無涯夜起蓬窗看月華灝氣一涵開玉府鏡光千道走金蛇碧空顛倒山流翠白石巉巗浪蹙花酒醒分明天上坐更從何處覔星槎留城道中有張良祠古隄楊栁緑絲柔盡日南風送客舟百里青徐平入望千年汴泗正交流草荒霸業春過沛月滿叢祠夜泊留老去馬遷心尚在不妨書劒事遨遊道出淮泗舟中閲髙常侍集有自淇涉黃河十二首因次其韻揚舲入淮泗春雲去閒閒彭門在何許仰見雲龍山逝矣黃樓人清風邈難攀坐令千載輕宇宙俯仰間燕燕語檣頭鳬鷖遵枉渚凡物囿化機飛鳴各求侣羇人獨何如託身無處所皎皎青天雲悠然自遐舉徐淮多往躅行行入周訪始瞻芒碭雲忽出清泗上千秋賞雄圖白髮不相放歌風與戲馬髙臺屹相向失身落名網汗漫江湖間揚舟涉清濟回首送淮山青山豈不佳白日不得閒斜光散煙莽暝禽時獨還渚蒲十里青隄栁千絲直行路尚裹裘忽忽徂春色暑寒有恆期人事無能測魚鳥獨㑹心欣然似相識伊昔東山賢悠然眷遲暮常恐兒輩覺悽其損歡趣富貴草露晞勳猷春電䳱云胡不暫息馳身傍荒戍潮水絶彭門揚帆凌北固何必非故鄉區中本形寓况此遊目餘平生賞心處清川渺無窮青山不知數客夢落遙天浮雲更盤互辭家一千里圓景更絃望朝煙航濟隂落日宿汶上百川自東逝千帆皆北向結髮事明主事左神益王眷兹行役艱那能不惻愴未遂羽儀心且逐江湖放朝出亂帆前暮落千山後十日泝春流未離清濟口憶初辭里門不謂行當久方舟得舊知春風共尊酒東風吹扁舟日暮率西滸平生學操舟未識修途苦齊魯冬春交河源方仰雨千里飛塵沙經旬飲斥鹵白鷗落遙湍憂來時自數何當狎禽魚去作湖山主明月照古堰夜泊洪河濵河流委以輸月亦如環循物理有榮悴發育春風仁如何慕古士卒嵗常苦辛事情從倒置何但如積薪風塵淹嵗月行路傷心神龜䝉不可即東望空嶙峋冉冉春雲度依依楊栁津渺渺長風沙惻惻逺遊人黃金銷欲盡白髮日夜新昨日夢故鄉覺來濟水濵濟水千里馳去去隨漂淪寧免顔色改長岐吹暗塵原倡重用二韻故改用新濵二字憶我出門時春風初著栁行行阻川途已落飛絮後白日感西飛黃流正東走河流幾百折時時回鷁首南風自何來吹渡古汴口須臾走塵沙奄忽迷九有收帆斜日明青山落吾手倚杖看春山不覺立已久前臨濟水清那堪照衰朽濟上聞笛關山不隔梅花夢吹破鄉愁笛裏春夜水不波殘月上江湖多少未眠人泊魯橋次九逵韻落帆魯橋口意行還自阻嘗聞魯獲麟西狩此其所去魯今千年秋風幾離黍扁舟春已深遊子歌白苧垂䕃滿芳洲清湍激回渚落日下西臯蒼然見平楚歸鳥飛已稀野寺鐘初杵不知水堰開夜聽舟人語嗟余老無成白髮事行旅明發不得休晨飱帶沙煮再次宿任城韻北風吹古堰長河捲沙白昔聞謫仙人曽作任城客任城非故樓勝事今尚籍想見天人姿春風岸烏幘落月伴長庚何處尋醉魄我行後千年空見徂徠碧長笛起鄰舟夜靜聲裂石不見賀知章悲歌向中夕巨野次九逵韻黃河互回折青山時隱見行行次巨野古服猶漢縣空聞澤既豬非復禹初甸野色浩無垠忽復春風變春風不可稽客子行亦倦黃金日以銷轉覺青衫賤雨濁或膠舟時行眺回堰驚吹捲平沙河流激飛箭何處望神京天涯雲一片誰云千里遙去去南風便先大父常有宿汶上之作今日次開河蓋汶上地也舟中閲先集敬次其韻日暮風霾欲漲天獨臨古渡意悽然春光三月行當暇客子長途未息肩白漫河流還岸岸緑垂楊栁自芊芊當年汶上城何處一抹斜陽萬樹煙過張秋追懷武功先生遺蹟投薪沉鐡事悠悠巨掃千尋壓上流河濟從來天下盡江淮今入地中流當時物論輕文士武功治張秋猝未有功于肅愍笑曰徐元玉五墨匠也顧令脫士塹然卒以成功千載行人仰壯猷人事幾回桑海異依然高碣鎮東州魏家灣有感博平縣地也博平縣裏侍親時四十年來兩鬢絲竹馬都非前日夢枯魚空負此生悲已無父老談遺事獨有聲名繫去思憔悴平生塵土跡魏灣流水㑹能知栁色漫說鵝兒色似油何如楊栁緑幽幽初收宿雨濃於染逺映新波翠欲流十里蟬聲溪上路一痕斜照驛邉樓莫言濯濯無人愛别有春光在御溝雨宿武城追和先溫州夜宿武城二首長河風雨送盡日傍滄洲白浪灘都沒青楓葉亂流百憂雙短鬢千里一孤舟日暮墟煙合荒寒滿舵樓經過言偃邑非復昔時城里俗無從問絃歌空有名江湖孤鴈斷風雨亂雞鳴酒醒青燈暗春寒一夜生次韻九逵阻雨飄風終夕號客子念明發愁聞雨蕭蕭况聽泥滑滑流潦失牛馬春雲暗城闕昨日青楓根已逐沙痕沒不堪行路憂中夜生華髮四月尚重裘怪事吁可咄慌忽夢吳江香羮薦春鱖非關重土思逺道心迫卒懷石湖寄吳中諸友江梅千樹繞楞伽記得臨行盡著花青子熟時應憶我緑隂成處正思家聽鶯此際堪攜酒燒竹何人共煮茶幾度扁舟夢中去不知塵土在天涯郁裕州忠節詩倉皇戰守強撑支力盡孤城竟死之不謂真卿能備寇終然南八是男兒塵昏何處歸遼鶴月黑空山呌子規不負平生忠孝志故人親勒墓前碑甫田集卷九
