  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0179_WYG_008-1a, image: WYG1273/WYG1273-0056a.png}
body:
  text: 甫田集卷八明文徵眀撰詩四十四首新年至湖上飲茶磨山絶頂楞伽春水玉浮天茶磨晴嵐翠掃煙坐喜湖山收宿雨眼看梅栁入新年等閒陳迹還成古老大歡悰不似前日暮剛風吹酒醒始知身在碧雲巔賦瓶梅斷枝黏碧蘚殘蕊疊氷紈未乏溪山韻尤宜几格看移燈傳壁影垂箔護春寒應斷西湖夢東風在席端賦盆蘭清真寒谷秀幽獨野人心結意清霞佩傳情緑綺琴德馨堪自近道味許誰深一笑歌璚樹春風雪滿襟遊靈巖登琴臺參差蓮宇逐飛埃斷礎荒基夕照開青草欲埋山下路白頭曽及劫前來五湖對酒真如掌千載鳴琴尚有臺喬木蔽空回首盡老僧猶自護松栽驟雨殷雷破柱蟄龍驚萬㸃飛濤木葉鳴何處長風吹海立一時行潦看渠成不愁涇渚迷牛馬願瀉天河洗甲兵秋到江南今幾日玉蘭堂下待凉生金陵客懷當户寒蛩泣露莎盆池踈雨戰衰荷飄零魂夢驚初定羇旅秋光得最多江上詩情傳警報樽前壯志說登科帝京爛漫江山在滿目西風撫劒歌青衫潦倒髮垂肩一舉明經二十年老大未忘餘業在追隨剛為後生憐槐花十日金陵雨桂子三秋玉露天壯志鄉心兩無著夜呼兒子話燈前登觀音閣紺殿彤樓凌紫煙危欄飛磴撫蒼淵隂崖直下千尋鐵秋水平吞萬里天身世波濤舟楫外乾坤勝概酒樽前解衾恨不中宵住白鷺洲南月正圓與許彥明夜話有懷王欽佩賦寄八月驅車入舊京戍塵千里暗江雲承平日久方多事交舊星稀苦憶君洛下秋風應已至江東暮雨不堪聞一時幽意何人㑹燈火微吟對許渾天界寺城南寶剎舊稱雄晉代莊嚴在眼中絶壁星辰連閣道上方龍象湧珠宫翠圍嵐岫層層雨凉入松杉院院風身世茫茫塵土滿欲依蓮社住江東與林志道兵部宿碧峯寺帝京何處少氛埃古寺幽深背郭開有約敲門看修竹還憐繫馬破蒼苔清齊我自便僧供雲卧君能襥被來最是多情雙白鶴夜凉飛下勘經臺八月六日書事萬甲倉皇起一呼如聞島寇僨洪都本憂江左非勍敵豈謂淮南是浪圖翠輦南巡方授鉞捷書西上已成俘可憐劉濞區區業贏得功名屬亞夫十載招懷自作姦區區名號等童孱冥鴻已在虞羅外殘鮪方遊鼎釜間三計果看從下蔡一丸那辦守函關笑他李白成何事便擬金陵作小山阻風江上同蔡九逵諸君登靜海寺閣塵土蕭條行路難秋風高閣一馮䦨雲移白鷺煙波逺水繞盧龍木葉寒老閲江山猶自壯行歌天地本來寬平生零落餘長劒得與同遊倚醉看盧龍觀盧龍高觀壓江城登望遙關絶塞情愁外鍾山雙眼碧胸中揚子一帆輕秋雲在野看逾靜晚日當軒落更明安得仙人攜緑綺石壇來寫萬松聲三宿巖在靜海寺一名達磨巖積石誰名達磨巖花間古洞鎖蒼煙何能桑下淹三宿却探仇池自一天古樹騰蛟根束鐵春苔蝕雨翠連錢只應曽見臺城事回首梁王又幾年渡江天上仙人七寶幢玉堂雲霧隔晴窗小山桂樹空招隱秋水芙蓉又渡江李廣不逢真有數黃香何用號無雙石頭城下西風急笑對青萍倒玉缸遣懷末習丹鉛未掃除等閒宣索到公車百年玩物能無喪萬事隨緣自有餘敢諱畫師呼立本直慚狗監薦相如白雲萬里山千疊豈不懷歸畏簡書重過大雲菴次明九逵履約兄弟同遊滄浪池水碧於苔依舊松關映水開城郭近藏行樂地煙霞常護讀書臺行追春事花無跡閒覔題名壁有埃古栝蒼然三百尺秪應曽見寶曇來夏日閒居門巷幽深白日長清風時灑玉蘭堂粉牆樹色交深夏羽扇茶甌共晚凉病起經時踈筆研晏居終日懶衣裳偶然無事成偷惰不是栖遲與世忘新秋江南七月火西流殘暑蕭然一雨收手把芙蓉驚欲暮身如蒲栁不禁秋凉風作意侵團扇斜日多情近小樓有約南湖將艇子晚香吹滿白蘋洲題畫細路盤盤轉石根蒼藤古木帶斜曛短笻不覺行來逺回首青山半是雲丹楓絶壁照空江萬里青天在野航卧展南華秋水讀不知嵐翠濕衣裳石壁巖巖翠倚空踈松謖謖灑清風夕陽滿徑看山立何福修來是畫中天風寂歷雨初收木葉蕭踈滿徑秋詩在古松巖石畔支笻欲去每回頭江頭春水緑灣灣江上春山擁翠鬟老我輸他茅屋底無愁終日對江山山下春江一鏡開江回山轉隔蓬萊舟行仿佛聞雞犬時有桃花出峽來何處風吹欸乃歌煙消日出水增波江南無限瀟湘意獨是漁舟占得多木葉驚風丹䇿策溪流過雨玉淙淙晚來添得斜陽好一片秋光落紙窗秋懷零露瀼瀼隕玉柯西風吹起洞庭波江東菰米空愁絶汾水樓船奈樂何萬里邉聲鴻鴈急四簷金氣候蟲多傷心最是邯鄲道忍聽佳人倚瑟歌江城縹眇度飛鴻露下高天月正中宫調誰家歌白苧商颷昨日到青桐雲迷八駿應回轡凉入三邊合奏功桂楫蘭橈期不至芙蓉開滿五湖東題畫稍稍凉思集依依炎景流西風吹木葉秋色滿蘋州伊人何所懷掇棹自夷猶青山在蓬底白雲宿船頭滄波渺然去仰見天漢浮飛塵暗岐路回首正悠悠寒流囓山足嵌空似凌跨蒼藤蔽深竇細路通隙􅀈幽人已神馳意行自閒雅徘徊出木末復在絶壁下大江渺無津萬頃自天㵼中有娥眉青白雲共容冶何當凌絶頂涵景有虛榭輕浪激回渚光風泛榮條青天渺何許中流見仙橈修眉落明鏡蘭帶矞雲飄含情采芙蓉無那美人遙送蔣員外浙東采木還朝祗命臨南服奏功旋上京歡聲載後車玉節光前津維皇崇出治肅肅建清廟鬱攸昨肆沴潭潭付延燎皇心軫隆業起廢屬司空掄材匪云易使君簡宸衷維兹浙東南民窮嵗仍厄山空川澤竭疇堪重兹役使君獨垂青勿緩亦勿期上足俾國用下恤斯民疲民疲不知勞功成使君去青山罣離思白日照行路夙駕不容淹遺惠何能忘願君茂逺猷萬里永相望八月十六夜對月不嫌既望月華偏自是浮生見月憐來嵗不知何處看百年能得幾回圓倚䦨凉思芙蓉露滿院秋風桂樹煙正是懷人情不極一聲歸鴈落尊前九日城西小集村墟靄靄暮煙浮木葉蕭蕭水亂流細雨百年還九日浮雲四海幾同遊樽前病色黃於菊鏡裏霜華不待秋何必茱萸重把看衰遲都不似前頭庚辰除夕西齊獨坐閲壁間王孟端畫竹自題洪武丁丒嵗除夜作抵今一百二十四除夕矣感而有作醉墨淋漓玉兩株淡痕依約兩行書不知丁丒人何在忽把屠蘇嵗又除凉影拂牆燒燭短清聲入夜聽窗虛不辭霜鬢蕭踈甚已有春風繞敝廬金山詩追賦白髮金山續舊遊依然紺宇壓中流沙痕滅沒潮侵磴帆影參差日映樓江漢東西千古逝乾坤高下一身浮謫仙故自多愁緒更上留雲望帝州懷九逵春來相見一何稽病裏相思意欲迷雨洗碧桃三月盡風吹落日五湖西眼中人物如公少鄉里聲名愧我齊老大未忘乘駟馬仙橋待與長卿題五月雨晴書事甘雨如膏遍草萊清風庭院少塵埃一畨春事飛花盡萬里青天宿霧開狂卓豈知郿塢散孝文方自代藩來不辭零落江湖逺潦倒元非賈誼才繞院春風野鵲鳴如傳吉語到江城虎賁倉卒收梁翼宣室從容召賈生一代明良開景運萬方父老望升平野人更識農情喜盡日西堂聽雨聲追和王叔明溪南醉歸詩荆南山前花滿溪山空獨有春風知春風幾度吹花落溪上花飛春亦歸溪女歌殘桃葉渡相思幾緑江南樹思君欲濟川無梁千片桃花溪路長春風桃李秋空月人生易得頭如雪萬里才看北鴈來一樽又與東風别對酒當歌秋月明摘花釀酒春杯冽溪翁不見草堂閒無限春光付啼鴂感懷歷服明堂次第成漢廷行致魯諸生周南留滯寧非命江左優游漫䇿名四海秋風雙鬢短百年飛鳥一身輕樓高不礙登臨目直北青雲是玉京甫田集卷八
