body:
  text: 甫田集巻二十六明文徴明撰行狀四首明故嘉議大夫都察院右副都御史沈公行狀曾祖溢祖洪父傑封奉直大夫晉州知州母張氏封宜人本貫蘇州府長洲縣尹山鄉沈林年六十九狀公諱林字材美世為蘇之長洲人自大父而上並以朴茂脩正為里善士至奉直公尤植義明法稍被推擇從事郡中尋自解歸後以公貴封奉直大夫晉州知州母張氏封宜人公生秀朗岐嶷少即勵志於學從吳謙先生授易選補縣學生益精進不懈摘經綴文粹然理勝戴簡肅公按試邑中羣諸生而首列之公時甫弱冠又起齊民人無知者及召見儀觀脩偉進止詳雅公益嘆異是嵗成化甲午遂中應天府鄉試辛丑登進士授晉州知州州在畿輔民惰而貧百務怠弛公至首為安集繁繇横賦以次罷行乃教之樹畜民用充實而誕章敷化俾即于理一州三邑之民尸而祝之曰吾乃今知有父母之愛也御史杜忠上其績誥授奉直大夫貤封其父母若妻皆如制𢎞治已酉陞南京刑部福建司員外郎辛亥陞本部湖廣司署郎中癸丑真授本司郎中公宅心仁恕雖官法比而審畫詳慎必求當允未嘗奇請他比以傅致人罪尚書賢愛之俾詳諸司奏獄歴數年所平反甚衆屢考優最丙辰陞四川順慶府知府順慶去京師萬里民獷而好訐尤習佞鬼覡巫縱誕莫為緒正公首下令禁之有殺人獄歴數政不决公一訊得之繼發姦民之並縁假托者悉抵於法他獄訟皆隨事决遣雖株連支綴未嘗數日畱也由是政平訟理民用孚恱益紹農振業謹輸將時旱潦民既安戢嵗亦比登乃篤意教化視郡學隘陋弗稱且文廟右列非制遂徹而新之建御書樓増置號舍製樂器設樂舞生規制𢎞偉物數咸備又以餘力脩復南充縣學於是集諸生教之躬自程試俾皆有所向方士亦翕然奮於學呉文定公實記其事在郡數年脩創公私廨宇無慮數十築城隍治道路所費無限而官民不擾人至今稱之都御史林元肅御史曽禄陳珀相繼以賢能薦𢎞治乙丑陞雲南右㕘政公所分地適當邊徼俄聞安南連兵内向逺近驚擾鎮巡大臣謀治兵應之公亟止之曰彼無釁何得内侵或自有所事不可知即萬一事出意外某請自當之即馳至境上果自相讐殺耳土官鳯英以功授㕘政散銜素驕悍昧事大之禮時以征緬人調集省下公先期諭以禮分俾知朝廷恩威於是英伏謁如制他所施設多類此㑹按察司缺官公承委緒理疏抉推摘務盡情實而搜剔蠧弊畧盡囹圄為空都御史吳文度御史陳天祥周雄交章論薦皆不報正徳己巳陞山西右布政使先是公以入賀萬壽節至京逆瑾方用事惡公不為禮遣中尉躡尋其過攗摭無所得乃以出滇時傳置非宜文致其罪遂落籍為民庚午更化再起為廣西左布政使凡所以治廣西者一如雲南而扶微興壊政以敷融㑹軍興廥積流輸不擾而辦尚書林廷選御史舒晟咸露章薦之壬申陞都察院右副都御史奉敕巡撫貴州兼理軍務貴與湖蜀比壤夷獠雜居往往梟獍以逆守臣乘時勦逐雖屢折北猶時出抄掠邊人患苦之公承制調集湖北川西數路官兵身自奬率期必戡定先給旗榜徠脅從散其醜類乃命將官引兵直擣諸巢疏捕追北務極勦滅於是鎮簟銅仁烏羅諸賊以次削平而天生厓囤二寨尤極險阻藺石控弦不可嚮邇公命都指揮司繼先絶其餉道伺賊困怠悉衆搏擊繼以飛鎗火銃盡扼而纖之生擒夷酋龍通保等千人俘獲男女牛羊器械不可勝計遂降陳家孟溪等凡九十七寨給以閑田牛種悉復為編民事聞璽書褒美有數年之患一旦掃除其功尤可嘉念之語仍賜白金文綺時餘冦奔迸四出或以聴撫為名以規免罪責湖廣守臣信之作格苗録以傳公曰此逋冦不戢方為内患乃侈張其事耶移文守臣俾為警備咸不以為然俄復嘯聚為亂流刼境上公復調集民兵勦平之先是劇冦廖麻子閧蜀中公念貴為蜀垂徼賊所出入窮必迸逸屬方有夷師乃先期距塞與蜀掎角互為聲援賊竟不得出蜀功倚成焉時諸冦雖平而土官玩習縱誕往往賊殺倡亂宣慰使宋然桀驁首禍公奏革其職仍奏建總府於省城令貴竹水東等五長官司洪遥等十三馬頭及程番府所屬金筑安撫司上馬橋長官司龍里衞所属大小平伐二長官司並𨽻焉置二縣分治其故地其四十八枝頭目青山等寨龍筑等長官司畢節等驛仍𨽻宣慰使萬鍾改置諸長官為流官悉𨽻貴前二衞諸土舍悉令占數為編户又猛朔争奮長官王通以争地讐殺無辜公奏調官兵遣㕘將洛忠相時勦殺通懼乃悔過聴撫山州土官同知蒙政妄奏本州因改設流官人民竄伏事下鎮巡官議處公奏流官之設民夷帖伏蒙政所為梗塞特是盜權市恩欲肆侵漁耳不懲無以令諸夷且動揺衆心非便朝廷竟從公言自是境内偃帖莫敢有異志癸酉奉直公卒公奏乞守制是嵗十二月代還乙亥張宜人卒朝廷皆遣官諭祭丁丑服闋㑹山東阻饑有詔起公於家俾巡撫其地先是公在師勞殫繼遭家艱哀毁踰制遂得末疾比被召命至中途加劇上疏自陳老疾不堪任使乞放歸田里以全晩節朝廷惜其去久乃得請仍給驛以歸閲四年辛巳十月四日卒于正寢距其生景泰癸酉六月二十九日享年六十有九某年月日𦵏吳江縣羅字圩新塋公娶計氏生子男二人知剛知柔俱國子生女二人適引禮舍人史相國子生張秉仁孫男四人大謨以公䕃為國子生次某某某孫女二人公為人剛正有守雖不為高亢而孑孑自將不肯㛪婀隨俗初筮仕時或憐其少未更事不堪有司教之隙趨以獵美官公笑曰欲圖事君而先欺君可乎竟就外補以去及積忤逆瑾禍出不測家人恇擾且懼為二老人憂謀入賄解免寮屬相知者亦勸之公曰死生命也僥倖茍全如虧名節何堅拒不從比罷怡然就道家居未嘗自悔所至持廉不私羨餘公堂錢悉貯官帑或用以葺廨舍供具賓客而已罷山西時在官甫月餘俸入單竭同官知而贐之悉謝不受單居就道或缺頓舍蕭然不以介意性尤簡靖居常進止有度端坐終日未嘗跛倚與人處擇言而發或相對無一語然情意融暢不為岸谷始見者莫不嚴憚久皆親戀不捨平生未嘗干人以私人亦不敢以私干之郡邑非公事未嘗輒入居官平易不事矯飾以取赫赫聲既去民輒懐之順慶之士嘗祀公郡學既而父老以不便瞻謁請於御史盧公别建生祠於學之西至今士夫稱賢守必曰沈公沈公云晉州之民每遇鄉人必問公起居或仕宦道出吳門必求其廬拜謁而去公孝友純至事二親必求意適家居雖燕處未嘗南向既貴且老孺戀依依入蜀時年甫四十念親老留妻子侍養自是終其身不復以家自隨及居喪已踰六十獨處中門之外者七年哭踊摧毁遂以沈頓一弟麓少則教之問學既長朂之以義同居怡怡中外無間言及自蜀歸麓已生分外處公亟過之坐室中澘然出涕曰吾止一弟忍遂分異耶其待族屬尤有恩義教諸子必導以善而身率之不事言説不加誚讓而閨門化之嗚呼若公者豈古所謂醇徳質行者乎公生平無他嗜好惟喜讀書居常手不釋巻為文務理勝間為小詩亦清潤有思所著有學鳴前後稿滇南紀行録貴竹行稿遣懐拙稿奏議總若干巻藏于家公少與先君同學繼復同朝相好某以契家子數得接侍知公為深及是二子遂属某為狀謹為敘次如右惟立言君子表而著之他日太史氏或有取焉資徳大夫正治上卿南京刑部尚書劉公行狀曾祖迪吉祖謙海累贈資政大夫南京刑部尚書考宗政累贈資政大夫南京刑部尚書妣張氏累贈夫人貫江西新淦縣橋埠灘人直𨽻蘇州衞籍居吳縣鳯凰里劉纓年八十二狀公姓劉氏諱纓字與清號鐵柯其先清江人裔出宋集賢學士原父其後有諱持矩者仕元為江西行省都事因徙家新淦之橋埠灘遂為新淦人國朝江西内附持矩之子雲芳以尺籍徙𨽻蘇州衞雲芳子迪吉迪吉二子次曰謙海讀書有行義代兄戍吳遂畱居呉中公之大父也父曰宗政娶張氏以正統七年壬戌八月五日生公於吳城鳯凰里磥砢英特資復穎異少從鄉先生賀復菴學先生亟稱之既而受易於夏璿先生精研淬礪不拘拘於師説而剽刺涉獵卓見端緒為文操札疾書未嘗致思視他人追琢衍繹方事竚儗而公數百言已就所作明暢英發以儒士再試不利乃入縣學為弟子員成化辛卯中應天鄉試戊戌中禮部試廷試賜同進士出身己亥授湖廣武陵知縣武陵為常徳輔邑地大而繁公少多更涉習知民隠至於胥史乾沒並縁請屬之情咸悉其故故視事之始展采錯事無不當允縣多隙地民惰不知穊種又貧什器多不備公處業賑贍務盡民利由是民知力本嵗亦比登先是有長賦者亡粟若干石郡坐以侵官帑法死公執不從當以亡失既而獄上上官閲其牘曰此良法家也卒從所儗明年庚子母張夫人卒公即日解官持服服闋改知山東兖州之滕縣縣小而僻素多盗荐被荒歉椎埋狼籍更數政益敝不治又其俗狠鬬嚚訟公抅摭精敏刃迎節解剖析明暢而軌道要束皆中肯綮一時莫不驚服自化盗亦衰止藩臬使者咸稱其能尤為司徒許公進所知丙午召入為河南道監察御史儌巡東城兼督視京倉不事摘抉而繩軌攸當宄弊罔匿戊申孝宗皇帝登極改元𢎞治公多所論奏皆隨事救正達於大體是嵗奉命按福建嘗閲沙縣囚有鄧釗者坐謀殺父繫獄同時麻冕張成富皆坐死公視其所荷校皆新翻閲牘詞多支贅且事發無主名而牘尾云云類隠語曰豈據匿名書成獄耶悉索前後訟牒果得匿名書於吏廨故櫝中葢釗父以負貸自刎其姑之夫陳富利釗産欲奪之故為此陷之以冕等其所親昵併及焉前時有司實傳致成獄其後讞者不欲更異又惡骫法故首䑕其事公既閲實即破械釋之一時稱為神明莆田民有隨母出嫁者刲股療繼父疾有司以孝聞公判曰棄本姓而冒他姓義已不明虧父體以濟父讐孝則安在衆服其明識時海外諸番入貢者多挾贋貨貿市於閩監舶者利其賄不禁或不時得賄即忿鬬成隙公謂此非來逺之道且傷國體即下令絶不許通至今以為法庚戌還朝十一月滿三載考最給敕命進階文林郎推恩贈考宗政文林郎河南道監察御史妣張氏孺人辛亥再奉命按廣東廣並海有别渚曰澚番舶交易之地地有珠市世其業者十人豪民張政者先竄名番舶商海外諸國致番貨直數十萬夤結中人監舶者假以公牒得捕盜海上憑藉聲勢張甚因欲漁奪十人者之業不得悉誣十人者為盜捕置獄中七人瘐死餘三人當論决公讞得其情並釋三人抵政死指揮倪鳯亦以捕盜椎剽海上忮害尤甚顧鳯隂狡多養死士自衞急之恐變乃以計擒得之竟致之法鎮守中官上言各堡俘獲幼男寄養軍中宜從官刑以給内用而實無其人比詔取之則旋買良人子腐以克數腐且三百人而斃者十五所須尚千人方買之海南公聞急渡海抵璚崖諸屬覈實馳還則所司部五百人方􅋈舟德慶公亟下守巡官驗非俘獲即日散遣於是其家人感恩咸謂曰劉公實生汝汝後有嗣宜以劉姓姓之癸丑還朝十月再滿考畱掌本道事時外戚驕蹇結聯中官用事縱横亂政公率同官上疏極言言侵中官中官故激怒上逮繫詔獄罪且不測卒賴上仁明笞而不問公前後兩按大省劾罷不職官省使郡縣守令而下三十有六人誅舞文者百三十餘人平反絞斬罪百二十三人兩侍經筵統署十一道印事皆集辦丙辰滿九載陞太僕寺少卿時馬政廢弛圉人多肆侵漁馬耗不孳又私相盜鬻遇裱印率滌去舊文更入充數公立法辨審弊為之清又探稽孳畜利病得二十事條列以聞從之己未考滿給誥命進中憲大夫推恩加贈公考中憲大夫太僕寺少卿妣恭人庚申拜都察院右僉都御史巡撫四川總督糧儲兼理松潘軍務錫璽書以行蜀去京師萬里而松潘又在荒外濱於諸夷棧道險絶氐獠出沒為患撫鎮大臣多不親履其地緩急惟事調遣或控馭失所徃徃僨敗公曰吾為大臣出鎮萬里可自逸以委勞於人耶且吾奉命督理軍務不歴其地何以知其要害險塞以得其事情乃乘竹兠度繩橋徧行諸寨廣布耳目以求其事端盖諸邊戍守城堡俱在夷中夷人與吾人連結無事則邀勝取功事急則買和滅跡其事在夷者什三在我者什七公為科條禁誡誕章敷化事以敉寧又有所謂賞番者凡官府行邊恐夷人出擾有司先事置綵幣牛酒於路以賄之謂之買路公嚴加禁戢官軍奉約束惟謹及是公行邊軍夷帖息莫敢動在蜀甫一年屬子儆卒悲傷成疾上疏乞歸詔予告暫還病痊起用仍給傳以歸壬戌抵家越三年乙丑御史龔元上言劉某舊撫四川老成諳練協于民夷年力未衰不應閒廢㑹四川缺撫臣吏部即奏起之有詔仍以僉都御史巡撫四川兼理如故再錫璽書以行㑹松茂疊溪木匠兒子諸番夷嘯集醜類連兵剽刼鑿城燒棧勢甚猖獗公親駐境上相機設䇿㑹諸路兵討之衝擊疏捕轉戰折北諸夷懼讋悉投兵羅拜願獻甲馬贖罪列柯空龍諸寨争斬賊首以降凡降二十餘寨前後俘斬千餘人捷聞降詔奬勵賜白金五十兩文綺二襲横梁麻嗒三哨嘴諸河道逼阽諸夷每餉運輒為邀刼而衞士通番往往起釁蒲江闗堡久已頽廢列柯諸番往來結納肆為剽掠一時邊患徃徃坐此公並議復之仍議各立分司設官守之自是訖公去邊境不擾正徳丁卯再滿考進階中議大夫勲贊治尹時有詔裁革巡撫大臣凡十有一人公得㫖還朝尋奉璽巡撫湖廣兼贊理軍務先是公在蜀以夔峽水勢湍急嵗嘗氾溢覆舟傍有小徑盜出沒其間商旅不敢行嵗歉假貸湖陜大費轉輸議自夔抵荆闢為大道公私便利至是御史王璟以聞時逆瑾方用事恨公不先聞矯詔逮公下詔獄公上章自理㑹廷臣亦交章論救得釋仍赴湖廣荆王奏蘄州守余忠擅用兵仗刻減禄米欺侮宗室諸不法論死詔公㑹三法司勘問公為奏辯得末減戊辰二月陞南京大理寺卿六月召為兵部侍郎初崇明盗起江南諸郡繹騷時承平久兵衞耗減殘卒莫能支所在募民兵應敵號義勇軍有司上其數請如官軍給餉公不可曰往時王都御史借闗隴民兵討洞蠻從便宜月給米人三斗後皆藉為軍至今遺患於民國家軍餉豈宜輕議事遂寢明年己巳公年六十有八上疏乞恩休致有詔不允尋給誥命進階通議大夫推恩贈公祖考謙海加贈考宗政皆通議大夫兵部右侍郎祖妣某妣張皆淑人庚午陞南京刑部尚書有豪非法殺人欲行贓丐免費且鉅萬顧公不可入因公所知乘間言之公不可竟按殺之公素練於事尤長於法比然不為深文巧詆遇獄有疑率下屬吏再三讞必無生理然後付法至於誖謾渫惡必盡法無貸故所屬咸執法不敢骫濫姦宄屏息辛未兩宮慶禮成覃恩給誥命進階資政大夫加贈祖考考皆資政大夫刑部尚書祖妣妣皆夫人是嵗公年七十再上疏乞休不允越明年癸酉尚書滿三載三月赴部考績有㫖令復職五月上疏再乞休致有㫖卿才識老成精力尚健宜照舊辦事不允所辭六月再疏自陳老疾乞休以全晩節有㫖卿敭歴中外多效賢勞近疏乞休已有㫖不允宜照舊用心辦事八月還次揚州再申前請因遂歸家待命有㫖卿累疏乞休已有㫖勉畱不必再辭十月又連上疏始得請仍詔月給俸米嵗給輿皂以示優寵越十年壬午今上入正大統改元嘉靖公年八十有一㑹兩宮尊號禮成覃恩進階資徳大夫正治上卿命有司具綵幣羊酒存問明年癸未以疾卒訃聞命有司致祭工部營葬事如制公為人亢爽疎雋明燭事機而閑於吏政又精敏强榦事多迎解然其中有定識雖事出匆遽而銖黍紛齊較若畫一彼沈思審處者或不及也故其翕張變化人莫能測而情法不悖所至威愛並立而能飾之以文在蜀大修學校尤敦行義飾祠祀唐西川節度使崔光逺散騎常侍高適經畧使李徳裕宋知益州張詠修復他名賢祠墓尤多連按閩廣皆值鄉試為監臨官精擇典校尤嚴閑衞而不為苛瑣惟詳於檢閲不令有遺在廣嘗親閲落巻得一士以為奇列之首選榜出咸謂得人即今翰林侍讀湛若水也其他推賢舉能化服道利無所不用其至故侍郎海陵儲公瓘稱公經世之務謀國之慮往往在刑章訟牒外其為尹如侯覽為御史如唐介其撫吳蜀文教如文翁水利如李氷鎮静如張詠一時以為實録云公長身玉立鬚眉疎秀而舉止軒掲辭吐琅然見者竦企晩嵗家居益事燕整客至未嘗不見雖盛暑未嘗不冠吉凶慶弔未嘗不行四方書疏皆手自裁荅不少遺忘尤篤於舊故或在患難必極力拯之雖犯謗不恤至人有過則多面折之雖貴顯當路無所諱以故人亦有讒之者然卒不能沒其善之衆也素性儉質既鼎貴非祭祀賓客食不重味尤寡嗜慾故晩嵗神觀不衰對客舉舊事如引繩貫珠纚纚不能休年八十餘篝燈作蠅頭字精楷不異壯嵗屬纊之前一日猶對客談洽無所苦抵暮與家人燕語如常明日覺體中不佳稍就枕却藥夜半起坐呼水盥靧及旦奄然而逝寔三月十有六日也年八十有二公仕中外四十年積階自文林郎九轉至資徳大夫勲正治上卿配李氏積封自孺人至夫人生子男一人即儆嘗為縣學生文學行誼人謂稱家不幸早卒娶諸氏亦卒女三人長適大理寺丞仰宗泰之孫灝次適福建僉事社子開之子恕又次適都御史王思德之子東孫男一人遺以公廕補國子生女二人適張幕林文甲曽孫男二人喬祖同祖女一人葬以卒之明年甲申某月某日墓在吳縣羊腸嶺之原某先君温州與公居同里既仕同朝相好甚密某以契家子蚤辱公教愛及公歸里遂得以晚進厠跡賓階竊念先君既沒老成彫謝殆盡而公巋然獨為鄉邦之重每一瞻對未嘗不興前輩典刑之嘆嗚呼而今已矣有如公者可復得耶公之孫遺將乞銘于當代名筆且將列之史官屬為事狀某自顧蕪劣安能論次而耳受目矚庶幾不誣云爾謹狀明故嘉議大夫都察院右副都御史毛公行狀曽祖顯卿祖以義考僎贈徴仕郎南京工科給事中妣何氏贈孺人本貫直𨽻蘇州府吳縣某里毛珵年八十二狀毛氏姬姓文王之子封於毛其後以國為姓穆王時有毛班漢有毛萇毛義其後毛珍毛寶顯於魏晉之間至趙宋澤民維瞻皆仕江南維瞻守筠卒葬於蘇公世家蘇之閶門譜牒不存莫知所始公諱珵字貞甫别號礪菴曾大父顯卿大父以義皆不仕父僎以公貴贈徴仕郎南京工科給事中妣何氏贈孺人初徴仕公贅于俞生子玉繼娶孺人寔生公及公弟瓚公生岐嶷不類羣兒稍長從學張僉憲企翺既而卒業於賀恩先生賀以易學發解南畿聲稱甚藉從遊者恒數十人獨許公善學尋被選為縣學生時未冠也㑹御史按試公獨後出或誚其遲頓公曰一出不可復入何可忽遽耶於時人已識其謹重自是屢試輒占前列成化丁酉領應天鄉薦戊戌試禮部不中卒業太學益精進不懈時舉子學易多事剽掇以求合有司於經義初無發明公取程朱氏之言揚㩁探竟務極其㫖趣有所論著多前人所未發同時有陸琪獻之者亦事研賾陸以深謐公以精雋皆號能明先儒之㫖一時學者咸毁其故習而宗師之成化丁未試禮部遂以易中高等有司録其義以傳廷試賜進士出身𢎞治庚戌授南京工科給事中時孝廟清明方事開納言事者曼詞長語往往不切事情上益厭思得中實之言用之公軌迹夷易不為毛舉有所論奏皆經國逺圖及當時機要故所言多見聴納巨璫薄琮矯誕懐諼在畱司横甚設穽陷中傷士類一時臺諫多以罪去公摭其尤不法數事露章劾之竟下獄論死尚書秦紘鎮嶺南與安逺侯柳景交構中官佑景逮秦詔獄事且不測公抗疏申理因論景諸不法有㫖景卒閒住而秦得致仕或言紘不當去者公曰事不可激激或禍出意外且秦譽聞方隆他時名位當不止是其後秦果復用如公言大學士丘濬博學自信以天下為已任而任偏矯正能以辯博濟其說人莫能難公上疏極論其偏私因言天下事非紙上陳言可舉而古今異宜逺近異勢亦非一已之見可盡如濬之才置之翰林則有餘不可在論思之地言雖不用時論韙之御史有以言事戍荒逺者母老可念公言其情請移近地以廣聖朝教孝之道又言餘官以言謫外不得同言官牽復則是臺諫之外不容有言矣豈所以廣忠益哉上皆嘉納都御史劉瑀先守蘇嘗不禮于公至是總儲南京外與公修好而中常慊公㑹公他有論劾或告劉科中有言矣劉怒上疏自陳即得㫖致仕而公實未嘗言也及去公顧惜之曰劉於此無大過吾可以私害之耶其直道秉公多此類丙辰以病予告家居久之庚申起告北上留為户科給事中㑹北邊有警餽饟不繼師徒摧衂多所失亡公劾奏諸將校逗留不職因言兵部尚書馬文昇坐視潰敗無所展畫不宜在本兵之地他所奏儗及徼駮論薦咸切事機丁巳奉璽書清儲嶺南道拜兵科右給事中駸駸向用矣㑹倪文毅公卒馬公為吏部即擢公山東布政司左㕘議自徴仕郎轉六階為朝列大夫外示進秩實疏之也或謂馬於公有宿憾而公無幾微見於色詞觸冒瘴癘舊疾復作上疏乞解新任不允逾年始赴時𢎞治癸亥也明年甲子嵗當大比御史檄公提調試塲公展采錯事必慎必勤内之區畫外之防閑動合事宜時王守仁以京朝官主試與御史不諴公為調停其間迄事無忤而事亦克濟是科得人為盛中官出鎮者怙恩驕恣多所漁取而藩府供億圉奪縱横最為民病公隨事道利不為過激不失骫骳而惟理之循民得不敝而法亦無不舉待屬官以禮而教之以正前是屬吏事上謟曲稱謂如卒史公痛斥之非大過未嘗有所譴呵至治豪猾懲胥徒則盡法無所貸小民疾苦必曲為處分慰諭恂恂惟恐傷之民亦愛之如父母云在藩三年以疾乞歸有㫖進浙江㕘政致仕公年甫艾服而精力强明聲望方赫不應遽遂閒散或謂當道有不樂公者因公有請遂聴其去而一時士論莫不惜之家居十年言官數有論薦皆以疾辭正徳丙子始起為南京鴻臚卿戊寅進太僕卿南太僕治滁州前是有司視為閒局不復稟畏事多緩散公至極意振率督閒屬核欺蔽徴逋負扶微興壊所緒正為多㑹逆濠以寧藩叛首下九江蹙安慶南京戒嚴㕘贊尚書喬公集羣僚議所以攻守公言南京祖宗基業國家所恃以為根本重地而安慶實南京屏蔽無安慶即無南京矣賊起倉卒以我無備故直搗九江以窺江左當出其不意調集民兵水陸並進可以得志若待其至則虚實形見人情恇擾事不可知也喬公亦以為然遂以便宜檄公督潁泗和陽諸軍以為江表聲援公即日出次泗上㑹罪人已得中外解嚴而公亦遂還領太僕尋進公南京都察院右副都御史督視江防公以年及七十上疏辭不允改撫治鄖陽公再理前疏遂得致仕時今上新立中外翕然望治羣賢彚進而公以三朝老成超然逺引用不盡才輿情有遺望焉公沈敏精悍料事明審發言處事必要其終自其少時已無所茍比老益慎讀書不事博綜而貴明理有得見之於用文章長於奏議爾雅明暢援據精審不激不隨而紆徐警發得告君之體尺牘善敘事理有所論辨棼棼數百言藻發雋永能起人意居官以愛物自存尤慎刑獄在南科時㑹諸大臣録囚有鬻雞者因索直毆主人女奴死懸其吭而絶之若自縊者主人執之坐死公疑邂逅索直非有深讐何至殺人即誤殺之當遂逸去又暇從容為計又安肯坐待執耶訊之乃女奴以他事雉經惡鬻雞者責直怒詈故用抵讕耳濟寧王彪者殺人置尸里中叢顯家賄其兄叢彰證顯殺之公閲獄至濟曰以兄證弟已非人情矧彰一人何可獨據豈彰故有憾於顯耶核之果然罪坐彪死吳有俞棠者素隂賊無行嘗負朱佑金忿其責償毎思報之一日誘至家醉而殺之其家疑俞所為迹之無所得他日長蕩漁人網得一篋有尸焉潰腐不可識其妻識其故衣乃執俞聞官反誣其妻嘗有所私與朱佑之弟奉嘗有恨於佑者共殺佑且誘其幼婢證成其獄而佑死之夕奉實行販於外不知也公時家居慮得其事力言於上官卒白其寃而置俞於理或議公居閒非所當與公曰兹事人皆知之莫能上達吾知之又能達之可坐視其寃耶盖公雅性不能忍人之急人緩急有求必為致力至於官府寃濫民間疾苦與凡是非失得有涉疑似者惟無所見見必昌言之公既無私諼而言復明暢事詳而核聴者為之意消一時監司郡守若邑大夫有事輒就而問焉公亦未嘗不為之盡與人交任真而有情在僚友中尤能推誠投分不肯自利以損人東藩有督饟督芻二役皆㕘佐番休任之督饟嵗至京師事勞而費倍芻在遼左費省而逸嵗甲子公有遼之役同官方矩以私便請以京饟易之明年復以讓同官冒政於時咸以為難厥後逆瑾用事誅求切促方冒咸以虧課追徴破産不能償而公初無所與人以為公克讓之報公曰是有命也當是時吾亦焉能逆知其事而為之就避耶公治家尤號有法教子孫必以正而能率之以身下至僮奴僕從使御之亦皆有制其所授任必堪其事而育之有恩卒皆得其死力殖産治第以若饋遺出内咸責成其下晚嵗業益充拓田園邸店徧於邑中垣屋崇嚴花竹秀野賓客過從讌飲狼籍雖極一時之盛而公無與也雅善養生平生保身如金玉愛養神明調䕶氣息至於暄寒起卧飲食藥餌節適惟時故晩嵗精神完固年餘八十鬚髪不變語言動止與少壯不殊咸謂公方來未艾優游黄耉為當世遺老詎意一疾遂不起耶嗚呼惜哉公生正統壬申七月十又八日卒嘉靖癸巳二月十又九日享年八十有二配韓氏封孺人先卒妾某氏子男三人長錫朋戊子鄉貢進士娶文氏我先叔父僉都御史諱森之女次錫嘏娶徳慶州判官沈公冕之女次錫疇娶刑部尚書吳公洪之女俱縣學生女五人長適都察院右副都御史吳山即刑部公之子次適布政司經歴秦鋭江西布政司使蕃之子次適鄉貢進士范汝輿宋文正公宗孫次適大理寺副王延喆太傅王文恪公長子次適蔣廷光監察御史蔣伯宣子孫男五人長體仁縣學生次志仁次利仁次友仁次闕仁孫女五人長適金鼎次適湯鼎次適陸延枝餘幼曽孫男一人錫朋等以卒之次年甲午某月日𦵏郡西花山天池之新阡韓孺人祔某於公為邑里晩進辱公忘年下交提衡引重雅意勤至有出於通家姻好之外者公平生居官行事雖間得於語言承接之間而莫知其詳今因其子錫朋所述者摭其大校敘次如右庶太史氏有所採擇云先叔父中憲大夫都察院右僉都御史文公行狀曽祖定聰祖惠父洪淶水教諭累贈南京太僕寺少卿母顧氏累贈恭人本貫蘇州府長洲縣人文森年六十四狀文氏姬姓裔出西漢成都守翁始著姓於蜀後唐莊宗帳前指使輕車都尉諱時者自成都徙廬陵傳十一世至宋宣教郎寶實與丞相天祥同所出寶官衡州教授子孫因家衡山至鎮逺府君俊卿仕元季為湖廣管軍都元帥佩金虎符鎮武昌生六子長定開入國朝為荆州左䕶衛千户賜名添龍次定聰侍高皇帝為散騎舍人後贅為都指揮蔡本壻從蔡徙蘇州遂占籍為蘇之長洲人散騎府君次子惠字孟仁公之祖考也考諱洪字功大仕為淶水縣儒學教諭累贈南京太僕寺少卿初少卿公娶陳安人生先君温州府君諱林繼娶顧恭人寔始生公公諱森字宗嚴隨少卿公宦淶水受易於家庭即得肯綮少卿公致仕歸卒於家公年甫十八即能自奮於學誦讀窮晝夜不休羣經子史若國語左氏諸書讀之殆遍下筆為程文儁發蹈􅀈不為時俗陳爛語一時曹耦咸退讓終喪選為縣學生稍試不利即屏居學宮益事研究三年不輒歸成化丙午遂中應天鄉試明年丁未中禮部試廷試賜同進士出身又明年戊申孝宗皇帝登極改元𢎞治詔諭天下公奉使歴山東鳯陽揚州廬淮諸郡尋以纂修憲宗皇帝實録奉使採訪浙江事竣以病予告還吳𢎞治四年辛亥起告赴部授河間府滄州慶雲縣知縣慶雲地瘠民貧屬嵗大旱公至首召父老問民所疾苦咸曰嵗旱民窮而督賦益急民亡且盡公曰若歸語而老弱而來吾且食爾無憂賦也即閲獄有以逋賦繫者立縱遣之乃上疏乞免田租户部以撫按無奏不報公疏再上語加切卒免其半既而請賑於上官上官令列户給之户不過五斗公曰户有小大概給不均給之當以口賦或以迕上官怵公公不顧按籍占數計口而發仍禁所司不得雜糠粃以給由是民被實惠而上官亦不以為迕㑹開興濟河役民甚衆公曰民饑且死何以出役走白於郡得減役視他縣獨得不擾郡又役之治道公亦白而遣之境故高而舊無渠堰民視雨澤以田一遇旱則束手待槁公教民相地鑿塘蓄水以備旱而澇則洩之每行視野中屏騎却盖親履塍畝持食一槖茗一器或當食不及頓次便憇樹下昬旦出入㬥風日中面焦且裂弗為止而䖍於禱祠曰靡神不索荒政之一事也因立八蜡祠修復龍王廟修築社稷縣厲諸壇而盡毁諸淫祠俗有所謂打旱魃者嵗旱則聚惡少發新瘞屍墓而鞭之或執産婦被髪坐而沃之曰淋旱魃公諭之曰在法發塜邪巫皆重辟若曹奈何蹈之因嚴為禁絶縣嘗有蝗患公捕得輒瘞而藏之或問故公曰野無青草異時何以自明既而朝廷累遣使行驗民賴是免賦而他縣無驗坐累者比比雅重學校稍暇即請學官與諸生講解示以法程里社設學以教鄉民子弟導以孝友而勸相之有徐文亮者數世同居為表其宅里它貞孝有蹟被旌與可旌而旌未及者咸勞以金帛撫其孤嫠嘗出聞有夜織者旦召其夫而勞之縣民故惰至是多勸而勤縣有養濟院而無廬舍為構屋四十餘楹具井釡給薪爨哺被以時不令失所縣比不登民流户減而額養孳生馬如故公上疏極言不均之弊下兵部參會衆議得通融均給縣𨽻滄州州每役縣民為斗級弓手防夫它夫皂之屬流傭轉輸曠日煩費民甚苦之公曰縣雖𨽻州然各有分土州安得擾縣之民白於監司罷之仍請下傍縣皆得視慶雲癸丑丁呂恭人憂丁巳服除改山東兖州府鄆城縣鄆城地大雄繁民獷健而喜訐公至縛奸人數輩投戍邊徼一時宿蠧為清豪猾歛戢不敢肆縣有徳王府莊田嵗輸子粒至府府官校每虐苦之至以鐵絙縶廏下榜笞之或賣所乘驢馬不足償公言於監司請自輸于長史不可則為征取貯於公俾官校自取民得無擾㑹有詔減明年田租而王府征輸如故公亟言於巡撫大臣得減輸如詔㫖因疏于朝極言王莊之擾不報富民縁邊儲出内為奸利公列櫝庭下令輸者書月日里甲姓名并所輸自投櫝中遏富民不得近又上供嵗帛不問里甲大小及民貧富㮣徴之胥徒復漁取其中公以九則占數而賦其直俾占帛以輸所省十五而輸復有羨民咸便之境有西裏河舊通漕運嵗發浚卒專官領之及築黄陵岡上流因罷專官而供調如故公請罷之所司不可公曰上流既築則河不必浚管河官既罷則卒不必設所司不能屈卒罷之縣城久圯而隍堙不能蓄水公糾工繕濬二旬而畢去城一舍有障水隄綿亘十餘里亦久就廢及是亦修復之又於隄口聚土以遏水衝凡所為興革利害無所不盡而崇奬風化激昂士類悉如慶雲慶雲倚山海而臨漕渠曠逺無防而鄆有梁山之險又當東平汶上壽張之衝皆號多盜盜白日遮刼不可跡公所至置民兵什伍分曹更邏約遇盜併力揜捕而高懸賞格以勸勞之故盜出境内無脱者嘗被郡檄捕刼盜公讀檄黙記其失物他日獲盜遽詰之曰爾前盜某物安在盜駭愕即吐實果前刼郡中者葢郡與真保定比壤盗出没於此公識其方言耳有竊人瓢粟解后其妻殺之求盗不得或得瓢於張乙土榻中執張至不承曰此故乙瓢也公召其妻至雜數瓢令識之妻遑錯莫能舉乙遂引伏鄆有趙小老兒者嘗解后一僧於市知其盗也詈而逐之既而它盗以僧言誣趙為槖盗者公使趙青衣雜羣皂中問識盗趙否曰識之曰羣皂中亦有類趙者乎曰無也公曰果汝妄耳因釋趙不問先是𨽻卒攝逮鄉民畏漁苛徃徃逃匿不時得公受牒輒判牒尾令自持以徃無不即至故事州縣圉夫率用富人以便供需公特簡下户充之皂則與鄰縣互易如制一切苞苴不得蹐門嘗自噉糲食每嵗儉輒停俸入家人或不能具饔飱以為常在鄆三年巡撫使者交薦其才可大用十四年辛酉召拜浙江道監察御史㑹吏部闕尚書大臣有夤縁求進者公疏力論之因舉宜為吏部尚書者疏劉大夏周經進以召時營進者甚銳且有力或從中醖釀之謂是專擅選法非所宜言遂下詔獄賴上仁明特笞而不問十五年壬戌奉命𣙜木盧溝橋隨事錯綜不先為程期而實乂不失常度召車徒給以闕符驗數勾稽限不得與門者通𨽻卒無所年大利富商大賈徃徃詭數規免或挾勢家為奸利公驗稅如制一切私書禁弗為道尋監光禄寺尤多緒正十六年癸亥奉詔河南清軍伍既至命所司各陳利病而興除之故事疏捕士伍視移文槩藉株逮徃徃民不勝擾公惟稽赤籍非缺伍不輒追有匿丁壯而以缺伍言者悉捕至抵罪弊為之清㑹疾作上疏乞告明年甲子還呉閲二年丙寅改元正徳逆瑾擅權用例致仕庚午更化再起為河南道監察御史推掌三法司事尋奉詔照刷在京五府六部各衙門文巻正徳七年辛未考績給敕命進階文林郎明年壬申陞南京太僕寺少卿於時民方苦科駒賣駒徴銀及追陪倒死諸弊政公移文諸屬條列古今廏牧之法與今之利病所宜興革者大畧言今日馬政除補足種馬之外上之所須獨備用一事而已豈有科賣徴解諸擾民之令哉奈何有司沿故習而忽令典憚改革以失事機援例變賣之文交屬於途聴民自便之條高束於閣妄傳㸃視而使期集之不暇虛稱拘刷以示科需之有名是致一牝常隨兩駒三駒之多而一駒或養三年四年之久羣醫牙販則請賣駒於官以謀撓法吏書庫役則請收銀於官以遂已私闕殊不知官賣之際多估則買者陪販而廏牧愈受其殃少估則賣者虧損而市井共饕其利負欠或遭勢豪之手徴求難免捶楚之刑甚而官吏私相貿易而馬於是乎併去矣此賣駒於官之弊也官收之時盤欹法重有秤頭之積出錙銖較闗有火耗之羨餘劵票有紙筆之需伺候通攙先之賂甚至上下傳相交代而利於是乎併失矣此收銀於官之弊也况名雖補輳備用而全科併𣲖之數實不開除陽雖變賣不堪而倒失虧欠之逋隂加併歛凡所言皆切中當時之弊在太僕三年軌道綜核隨事財正下享其利而上蒙其成乙亥考績赴京道陞都察院右僉都御史尋給誥命進階中憲大夫贈考為南京太僕寺少卿妣顧氏繼妣呂氏俱恭人於是公在仕途三十年年五十有五矣㑹有小疾遂上疏乞休有㫖俾回籍養病疏再上始得致仕是嵗正徳十二年丙子也越六年辛巳今上踐阼工部尚書李公某户部侍郎胡公某御史沈某先後薦公老成可用皆不報又五年為嘉靖四年乙酉五月某日以疾卒於正寢實公所建文山忠烈祠之右公平生忠義自許雅慕文山為人以先世嘗與通譜且嘗建節吳門有功徳於民因言于朝得列祀典即所居建祠俾子斗主之吳之有文山祠實自公發之也而公竟易簀於此豈偶然哉公為人精悍英發激昂負氣義而軌法弗撓意見所在必達其志初奉使至鳯陽解后二貴臣行禮稍不如制一中官尤誖謾公執故事不少降必使引伏乃已葢其初筮為小官已能抗捍權要如此及按河南中官劉瑯貴横尤甚懐諼侵官無所不至一時藩臬諸臣脅息順㫖莫敢出氣公檄有司謂事有統攝法不可奸茍事涉我而移文非我出輒承行行必劾弗貸趣令示劉劉為之歛戢其為縣時與上官論事亦皆直前不顧或不聴必疏論之户部著令下州縣驗田高下以稽水旱公謂壤有變遷農力不齊胡可一槩限列又欲括縣金錢以足上供公亦不可曰與其他日發内帑以救饑饉孰若今日存府庫以備緩急皆極疏言之不以有成命但已既在言路益得盡言然必執大體不為抉摘細碎所言皆明白直致不為回曲其論吏部尚書尤人所難然非其人絶不與交晚節益堅定思有所為及今上收用老成又經中外論薦當路者且次第叙進公而公不待死矣公問學精詣而不務博綜自少與先温州兄弟自相師友及入仕即從學李文正公所得甚深而賦性高朗視一時名家若不足為其論著必法左氏鑄詞命意精鍊峭拔不劇致不已然不茍作亦不輕以示人人無知者晚嵗悉棄不復為曰大丈夫乃復區區佔畢間耶其意欲以功業自見屬正徳多故又不能隨時俯仰遂以盛年棄官家居其意葢有待也而豈意其遂已邪公自少貧苦然視富貴漠然無所動於中既貴不復殖産亦不治居第俸禄所入皆縁手散去家之有無一不問至於子女婚嫁特成禮而已不求備也惟雅好賓客客至未嘗不置酒治具草畧亦不求甚設而情意懽洽藹然可親錢寧翟鵬用事皆嘗加禮於公公皆無所受造謁皆不報有故人在當路與公論事公正折之又為書詆訾其過不少諱其刻廉修正無所回折如此晚嵗偃蹇不究大用殆亦以此而公不悔也公娶談氏累封恭人生子男一人斗娶沈氏女二人長歸國子生毛錫朋其一早夭側出子男二人科娶張氏犀聘陳氏女六人歸錢班張哲周某哲國子生其三未行孫男三人女四人公少先温州十九年事温州如父終身未嘗與亢列處季弟縣學生彬備極友愛撫諸姪禮嚴而情篤於徴明加親徴明少則受業於公賴其有成及以薦入官數書示其所志思一見徴明不及及是歸而公不可作矣嗚呼痛哉今將以某年月日𦵏某原惟公抱負閎偉志烈剛大屬時多艱不獲盡展而所施設僅僅見於一方百里之間太僕之任又在叅佐之列是其所有曽不少見於用而盛年奄棄明時有可惜者敢列其大校以備采擇云謹狀姪翰林院待詔將仕佐郎徴明狀甫田集巻二十六
