body:
  text: 甫田集卷三十三明文徵明撰墓志銘四首浙江按察司僉事皇甫君墓志銘僉事皇甫君子安既解浙臬還長洲未及赴調而母夫人卒摧毁得疾甫三月亦卒嗚呼傷哉君舉壬辰進士官禮部以文學為當道所知會東宫肇建遂用為春坊司直論者以為得人而餘人意忌顧已媒孽其間未幾補外自是浮沉外寮者纍年再起再僨卒骯髒以沒嗚呼自古文學之士往往不得志於時其侈聲擅名固造物者所忌然而一時秉銓之人不得不受其咎也君諱涍字子安裔出宋戴公以字為氏世望安定趙宋時有為提刑者扈高宗南渡居吳城孔聖里占數為長洲人六世祖斌死張士誠之難斌一再傳乃君之曾大父也大父信以文學起家為太學生未仕而卒父諱録丙辰進士仕終順慶知府母夫人黃氏生君兄弟四人君其仲也黃夫人夢人授巨鼎而生韶秀異常能言即解誦書占對敏給如成人稍長績學綴文遂有名世之志及選入郡學為諸生益事博綜兄弟自相師友揚榷探竟務求抵極攄詞發藻逈出輩流未數年相繼舉於鄉而君與二弟遂收甲科一時名文學之盛三吳之士鮮其儷者而君不以自異益思振植操廉服勤􅍀然自守不與時流徵逐人亦莫敢與狎初授工部虞衡司主事尋改禮部精膳司再改儀制進員外郎升主客司郎中主客職蕃夷朝貢凡餼館勞來與凡貢篚之屬往來之儀皆主客領之故時曹司怠緩稽留使人經嵗傳食供億浩穰君奏報以時不踰旬浹靡密上下斟度維宜視曩時損費什伍朵顏內屬歲有賞賚發自內帑故多穢濫君以其捍邊有功非他濫恩比言於主者俾精擇以給被賜者莫不歡感以去車駕南巡諸夷留京師者慮有窺伺悉屛之徼外時稱其逺識君自虞衡至主客凡歷四署所在職辦而能緣飾以文在儀制時建儲九疏咸君屬草詞理明辨有以上當君心遂為諸公大臣所簡注春坊之擢蓋緣於此車駕之行君先已注籍扈從會改官不果行駕次承天按籍推賞而君不在有司乘間劾君失事而實非也坐是左遷廣平府通判踰年召為南京刑部主事未任丁父憂服闋還朝復補南京刑部主事進員外郎尋升浙江按察司僉事分蒞浙東所蒞天台寧紹諸郡民忮而狡叨詖喜訐最為煩劇君所至懲飭綜核周審擲伏若神而裁決敏利案無留牘恤隱崇賢納之仁軌甫三月而宿蠧為清管內振肅以其暇逸覽觀山川發為篇詠委蛇張弛文治燦然譽聞方逹而南遷考核惟視一時實履以為黜陟近時乃有既徙官而徵其舊事者因得以其私意中傷之然非顯惡大懟亦不敢公肆詆毁君初闕曹未及上再任亦無幾時竟以勝任推擢曾未數月而以不職論黜嗚呼羣耳目何可塗也君沉靜寡與自負高峻人茍不當其意終日相對默無一語居官任事砥厲操切不肯脂韋取容既多忤物又稍稍與時崖異故愛之者雖深而卒不能勝夫疾之者之衆也雅性間靖慕玄晏先生所為自號少玄子作續高士傳以著志居常問學之外他無所事羣經子史莫不貫綜而酷喜左氏著春秋書法紀原選唐文粹為文粹闕為文必古人為師自兩漢而下咸有所擇見諸論撰居然合作詩尤沉蔚偉麗早嵗規倣初唐旋入魏晉晚益玄造鑄詞命意直欲窺曹劉之奧而及之惜乎未見其止也沒後其兄子俊集所作為皇甫少玄集云君生𢎞治丁巳六月某日卒嘉靖丙午三月九日享年五十配劉氏後君一月卒子男二人長秦郡學生娶王氏次匱聘金氏女三人長適國子生王大猷次適太倉州學生陸鳴陽又次適郡學生吳尚儉孫女二人卒之嵗十二月十又三日葬虎丘新阡於是子俊手具事狀率其二子詣余乞銘余何足以銘君哉辭不獲為序次如此系之銘曰嗟皇甫君維時才彥天實生之亦既有衍爰賔于王式揚用昭胡豐其受而厄其遭秩秩郎曹五禮云職貞德允文乃言有克維文之克維德之載實德升聞有簡斯在青宫蘭省舍官孰宜譽者在前毁者隨之誰毁誰譽君則有命命也自天弗隕厥聞嗟皇甫君靖共維秉豈無遺榮降年弗永弗永其世式宣其言後有子雲尚鑒吾玄錢孔周墓志銘吾友錢君孔周以高明踔絶之才負輘轢奮迅之氣感慨激昻以豪俊自命雅性闊逹不任檢押所與遊皆一時高朗亢爽之士而唐君伯虎徐君昌國其最善者視余拘檢齷齪若所不屑而意獨親時余三人與君皆在庠序故會晤為數時日不見輒奔走相覓見輒文酒宴笑評隲古今或書所為文相討質以為樂既而唐徐起髙科入仕尋皆病已而湯君子重王君履約履吉雖稍後出而遊好為密善君喜學而好結納自少至老未嘗一日忘學亦未嘗一日忘取友以自益也其所友必皆勝已者茍不當其意雖貴富有勢力者恆白眼視之或取怪怒不恤也家本溫厚室廬靚深嘉木秀野足以遊適肆陳圖籍時時招集竒勝滿座中酒壺列前棋局傍臨握槊呼盧慿陵翔擲含醺賦詩負軒而歌邈然髙寄不知古人何如也嗚呼而今已矣交遊中有如斯人可復得耶性喜畜書每併金懸購故所積甚富諸經子史之外山經地志稗官小説無所不有而亦無所不窺尤喜左氏及司馬班揚之書讀之殆遍遇有所得隨手劄記積數巨帙至所不喜雖世指以為切要而君未始一注目也為文奇崛深奧讀之棘口不能句然思玄語麗足自成家而尺牘之妙尤其所長一行數字矢口信筆文意燦然如出硎鍊他人沉思極意不能至也早嵗思以功名自奮稍斂鋒鍔以就文場矩矱亦惟涉獵訓故涵泳道腴而已於世所謂括帖關鍵皆不之省人咸非笑之而提學莆田陳公獨識之嘗按試第君高等咸以為疑公曰吾見其文有古意知其非經生常士也余親聞陳公語喜公能得君而又喜君之為陳公所得也自陳公去他主司惟取淺近合格者而君不復振矣君自𢎞治辛酉至正德丙子凡六試應天試輒不售而年日益老遂自免歸嗚呼惜哉君長身玉立被服鮮華而舉止軒揭人望而異之謂必有所就而竒窮骯髒迄於不偶嗚呼惜哉晚嵗困於征徭家日益落而又得末疾行履疲曵每負杖而嬉而高懷雅致不殊前時文酒過從宴談謔浪逶蛇容與使人意消嗚呼君真雄俊不羈之士而曾不得一試以死豈不痛哉君諱同愛字孔周别號野亭錢氏其先江都人有諱仲陽者以醫顯於宋事見國史五世祖益仕元為常州府醫學教諭避亂來吳遂占數為長洲人益生太醫院醫士原善原善生晉府良醫宗道宗道生太醫院醫士良玉良玉生伯寬伯寬生汝式自汝式以上世以醫顯汝式娶陳氏生君之兄弟二長同仁太醫院御醫次即君娶張氏子男二人鶴徵太醫院醫士娶吳氏竹徵薊州吏目出後同仁娶朱氏繼湯氏女二人適余長子縣學生彭次適陳遇側室生子男一人復貞娶某氏女一人適劉某孫男三人女二人君生成化乙未某月日卒嘉靖己酉某月日享年七十有五庚戌十二月某日葬吳縣寶華山銘曰氣則揚亦藝而章維命不臧而志弗昌卷而藏而卒困以亡吁其傷廣西提學僉事袁君墓志銘吾友袁君永之以髙明踔越之才精深宏博之學而輔以輘轣奮迅之氣自其少時已不肯碌碌後人既起高科登膴仕視天下事無不可為而砥節履方不欲附麗匪人首忤權臣幾蹈不測賴天子仁聖得不擯棄浮湛中外垂二十年再起再廢迄骯髒以死嗚呼傷哉其命也夫君諱帙字永之别號胥臺山人世吳人髙祖以寧曾祖琮祖敬先考封承德郎刑部主事諱冪母安人葛氏袁氏自高曽而下世以氣義長雄其鄉而未有顯者至君昆弟數人藻發競秀突起閭閻聲生勢長隱然為文獻之族君於羣從中最少而竒頴異常五齡知書七歲賦詩有竒語十五試應天再試再不利憤曰吾所志何如顧為場屋所困耶益淬礪精進刺經質義務究抵極嘉靖乙酉遂以第一人薦試禮部亦在髙等一時聲名傾動京邑入對大廷摛衍揚繹上下數千言出入經史詞旨宏逹時權臣方為學士得君卷竒之執欲冠多士在廷諸公惡其攬權故抑置二甲第一人及啓封見君名乃悔不用其言而權臣則喜於得君他日詣君敘致本末自謂君知已而君不對亦不謝權臣大懟銜之然無以發也未幾入內閣用事而君方為翰林庶吉士因上言諸庶吉士跅弛靡薄不宜在禁近悉罷為庶僚怒猶未已乃起兵部火災之獄將甘心焉時君武選主事火時君當徼巡在法為失警乃掠立文致劾君縱火為姦利必欲殺之煆鍊數月無所得編戍湖之衛會赦免歸權臣死稍起為南京武選主事歷職方員外郎晉擢廣西提學僉事致仕歸卒年僅四十有六始君自翰林出為刑部主事即思明法以逹於政謹推讞審法比所當必允為尚書胡端毅公所知簡蒞本科本科者凡諸司獄詞及上請章疏皆從審畫君析律詳明剸裁敏利而將以勤誠案無留牘時稱職辦有詔以京朝官考各省鄉試君被命主試河南校閲精審去取攸當時稱得士尋奉使決獄淮揚還朝改司武選武選有銓選有勳録有貼黃及諸委瑣故號劇司而貼黃尤多敝事君督併嚴密關決明審吏不得並緣為姦展采錯事方將有為會獄事起而君去國矣在南部適當考選軍政尚書熊公特委重君君杜請托察賢否勵精從事考核緒正一於至公人服其明莫復異議廣西在嶺徼之外夷獠雜處文教久弛君不鄙夷其人教詔諄切而率之以身示之矩範程以科條取士貴淳雅而黜浮誕恆矜其不逮薄懲而廣録以誘進百粵之士士方安其化而君􅌒遊矣君樂間曠謫居吳興日與髙人逸士探竒選勝登陟遊衍悠然自適及歸築室橫塘之上據湖山之勝縱浪其間有終焉之志雖暫起守官而寤寐林壑未始少忘篤志問學羣經子史無所不窺為文必先秦兩漢為法樂府師漢魏賦宗屈賈古律詩出入唐宋見諸論撰莫不合作所著文集二十卷皇明獻實二十卷吳中先賢傳十卷世緯及歲時記及周禮直解總若干卷始君雅志用世及事與心違時移身逺乃肆意於此以泄其所蘊耳觀世緯所著皆鑿鑿乎經世之論其官宗遴傳與夫詎偽諸篇實維時敝惜不得少見於事而徒托之空言可慨也已君闊逹髙朗議論英發能以辨博勝人人莫能屈然實無他腸志同道合即傾倒無間故知君者莫不賢愛之而不勝嫉之者之衆也君生𢎞治壬戌十月二十六日卒嘉靖丁未六月十有三日配馬民封安人繼文氏子男一人尊尼癸卯貢士女三人適生員玉子恭殷邦柱徐欽葬以卒之某年某月日墓在某山銘曰侃侃袁君維時之碩履道含𢎞抱貞翼德爰起髙科式揚用聲載緝用明奕其邦楨維邦之楨弗為道屈矧兹匪人胡彼之恤豈無榮途有命在天寧玉之毁匪瓦斯全陷則有穽守則為正孰其生之天王明聖侃侃袁君守身用恆弗利攸征身否道亨亨之如何有言則立言立名存有永無泐江西布政使司左參政贈光祿寺卿錢公墓志銘嗚呼自倭夷為三吳患者數年虜掠燒劫多所殺傷兵不得休息民不得安居而常熟濵海帶湖罹禍尤慘雲江錢公以江西參政居憂邑中謂邑宰王公鈇曰寇既得志勢必復來公有守土之責而吾父母之邑墳墓親戚所在忍坐視耶乃日與商略為僃禦計練兵飭甲部分調遣事甫就緒而寇猝至城下即與乘城捍禦悉衆急擊連弩繼發寇乃遁去又明日寇自上湖北下直指讓港公謂王曰此可邀而擊也部領民兵抗旌出港轉戰而前殺傷相當俄而賊大衆掩至公麾下鳥獸散衆寡不敵公身被數鎗猶手刃三賊遂與王公死焉實乙丣五月草又四日也事聞天子震悼贈公光祿卿官其子部錦衣百戶遣官諭祭於其家嗚呼承平日久所在備弛兵興以來並海州縣往往閉城自守或不發一矢而公非有官守未始受命征討徒以桑梓之故慷慨激發摧鋒陷陳竟以身殉豈不誠義烈也哉公諱泮字鳴教别號雲江裔出武肅王鏐南渡時徙居常熟之奚浦再徙緑園髙祖叔平仕宣德時稽勳主事曾祖景儀祖希直父封刑部郎中諱某母宜人禇氏公生而凝重少無童習及長敏利好學為文麗則而理弱冠選𨽻學官里胥以髙訾推長鄉賦或言學官造士例復其身不在科謫之列公曰往役義也吾何辭晝出應繇暮歸讀書研經質義不以事廢遂舉甲午應天鄉試乙未舉進士筮仕閩之侯官改浙之慈溪召入為刑部主事歷員外郎郎中出守順慶升陜西按察司副使進今官未赴以憂歸卒年六十有二嗚呼傷哉公修正踔絶敏於剸裁試邑侯官拊循道利民安其政展錯維勤庶務畢舉上官材之奏改慈溪慈溪浙省劇邑靡薄易動公嚴毅自將而誕章敷化一如侯官擲伏省微兼以加愼在比部尤稱職辦有權貴囑公置所仇於大辟公曰附勢而殺人仁者不為也卒讞出之邊帥執疑似數人以為外來姦細傅致抵死本兵不為異公察其非辜特為執奏同官謂具獄不宜翻異恐得罪不測公曰知其寃而不為白何用法為奏上數人者皆得不死公析律詳明心存仁恕每多平反如此順慶僻逺郡大而繁公久更民牧諳練法情推其緒餘以逹於庶政興學養士專務德化居若干年俗以丕厚顧城圮且廢念欲修復而重於動衆乃號召屬邑飢民厚直而使之民既得食工亦告成及持節分陜益修兵防飭亭障謹烽燧訓農講武令嚴政肅敵聞不敢窺塞邊庭晏然會漢中飢流莩屬路公即以便宜發廪賑之巡撫以軍餉非奏不宜妄動公曰陜去京數千里必待奏發民死無遺矣矯詔活民即得罪不恨於是所全活以萬計他郡飢民相率盜礦耀兵嘯聚撫巡欲發兵勦除公執不從曰此飢民暫此求活非有他圖麥熟則散矣萬一猖獗某執其咎若兵興則絶其自新之路或生他變撫巡因以屬公公檄所在官司開倉賑民民所至隨地安集勿追求其過仍榜示使麥熟歸農麥熟而不解即真盜矣民聞歡曰錢公實生我民民何可負公也咸投刃散去事亦敉寧撫巡上其事遂有江西之命嗚呼公揚歷中外餘二十年所至效績往往以身殉道如此及兹死事亦其素志敢為不欲茍且自恕耳非直邂逅幸功為也嗚呼烈哉若其家庭孝友之行端居自守之操律身以禮接物以義髙情雅致不能盡書書其大節如此公生𢎞治癸丑某月某日先配徐氏繼盧氏贈封皆宜人子男十二人長即部次郡都鄉廓鄰祁抑郛却昻遺腹一子未名女五人章卿趙僴龎夢登龔文檟王繼麟吳繼常其壻也孫男十六人輿較輻輕輪軾軋軩軒輅輈輔􅀈轉餘未名孫女六人嘉靖丁巳某月某日葬公邑之姚唐里部手具事狀乞余為銘銘曰虞麓巖巖琴流淵淵秀頴有鍾是生才賢烈烈錢公履貞蹈義䇿名王廷出宰百里回翔二邑侯官慈溪以翼以綏以莫不宜爰登法比邦刑是執不苛以隨乃正而克乃言均勞罔有中外建節秉麾實惟簡在肅肅西征翼翼專城文教攸興邊庭用寧烈烈錢公志貞孔武飭甲韜兵孰余敢侮蠢兹小醜犯我鄉邑窺我城闉肆其狂逆我武再揚抗旌摧鋒保兹墓城志翦窮凶仗鉞于征討逆用順衆寡于懸爰以身殉海立濤崩日星晦冥山川攸攸適還厥靈嗚呼烈哉天王有制恩沾及泉賞延于世有玄者宅姚塘之阿忠魂在兹鬼神護呵石闕峩峩松楸鬱鬱有永貞名千祀弗沒甫田集卷三十三
