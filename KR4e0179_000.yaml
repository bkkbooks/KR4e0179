body:
  text: 甫田集别集類五明提要臣等謹案甫田集三十五卷附録一卷明文徵明撰徵明初名璧以字行更字徵仲號衡山長洲人以嵗貢薦授翰林院待詔事迹具明史文苑傳是集凡詩十五卷文二十卷附録行略一卷其仲子嘉所述也徵明與沈周皆以書畫名亦並能詩揮灑淋漓但自寫其天趣如雲容水態不可限以方圓徵明詩則雅飭之中時饒逸韻靜志居詩話記其告何良俊之言曰我少年學詩從陸放翁入故格調卑弱不若諸君皆唐音也此所謂如魚飲水冷暖自知皎然不誣其本志然周天懷坦易其畫雄深而蒼莽詩格如之徵明秉志雅潔其畫細潤而瀟灑詩格亦如之要亦各肖其性情不盡由於所倣效也朱彛尊明詩綜録徴明詩十五首其池上一首得諸墨迹為本集所不載且稱其集外流傳者甚多惜無廣搜為續集者然縑素流傳半真半贋與其如吳鎮倪瓚諸集多收偽本固不如據其家集猶不失本來面目矣乾隆四十四年七月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:9ef63bc164d23bc82822e9655fb00da6e9cb5d13d6623d97364450147a3dc833
