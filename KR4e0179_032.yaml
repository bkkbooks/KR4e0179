body:
  text: 明文徵明撰墓志銘四首翰林蔡先生墓志嘉靖二十年辛丑正月三日吳郡蔡先生卒吾吳文章之盛自昔為東南稱首成化𢎞治間吳文定王文恪繼起髙科傳掌帝制遂持海內文柄同時若楊禮部君謙都太僕元敬祝京兆希哲仕不大顯而文章奕奕顒然在人要亦不可以一時一郡言也先生雖稍後出而所造實深自視甚髙常所評隲雖唐宋名家猶有所擇其隱然自負之意殆不肯碌碌後人而潦倒場屋曽不得盱衡抗首一儕諸公間而以小官困頓死嗚呼豈不有命哉先生諱羽字九逵其先望於陳留宋南渡時祕書郎源自大梁徙杭又自杭徙吳居太湖之包山先生其十四世孫也髙祖敬曽祖貞祖升以長子貴封奉政大夫父滂母吳氏先生髙朗疏俊聰警絶人少失父吳夫人親授之書輒能領解年十二操筆為文已有奇氣稍長盡發家所藏書自諸經子史而下悉讀而通之然不事記誦不習訓故而融液通貫能自得師為文必先秦兩漢為法而自信甚篤發揚蹈厲意必已出見諸論著奧雅宏肆潤而不浮詩尤雋永蚤嵗微尚纖縟既而濺滌曼靡一歸雅馴晚更沉著而時出奇麗見者謂雖長吉不過先生乃大悔恨曰吾辛苦作詩求出魏晉之上乃今為李賀耶吾愧死矣其髙自標表不肯屈抑如此然其所作凌歷頓迅誠亦髙敻莫及當其得意時不知古人何如也先生故邃於易出其緒餘為程文以應有司而辭義藻發每一篇出人爭傳以為式而先生試輒不售屢挫益鋭而卒無所成蓋自𢎞治壬子至嘉靖辛卯凡十有四試閲四十年而先生則既老矣嵗甲午以太學生赴選調天官卿雅知其名曰此吾少日所聞蔡某今猶滯選調耶然限於資地亦不能有所振拔特以程試第二人奏授南京翰林院孔目居三年致仕歸卒於家袁飛卿墓志銘飛卿諱翼其字飛卿姓氏袁蘇之吳邑人也世家郭西金昌里曽大父某大父某俱隱不仕父某以族人仕京師為兵官因𨽻京衛為武學生不幸早卒飛卿三嵗而孤育於母王氏少竒警異常母授之書輒能領解十齡能把筆為文稍長益淬礪精進尋補郡諸生益事博綜竒文祕記多所探閲聞有未見書輒奔走求之往往併金懸購以必得為快手披口吟窮日夕不厭雖𨽻學官業進取而不專事俗學然出其緒餘為程文則濺滌蔓蘼劖刪陳爛典麗明發煜然秀出每一篇出爭相傳録不終日已遍於邑中其為人慕尚如此然試有司輒不利自𢎞治甲子至正德丙子凡四試始舉於鄉是嵗以母病逗遛不及赴省試自是更七試或赴或不赴竟不獲一第而飛卿老矣蓋其性跅弛而意復逋蕩初未嘗以功名為意或勸之則曰吾性不耐事慵惰成習今仕途以禮法羈人視吾狂昜果堪為世用耶平生名義自信口未嘗言利與人處不為岸谷然矯亢任情不能與物俯仰一有所觸輒狂呌奮詈是是非非必逹其志乃已晚益骯髒深藏不出以樹藝自娛性喜菊闢小圃植菊數百本手自栽接不以為勞嘗曰吾平生萬事皆可遣棄惟積書種菊不能忘情或時饎㸑不繼回視吾所有輒欣然以樂不復自知其貧也昔陶靖節採菊東籬悠然有會又其言曰竒文共欣賞以淵明之髙塵視一世而猶復云云者直欲寄其所志焉耳余之所癖殆是類也嗚呼飛卿豈亦一時奇譎之士哉飛卿生成化辛丑十一月草又九日卒嘉靖辛丑二月草又一日享年六十有一初娶徐氏無子繼瞿氏生子一人麟士麟士以卒之明年壬寅八月草又九日葬黃山祖塋之次前葬以狀來乞銘且曰我先君每讀公文輒喜曰死而得文君銘可不死矣先君之亡雖無治命而其言不能忘也敢以請嗚呼余之言果足以永吾飛卿乎哉雖然不可辭也是為銘銘曰藝則工亦奮有庸胡仕之邅而卒困以窮有植藂藂緹緗縱縱歸視其家樂靡有忡亶適厥中而惟志之從吁嗟飛卿其永終太子少保南京吏部尚書贈太子太保諡文端吳公墓志銘嘉靖六年丁亥禮部尚書兼翰林學士長洲吳公自知制誥出領禮部事尋加太子少保出為南京吏部尚書故事無有自內制出理部事者若分司南京亦必有故而出公一再徙官雖以敘遷實皆左授蓋當路有嗛公者隂擠之士論咸為不平而公怡然就道無幾微見於色辭久之竟致其事而歸歸十有四年年八十三乃卒二十一年二月一日也公之歸也朝廷重其去特給輿皂廪以餘祿及是訃聞贈太子太保賜諡文端遣官治葬事自始死至葬諭祭者四皆異數也公舉𢎞治癸丑進士改庶吉士乙卯授翰林編修預修大明會典丁父憂服除復入翰林為編修修通鑑節要兼修玉牒正德丁卯升翰林侍講兼經筵官修孝宗實録充編纂官實録成改南京刑部員外郎先是逆瑾用事朝士往往屈節自容公與同官獨亢禮不為下瑾嗛之會進書延賞遂矯詔以更練為名盡出諸編纂官為曹郎公在刑曹逾年升南京禮部郎中瑾誅召還復入翰林為侍講兼經筵如故尋升侍講學士癸酉出為南京祭酒乙亥升南京太常卿嘉靖改元壬午召為禮部右侍郎進左侍郎奉詔使安陸恭題獻皇帝神主奉迎還京賜白金文綺進兼翰林院學士掌詹事府事知制誥修武宗實録充副總裁實録成賜白金文綺升禮部尚書兼官如故是嵗謁告省墓丙戌還朝尋有南京之命而公自是去國矣公生秀頴凝重少則知學稍長還𨽻郡學為諸生刺經綴文不專事舉子而程試之文藻麗雋發擅名一時既入翰林益肆力於學貫綜羣籍雋味道腴攄辭發藻務刋奇譎見諸論撰溫潤爾雅足自名家而醇謹修正尤以制行著稱初官法比或懼不勝任而公探讞維審不為文深傳爰論報咸協於令有老吏所不及者自是揚歷兩京荐登華要展采錯事所至職辨而南雍之政淵靖端方軌迹夷昜士服其誠入典邦禮屬繼統之初追崇未定羣僚百執事建議紛紜公軌道緒正不為茍同擬議之間多所乖忤賴上仁明不以為罪而一二秉權之人則己意忌之矣得罪去國殆亦以此立朝四十年雖以文字為職而國家利害生民休戚未嘗不以嬰懷有所見聞輒陳諸朝其言淮揚亢旱民流道阻及漕河通塞之故審畫有敘斟度維宜皆可見之施行嘗言范文正公自其少時即慨然有志於天下吾為鄉人愧公多矣於鄉里先輩獨喜吳文定公事輒師之晚嵗家居修復陸宣公墓及建先賢祠以祀范公及胡安定尹和靖凡以顯揚先烈表率後來也其好古樂善之心惟日不足故見諸行事咸有法程而世道榮辱升沉之事一不動心嘗四典文衡一領國子名卿碩輔多出其門而靖恭自將不以為德間朗醖籍喜愠不形否臧不出口故人莫能窺其所蘊然而端居自守之操仁隱不害之心所以播諸朝省被於鄉人者卒亦莫之能掩也公諱一鵬字南夫别號白樓居士世為蘇之長洲人高祖泰老曽祖敬俱不仕祖琮以公貴贈通議大夫南京太常寺卿祖妣周氏贈淑人父諱行初封翰林院編修階文林郎後纍贈太子少保禮部尚書妣司氏繼妣趙氏俱纍贈夫人公凡三娶元配宣繼姚又繼薛宣薛皆纍贈夫人子男二人子忠早卒子孝己丑進士庶吉士今為南京吏部主事以親老乞恩侍養於家孫男五人尚朴尚儉尚默尚遜尚潔朴以公蔭為國子生女四人孫女四人卒之嵗十月草六日葬吳縣陽山新阡某鄉里晚學辱公折節與遊知公為深於是子孝屬某為銘自顧猥劣不足承命而誼有不得辭者銘曰維吳奧區秀頴則鍾孰其尸之展也吳公維公英英賦才孔碩靡亟以徐亦貞而式維貞弗隨乃時有困回翔庶僚弗隕厥聞道弗終否乃窮而亨乃言有翼式昭用明進司帝制出教於國以德以文以莫不克展也吳公木質而理爰德之華匪言則藝豈無逺猷亦憂有思時弗我庸舍旃來歸退斯有榮維順而正八十斯齡爰考終命有展吳公令德維恆少也師古老而彌貞人孰不仕孰完如公孰不云匹哀榮始終煌煌密章天子有詔昭銘墓田尚後有考故資善大夫南京刑部尚書顧公墓志銘嘉靖二十四年乙巳閏正月八日辛巳南京刑部尚書顧公以疾卒於金陵里第先是公考績還自京師道聞長子嶼卒驚惋得疾扺家疾甚久之竟不起嗚呼惜哉公諱璘字華玉别號東橋居士世為蘇之吳縣人國朝洪武中髙祖通以匠作徵𨽻工部因占數為上元人曽祖海不仕祖誠以公貴贈資善大夫南京刑部尚書考紋號愚逸初封承德郎南京吏部主事加贈資善大夫南京刑部尚書祖母陸氏母楊氏俱贈夫人公以應天府學生領𢎞治乙卯鄉薦明年丙辰舉進士己未授廣平縣知縣壬戌徵入為南京吏部驗封司主事進稽勳郎中正德己酉升河南開封府知府癸酉謫授廣西全州知州丙子起知浙江台州府升浙江布政使司左參政嘉靖改元册立中宫禮成奉表入賀道升山西按察使以親老辭不允尋以病免戊子起為江西按察使未行升浙江右布政使轉左布政使庚寅召為都察院右副都御史巡撫山西上疏乞終養忤旨落都御史以布政使致仕丁酉再起為都察院右副都御史巡撫湖廣兼贊理軍務己亥升刑部右侍郎尋改吏部會顯陵肇工改工部左侍郎領山陵事進工部尚書事竣還朝改南京刑部尚書公於是歷仕三朝閲五十年歷十有九任積階自文林郎厯十有一資為資善大夫正治上卿公融朗闊逹精於吏理能激昻任事初蒞廣平年甫弱冠或昜視之而公關決敏利擲伏若神拊循道利靖而不煩而飾以文學有古循良之風及為開封益更練堅決盜起燕薊流劫中原攻圍城邑所在繹騷兵部尚書彭公澤奉詔疏捕領兵壓境上簡公自輔公亦悉心展錯練兵飾甲轉餉傳餐取具呼吸間而厭難折衝謀畫居多在郡期年隨事經理多所緒正而強執不撓鎮守中官廖堂恃逆瑾黨援圉奪自恣公摧抑捍蔽每折其萌芽不令得肆瑾誅廖罷去而錢寧用事羣閹方熾王宏者尤悖謾剽疾繼廖出鎮乘權席寵氣熖讋人一時有司或屈節自容公故不為禮有所徵需一不答嵗時展謁長揖而已用是積忤宏宏方恃寧為援矯詔逮赴錦衣獄獄吏問狀公據禮執誼抗言條對一無所承寧無已遣邏卒隂探郡中無所得乃文致他比以竟其獄獄成鐫三階徙全全即古零陵郡越在嶺嶠僻逺荒陋公不鄙夷其民而翊以文教道化更革誠心拊綏久之民用乂安而士興於學甫三年而有台州之命台為東南劇郡武衛錯居俗獷而喜訐胥史並緣其間縱橫叨詖更數政不治公至爬疏剔抉求得其敝端與利源所在次第興除之故事武衛諸城郡為修築更費浩穰率為主守者乾沒恆嵗一築築輒壞公鈎考得所侵漁悉沒入為城費檄義士經理而程督之故他城昜隳而台所𨽻三城特完郡瀕海有鹽莢之利貧民業鹽自食辜苦榷煩苛每迂道轉輸而邏卒乘是為姦利至相賊殺不可止公為弛禁俾得負販出郡下而薄其稅入民用便利而國課亦登故時軍餉不時給運軍往往稱貸以需而駔儈得肆侵牟公支放有期而勾稽維審軍皆給足而姦民無所牟利矣郡南瀕江卑下多水患地有中津橋且壞公復修之因築石隄而樓其上凡數十楹人初莫喻其旨已而夏潦水猝至居民得依樓以避所活以千計乃服公先見云既久於台悉浙中事宜繼起藩參遂得舉而行之雖不及久而宏規石畫功緒為多及以左轄重臨益諳練宏逹而意復周審展采錯事惟志所為而釐革積敝若賦發科適調補吏胥皆利蠧蟠結前政所不敢問者公排根絶蔓振剔不少縱而畫一以守要束章程咸正而核吏不得緣以為姦事緒雜襲文牒糾紛隨事剸裁司無留政御史按浙者往往斂手無所事事然積不能平乘其解任而躡尋過誤一時雖橫被口語而素履明潔堅實在人卒亦不能有所誣蔑也起撫湖南益事振植湖湘遐矌提封數千里撫臣尊重受計坐理而已公不躡故迹軺車省循遍歷州郡雖偏疆下鄙莫不躬蒞跋涉險阻蒙犯霜露不少厭却故事撫臣述歷必以藩臬守臣自隨公悉謝遣軒車簡昜傔徒斂約供頓次舍身足周用民安堵不知為勞念荆湖沃衍而流庸惰弛地利有所未盡科輸煩擾期會促迫民日益貧公私交病故所至劭農振業平繇復稅而擲伏省微軌迹夷昜民用安集而嵗亦比登在鎮逾年多所建白首言地瘠民貧兵食不足而藩府賦祿無隄後繼為難又以湖湘控扼邊徼地大事繁御史按部嵗更一代勢不得周欲乞添差御史分蒞湖南北以廣詢謀又言外屬臣􅒼多有宏才碩望足充任使者比嵗限以藩府戚屬不得內徙此非祖宗舊制乞越例推選以收偉才所言凡數十事皆當時利病深切治理雖不盡施行而論者莫不韙其言云顯陵之作役大事繁經費不資公既長於料簡而程省弗懈調發有制視他所塋率損費十五而功實倍規制宏偉翬飛赫奕而民不告病有司不以為煩其經理施置有足多者然此特出其緒餘耳而非公所用以為才也及是雖典邦刑而留司務簡亦不足以盡其用且鄉里所在父老姻戚不能無望於公而公執志堅定不肯骫骳以徇茍罹於辜必以法繩之豪植強禦咸不得肆而怨讟興矣言者因得假以為辭肆言醜抵而素所忌嫉之人從而醖釀之公雖內省不愧而不勝浸淫之辱竟鬱鬱以沒嗚呼公論不明是非失實使瓌奇卓越之才不獲推究於明盛之世必有執其咎者君子固有俟於百世之下也然公亦奚憾哉公素長者不虞人詆欺而直諒自信不肯脂韋干譽出入中外垂五十年一時新進多非曹耦公既前輩自處論議之間陵轣奮迅侃侃自將每下視諸人多不能堪往往傍睨切齒而公不知也其得謗受禍殆亦以此平居事親孝愚逸公病疽公時已五十餘與同臥起吮濯扶掖舉身親之肉血淋灕十指皆潰曽不肯自佚以委勞於人初公以親故一再解官其後出入靡恆而二親之亡公適皆在告皆得受終焉殆有不偶然者處羣從兄弟尤極友愛從弟玉英繼公起進士官按察副使仕歸而貧而介潔自將公雅知其志雖日與親接而不輒饋遺然而中心相孚不殊同胞也少學於李璞先生李死一子不立妻某不免飢寒公在官每分餘資給之既又為其子植産旋植旋廢而其子卒困以死乃迎某氏於家死為斂葬而給其孫如子終其身不衰友人胡欽死妻方食貧養姑公俾里中上其事請表於朝凡旌核探究文牒往來咸具於公而一切更費咸自公出至於里黨族屬婚喪緩急亦多倚成於公其於倫誼至篤也為文不事險刻而鑄詞發藻必古人為師見諸論著雄深爾雅足自名家詩尤雋永雖矩矱唐人而劖芟陳爛時出奇峭樂府歌詞不失漢魏風格問學深博既有資地而才敏氣充足以發之自其少時已有名世之志既舉進士即自免歸大肆力於學時陳侍講魯南王太僕欽珮皆未仕家居皆名能文與相麗澤聲望奕然時稱金陵三俊及官南曹曹事甚簡益淬厲精進居六年而學益有聞自是出入中外所雅遊若李崆洞獻吉若何大復仲默若朱升之徐昌榖皆海內名流一時詩名震疊不啻李杜復出而公頡頏其間不知其孰為高下也然諸公皆仕不顯又皆盛年物故公仕最久官亦最顯所歷若沅湘若天台鴈宕若衡嶽皆山水勝處雖簿書鞅掌而不忘觚翰所至領客宴遊感時懷古臨觀賦詩風流文雅照映林壑委蛇張弛有古高賢特逹之風及是將解留務往來吳門尋鄉里舊遊期余盡遊諸山以畢其平生而事左心違竟成乖越嗚呼而今已矣尚忍言哉公所著書曰國寶新編曰近言曰顧氏七記詩曰浮湘稿曰山中集曰息園集曰憑几集曰登衡小紀總若干卷其生成化丙申七月二日享年七十娶沈氏封夫人子男三人嶼嵗貢生娶羅氏峙娶陳氏又次峻女二人適俞璉趙念孫男八人履祥蔭為國子生次賔祥元祥耆祥應祥楚祥餘幼孫女二人曽孫男三人履祥等以卒之明年某月日葬上元彭城山之原前事奉公門生太常少卿許榖所為狀來乞銘銘曰於穆孝皇立國用明孰言翊之允維邦楨烈烈顧公維時之彥爰外而中式揚用踐起家民牧弗奪弗違言飲之和既去而思豈德則周亦堅厥志志植靡移乃言有濟扶微興壞樹之風聲載蹶載奮卒偕以升維靖而共乃剛弗折式遄其歸峻躋華列出將使指入典邦刑以翼以貞以莫不維爰飾用文富茲述作乃古有訓仕優而學其學如何亶言華國敷彰帝猷詠歌明德在孝皇日羣獻英英發藻攄詞式章用明翺翔後先公實曹耦德音洋洋經學之懋烈烈顧公既瓌既奇學為文宗政為吏師維學維政鮮茲兼得繄名之高斯毁之積烈烈顧公連蹇在是豈不顯融迄屯厥施彭城之原公兆於斯尚後有考視此刻詞甫田集卷三十二
